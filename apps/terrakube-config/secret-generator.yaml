# KSOPS generator - Terrakube secrets
#
# ArgoCD repo-server に注入された KSOPS プラグインが
# secrets/*.enc.yaml を復号して Secret リソースを生成する。
#
# CNPG Barman の S3 credentials (cnpg-garage-credentials) は KSOPS では
# 生成しない。Garage Operator が GarageKey "cnpg-terrakube" の secretTemplate で
# terrakube NS に直接生成する (apps/garage/keys.yaml 参照)。
#
# terrakube-app-secrets: Terrakube 本体 (Helm) の PatSecret / InternalSecret。
# chart の b64enc 仕様に合わせ base64(値) で格納し、各 component の env から
# valueFrom: secretKeyRef で注入する (infrastructure/terrakube/application.yaml)。
# OIDC connector clientSecret 用 secret は Phase 1b で追加する。
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/terrakube-db-app.enc.yaml
  - secrets/terrakube-app-secrets.enc.yaml
