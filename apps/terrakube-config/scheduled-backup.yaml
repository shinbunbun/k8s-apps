# 毎日 03:00 JST (= 18:00 UTC) に terrakube-db の base backup を取得。
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: terrakube-db-daily
spec:
  schedule: "0 0 18 * * *"
  backupOwnerReference: self
  cluster:
    name: terrakube-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  immediate: false
