# Rust + Polars: bronze (raw -> daily-struct) for systemd source
#
# shinbunbun/dotfiles-private#191 Phase 4 で apps/logs-typed-dbt/ から切り出し。
# 旧 dbt-duckdb (apps/logs-typed-dbt/cronjob-bronze.yaml) との並走 verify を継続。
# 新 prefix `daily-struct/` に書くので旧 `daily/` には触れない。
# image source: shinbunbun/logs-pipeline
# credentials: logs-rust-pipeline-credentials (apps/garage/keys.yaml の専用 GarageKey)
#
# Schedule:
#   00:35 JST (旧 dbt-duckdb bronze 00:30 JST から 5 分ずらして競合回避)。
#   両方とも raw/ を読むだけで delete はしないので衝突は理論上ないが、
#   観測できるよう時間差を入れる。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-bronze-systemd
spec:
  schedule: "35 0 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: bronze
            source: systemd
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pipeline
              # 将来 ArgoCD Image Updater で SHA pin 化予定 (Phase 4 残タスク)。
              image: ghcr.io/shinbunbun/logs-pipeline:latest
              args:
                - bronze
                - --source
                - systemd
                # date は省略 -> binary 内で yesterday-jst を解釈
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
                - name: RUST_LOG
                  value: "info"
              envFrom:
                - secretRef:
                    name: logs-rust-pipeline-credentials
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  # Polars dynamic NDJSON inference + concat(diagonal=true) で全 hour
                  # を in-memory に乗せるため、systemd 25K 行でも余裕を持って 4Gi。
                  # 実測 (peak_mib log) 後に縮小可。
                  memory: 4Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: [ALL]
              volumeMounts:
                # tempfile crate が /tmp に書き出すため emptyDir をマウント
                # (readOnlyRootFilesystem=true なので /tmp も RO になる)。
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 1Gi
