# Rust + Polars: bronze (raw -> daily-struct) for systemd source
#
# Source repo: shinbunbun/logs-pipeline
# 経緯: shinbunbun/dotfiles-private#191 Phase 4 で apps/logs-typed-dbt/ から切り出し
# credentials: logs-rust-pipeline-credentials (apps/garage/keys.yaml の専用 GarageKey)
# image SHA pin: kustomization.yaml の images transformer (newTag) で一元管理
#
# Schedule: 00:35 JST。4 source の bronze を 10 分間隔の連番 (35/45/55/05) で
#           走らせ、観測しやすく時間差を入れている。raw/ を読むだけなので競合なし。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-bronze-systemd
spec:
  schedule: "35 0 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: bronze
            source: systemd
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pipeline
              # tag は kustomization.yaml の images transformer で SHA pin される。
              image: ghcr.io/shinbunbun/logs-pipeline:latest
              args:
                - bronze
                - --source
                - systemd
                # date は省略 -> binary 内で yesterday-jst を解釈
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
                - name: RUST_LOG
                  value: "info"
              envFrom:
                - secretRef:
                    name: logs-rust-pipeline-credentials
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  # Polars dynamic NDJSON inference + concat(diagonal=true) で全 hour
                  # を in-memory に乗せるため、systemd 25K 行でも余裕を持って 4Gi。
                  # 実測 (peak_mib log) 後に縮小可。
                  # 2026-05-15/16 OOM-killed 発生 (anon-rss 4.1GB で limit 突破、
                  # systemd silver 量増加で 449MB NDJSON / 338K records に到達):
                  # bronze-k8s-pods と同じ +50% 6Gi に bump (dotfiles-private#242 系)。
                  # 2026-05-17 NDJSON 1.64GiB / 1.2M records (5/15 の 3.6x) に再急増、
                  # 6Gi は 19s で OOM、12Gi も parsing 段階で OOM、24Gi で完走 (k8s-apps#363
                  # で /tmp sizeLimit、本 PR で memory を 6→24Gi)。Polars NDJSON inference
                  # の memory 増幅 (~7-8x NDJSON size) が根本原因 (dotfiles-private#242)。
                  memory: 24Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: [ALL]
              volumeMounts:
                # tempfile crate が /tmp に書き出すため emptyDir をマウント
                # (readOnlyRootFilesystem=true なので /tmp も RO になる)。
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                # 2026-05-17 00:35 JST daily run が 1Gi 超過で 19s で Evict、systemd の
                # bronze 出力だけ Parquet 欠落 (silver/drain-apply も連鎖スキップ)。
                # bronze-k8s-pods が 5/13 に同じ理由で 4→8Gi 拡張済み。systemd は
                # 当面 silver-systemd と同水準の 4Gi に揃える。
                sizeLimit: 4Gi
