# Rust + Polars: gold/template_rate (silver + templates -> count by template_id/hour) for k8s-pods
#
# Source repo: shinbunbun/logs-pipeline (gold-build subcommand、PR #26)
# 経緯: shinbunbun/dotfiles-private#201 Phase 6
#
# k8s-pods は template_card 最大 (~1720)、JOIN 後の hash table が systemd より大きい。
#
# Schedule: 05:35 JST。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-gold-template-rate-k8s-pods
spec:
  schedule: "35 5 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: gold
            table: template-rate
            source: k8s-pods
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pipeline
              image: ghcr.io/shinbunbun/logs-pipeline:latest
              args:
                - gold-build
                - --table
                - template-rate
                - --source
                - k8s-pods
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
                - name: RUST_LOG
                  value: "info"
              envFrom:
                - secretRef:
                    name: logs-rust-pipeline-credentials
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 4Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: [ALL]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 4Gi
