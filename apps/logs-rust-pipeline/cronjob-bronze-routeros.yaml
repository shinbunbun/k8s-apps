# Rust + Polars: bronze (raw -> daily-struct) for routeros source
#
# Source repo: shinbunbun/logs-pipeline
# 経緯: shinbunbun/dotfiles-private#191 Phase 4 で apps/logs-typed-dbt/ から切り出し
# credentials: logs-rust-pipeline-credentials (apps/garage/keys.yaml の専用 GarageKey)
# image SHA pin: kustomization.yaml の images transformer (newTag) で一元管理
#
# Schedule: 00:45 JST。4 source の bronze を 10 分間隔の連番 (35/45/55/05) で走らせる。
#
# Memory:
#   routeros は systemd の ~50x volume (5M+ rows/day)、巨大 record (5MB config dump
#   100-200/日) も含めて全保持 (1MB filter / truncate なし)。実測 peak ~3.7 GiB
#   (limit 8Gi の 45%)。1 週間以上観察後に 6Gi へ縮小余地あり (Issue #191 D-1)。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-bronze-routeros
spec:
  schedule: "45 0 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: bronze
            source: routeros
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pipeline
              image: ghcr.io/shinbunbun/logs-pipeline:latest
              args:
                - bronze
                - --source
                - routeros
                # date は省略 -> binary 内で yesterday-jst を解釈
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
                - name: RUST_LOG
                  value: "info"
              envFrom:
                - secretRef:
                    name: logs-rust-pipeline-credentials
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 8Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: [ALL]
              volumeMounts:
                # tempfile crate が /tmp に hour 別 NDJSON + 最終 Parquet を書くため
                # emptyDir をマウント。zstd 解凍後 NDJSON が一時的に展開される。
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 4Gi
