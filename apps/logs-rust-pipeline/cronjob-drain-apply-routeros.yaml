# Drain3 sidecar: silver -> templates assignments for routeros
#
# Source repo: shinbunbun/logs-pipeline-drain
# 経緯: shinbunbun/dotfiles-private#197 Phase 5
# Schedule: 02:40 JST (= silver 01:45 + ~1h)。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-drain-apply-routeros
spec:
  schedule: "40 2 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      # routeros 6M rows は Drain Python iter で 30-60 分見込み、余裕で 2h。
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: drain-apply
            source: routeros
        spec:
          restartPolicy: OnFailure
          containers:
            - name: drain
              image: ghcr.io/shinbunbun/logs-pipeline-drain:latest
              args:
                - apply
                - --source
                - routeros
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
              envFrom:
                - secretRef:
                    name: logs-rust-pipeline-credentials
              resources:
                requests:
                  cpu: 500m
                  memory: 512Mi
                limits:
                  # 6M rows の silver parquet load + Drain tree。PoC で 500K rows ×
                  # 通常設定の peak は 1-2 GiB、6M rows で 4 GiB を上限に取る。
                  memory: 4Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                capabilities:
                  drop: [ALL]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 1Gi
