# Drain3 sidecar: silver -> templates assignments for routeros
#
# Source repo: shinbunbun/logs-pipeline-drain
# 経緯: shinbunbun/dotfiles-private#197 Phase 5
#
# **2026-05-30 fix**: routeros cumulative drain tree が 15,546 clusters / 421M msg
# まで成長し、逐次モード (`apply` のデフォルト) では 5.4M rows/日 を 2h
# (activeDeadlineSeconds 上限) 内に処理できず連続 SIGKILL されていた
# (5/21 以降 daily templates 欠落)。手動 debug Job で `--workers 4` 並列モード
# (read-only match()、state mutate なし、PR #3 で導入) が 64 min で完走することを
# 確認したため、daily cron を並列モードに切り替える。
#
# trade-off: read-only モードでは新規 template が state.bin に追加されない。
# 直近 30 日 routeros で 2,279 個出ていた new template が untracked になるが、
# motherduck 実測で直近 7 日新規 0 = 安定期と判明済 (shinbunbun/dotfiles-private#264)。
# 中期的には `mine` CronJob を別途追加して state を rebuild する想定 (別 Issue)。
#
# `--workers 4` 時は drain.py の挙動上 `--dump-templates` は ignored (warning) なので削除。
# 既存の templates/source=routeros/templates.parquet snapshot は当面 固定される。
#
# Schedule: 02:40 JST (= silver 01:45 + ~1h)。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-drain-apply-routeros
spec:
  schedule: "40 2 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      # routeros 6M rows は Drain Python iter で 30-60 分見込み、余裕で 2h。
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: drain-apply
            source: routeros
        spec:
          restartPolicy: OnFailure
          containers:
            - name: drain
              image: ghcr.io/shinbunbun/logs-pipeline-drain:latest
              args:
                - apply
                - --source
                - routeros
                - --workers
                - "4"
                - --force  # 並列モードでは state save がスキップされる関係上、上書き許可で安全側
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
              envFrom:
                - secretRef:
                    name: logs-rust-pipeline-credentials
              resources:
                requests:
                  cpu: 500m
                  memory: 512Mi
                limits:
                  # 6M rows の silver parquet load + Drain tree。PoC で 500K rows ×
                  # 通常設定の peak は 1-2 GiB、6M rows で 4 GiB を上限に取る。
                  memory: 4Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                capabilities:
                  drop: [ALL]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 1Gi
