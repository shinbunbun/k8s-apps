# Argo CronWorkflow: egress C2 検知 gold ビルダー (dotfiles-private#399 / #396)
#
# 「感染端末が変なとこ(C2)へ通信していないか」を、既存の netflow(IPFIX)+
# passive-DNS に脅威判定とエンリッチを乗せて日次で materialize する検知ジョブ。
# 新規センサー(Suricata/TZSP ミラー等)は入れず、既に取っているデータの上に
# 分類・ランキングを載せるだけ (dotfiles-private#396 の方針転換)。
#
# 設計 (dotfiles-private#399、15 日実データ backtest で裏付け済み):
#   検知の本質は「アルゴリズム」でなく「大量の良性周期/直打ち通信から悪性の細い尾を
#   分離する分類」。主役はエンリッチメント。学習型 ML は不採用(陽性例ゼロ +
#   base-rate fallacy + 異常≠悪性)。ルール(背骨)+ 統計スコア(振る舞い)で構成。
#
#   3 検知を 1 テーブルに UNION して出力する:
#     - D1 known-bad (severity=alert): gold.remote が C2 脅威フィードに一致。精度≈1.0。
#     - D2 beacon    (severity=alert): netflow silver の接続間隔が規則的(CV<0.3, ≥24 接続)
#         かつ ASN が大手 cloud/CDN でない = 未知 C2 を振る舞いで炙り出す(RITA 相当)。
#     - D3 direct-to-IP suspicious (severity=review): DNS 解決痕跡なし(qname 無)× 非大手
#         ASN。単独では ~23/日出るのでアラートでなくレビュー枠。D2 と重なった時が本命。
#
# 入力(すべて既存資産、追加の常駐サービス無し):
#   - gold/access-attribution/date=<d>/data.parquet … netflow ⋈ passive-dns ⋈ ASN を
#       materialize 済(gold-access-attribution)。org/country/qname 付き。D1/D3 の土台。
#   - silver/source=netflow/date=<d>/logs.parquet   … D2 のビーコン計算(接続間隔)。
#   - reference/asn/asn.parquet                     … D2 の org 付与(INET BETWEEN range join)。
#   - C2IntelFeeds IPC2s.csv (GitHub, 無認証)        … D1 の C2 宛先 IP フィード。
#
# 出力: s3://logs-archive/gold/egress-c2/date=<rundate>/data.parquet (garage-archive)。
#   date はデータ列に持たず hive partition (date=) が供給(access-attribution と同方針)。
#   Grafana dashboard / alert がこれを読む(#399 別コミット)。
#
# フィード注記: abuse.ch(Feodo/ThreatFox/URLhaus)は現在 DL に無料 Auth-Key が要る/
#   Feodo プレーンリストは枯れているため、v1 は無認証の C2IntelFeeds のみ。Auth-Key
#   取得後に ThreatFox を追加する(SOPS に鍵を置いて envFrom で注入)。
#
# ランタイム: 公式 python:slim + pip 固定版 duckdb の純 SQL ジョブ(asn-reference と同方式、
#   専用 image や新 gold エンジンを増やさず k8s 単一リポジトリに収める)。httpfs で S3/GitHub、
#   inet 拡張で ASN range join。書込みは既存 logs-rust-pipeline-archive-credentials を再利用。
#
# 初回: CronWorkflow は作成時に走らないため merge 後に一度手動トリガする
#   argo submit --from cronwf/egress-c2-build -n logs-rust-pipeline
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: egress-c2-build
spec:
  # 毎日 05:00 JST。daily-pipeline(00:35 起動、gold-access-attribution 完了)より後に
  # 走らせ、当日ぶんの access-attribution gold が揃った状態で読む。
  schedules:
    - "0 5 * * *"
  timezone: "Asia/Tokyo"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    entrypoint: build
    activeDeadlineSeconds: 900
    ttlStrategy:
      secondsAfterCompletion: 86400
    podMetadata:
      labels:
        app: logs-rust-pipeline
        tier: gold
        table: egress-c2
    templates:
      - name: build
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values: [g3pro]
        # 一過性の S3 timeout / runtime pip・拡張取得・GitHub フェッチ失敗を OnFailure × 2 で吸収。
        retryStrategy:
          limit: "2"
          retryPolicy: OnFailure
          backoff:
            duration: "1m"
            factor: "2"
            maxDuration: "10m"
        script:
          image: python:3.14-slim
          command: [bash]
          source: |
            set -euo pipefail
            # pip は readOnlyRootFilesystem 下で書けないので /tmp に隔離インストール。
            # duckdb は C 拡張のため image の python と ABI 互換な cp wheel が要る
            # (python:3.14-slim = cp314 は duckdb>=1.5.1 のみ wheel 提供)。asn-reference と pin を揃える。
            # この pin は renovate.json5 の customManager (pypi) で追跡する。
            pip install --no-cache-dir --quiet --target /tmp/pylib 'duckdb==1.5.4'
            export PYTHONPATH=/tmp/pylib HOME=/tmp
            python - <<'PY'
            import os, duckdb
            from datetime import datetime, timedelta
            from zoneinfo import ZoneInfo

            # rundate = 昨日(JST)。当日ぶんの access-attribution gold が対象。
            rundate = (datetime.now(ZoneInfo("Asia/Tokyo")).date() - timedelta(days=1)).isoformat()
            print(f"egress-c2 build rundate={rundate}")

            con = duckdb.connect()
            con.execute("SET memory_limit='1GB'")
            con.execute("SET temp_directory='/tmp/duckdb'")
            con.execute("INSTALL httpfs"); con.execute("LOAD httpfs")
            con.execute("INSTALL inet");   con.execute("LOAD inet")
            con.execute(f"""
                CREATE SECRET garage (
                  TYPE s3, PROVIDER credential_chain, CHAIN 'env',
                  REGION 'garage', ENDPOINT '{os.environ["GARAGE_S3_ENDPOINT"]}',
                  URL_STYLE 'path', USE_SSL false
                )
            """)

            # C2 脅威フィード(無認証)。ip,ioc 形式・# はコメント。
            feed_rows = con.execute("""
                SELECT count(*) FROM read_csv(
                  'https://raw.githubusercontent.com/drb-ra/C2IntelFeeds/master/feeds/IPC2s.csv',
                  header=false, delim='\x01', columns={'l':'VARCHAR'}, ignore_errors=true)
                WHERE l NOT LIKE '#%' AND l LIKE '%.%.%.%,%'
            """).fetchone()[0]
            assert feed_rows > 0, "C2 feed empty — フェッチ失敗の可能性"
            print(f"C2 feed rows={feed_rows}")

            # 大手 cloud/CDN/SaaS の org allowlist(良性の周期/直打ちを抑制)。
            # v1 は正規表現。将来は維持テーブル(reference/)化する (#399)。
            CLOUD_RE = ("(?i).*(amazon|cloudflare|google|facebook|meta platforms|microsoft|"
                        "msn|apple|akamai|fastly|edgecast|limelight|cdn77|incapsula|imperva|"
                        "netflix|youtube|telegram|linkedin|twitter|zoho|salesforce|rubicon|"
                        "adjust|aarki|line corp|automattic|cloudfront).*")

            GARAGE = "s3://logs-archive"
            sql = f"""
            COPY (
              WITH
              gold AS (
                SELECT client_ip, remote, qname, org, country, bytes, flows, date
                FROM read_parquet('{GARAGE}/gold/access-attribution/date=*/data.parquet',
                     hive_partitioning=true, union_by_name=true)
                WHERE client_ip LIKE '192.168.1.%'
              ),
              feed AS (
                SELECT split_part(l, ',', 1) AS ip, split_part(l, ',', 2) AS ioc
                FROM read_csv('https://raw.githubusercontent.com/drb-ra/C2IntelFeeds/master/feeds/IPC2s.csv',
                     header=false, delim='\x01', columns={{'l':'VARCHAR'}}, ignore_errors=true)
                WHERE l NOT LIKE '#%' AND l LIKE '%.%.%.%,%'
              ),
              -- D1: known-bad(gold.remote ∈ C2 フィード)。trailing 2 日。
              d1 AS (
                SELECT 'known_bad' AS detection, 'alert' AS severity,
                  g.client_ip, g.remote, CAST(NULL AS BIGINT) AS dst_port, g.qname, g.org, g.country,
                  f.ioc, CAST(NULL AS BIGINT) AS conns, CAST(NULL AS DOUBLE) AS cv,
                  CAST(NULL AS DOUBLE) AS med_gap_s, CAST(NULL AS DOUBLE) AS mean_bytes,
                  CAST(SUM(g.flows) AS BIGINT) AS flows, CAST(SUM(g.bytes) AS BIGINT) AS bytes,
                  2 AS window_days
                FROM gold g JOIN feed f ON g.remote = f.ip
                WHERE g.date >= DATE '{rundate}' - INTERVAL 1 DAY AND g.date <= DATE '{rundate}'
                GROUP BY g.client_ip, g.remote, g.qname, g.org, g.country, f.ioc
              ),
              -- D3: 疑わしい直打ち(qname 無 × 非大手 org)。rundate 当日。severity=review。
              d3 AS (
                SELECT 'direct_suspicious', 'review',
                  g.client_ip, g.remote, CAST(NULL AS BIGINT), CAST(NULL AS VARCHAR), g.org, g.country,
                  CAST(NULL AS VARCHAR), CAST(NULL AS BIGINT), CAST(NULL AS DOUBLE),
                  CAST(NULL AS DOUBLE), CAST(NULL AS DOUBLE),
                  CAST(SUM(g.flows) AS BIGINT), CAST(SUM(g.bytes) AS BIGINT), 1
                FROM gold g
                WHERE g.date = DATE '{rundate}'
                  AND (g.qname IS NULL OR g.qname = '')
                  AND coalesce(g.org, '') NOT SIMILAR TO '{CLOUD_RE}'
                GROUP BY g.client_ip, g.remote, g.org, g.country
              ),
              -- D2: ビーコン(silver 接続間隔が規則的 × 非大手 ASN)。trailing 7 日。
              nf AS (
                SELECT src_ip, dst_ip, dst_port, ts, bytes
                FROM read_parquet('{GARAGE}/silver/source=netflow/date=*/logs.parquet',
                     hive_partitioning=true, union_by_name=true)
                WHERE date > DATE '{rundate}' - INTERVAL 7 DAY AND date <= DATE '{rundate}'
                  AND src_ip LIKE '192.168.1.%' AND dst_ip LIKE '%.%.%.%'
                  AND NOT (dst_ip LIKE '192.168.%' OR dst_ip LIKE '10.%' OR dst_ip LIKE '172.1%'
                    OR dst_ip LIKE '172.2%' OR dst_ip LIKE '172.3%' OR dst_ip LIKE '169.254.%'
                    OR dst_ip LIKE '127.%' OR dst_ip LIKE '224.%' OR dst_ip LIKE '239.%' OR dst_ip LIKE '255.%')
              ),
              gaps AS (
                SELECT src_ip, dst_ip, dst_port,
                  epoch(ts) - LAG(epoch(ts)) OVER (PARTITION BY src_ip, dst_ip, dst_port ORDER BY ts) AS gap_s,
                  bytes
                FROM nf
              ),
              bcn AS (
                SELECT src_ip, dst_ip, dst_port, COUNT(*) AS conns,
                  STDDEV_SAMP(gap_s) / NULLIF(AVG(gap_s), 0) AS cv,
                  MEDIAN(gap_s) AS med_gap_s, AVG(bytes) AS mean_bytes
                FROM gaps WHERE gap_s IS NOT NULL
                GROUP BY src_ip, dst_ip, dst_port
                HAVING COUNT(*) >= 24 AND STDDEV_SAMP(gap_s) / NULLIF(AVG(gap_s), 0) < 0.3
              ),
              asn AS (
                SELECT range_start, range_end, org, country
                FROM read_parquet('{GARAGE}/reference/asn/asn.parquet') WHERE family = 'v4'
              ),
              d2 AS (
                SELECT 'beacon', 'alert',
                  b.src_ip, b.dst_ip, b.dst_port, CAST(NULL AS VARCHAR), a.org, a.country,
                  CAST(NULL AS VARCHAR), b.conns, round(b.cv, 4),
                  round(b.med_gap_s), round(b.mean_bytes),
                  CAST(NULL AS BIGINT), CAST(NULL AS BIGINT), 7
                FROM bcn b LEFT JOIN asn a
                  ON b.dst_ip::INET BETWEEN a.range_start::INET AND a.range_end::INET
                WHERE coalesce(a.org, '') NOT SIMILAR TO '{CLOUD_RE}'
              )
              SELECT * FROM d1
              UNION ALL SELECT * FROM d3
              UNION ALL SELECT * FROM d2
            ) TO '{GARAGE}/gold/egress-c2/date={rundate}/data.parquet'
              (FORMAT parquet, COMPRESSION zstd)
            """
            con.execute(sql)
            n = con.execute(
                f"SELECT count(*) FROM read_parquet('{GARAGE}/gold/egress-c2/date={rundate}/data.parquet')"
            ).fetchone()[0]
            by = con.execute(
                f"""SELECT detection, count(*) FROM read_parquet('{GARAGE}/gold/egress-c2/date={rundate}/data.parquet')
                    GROUP BY detection ORDER BY detection"""
            ).fetchall()
            print(f"wrote {GARAGE}/gold/egress-c2/date={rundate}/data.parquet rows={n} by_detection={by}")

            # severity=alert (D1 known-bad / D2 beacon) を 1 行 1 検知の構造化マーカーで stdout に出す。
            # Alloy DaemonSet が job="k8s-pods" として Loki へ収集し、loki-config の EgressC2* ルールが
            # このマーカー行を count_over_time で拾って Alertmanager→Discord に流す (k8s-apps#... / #399)。
            # level="error" にしない(既存 K3sPodErrorLogDetected と混線させない)ため "error/fail/warn"
            # 語を含めず、専用トークン EGRESS_C2_ALERT を目印にする。
            alerts = con.execute(f"""
                SELECT detection, client_ip, remote,
                  coalesce(dst_port::VARCHAR, '') AS dst_port,
                  coalesce(org, '(unknown ASN)') AS org, coalesce(country, '') AS country,
                  coalesce(ioc, '') AS ioc, coalesce(conns::VARCHAR, '') AS conns,
                  coalesce(cv::VARCHAR, '') AS cv
                FROM read_parquet('{GARAGE}/gold/egress-c2/date={rundate}/data.parquet')
                WHERE severity = 'alert' ORDER BY detection, remote
            """).fetchall()
            for detection, client_ip, remote, dst_port, org, country, ioc, conns, cv in alerts:
                sev = "critical" if detection == "known_bad" else "warning"
                print(f"EGRESS_C2_ALERT severity={sev} detection={detection} client_ip={client_ip} "
                      f"remote={remote} dst_port={dst_port} org={org!r} country={country} "
                      f"ioc={ioc!r} conns={conns} cv={cv} date={rundate}")
            print(f"egress-c2 alert markers emitted={len(alerts)}")
            PY
          env:
            - name: GARAGE_S3_ENDPOINT
              value: "garage-archive.garage.svc.cluster.local:3900"
          envFrom:
            - secretRef:
                name: logs-rust-pipeline-archive-credentials
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              # D2 が trailing 7 日ぶんの netflow silver を窓関数で走査 + INET range join。
              memory: 1536Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
        volumes:
          - name: tmp
            emptyDir:
              sizeLimit: 2Gi
