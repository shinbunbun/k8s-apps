# Argo Workflows WorkflowTemplate: logs-pipeline daily DAG
#
# dotfiles#681 Phase 3: 4 source × 3 stage の真の DAG。旧 CronJob 12 本を
# 置き換える本番化版。Phase 2 PoC (systemd 1 source) から拡張。
#
# 構造:
#   daily-pipeline (steps, withItems で 4 source 並列展開)
#       source-pipeline (DAG, source ごとに bronze→silver→gold-volume 直列)
#           bronze        -> ingest-stage(stage=bronze)  logs-pipeline bronze --source <s>
#           silver        -> ingest-stage(stage=silver)  logs-pipeline silver --source <s>     (depends: bronze)
#           gold-volume   -> gold-volume                 logs-pipeline gold-build --table volume --source <s> (depends: silver)
#
# 【テンプレート統合 (T62)】bronze/silver/gold-volume の 3 stage はかつて
# それぞれ別テンプレート (各 ~85 行) として定義され、retryStrategy/affinity
# (g3pro NotIn)/securityContext/volumeMounts/podSpecPatch が完全重複していた。
# #479 の retryStrategy 追加時も 3 箇所に同じブロックを貼る必要があり drift の
# 温床だった (実際 retryStrategy コメントが stage 間でずれ始めていた)。
#
# bronze と silver は「テンプレート名・tier ラベル・args の stage 名」だけが
# 異なり構造完全一致だったため、stage 名を inputs.parameters 化した単一テンプレート
# ingest-stage に統合した。gold-volume は args が gold-build --table volume と
# 構造が異なり (4要素 vs bronze/silver の 2要素)、activeDeadlineSeconds も 1800
# (bronze/silver は 3600)、pod に table=volume ラベルが付くなど固有差分が多いため、
# 無理に統合せず独立テンプレートのまま残した (タスク方針: gold 固有差分は最小分岐)。
# これで bronze≡silver の重複 (~85 行) が解消され、共通部の方針変更が ingest-stage
# 1 箇所 + gold-volume 1 箇所の計 2 箇所保守 (従来 3 箇所) に減る。
# 注意: source-pipeline DAG の task 名 (bronze/silver/gold-volume) は維持して
# いるため、Workflow node 名・既存の挙動は変わらない。
#
# Phase 3 拡張ポイント:
#
# 【4 source 並列】withItems を object list に拡張、memory / tmp_size を source 毎に
# 指定。systemd だけ bronze 12Gi (大量 NDJSON)、macos-unified だけ tmp 16Gi
# (large raw archive)、routeros gold は 4Gi (集計 host 数多い) など、旧 CronJob と
# 同値を踏襲。
#
# 【全並列実行】user choice (Phase 3 計画時の決定): parallelism 制限なし。peak で
# bronze 4 並列 (12+6+6+6=30Gi) + silver/gold は段階的に追随。homemachine 64GB
# クラスタの安全圏内。
#
# 【image SHA 直書き】kustomization.yaml images transformer は CRD path 標準対応外
# のため WorkflowTemplate には適用されない。Phase 2-3 中は旧 CronJob (transformer 経由)
# と本 file (直書き) の 2 箇所更新が必要。Phase 4 で旧 CronJob 削除と同時に transformer
# も外す。
#
# 【date 引数】Workflow 起動時 date 未指定なら binary 内で yesterday-jst を解釈
# (旧 CronJob と同じ default)。backfill は Phase 4 の別 WorkflowTemplate に分離。
#
# 【SA】workflowDefaults.serviceAccountName=argo-workflow が infrastructure 側で設定済。
# workflowNamespaces=[argo, logs-rust-pipeline] で chart が argo-workflow SA / Role /
# RoleBinding を logs-rust-pipeline ns にも生成済。
#
# 【g3pro 退避】データプレーン重 Pod は preferred で g3pro を避ける既存 pattern (loki)。
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: logs-pipeline-daily
spec:
  entrypoint: daily-pipeline
  ttlStrategy:
    secondsAfterCompletion: 86400  # 完了 Workflow CR を 1 日後に GC
  arguments:
    parameters: []

  templates:
    # Top level: 4 source の source-pipeline DAG を並列起動。
    # source 毎の memory / tmp_size は旧 CronJob 値を踏襲 (apps/logs-rust-pipeline/
    # cronjob-{bronze,silver,gold-volume}-{systemd,routeros,k8s-pods,macos-unified}.yaml)。
    - name: daily-pipeline
      steps:
        - - name: per-source
            template: source-pipeline
            arguments:
              parameters:
                - {name: source,      value: "{{item.source}}"}
                - {name: bronze_mem,  value: "{{item.bronze_mem}}"}
                - {name: bronze_tmp,  value: "{{item.bronze_tmp}}"}
                - {name: silver_mem,  value: "{{item.silver_mem}}"}
                - {name: silver_tmp,  value: "{{item.silver_tmp}}"}
                - {name: gold_mem,    value: "{{item.gold_mem}}"}
                - {name: gold_tmp,    value: "{{item.gold_tmp}}"}
            # bronze_tmp: systemd / routeros は当初 4Gi (旧 CronJob 同値) だったが、
            # 2026-06-03 の daily run で両者とも bronze が EmptyDir "tmp" 4Gi 超過で
            # kill (exit 143)。行数が増加傾向 (routeros 3.7M→5.5M / systemd 83k→207k, 直近1週)
            # で 4Gi 閾値を超えたため、成長ヘッドルームを見て 12Gi に引き上げ。
            # sizeLimit は上限値であり実消費ではないため、未使用時の node 圧迫はない。
            #
            # silver_mem: 2026-06-03/06-09 に routeros / k8s-pods が collect 経路で silver
            # OOMKilled (exit 137、k8s-pods peak_mib=4244.8/5.76M 行が 4Gi 超過) したため
            # 両者を 8Gi に引き上げていた (systemd は 6Gi)。その後 silver を sink+Engine::Streaming 化
            # (logs-pipeline PR #40、image f735758、dotfiles-private#258 (1)) し、2026-06-14
            # daily run の実測 peak が routeros 1.17GiB / k8s-pods 3.37GiB / systemd 0.44GiB /
            # macos 0.27GiB に低下したため、実測 peak を基準に right-size する。
            # k8s-pods は global sort が peak を支配し streaming の効きが薄く行数増で伸びやすい
            # (06-09 collect 4.15GiB) ため余裕厚めの 6Gi、他は実測 peak の 2.5x 以上を確保。
            # bronze_mem / *_tmp 系は本 right-size の対象外 (別途実測ベース)。
            withItems:
              - {source: systemd,        bronze_mem: 12Gi, bronze_tmp: 12Gi, silver_mem: 2Gi, silver_tmp: 4Gi, gold_mem: 2Gi, gold_tmp: 2Gi}
              - {source: routeros,       bronze_mem:  6Gi, bronze_tmp: 12Gi, silver_mem: 3Gi, silver_tmp: 4Gi, gold_mem: 4Gi, gold_tmp: 2Gi}
              - {source: k8s-pods,       bronze_mem:  6Gi, bronze_tmp:  8Gi, silver_mem: 6Gi, silver_tmp: 4Gi, gold_mem: 2Gi, gold_tmp: 2Gi}
              - {source: macos-unified,  bronze_mem:  6Gi, bronze_tmp: 16Gi, silver_mem: 2Gi, silver_tmp: 8Gi, gold_mem: 2Gi, gold_tmp: 2Gi}
          # passive-dns / netflow (RouterOS アクセス先統計, dotfiles-private#326) は
          # collector が raw/source={passive-dns,netflow}/ を産出する。silver projection は
          # logs-pipeline#45 で実装済 (passive-dns=server_ip フィルタ+answer_ip explode+dedup、
          # netflow=v4/v6 coalesce 等の faithful 正規化)。一方 gold はこの 2 source では
          # host+service+level の gold-volume ではなく netflow⋈passive-dns の join (別物、
          # #326 フェーズ4 後続) なので、ここでは bronze→silver までを回す縮約版
          # bronze-silver-pipeline を使う (gold-volume は付けない)。上の per-source と同じ
          # step group に置き並列起動 (依存なし)。
          - name: per-source-bronze-silver
            template: bronze-silver-pipeline
            arguments:
              parameters:
                - {name: source,      value: "{{item.source}}"}
                - {name: bronze_mem,  value: "{{item.bronze_mem}}"}
                - {name: bronze_tmp,  value: "{{item.bronze_tmp}}"}
                - {name: silver_mem,  value: "{{item.silver_mem}}"}
                - {name: silver_tmp,  value: "{{item.silver_tmp}}"}
            # netflow は直近 raw 実測で日次 数万行、passive-dns も同オーダーで systemd/routeros
            # (数十万〜数百万行) より桁違いに小さいため控えめに割当。silver は collect() 経路
            # (explode/dedup) だが対象が小規模なので 2Gi で十分。成長時は実測 peak を見て
            # 他 source と同様 right-size する。
            withItems:
              - {source: passive-dns,  bronze_mem: 2Gi, bronze_tmp: 4Gi, silver_mem: 2Gi, silver_tmp: 2Gi}
              - {source: netflow,      bronze_mem: 2Gi, bronze_tmp: 4Gi, silver_mem: 2Gi, silver_tmp: 2Gi}

    # 1 source 分の bronze -> silver -> gold-volume を直列実行。
    # bronze/silver は共通テンプレート ingest-stage を stage 名違いで呼ぶ。
    # gold-volume は固有差分が多いため独立テンプレート (下記参照)。
    - name: source-pipeline
      inputs:
        parameters:
          - name: source
          - name: bronze_mem
          - name: bronze_tmp
          - name: silver_mem
          - name: silver_tmp
          - name: gold_mem
          - name: gold_tmp
      dag:
        tasks:
          - name: bronze
            template: ingest-stage
            arguments:
              parameters:
                - {name: stage,     value: bronze}
                - {name: source,    value: "{{inputs.parameters.source}}"}
                - {name: memory,    value: "{{inputs.parameters.bronze_mem}}"}
                - {name: tmp_size,  value: "{{inputs.parameters.bronze_tmp}}"}
          - name: silver
            dependencies: [bronze]
            template: ingest-stage
            arguments:
              parameters:
                - {name: stage,     value: silver}
                - {name: source,    value: "{{inputs.parameters.source}}"}
                - {name: memory,    value: "{{inputs.parameters.silver_mem}}"}
                - {name: tmp_size,  value: "{{inputs.parameters.silver_tmp}}"}
          - name: gold-volume
            dependencies: [silver]
            template: gold-volume
            arguments:
              parameters:
                - {name: source,    value: "{{inputs.parameters.source}}"}
                - {name: memory,    value: "{{inputs.parameters.gold_mem}}"}
                - {name: tmp_size,  value: "{{inputs.parameters.gold_tmp}}"}

    # bronze→silver のみ実行する縮約版 source-pipeline (passive-dns / netflow 専用)。
    # 両 source は log canonical な gold-volume (host+service+level GROUP BY) の対象では
    # なく、gold は netflow⋈passive-dns の join (別物、dotfiles-private#326 フェーズ4 後続
    # PR で別テンプレート) になるため、source-pipeline の bronze→silver→gold-volume には
    # 載せず、gold-volume を除いた bronze→silver までをここで回す。bronze/silver stage
    # 本体は source-pipeline と同じ共通テンプレート ingest-stage を流用。
    - name: bronze-silver-pipeline
      inputs:
        parameters:
          - name: source
          - name: bronze_mem
          - name: bronze_tmp
          - name: silver_mem
          - name: silver_tmp
      dag:
        tasks:
          - name: bronze
            template: ingest-stage
            arguments:
              parameters:
                - {name: stage,     value: bronze}
                - {name: source,    value: "{{inputs.parameters.source}}"}
                - {name: memory,    value: "{{inputs.parameters.bronze_mem}}"}
                - {name: tmp_size,  value: "{{inputs.parameters.bronze_tmp}}"}
          - name: silver
            dependencies: [bronze]
            template: ingest-stage
            arguments:
              parameters:
                - {name: stage,     value: silver}
                - {name: source,    value: "{{inputs.parameters.source}}"}
                - {name: memory,    value: "{{inputs.parameters.silver_mem}}"}
                - {name: tmp_size,  value: "{{inputs.parameters.silver_tmp}}"}

    # 共通 stage テンプレート: bronze と silver を統合。
    #   - stage:  binary に渡す stage 名 + pod の tier ラベル (bronze / silver)。
    #             args は `<stage> --source <source>`。bronze/silver は構造同一の
    #             ため stage 名 1 パラメータで両者を表現できる。
    #   - source / memory / tmp_size: 従来どおり source 毎チューニング値。
    # gold-volume は args 構造 (gold-build --table volume)・deadline (1800)・
    # table ラベルが異なるため本テンプレートには含めず独立定義する。
    - name: ingest-stage
      inputs:
        parameters:
          - name: stage
          - name: source
          - name: memory
          - name: tmp_size
      # 実 memory limit と /tmp sizeLimit は CRD admission の regex 制約を避けるため
      # podSpecPatch で Pod 生成時に strategic merge patch する。container.resources.limits
      # と volumes[name=tmp].emptyDir の placeholder 値を上書き。
      podSpecPatch: |
        containers:
        - name: main
          resources:
            limits:
              memory: "{{inputs.parameters.memory}}"
        volumes:
        - name: tmp
          emptyDir:
            sizeLimit: "{{inputs.parameters.tmp_size}}"
      activeDeadlineSeconds: 3600
      # 一過性エラー (Garage S3 download timeout 等、2026-06-10 daily run で k8s-pods
      # silver が "operation timed out" で落ち Workflow 全体 Failed) を自動リトライで吸収。
      # OnFailure: container exit≠0 (S3 timeout の exit 1 を含む) で再試行。OOM (exit 137)
      # も対象だが mem は source 毎にチューニング済で稀、2 回の追加試行コストは許容範囲。
      # backoff 指数: 30s → 60s (S3/Garage の瞬断が収まるのを待つ)。
      # silver は bronze parquet を S3 から download するため timeout の影響を最も受けやすい。
      retryStrategy:
        limit: "2"
        retryPolicy: OnFailure
        backoff:
          duration: "30s"
          factor: "2"
          maxDuration: "5m"
      metadata:
        labels:
          app: logs-rust-pipeline
          tier: "{{inputs.parameters.stage}}"
          source: "{{inputs.parameters.source}}"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [g3pro]
      container:
        image: ghcr.io/shinbunbun/logs-pipeline:e4b7ab1
        args:
          - "{{inputs.parameters.stage}}"
          - --source
          - "{{inputs.parameters.source}}"
        env:
          - name: AWS_S3_ENDPOINT
            value: "http://garage-archive.garage.svc.cluster.local:3900"
          - name: RUST_LOG
            value: "info"
        envFrom:
          - secretRef:
              name: logs-rust-pipeline-archive-credentials
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            # placeholder: k8s CRD admission が ResourceQuantity 正規表現で validate するため
            # parameter substitution string ({{...}}) を直接書けない。実際の memory limit は
            # template の podSpecPatch で Pod 生成時に strategic merge patch で上書きする。
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: tmp
            mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            # placeholder: memory と同じく podSpecPatch で上書きする
            sizeLimit: 100Mi

    # Stage: gold-volume (silver -> gold/volume/ host+service+level GROUP BY count)
    # ingest-stage と共通部 (podSpecPatch/retryStrategy/affinity/securityContext/
    # volumeMounts/volumes) は同一だが、args が gold-build --table volume と構造が
    # 異なり、activeDeadlineSeconds=1800、pod に table=volume ラベルが付くため独立。
    - name: gold-volume
      inputs:
        parameters:
          - name: source
          - name: memory
          - name: tmp_size
      podSpecPatch: |
        containers:
        - name: main
          resources:
            limits:
              memory: "{{inputs.parameters.memory}}"
        volumes:
        - name: tmp
          emptyDir:
            sizeLimit: "{{inputs.parameters.tmp_size}}"
      activeDeadlineSeconds: 1800
      # bronze / silver と同方針: 一過性 S3 timeout を OnFailure × 2 リトライで吸収。
      retryStrategy:
        limit: "2"
        retryPolicy: OnFailure
        backoff:
          duration: "30s"
          factor: "2"
          maxDuration: "5m"
      metadata:
        labels:
          app: logs-rust-pipeline
          tier: gold
          table: volume
          source: "{{inputs.parameters.source}}"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [g3pro]
      container:
        image: ghcr.io/shinbunbun/logs-pipeline:e4b7ab1
        args:
          - gold-build
          - --table
          - volume
          - --source
          - "{{inputs.parameters.source}}"
        env:
          - name: AWS_S3_ENDPOINT
            value: "http://garage-archive.garage.svc.cluster.local:3900"
          - name: RUST_LOG
            value: "info"
        envFrom:
          - secretRef:
              name: logs-rust-pipeline-archive-credentials
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            # placeholder: k8s CRD admission が ResourceQuantity 正規表現で validate するため
            # parameter substitution string ({{...}}) を直接書けない。実際の memory limit は
            # template の podSpecPatch で Pod 生成時に strategic merge patch で上書きする。
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: tmp
            mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            # placeholder: memory と同じく podSpecPatch で上書きする
            sizeLimit: 100Mi
