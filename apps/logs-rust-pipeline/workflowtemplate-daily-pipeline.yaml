# Argo Workflows WorkflowTemplate: logs-pipeline daily DAG
#
# dotfiles#681 Phase 3: 4 source × 3 stage の真の DAG。旧 CronJob 12 本を
# 置き換える本番化版。Phase 2 PoC (systemd 1 source) から拡張。
#
# 構造:
#   daily-pipeline (steps, withItems で 4 source 並列展開)
#       source-pipeline (DAG, source ごとに bronze→silver→gold-volume 直列)
#           bronze        -> logs-pipeline bronze --source <s>
#           silver        -> logs-pipeline silver --source <s>     (depends: bronze)
#           gold-volume   -> logs-pipeline gold-build --table volume --source <s> (depends: silver)
#
# Phase 3 拡張ポイント:
#
# 【4 source 並列】withItems を object list に拡張、memory / tmp_size を source 毎に
# 指定。systemd だけ bronze 12Gi (大量 NDJSON)、macos-unified だけ tmp 16Gi
# (large raw archive)、routeros gold は 4Gi (集計 host 数多い) など、旧 CronJob と
# 同値を踏襲。
#
# 【全並列実行】user choice (Phase 3 計画時の決定): parallelism 制限なし。peak で
# bronze 4 並列 (12+6+6+6=30Gi) + silver/gold は段階的に追随。homemachine 64GB
# クラスタの安全圏内。
#
# 【image SHA 直書き】kustomization.yaml images transformer は CRD path 標準対応外
# のため WorkflowTemplate には適用されない。Phase 2-3 中は旧 CronJob (transformer 経由)
# と本 file (直書き) の 2 箇所更新が必要。Phase 4 で旧 CronJob 削除と同時に transformer
# も外す。
#
# 【date 引数】Workflow 起動時 date 未指定なら binary 内で yesterday-jst を解釈
# (旧 CronJob と同じ default)。backfill は Phase 4 の別 WorkflowTemplate に分離。
#
# 【SA】workflowDefaults.serviceAccountName=argo-workflow が infrastructure 側で設定済。
# workflowNamespaces=[argo, logs-rust-pipeline] で chart が argo-workflow SA / Role /
# RoleBinding を logs-rust-pipeline ns にも生成済。
#
# 【g3pro 退避】データプレーン重 Pod は preferred で g3pro を避ける既存 pattern (loki)。
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: logs-pipeline-daily
spec:
  entrypoint: daily-pipeline
  ttlStrategy:
    secondsAfterCompletion: 86400  # 完了 Workflow CR を 1 日後に GC
  arguments:
    parameters: []

  templates:
    # Top level: 4 source の source-pipeline DAG を並列起動。
    # source 毎の memory / tmp_size は旧 CronJob 値を踏襲 (apps/logs-rust-pipeline/
    # cronjob-{bronze,silver,gold-volume}-{systemd,routeros,k8s-pods,macos-unified}.yaml)。
    - name: daily-pipeline
      steps:
        - - name: per-source
            template: source-pipeline
            arguments:
              parameters:
                - {name: source,      value: "{{item.source}}"}
                - {name: bronze_mem,  value: "{{item.bronze_mem}}"}
                - {name: bronze_tmp,  value: "{{item.bronze_tmp}}"}
                - {name: silver_mem,  value: "{{item.silver_mem}}"}
                - {name: silver_tmp,  value: "{{item.silver_tmp}}"}
                - {name: gold_mem,    value: "{{item.gold_mem}}"}
                - {name: gold_tmp,    value: "{{item.gold_tmp}}"}
            # bronze_tmp: systemd / routeros は当初 4Gi (旧 CronJob 同値) だったが、
            # 2026-06-03 の daily run で両者とも bronze が EmptyDir "tmp" 4Gi 超過で
            # kill (exit 143)。行数が増加傾向 (routeros 3.7M→5.5M / systemd 83k→207k, 直近1週)
            # で 4Gi 閾値を超えたため、成長ヘッドルームを見て 12Gi に引き上げ。
            # sizeLimit は上限値であり実消費ではないため、未使用時の node 圧迫はない。
            #
            # silver_mem: routeros は最大行数 (5.5M, 増加傾向) にもかかわらず最小の 4Gi
            # だったため、2026-06-03 backfill 再実行時に silver が OOMKilled (exit 137)。
            # backfill template の silver は 12Gi (daily 8Gi 想定 + 余裕) で完走するため、
            # daily 側も他大規模 source (macos-unified) と揃えて 4Gi→8Gi に引き上げ。
            #
            # k8s-pods も同様に 4Gi のまま取り残されており、2026-06-09 daily run で silver が
            # OOMKilled (exit 137)。binary ログの peak_mib=4244.8 (5.76M 行) が 4Gi=4096MiB を
            # わずかに超過したのが原因。routeros と同規模行数のため、同じく 4Gi→8Gi に引き上げ
            # (peak ~4.15GiB に対し約1.9倍ヘッドルーム)。
            withItems:
              - {source: systemd,        bronze_mem: 12Gi, bronze_tmp: 12Gi, silver_mem: 6Gi, silver_tmp: 4Gi, gold_mem: 2Gi, gold_tmp: 2Gi}
              - {source: routeros,       bronze_mem:  6Gi, bronze_tmp: 12Gi, silver_mem: 8Gi, silver_tmp: 4Gi, gold_mem: 4Gi, gold_tmp: 2Gi}
              - {source: k8s-pods,       bronze_mem:  6Gi, bronze_tmp:  8Gi, silver_mem: 8Gi, silver_tmp: 4Gi, gold_mem: 2Gi, gold_tmp: 2Gi}
              - {source: macos-unified,  bronze_mem:  6Gi, bronze_tmp: 16Gi, silver_mem: 8Gi, silver_tmp: 8Gi, gold_mem: 2Gi, gold_tmp: 2Gi}

    # 1 source 分の bronze -> silver -> gold-volume を直列実行
    - name: source-pipeline
      inputs:
        parameters:
          - name: source
          - name: bronze_mem
          - name: bronze_tmp
          - name: silver_mem
          - name: silver_tmp
          - name: gold_mem
          - name: gold_tmp
      dag:
        tasks:
          - name: bronze
            template: bronze
            arguments:
              parameters:
                - {name: source,    value: "{{inputs.parameters.source}}"}
                - {name: memory,    value: "{{inputs.parameters.bronze_mem}}"}
                - {name: tmp_size,  value: "{{inputs.parameters.bronze_tmp}}"}
          - name: silver
            dependencies: [bronze]
            template: silver
            arguments:
              parameters:
                - {name: source,    value: "{{inputs.parameters.source}}"}
                - {name: memory,    value: "{{inputs.parameters.silver_mem}}"}
                - {name: tmp_size,  value: "{{inputs.parameters.silver_tmp}}"}
          - name: gold-volume
            dependencies: [silver]
            template: gold-volume
            arguments:
              parameters:
                - {name: source,    value: "{{inputs.parameters.source}}"}
                - {name: memory,    value: "{{inputs.parameters.gold_mem}}"}
                - {name: tmp_size,  value: "{{inputs.parameters.gold_tmp}}"}

    # Stage: bronze (raw/ NDJSON.zst -> daily-struct/ Parquet)
    - name: bronze
      inputs:
        parameters:
          - name: source
          - name: memory
          - name: tmp_size
      # 実 memory limit と /tmp sizeLimit は CRD admission の regex 制約を避けるため
      # podSpecPatch で Pod 生成時に strategic merge patch する。container.resources.limits
      # と volumes[name=tmp].emptyDir の placeholder 値を上書き。
      podSpecPatch: |
        containers:
        - name: main
          resources:
            limits:
              memory: "{{inputs.parameters.memory}}"
        volumes:
        - name: tmp
          emptyDir:
            sizeLimit: "{{inputs.parameters.tmp_size}}"
      activeDeadlineSeconds: 3600
      # 一過性エラー (Garage S3 download timeout 等、2026-06-10 daily run で k8s-pods
      # silver が "operation timed out" で落ち Workflow 全体 Failed) を自動リトライで吸収。
      # OnFailure: container exit≠0 (S3 timeout の exit 1 を含む) で再試行。OOM (exit 137)
      # も対象だが mem は source 毎にチューニング済で稀、2 回の追加試行コストは許容範囲。
      # backoff 指数: 30s → 60s (S3/Garage の瞬断が収まるのを待つ)。
      retryStrategy:
        limit: "2"
        retryPolicy: OnFailure
        backoff:
          duration: "30s"
          factor: "2"
          maxDuration: "5m"
      metadata:
        labels:
          app: logs-rust-pipeline
          tier: bronze
          source: "{{inputs.parameters.source}}"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [g3pro]
      container:
        image: ghcr.io/shinbunbun/logs-pipeline:7bd76bc
        args:
          - bronze
          - --source
          - "{{inputs.parameters.source}}"
        env:
          - name: AWS_S3_ENDPOINT
            value: "http://garage.garage.svc.cluster.local:3900"
          - name: RUST_LOG
            value: "info"
        envFrom:
          - secretRef:
              name: logs-rust-pipeline-credentials
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            # placeholder: k8s CRD admission が ResourceQuantity 正規表現で validate するため
            # parameter substitution string ({{...}}) を直接書けない。実際の memory limit は
            # template の podSpecPatch で Pod 生成時に strategic merge patch で上書きする。
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: tmp
            mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            # placeholder: memory と同じく podSpecPatch で上書きする
            sizeLimit: 100Mi

    # Stage: silver (daily-struct/ -> silver/ immutable canonical schema)
    - name: silver
      inputs:
        parameters:
          - name: source
          - name: memory
          - name: tmp_size
      podSpecPatch: |
        containers:
        - name: main
          resources:
            limits:
              memory: "{{inputs.parameters.memory}}"
        volumes:
        - name: tmp
          emptyDir:
            sizeLimit: "{{inputs.parameters.tmp_size}}"
      activeDeadlineSeconds: 3600
      # bronze と同方針: 一過性 S3 timeout を OnFailure × 2 リトライで吸収。
      # silver は bronze parquet を S3 から download するため timeout の影響を最も受けやすい。
      retryStrategy:
        limit: "2"
        retryPolicy: OnFailure
        backoff:
          duration: "30s"
          factor: "2"
          maxDuration: "5m"
      metadata:
        labels:
          app: logs-rust-pipeline
          tier: silver
          source: "{{inputs.parameters.source}}"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [g3pro]
      container:
        image: ghcr.io/shinbunbun/logs-pipeline:7bd76bc
        args:
          - silver
          - --source
          - "{{inputs.parameters.source}}"
        env:
          - name: AWS_S3_ENDPOINT
            value: "http://garage.garage.svc.cluster.local:3900"
          - name: RUST_LOG
            value: "info"
        envFrom:
          - secretRef:
              name: logs-rust-pipeline-credentials
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            # placeholder: k8s CRD admission が ResourceQuantity 正規表現で validate するため
            # parameter substitution string ({{...}}) を直接書けない。実際の memory limit は
            # template の podSpecPatch で Pod 生成時に strategic merge patch で上書きする。
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: tmp
            mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            # placeholder: memory と同じく podSpecPatch で上書きする
            sizeLimit: 100Mi

    # Stage: gold-volume (silver -> gold/volume/ host+service+level GROUP BY count)
    - name: gold-volume
      inputs:
        parameters:
          - name: source
          - name: memory
          - name: tmp_size
      podSpecPatch: |
        containers:
        - name: main
          resources:
            limits:
              memory: "{{inputs.parameters.memory}}"
        volumes:
        - name: tmp
          emptyDir:
            sizeLimit: "{{inputs.parameters.tmp_size}}"
      activeDeadlineSeconds: 1800
      # bronze / silver と同方針: 一過性 S3 timeout を OnFailure × 2 リトライで吸収。
      retryStrategy:
        limit: "2"
        retryPolicy: OnFailure
        backoff:
          duration: "30s"
          factor: "2"
          maxDuration: "5m"
      metadata:
        labels:
          app: logs-rust-pipeline
          tier: gold
          table: volume
          source: "{{inputs.parameters.source}}"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [g3pro]
      container:
        image: ghcr.io/shinbunbun/logs-pipeline:7bd76bc
        args:
          - gold-build
          - --table
          - volume
          - --source
          - "{{inputs.parameters.source}}"
        env:
          - name: AWS_S3_ENDPOINT
            value: "http://garage.garage.svc.cluster.local:3900"
          - name: RUST_LOG
            value: "info"
        envFrom:
          - secretRef:
              name: logs-rust-pipeline-credentials
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            # placeholder: k8s CRD admission が ResourceQuantity 正規表現で validate するため
            # parameter substitution string ({{...}}) を直接書けない。実際の memory limit は
            # template の podSpecPatch で Pod 生成時に strategic merge patch で上書きする。
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: tmp
            mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            # placeholder: memory と同じく podSpecPatch で上書きする
            sizeLimit: 100Mi
