# Rust + Polars: gold/volume (silver -> count by host/service/level) for macos-unified
#
# Source repo: shinbunbun/logs-pipeline (gold-build subcommand、PR #26)
# 経緯: shinbunbun/dotfiles-private#201 Phase 6
#
# macos-unified silver は host=1 (Mac mini 単一) + 1 日 ~200K 行 (recent)。
#
# Schedule: 05:15 JST。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-gold-volume-macos-unified
spec:
  # dotfiles#681 Phase 3: WorkflowTemplate + CronWorkflow に切替済、本 CR は
  # Phase 4 で削除予定。それまで suspend で停止 (ロールバック窓を保つため manifest 残置)。
  suspend: true
  schedule: "15 5 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: gold
            table: volume
            source: macos-unified
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pipeline
              image: ghcr.io/shinbunbun/logs-pipeline:latest
              args:
                - gold-build
                - --table
                - volume
                - --source
                - macos-unified
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
                - name: RUST_LOG
                  value: "info"
              envFrom:
                - secretRef:
                    name: logs-rust-pipeline-credentials
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 2Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: [ALL]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 2Gi
