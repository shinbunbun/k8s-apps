# Rust + Polars: silver backfill (silver/source=*/date=*/) 全期間再生成 Job template
#
# 【用途】
# silver は immutable layer (`--force` なしで実行すると既存 partition は skip)。
# bronze schema 保持の原則 (shinbunbun/dotfiles-private#197 §2) のもと、silver の
# projection mapping rule にバグ / 設計漏れが見つかった場合は本 template で全期間
# `--force` で書き直す。bronze は触らない。
#
# 直近の発火事例: shinbunbun/dotfiles-private#202 Phase A
# (macos-unified の `service` 列が full `/nix/store/...` path のまま silver に
# 出ていた問題、shinbunbun/logs-pipeline#22 で basename 化、本 template で
# silver/source=macos-unified/ 全期間 ~71 day を再生成)。
#
# 【実行方法】
# kustomize 外。手動 `kubectl create -f -` で apply。`{{SOURCE}}` と `{{DATE}}` を
# sed で都度置換 (migrate-job-template.yaml と同形の運用)。
#
# 【1-day smoke test 例】
# 直近 1 日だけ流して silver の service top10 を確認する用途。本格 backfill 前に
# 必ず実施を推奨:
#
#   sed -e "s/{{SOURCE}}/macos-unified/g" -e "s/{{DATE}}/$(date -d 'yesterday' +%Y-%m-%d)/g" \
#     apps/logs-rust-pipeline/backfill-silver-job-template.yaml \
#     | kubectl create -f -
#   # Pod 完走を待つ
#   kubectl wait --for=condition=complete -n logs-rust-pipeline \
#     job -l app=logs-rust-pipeline,tier=silver-backfill,source=macos-unified \
#     --timeout=900s
#   # 結果確認 (DuckDB CLI 等で silver/source=macos-unified/date=YYYY-MM-DD/logs.parquet
#   # の service 列を group by して top10 を確認、`/nix/store/` 先頭の値が無くなり
#   # `node_exporter` / `kernel` / `attic` 等の basename に揃っていれば OK)
#
# 【全期間 backfill 例】
# silver/source=macos-unified/ の存在期間 ~2026-02-26 〜 yesterday (~71 day):
#
#   START="2026-02-26"
#   END=$(date -d "yesterday" +%Y-%m-%d)
#   DAYS=$(( ($(date -d "$END" +%s) - $(date -d "$START" +%s)) / 86400 + 1 ))
#   for i in $(seq 0 $((DAYS - 1))); do
#     d=$(date -d "$START +$i days" +%Y-%m-%d)
#     sed -e "s/{{SOURCE}}/macos-unified/g" -e "s/{{DATE}}/${d}/g" \
#       apps/logs-rust-pipeline/backfill-silver-job-template.yaml \
#       | kubectl create -f -
#     # 並列度を抑えて memory 競合を避ける (silver は軽いが macos peak ~1-2 GiB 想定):
#     kubectl wait --for=condition=complete -n logs-rust-pipeline \
#       job -l app=logs-rust-pipeline,tier=silver-backfill,source=macos-unified,date=${d} \
#       --timeout=900s || true
#   done
#
# 並列実行する場合は wait を外し、cluster の Pod 並列度上限 (homemachine 64GB) と
# silver Pod の memory limit (8Gi) を踏まえて 4-6 並列が目安。
#
# 【完了 verify】
# - silver の row_count が bronze と一致 (filter は ts NULL drop のみ)
# - service top10 が basename (`node_exporter` / `kernel` / 等) で path prefix が消えている
# - row_id determinism: PR #22 修正は service 列のみで row_id sort key (ts, archived_at,
#   xxh3(message)) には触れないため、templates の row_id 不変、drain re-apply 不要
#
# 【binary subcommand】
# logs-pipeline silver --source <SOURCE> --date YYYY-MM-DD --force
# - --force なし: dst (silver/...) が既存ならスキップ (immutable 原則)
# - --force あり: 上書き (本 template では必ず渡す)
apiVersion: batch/v1
kind: Job
metadata:
  generateName: logs-rust-pipeline-silver-backfill-{{SOURCE}}-{{DATE}}-
  namespace: logs-rust-pipeline
  labels:
    app: logs-rust-pipeline
    tier: silver-backfill
    source: "{{SOURCE}}"
    date: "{{DATE}}"
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: logs-rust-pipeline
        tier: silver-backfill
        source: "{{SOURCE}}"
        date: "{{DATE}}"
    spec:
      restartPolicy: Never
      containers:
        - name: silver
          image: ghcr.io/shinbunbun/logs-pipeline:latest
          args:
            - silver
            - --source
            - "{{SOURCE}}"  # ← edit before kubectl create (sed 推奨)
            - --date
            - "{{DATE}}"    # ← edit before kubectl create (sed 推奨)
            - --force
          env:
            - name: AWS_S3_ENDPOINT
              value: "http://garage.garage.svc.cluster.local:3900"
            - name: RUST_LOG
              value: "info"
          envFrom:
            - secretRef:
                name: logs-rust-pipeline-credentials
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              # silver は projection + sort のみで bronze より軽い。cron 側 macos-unified
              # は 8Gi で steady-state 動作中、backfill も同値で start (peak_mib log 観測後
              # に right-size 余地)。
              memory: 8Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          # silver の tmpdir は bronze parquet download + silver parquet 書き出しの
          # 一時領域。macos 6.1M rows/日で peak ~数百 MiB 想定だが余裕を持って 8Gi。
          emptyDir:
            sizeLimit: 8Gi
