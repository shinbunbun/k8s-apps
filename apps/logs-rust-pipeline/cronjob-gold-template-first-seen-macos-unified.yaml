# Rust + Polars: gold/template_first_seen (新規 template だけ抽出) for macos-unified
#
# Source repo: shinbunbun/logs-pipeline (gold-build subcommand、PR #26)
# 経緯: shinbunbun/dotfiles-private#201 Phase 6
#
# Schedule: 06:05 JST。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-gold-template-first-seen-macos-unified
spec:
  schedule: "5 6 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: gold
            table: template-first-seen
            source: macos-unified
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pipeline
              image: ghcr.io/shinbunbun/logs-pipeline:latest
              args:
                - gold-build
                - --table
                - template-first-seen
                - --source
                - macos-unified
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
                - name: RUST_LOG
                  value: "info"
              envFrom:
                - secretRef:
                    name: logs-rust-pipeline-credentials
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 4Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: [ALL]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 4Gi
