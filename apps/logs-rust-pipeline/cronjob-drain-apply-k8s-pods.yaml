# Drain3 sidecar: silver -> templates assignments for k8s-pods
#
# Source repo: shinbunbun/logs-pipeline-drain
# 経緯: shinbunbun/dotfiles-private#197 Phase 5
# Schedule: 02:50 JST (= silver 01:55 + ~1h)。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-drain-apply-k8s-pods
spec:
  schedule: "50 2 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: drain-apply
            source: k8s-pods
        spec:
          restartPolicy: OnFailure
          containers:
            - name: drain
              image: ghcr.io/shinbunbun/logs-pipeline-drain:latest
              args:
                - apply
                - --source
                - k8s-pods
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
              envFrom:
                - secretRef:
                    name: logs-rust-pipeline-credentials
              resources:
                requests:
                  cpu: 300m
                  memory: 256Mi
                limits:
                  # k8s-pods 1M rows、Drain tree + parquet load で 2 GiB 程度想定。
                  memory: 2Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                capabilities:
                  drop: [ALL]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 1Gi
