# Drain3 sidecar: silver -> templates assignments for macos-unified
#
# Source repo: shinbunbun/logs-pipeline-drain
# 経緯: shinbunbun/dotfiles-private#197 Phase 5
# Schedule: 03:00 JST (= silver 02:05 + ~1h)。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-drain-apply-macos-unified
spec:
  schedule: "0 3 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      # macos 6.1M rows、Drain Python iter で 30-60 分見込み、余裕で 2h。
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: drain-apply
            source: macos-unified
        spec:
          restartPolicy: OnFailure
          containers:
            - name: drain
              image: ghcr.io/shinbunbun/logs-pipeline-drain:latest
              args:
                - apply
                - --source
                - macos-unified
                - --dump-templates  # apply 後に template_id → text dict も snapshot 上書き
                # (shinbunbun/dotfiles-private#208 Phase 6 prereq 2)
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
              envFrom:
                - secretRef:
                    name: logs-rust-pipeline-credentials
              resources:
                requests:
                  cpu: 500m
                  memory: 512Mi
                limits:
                  # macos 6.1M rows、message に巨大 backtrace JSON が含まれる行があるため
                  # 4 GiB を上限。peak 観測後に縮小可。
                  memory: 4Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
                capabilities:
                  drop: [ALL]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 1Gi
