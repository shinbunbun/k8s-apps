# Rust + Polars: gold/template_rate (silver + templates -> count by template_id/hour) for systemd
#
# Source repo: shinbunbun/logs-pipeline (gold-build subcommand、PR #26)
# 経緯: shinbunbun/dotfiles-private#201 Phase 6
#
# silver と templates を row_id で INNER JOIN、JST hour を抽出して (template_id, hour) で
# 集計。message 本文単位の異常検知 (z-score / Holt-Winters) の base。drain-apply
# 完了が前提なので drain-apply-systemd (02:30 JST) より後。
#
# Schedule: 05:30 JST (gold-volume 全 4 source 完了後)。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-gold-template-rate-systemd
spec:
  schedule: "30 5 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      # silver + templates の hash JOIN + GROUP BY。silver 1 file scan より重い、1h 上限。
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: gold
            table: template-rate
            source: systemd
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pipeline
              image: ghcr.io/shinbunbun/logs-pipeline:latest
              args:
                - gold-build
                - --table
                - template-rate
                - --source
                - systemd
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
                - name: RUST_LOG
                  value: "info"
              envFrom:
                - secretRef:
                    name: logs-rust-pipeline-credentials
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  # silver + templates の hash JOIN がメイン consumer。silver-routeros と
                  # 同じ 4Gi で安全側、観測後に縮小余地あり。
                  memory: 4Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: [ALL]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                # silver + templates の 2 file を /tmp に同時保持、scan & join。
                sizeLimit: 4Gi
