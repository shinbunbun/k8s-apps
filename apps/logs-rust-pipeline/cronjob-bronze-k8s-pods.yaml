# Rust + Polars: bronze (raw -> daily-struct) for k8s-pods source
#
# Source repo: shinbunbun/logs-pipeline
# 経緯: shinbunbun/dotfiles-private#191 Phase 4 で apps/logs-typed-dbt/ から切り出し
# credentials: logs-rust-pipeline-credentials (apps/garage/keys.yaml の専用 GarageKey)
# image SHA pin: kustomization.yaml の images transformer (newTag) で一元管理
#
# Schedule: 00:55 JST。4 source の bronze を 10 分間隔の連番 (35/45/55/05) で走らせる。
#
# Memory:
#   k8s-pods は OTLP-shape の NDJSON で attributes が struct (namespace/pod/container/
#   level 等) で埋まり typed columns 数が systemd/routeros より多い。
#   container memory limit: 実測 (860K rows/日) peak ~1.2 GiB、Phase 4 で 8Gi → 4Gi
#   に縮小済 (限度の 30% 使用)。
#   2026-05-15 nixos-desktop ハング根本原因調査 (dotfiles-private#233) で 5/14 daily run の
#   OOM 観測 (anon-rss 4.1GB)、経年でデータ量が増えていた → 4Gi → 6Gi に引き上げ。
#   tmp emptyDir sizeLimit: 新設時から 4Gi だったが 2026-05-13 0:55 JST の Job がログ量
#   増加で超過 Evict (3 試行すべて BackoffLimitExceeded) → 8Gi に拡張。実測値要再確認。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-bronze-k8s-pods
spec:
  # dotfiles#681 Phase 3: WorkflowTemplate + CronWorkflow に切替済、本 CR は
  # Phase 4 で削除予定。それまで suspend で停止 (ロールバック窓を保つため manifest 残置)。
  suspend: true
  schedule: "55 0 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: bronze
            source: k8s-pods
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pipeline
              image: ghcr.io/shinbunbun/logs-pipeline:latest
              args:
                - bronze
                - --source
                - k8s-pods
                # date は省略 -> binary 内で yesterday-jst を解釈
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
                - name: RUST_LOG
                  value: "info"
              envFrom:
                - secretRef:
                    name: logs-rust-pipeline-credentials
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 6Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: [ALL]
              volumeMounts:
                # tempfile crate が /tmp に hour 別 NDJSON + 最終 Parquet を書くため
                # emptyDir をマウント。zstd 解凍後 NDJSON が一時的に展開される。
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 8Gi
