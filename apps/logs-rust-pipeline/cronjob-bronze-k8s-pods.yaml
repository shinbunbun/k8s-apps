# Rust + Polars: bronze (raw -> daily-struct) for k8s-pods source
#
# shinbunbun/dotfiles-private#191 Phase 4 で apps/logs-typed-dbt/ から切り出し。
# 旧 dbt-duckdb (apps/logs-typed-dbt/cronjob-bronze.yaml) との並走 verify を継続。
# 新 prefix `daily-struct/source=k8s-pods/` に書くので旧 `daily/` には触れない。
# image source: shinbunbun/logs-pipeline
# credentials: logs-rust-pipeline-credentials (apps/garage/keys.yaml の専用 GarageKey)
#
# Schedule:
#   00:55 JST (旧 dbt-duckdb bronze 00:30 / 新 systemd bronze 00:35 / 新 routeros
#   bronze 00:45 から 10 分ずつずらした連番)。raw/ を読むだけで delete はしないので
#   衝突は理論上ないが、観測しやすく時間差。
#
# Memory:
#   k8s-pods は OTLP-shape の NDJSON で attributes が struct (namespace/pod/container/
#   level 等) で埋まり typed columns 数が systemd/routeros より多い。
#   実測 (補遺 5、860K rows/日): peak_mib 1180 MiB (旧 8Gi limit の 14%)。
#   推定の 4M+ 行から大幅下振れしており、4Gi (推定 peak の 3.4x 余裕) で十分。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-bronze-k8s-pods
spec:
  schedule: "55 0 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: bronze
            source: k8s-pods
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pipeline
              image: ghcr.io/shinbunbun/logs-pipeline:latest
              args:
                - bronze
                - --source
                - k8s-pods
                # date は省略 -> binary 内で yesterday-jst を解釈
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
                - name: RUST_LOG
                  value: "info"
              envFrom:
                - secretRef:
                    name: logs-rust-pipeline-credentials
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 4Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: [ALL]
              volumeMounts:
                # tempfile crate が /tmp に hour 別 NDJSON + 最終 Parquet を書くため
                # emptyDir をマウント。zstd 解凍後 NDJSON が一時的に展開される。
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 4Gi
