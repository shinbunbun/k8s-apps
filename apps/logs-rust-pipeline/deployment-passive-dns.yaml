# passive-dns collector (常駐 Deployment)
#
# RouterOS /tool sniffer の TZSP ストリーム (UDP 37008) を受信し、DNS 応答を
# パースして raw/source=passive-dns/ へ ndjson.zst で書き出す。既存 bronze→silver→
# gold バッチがこの raw を処理する (案X)。設計: shinbunbun/dotfiles-private#326。
#
# 単一 UDP listener。replicas=1 + Recreate でローリング中の二重 bind を避ける
# (LB が複数 Pod に datagram を分散すると取りこぼし/重複の温床になる)。
# image / Garage 資格情報 / endpoint は既存 logs-pipeline batch と共有
# (logs-rust-pipeline-archive-credentials, garage-archive, bucket=logs-archive)。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: passive-dns-collector
  labels:
    app: logs-rust-pipeline
    component: passive-dns
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: logs-rust-pipeline
      component: passive-dns
  template:
    metadata:
      labels:
        app: logs-rust-pipeline
        component: passive-dns
    spec:
      # データプレーン寄りの常駐 Pod は g3pro に置かない (dotfiles-private 方針)。
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [g3pro]
      containers:
        - name: passive-dns
          image: ghcr.io/shinbunbun/logs-pipeline:a82e0a5
          args: [passive-dns]
          ports:
            - name: tzsp
              containerPort: 37008
              protocol: UDP
          env:
            - name: AWS_S3_ENDPOINT
              value: "http://garage-archive.garage.svc.cluster.local:3900"
            - name: RUST_LOG
              value: "info"
          envFrom:
            - secretRef:
                name: logs-rust-pipeline-archive-credentials
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
