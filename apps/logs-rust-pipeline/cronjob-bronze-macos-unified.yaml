# Rust + Polars: bronze (raw -> daily-struct) for macos-unified source
#
# Source repo: shinbunbun/logs-pipeline
# 経緯: shinbunbun/dotfiles-private#191 Phase 4 で apps/logs-typed-dbt/ から切り出し
# credentials: logs-rust-pipeline-credentials (apps/garage/keys.yaml の専用 GarageKey)
# image SHA pin: kustomization.yaml の images transformer (newTag) で一元管理
#
# Schedule: 01:05 JST。4 source の bronze を 10 分間隔の連番 (35/45/55/05) で走らせる。
#
# Memory:
#   fluent-bit Lua filter (/nix/store/*, /kernel) を経由するが nested object/array が
#   含まれるため bronze.rs の preprocess (stringify_nested_to_ndjson) で flatten。
#   実測 (6.1M rows/日, 2026-05-05 backfill): peak 8.0 GiB / limit 12Gi (67% 使用)。
#   注: macOS は systemd の ~60x volume で fluent-bit が /nix/store ノイズを出している
#   可能性あり (要別途調査)。volume 揺らぎを吸収する余裕を持たせる。
#
# Tmp:
#   bronze.rs は merged.ndjson と merged-flat.ndjson の 2 つの tmpfile を併存させる
#   (preprocess で nested を JSON string に stringify した結果を別ファイルに書く)
#   ため、/tmp peak ≈ 2x NDJSON。zstd 解凍後の NDJSON は zst の ~25x。
#   実測 (2026-05-05): merged 3.5 GiB + flat 3.6 GiB = peak 7.2 GiB。16Gi は 2x 余裕。
#   経緯: 1Gi (Cilium 停止中の名残) → 4Gi (PR #288、まだ不足) → 16Gi (本 PR)。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-bronze-macos-unified
spec:
  schedule: "5 1 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: bronze
            source: macos-unified
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pipeline
              image: ghcr.io/shinbunbun/logs-pipeline:latest
              args:
                - bronze
                - --source
                - macos-unified
                # date は省略 -> binary 内で yesterday-jst を解釈
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
                - name: RUST_LOG
                  value: "info"
              envFrom:
                - secretRef:
                    name: logs-rust-pipeline-credentials
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  # 2026-05-20 logs-pipeline PR #25 (sink+Engine::Streaming、dotfiles-private#242
                  # Phase 2) で macos-unified の peak_mib_after_collect ~375MB を観測、
                  # NDJSON 126MB × ~3x amplification → 12Gi は overkill (32x headroom)
                  # で 6Gi に縮小 (16x headroom 維持、Phase 3)。
                  memory: 6Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: [ALL]
              volumeMounts:
                # tempfile crate が /tmp に hour 別 NDJSON + 最終 Parquet を書くため
                # emptyDir をマウント。zstd 解凍後 NDJSON が一時的に展開される。
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 16Gi
