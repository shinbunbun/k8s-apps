# Rust + Polars: migrate (旧 daily/ -> 新 daily-struct/) Job template
#
# 【用途】
# 旧 `daily/date=*/source=*/` 配下の Parquet を新 `daily-struct/source=*/date=*/`
# に再パース。次の 2 形式が共存しているので両方扱う:
#   - logs.parquet (Vector → 旧 dbt-duckdb 出力): 1 列 `json: VARCHAR`
#   - logs-opensearch-*.parquet (Phase Z 移行 Job、k8s-apps#169): multi-column typed
#     (4.51 億件 / 9.09 GB、log_type 別: macos-unified 2.5億 / routeros 1.5億 /
#     systemd 7750万 / k8s-pods 120万 / unknown 1345万)
#
# 出力は `daily-struct/source=*/date=*/logs.parquet` の単一 Parquet にマージされる。
# logs-pipeline binary の `migrate` subcommand を呼ぶだけで内部処理は両形式を
# 自動判定 (1-col `json` String 検出 → そのまま、それ以外 → JsonWriter 再シリアライズ)。
#
# 【実行方法】
# kustomize 外。手動 `kubectl create -f apps/logs-rust-pipeline/migrate-job-template.yaml`
# で実行。`--source` (systemd / routeros / k8s-pods / macos-unified) と `--date`
# (TARGET_DATE) を都度書き換える (sed 推奨)。
#
# 【一括 backfill 例】
# OpenSearch dump 期間は ~2025-10-14 〜 2026-04-21 (200 日 × 4 source = 800 件)。
# 1 日 1 source ずつ serial で回す shell loop:
#
#   for src in systemd routeros k8s-pods macos-unified; do
#     for date in $(seq 0 199 | xargs -I{} date -d "2025-10-14 +{} days" +%Y-%m-%d); do
#       sed -e "s/{{SOURCE}}/${src}/g" -e "s/{{DATE}}/${date}/g" \
#         apps/logs-rust-pipeline/migrate-job-template.yaml \
#         | kubectl create -f -
#       # ttlSecondsAfterFinished=600 で 10 分後に自動 GC されるが、並列度制御のため
#       # job 完了を待ってから次へ:
#       kubectl wait --for=condition=complete -n logs-rust-pipeline \
#         job -l app=logs-rust-pipeline,tier=migrate,source=${src},date=${date} \
#         --timeout=1800s || true
#     done
#   done
#
# 並列実行する場合は `--parallelism` 制御や、同時 PV/Pod 数上限の cluster 状況を考慮。
#
# 【binary subcommand】
# logs-pipeline migrate --source systemd --date YYYY-MM-DD [--force]
# - --force なし: dst (daily-struct/...) が既存ならスキップ (idempotent)
# - --force あり: 上書き
# - daily/ 配下に Parquet がなければ warn + exit 0 (失敗にしない)
apiVersion: batch/v1
kind: Job
metadata:
  generateName: logs-rust-pipeline-migrate-{{SOURCE}}-{{DATE}}-
  namespace: logs-rust-pipeline
  labels:
    app: logs-rust-pipeline
    tier: migrate
    source: "{{SOURCE}}"
    date: "{{DATE}}"
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 1800
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: logs-rust-pipeline
        tier: migrate
        source: "{{SOURCE}}"
        date: "{{DATE}}"
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/shinbunbun/logs-pipeline:latest
          args:
            - migrate
            - --source
            - "{{SOURCE}}"  # ← edit before kubectl create
            - --date
            - "{{DATE}}"    # ← edit before kubectl create
          env:
            - name: AWS_S3_ENDPOINT
              value: "http://garage.garage.svc.cluster.local:3900"
            - name: RUST_LOG
              value: "info"
          envFrom:
            - secretRef:
                name: logs-rust-pipeline-credentials
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              # 実機 batch run3 (494/494 完了、ok=348 fail=5) で 16Gi でも一部
              # systemd 日 (2026-03-03, -03-14, -03-17, -03-21, -04-02) で OOM。
              # macos-unified 6M rows/日 が 8.7 GiB peak で完走するのに対し、
              # systemd は字幅が広く expansion factor が大きい。32Gi に増量で
              # OOM 解消 (homemachine 64GB cluster で 1 件分なら問題なし)。
              memory: 32Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          # tmpdir に NDJSON (decode 後) + 出力 Parquet が一時的に存在。
          # 実機検証で systemd 1.1M rows = 33MB NDJSON、routeros 3.2M rows = 33MB
          # NDJSON。最大 50MB 想定で 8Gi は十分すぎるが、OOM リスクの方が大なので
          # memory 増量に合わせて余裕を確保。
          emptyDir:
            sizeLimit: 8Gi
