# Drain3 sidecar: 過去日 silver に template_id を遡及付与する backfill Job テンプレ
#
# 【用途】
# Step 1 (backfill-drain-mine-job-template) で構築した state を元に、過去日の
# silver に template_id を assign、`templates/source=X/date=Y/assignments.parquet`
# を生成する。daily drain-apply CronJob は 5/06-5/08 のみ assignments を持つので、
# 過去日 (各 source 開始日 〜 2026-05-05) を本テンプレで全期間 backfill する。
#
# 経緯: shinbunbun/dotfiles-private#207 (Phase 6 prereq 1) Step 2
#
# 既存 5/06-5/08 assignments は維持 (silver row_id #205 改修後も整合確認済、
# 再生成不要)。本テンプレは `--force` 付きなので、誤って 5/06 以降の date を
# 渡すと既存 assignments が上書きされる点に注意。
#
# 【kustomize 外】手動 `kubectl create -f -` 専用。`{{SOURCE}}` / `{{DATE}}` を
# sed で都度置換 (backfill-silver-job-template と同形式)。
#
# 【per-source 期間 (Issue #207 §2-1)】
#   systemd:        2025-10-14 〜 2026-05-05  (~204 day)
#   routeros:       2025-10-17 〜 2026-05-05  (~201 day)
#   macos-unified:  2026-02-22 〜 2026-05-05  (~73 day)
#   k8s-pods:       2026-02-21 〜 2026-05-05  (~74 day)
#
# 【1-day smoke test 例】
#   sed -e "s/{{SOURCE}}/k8s-pods/g" -e "s/{{DATE}}/2026-05-05/g" \
#     apps/logs-rust-pipeline/backfill-drain-apply-job-template.yaml \
#     | kubectl create -f -
#   kubectl wait --for=condition=complete -n logs-rust-pipeline \
#     job -l app=logs-rust-pipeline,tier=drain-apply-backfill,source=k8s-pods,date=2026-05-05 \
#     --timeout=3600s
#
# 【全期間 backfill 例 (per-source、chronological order)】
#   START="2025-10-14"   # ← source 別に書き換え
#   END="2026-05-05"
#   SOURCE="systemd"
#   DAYS=$(( ($(date -d "$END" +%s) - $(date -d "$START" +%s)) / 86400 + 1 ))
#   for i in $(seq 0 $((DAYS - 1))); do
#     d=$(date -d "$START +$i days" +%Y-%m-%d)
#     sed -e "s/{{SOURCE}}/${SOURCE}/g" -e "s/{{DATE}}/${d}/g" \
#       apps/logs-rust-pipeline/backfill-drain-apply-job-template.yaml \
#       | kubectl create -f -
#     # state.bin は source 内で sequential 必須 (incremental learning + state save)、
#     # 同 source の day 並列は不可。完走を待ってから次 day。
#     kubectl wait --for=condition=complete -n logs-rust-pipeline \
#       job -l app=logs-rust-pipeline,tier=drain-apply-backfill,source=${SOURCE},date=${d} \
#       --timeout=3600s || true
#   done
#
# 【daily cron との衝突注意】
# Step 1 (mine) と同じく、02:00 JST 〜 04:00 JST の daily cron 時間帯は
# 本 Job 投入を避けること。silver は immutable なので本 backfill 自体は
# silver には触らないが、state.bin は単一 resource で race する。
#
# 【完了 verify】
# - 全 source × 全期間で `templates/source=X/date=Y/assignments.parquet` 存在
# - silver row count == assignments row count (per source per date)
# - 受入条件: gold_template_rate 想定 SQL (silver INNER JOIN assignments で
#   template_id × hour count) が秒オーダーで返ること
#
# 【binary subcommand】
# drain apply --source <SOURCE> --date YYYY-MM-DD --force --workers 10
# - --force なし: dst (assignments.parquet) が既存ならスキップ
# - --force あり: 上書き。本テンプレでは backfill 想定で必ず付ける
# - --workers 10: mine 後の固定 state 前提の read-only 並列モード。drain3 match()
#   を multiprocessing.Pool で 10 並列実行、state mutate なし (state save 省略)。
#   未 match 行は template_id=NULL で書き出し。shinbunbun/logs-pipeline-drain#3。
# - daily apply CronJob は --workers 未指定 (default 1) で逐次 incremental learning
#   モードのまま、本テンプレ (backfill) だけ並列モード使用。
#
# 【投入時の MAX_PARALLEL ガイドライン】
# pod の limits.cpu=10 と合わせて MAX_PARALLEL=2 推奨 → 全 backfill で 20 core
# (= node 24 core の 83%)、残り 4 core を kernel/k3s/daily bronze/silver 用に確保。
# 2026-05-15 nixos-desktop ハング (CPU/IO thread starvation、load 425 で physical
# reset) は CPU limit 未設定 + MAX_PARALLEL=3 で 24 core 食い尽くしたのが原因。
apiVersion: batch/v1
kind: Job
metadata:
  generateName: logs-rust-pipeline-drain-apply-backfill-{{SOURCE}}-{{DATE}}-
  namespace: logs-rust-pipeline
  labels:
    app: logs-rust-pipeline
    tier: drain-apply-backfill
    source: "{{SOURCE}}"
    date: "{{DATE}}"
spec:
  backoffLimit: 1
  # daily apply cronjob は per-day で軽量 source は数分、routeros / macos の
  # 6M rows/day で peak 30-60 分想定、余裕を持って 1h。
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: logs-rust-pipeline
        tier: drain-apply-backfill
        source: "{{SOURCE}}"
        date: "{{DATE}}"
    spec:
      restartPolicy: Never
      containers:
        - name: drain
          image: ghcr.io/shinbunbun/logs-pipeline-drain:latest
          args:
            - apply
            - --source
            - "{{SOURCE}}"  # ← edit before kubectl create (sed 推奨)
            - --date
            - "{{DATE}}"    # ← edit before kubectl create (sed 推奨)
            - --force
            - --workers     # mine 後の固定 state を前提とした read-only 並列モード
            - "10"          # 10 worker process × match() で 1 pod 内 10 core 飽和
            # --dump-templates は付けない: backfill 中に都度 dict 上書きすると
            # daily cron の dict 状態と race するため、dict 更新は backfill 完了後の
            # 次 daily cron に任せる (Issue #208 で daily 統合済)。
            # --workers >1 では state mutate しないので --dump-templates 自体無効。
          env:
            - name: AWS_S3_ENDPOINT
              value: "http://garage.garage.svc.cluster.local:3900"
          envFrom:
            - secretRef:
                name: logs-rust-pipeline-credentials
          resources:
            requests:
              # --workers 10 で 10 core 食う。scheduler に 5 core request を伝え、
              # 残りは burst で limit まで取る (実効 ~10 core で安定動作)。
              cpu: 5000m
              # 10 worker × ~150MB (state load + match overhead) + polars frame
              # ~500MB-1GB = ~2.5GB ベース。安全側で 2Gi request。
              memory: 2Gi
            limits:
              # CPU hard cap 10 core (= node 24 core の ~42%)。MAX_PARALLEL=2 で
              # 投入する想定なので backfill 全体で 20 core 上限、kernel/k3s/daily
              # bronze/silver に残り 4 core 確保。
              # 2026-05-15 nixos-desktop ハング再発防止 (dotfiles-private#242 系
              # CPU/IO thread starvation): 前 PR は CPU limit 未設定で 24 core
              # 食い尽くし → load avg 425 → physical reset。本 limit で防止。
              cpu: 10000m
              # 10 worker × silver parquet load 共有 + Drain tree。memory は
              # ~2-3 GB peak (mine 観測値) を踏まえ 8Gi。
              memory: 8Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
