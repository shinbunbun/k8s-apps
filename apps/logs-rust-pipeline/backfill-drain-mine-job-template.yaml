# Drain3 sidecar: 全期間 silver から template tree を学習する backfill Job テンプレ
#
# 【用途】
# daily drain-apply CronJob は 2026-05-06 から稼働開始 → 過去日 (2025-10-14 〜
# 2026-05-05) の silver には template_id 未割当。Phase 6 gold (Issue #201) の
# gold_template_rate / gold_template_first_seen が機能するように全期間に
# template_id を遡及付与する。本テンプレは Step 1 (mine、state 構築) 用。
#
# 経緯: shinbunbun/dotfiles-private#207 (Phase 6 prereq 1)
#
# 既存 state があれば load して incremental 学習、なければ fresh start。
# silver row_id は #205 改修後も sort key 不変で 5/06-5/08 既存 assignments と
# 整合する (実機検証 ok、k8s-pods 5/07 で 937,423 row 全 match)。
#
# 【kustomize 外】手動 `kubectl create -f -` 専用。`{{SOURCE}}` / `{{SINCE}}` /
# `{{UNTIL}}` を sed で都度置換 (backfill-silver-job-template と同形式)。
#
# 【per-source 期間 (Issue #207 §2-1)】
#   systemd:        --since 2025-10-14 --until 2026-05-05  (~204 day)
#   routeros:       --since 2025-10-17 --until 2026-05-05  (~201 day)
#   macos-unified:  --since 2026-02-22 --until 2026-05-05  (~73 day)
#   k8s-pods:       --since 2026-02-21 --until 2026-05-05  (~74 day)
#
# 【4 source 並列実行例】state.bin は source 別なので並列衝突なし。
#
#   declare -A RANGES=(
#     [systemd]="2025-10-14 2026-05-05"
#     [routeros]="2025-10-17 2026-05-05"
#     [macos-unified]="2026-02-22 2026-05-05"
#     [k8s-pods]="2026-02-21 2026-05-05"
#   )
#   for s in "${!RANGES[@]}"; do
#     read since until <<< "${RANGES[$s]}"
#     sed -e "s/{{SOURCE}}/${s}/g" -e "s/{{SINCE}}/${since}/g" -e "s/{{UNTIL}}/${until}/g" \
#       apps/logs-rust-pipeline/backfill-drain-mine-job-template.yaml \
#       | kubectl create -f -
#   done
#   kubectl wait --for=condition=complete -n logs-rust-pipeline \
#     job -l app=logs-rust-pipeline,tier=drain-mine-backfill \
#     --timeout=21600s  # 6h cap (routeros 6M rows × 200 day で peak 数 hour 想定)
#
# 【daily cron との衝突注意】
# state.bin は単一 resource。daily drain-apply CronJob (02:30-03:00 JST) と
# 本 mine Job が並走すると state save が race する。02:00 JST 〜 04:00 JST の
# 時間帯は本 Job 投入を避けること (Issue #207 §3 の前提)。
#
# 【完了 verify】
#   aws --endpoint-url ... s3 ls s3://logs-archive/drain-state/source=systemd/state.bin
#   # 4 source 全てに state.bin が出ていれば OK (size は templates 数に比例、数十 KiB 〜 MiB)
#
# 【binary subcommand】
# drain mine --source <SOURCE> --since YYYY-MM-DD --until YYYY-MM-DD
# - 既存 state があれば load + 増分学習、なければ fresh start
# - per-day silver の `message` 列を全部 add_log_message
# - 完了時に state.bin を save
apiVersion: batch/v1
kind: Job
metadata:
  generateName: logs-rust-pipeline-drain-mine-backfill-{{SOURCE}}-
  namespace: logs-rust-pipeline
  labels:
    app: logs-rust-pipeline
    tier: drain-mine-backfill
    source: "{{SOURCE}}"
spec:
  backoffLimit: 1
  # routeros / macos は 6M rows × 数百 day で peak 数 hour 想定、6h cap で余裕。
  activeDeadlineSeconds: 21600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: logs-rust-pipeline
        tier: drain-mine-backfill
        source: "{{SOURCE}}"
    spec:
      restartPolicy: Never
      containers:
        - name: drain
          image: ghcr.io/shinbunbun/logs-pipeline-drain:latest
          args:
            - mine
            - --source
            - "{{SOURCE}}"  # ← edit before kubectl create (sed 推奨)
            - --since
            - "{{SINCE}}"   # ← edit before kubectl create (sed 推奨)
            - --until
            - "{{UNTIL}}"   # ← edit before kubectl create (sed 推奨)
          env:
            - name: AWS_S3_ENDPOINT
              value: "http://garage.garage.svc.cluster.local:3900"
          envFrom:
            - secretRef:
                name: logs-rust-pipeline-credentials
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              # daily apply cronjob は per-day で 2-4 GiB peak。mine は per-day silver
              # を順次 load + Drain tree が累積成長、routeros / macos の数百日 backfill
              # では tree サイズ + Polars frame で 8 GiB を上限。peak 観測後に縮小可。
              # 2026-05-15 ハング根本原因調査 (dotfiles-private#233): 5/3-5/5 backfill で
              # anon-rss 8.3GB に張り付いて OOM 多発 → 8Gi → 12Gi に引き上げ。
              memory: 12Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
