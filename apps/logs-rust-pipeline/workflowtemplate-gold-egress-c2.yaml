# Argo WorkflowTemplate: egress C2 検知 gold (dotfiles-private#399 / #396)
#
# 「感染端末が変なとこ (C2) へ通信していないか」を、新規センサーを入れず既存の
# netflow(IPFIX) + passive-DNS の上に脅威判定 + ビーコン統計を乗せて日次検知する。
# 検知本体は logs-pipeline (Rust) の埋め込み DuckDB binary `gold-build --table egress-c2`
# (logs-pipeline#48、GoldTable::EgressC2)。gold-access-attribution と同じ方式で、専用 image や
# Python ジョブを増やさず単一 binary の subcommand に収める。
#
# 3 検知を 1 テーブルに UNION して gold/egress-c2/date=<d>/data.parquet に materialize する:
#   - D1 known-bad (severity=alert): access-attribution gold の remote が C2 脅威フィード
#       (C2IntelFeeds, GitHub 無認証) に一致。精度≈1.0。
#   - D2 beacon    (severity=alert): silver netflow の接続間隔が規則的 (CV<0.3, ≥24 接続) かつ
#       ASN が大手 cloud/CDN でない = 未知 C2 を振る舞いで炙り出す。
#   - D3 direct-to-IP suspicious (severity=review): DNS 解決痕跡なし × 非大手 ASN。
#   severity=alert は "EGRESS_C2_ALERT ..." マーカーを stderr に出し、Alloy が job="k8s-pods" で
#   Loki 収集 → loki-config の EgressC2* ルール (EgressC2KnownBadDetected / EgressC2BeaconDetected)
#   が拾って Alertmanager→Discord に流す。
#
# 入力: gold/access-attribution (D1/D3 の enriched 土台) + silver/source=netflow (D2 のビーコン,
#   trailing 7 日) + reference/asn (D2 の org 付与) + C2IntelFeeds (D1)。**同日ぶんの
#   access-attribution gold が先に build 済みである前提** → daily-pipeline は本テンプレートを
#   gold-access-attribution の後段の step group で呼ぶ (順序保証)。
#
# 出力: s3://logs-archive/gold/egress-c2/date=<d>/data.parquet (garage-archive)。date はデータ列に
#   持たず hive partition (date=) が供給。Grafana "Egress C2 Detection" dashboard がこれを読む。
#
# 【daily / backfill 兼用】
#   - 日次: daily-pipeline が gold-access-attribution の後に templateRef で本テンプレートを呼ぶ。
#     date 未指定 → binary が yesterday-jst を解釈 (同日の access-attribution gold と揃う)。
#   - backfill: argo submit --from で date を明示渡し (--force で冪等):
#       argo submit -n logs-rust-pipeline \
#         --from workflowtemplate/gold-egress-c2 -p date=2026-06-20
#     (対象日の access-attribution gold が存在している必要がある)
#
# 【埋め込み DuckDB のランタイム要件】binary は httpfs/inet/icu を runtime に INSTALL する。
#   - HTTPS egress: 当 namespace は NetworkPolicy 無しで egress 可 (S3 + GitHub フィード取得)。
#   - 書込可能な拡張/spill dir: binary が extension_directory / temp_directory を /tmp 配下へ向ける。
#
# 【image SHA】daily-pipeline / backfill / gold-access-attribution と同じく直書き・同一 SHA。
#   logs-pipeline を bump したら揃える (README「image SHA bump」参照)。
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: gold-egress-c2
spec:
  entrypoint: build
  ttlStrategy:
    secondsAfterCompletion: 86400
  podGC:
    strategy: OnWorkflowSuccess
    deleteDelayDuration: 30s
  arguments:
    parameters:
      - name: date
        value: "yesterday-jst"
  templates:
    - name: build
      inputs:
        parameters:
          - name: date
            value: "yesterday-jst"
      # D2 が trailing 7 日ぶんの netflow silver を窓関数走査 + INET join するため長めに。
      activeDeadlineSeconds: 1800
      metadata:
        labels:
          app: logs-rust-pipeline
          tier: gold
          table: egress-c2
      retryStrategy:
        limit: "2"
        retryPolicy: OnFailure
        backoff:
          duration: "30s"
          factor: "2"
          maxDuration: "5m"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [g3pro]
      container:
        image: ghcr.io/shinbunbun/logs-pipeline:0cf4337
        args:
          - gold-build
          - --table
          - egress-c2
          - --date
          - "{{inputs.parameters.date}}"
          # daily は新規 date を書くため no-op、backfill は既存 date を上書き。冪等化のため常に --force。
          - --force
        env:
          - name: AWS_S3_ENDPOINT
            value: "http://garage-archive.garage.svc.cluster.local:3900"
          - name: RUST_LOG
            value: "info"
        envFrom:
          - secretRef:
              name: logs-rust-pipeline-archive-credentials
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            # binary の DuckDB memory_limit は 2GB。7 日 silver 走査 + 拡張ロード分の
            # ヘッドルームとして 4Gi。超過分は /tmp へ spill。
            memory: 4Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: tmp
            mountPath: /tmp
      volumes:
        - name: tmp
          # tempfile (gold parquet) + DuckDB の拡張 INSTALL 先 + spill 先。7 日 silver の
          # 窓処理で spill し得るため 6Gi。
          emptyDir:
            sizeLimit: 6Gi
