# gold/template_rate backfill Job テンプレ (1 partition = (source, date) ペア)
#
# 【用途】
# silver + templates から gold/template_rate/source=*/date=*/data.parquet を全期間生成。
# 4 source (systemd / routeros / k8s-pods / macos-unified) 全てが対象。
# 当初 routeros は #201 設計で除外していたが、 shinbunbun/dotfiles-private#264 の motherduck
# 実測で逆 (S/N ベスト) と判明したため shinbunbun/logs-pipeline#29 でガード削除済。
#
# 経緯: shinbunbun/dotfiles-private#201 Phase 6 backfill + shinbunbun/dotfiles-private#264
#
# 【kustomize 外】手動 `kubectl create -f -` 専用。`{{SOURCE}}` / `{{DATE}}` を sed 置換。
# orchestrator script (`backfill-gold-orchestrator.sh`) が xargs -P N で投入。
#
# 【per-source 期間】
#   systemd:        2025-10-15 〜 2026-05-24  (~222 day)
#   k8s-pods:       2026-02-21 〜 2026-05-24  (~93 day)
#   macos-unified:  2026-02-22 〜 2026-05-21  (~89 day、silver Issue E で 5/22 以降欠落)
#
# 【1-day smoke test 例】
#   sed -e "s/{{SOURCE}}/k8s-pods/g" -e "s/{{DATE}}/2026-05-24/g" \
#     apps/logs-rust-pipeline/backfill-gold-template-rate-job-template.yaml \
#     | kubectl create -f -
#
# 【MAX_PARALLEL ガイドライン】
# template_rate は silver + templates の hash JOIN がメイン consumer。
# 1 Job 2 core 上限 (POLARS_MAX_THREADS=2)、MAX_PARALLEL=5 推奨 → 全体 10 core。
# volume backfill (10 parallel) と同時実行で計 30 core peak、limit ベース。
# request ベースでは 5 × 500m = 2.5 core、scheduler 余裕あり。
apiVersion: batch/v1
kind: Job
metadata:
  generateName: logs-rust-pipeline-gold-rate-bf-{{SOURCE}}-{{DATE}}-
  namespace: logs-rust-pipeline
  labels:
    app: logs-rust-pipeline
    tier: gold-backfill
    table: template-rate
    source: "{{SOURCE}}"
    date: "{{DATE}}"
spec:
  backoffLimit: 1
  # silver + templates JOIN + GROUP BY。1h 上限 (daily CronJob と同じ)。
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: logs-rust-pipeline
        tier: gold-backfill
        table: template-rate
        source: "{{SOURCE}}"
        date: "{{DATE}}"
    spec:
      restartPolicy: Never
      containers:
        - name: pipeline
          image: ghcr.io/shinbunbun/logs-pipeline:latest
          args:
            - gold-build
            - --table
            - template-rate
            - --source
            - "{{SOURCE}}"
            - --date
            - "{{DATE}}"
            - --force
          env:
            - name: AWS_S3_ENDPOINT
              value: "http://garage.garage.svc.cluster.local:3900"
            - name: RUST_LOG
              value: "info"
            - name: POLARS_MAX_THREADS
              value: "2"
          envFrom:
            - secretRef:
                name: logs-rust-pipeline-credentials
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 4Gi
