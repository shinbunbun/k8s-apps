# KSOPS generator: threatfox-credentials (abuse.ch ThreatFox Auth-Key)。
# threat-feed-mirror CronWorkflow が envFrom で参照する。実値は secrets/threatfox.enc.yaml。
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/threatfox.enc.yaml
