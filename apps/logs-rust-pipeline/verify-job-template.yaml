# Rust + Polars: verify (旧 daily/ vs 新 daily-struct/) Job template
#
# 【用途】
# 旧 dbt-duckdb stack は Phase 4 で廃止済 (Issue #191、apps/logs-typed-dbt/ 削除)。
# 本テンプレートは backfill 期間 (旧 dbt 廃止以前の日付) に対する row count 整合
# 検証専用。新規 fire 後の日付では `--old-prefix daily` 配下に新規 write がないため
# 意味のある比較にならない。
#
# 【ライフサイクル】
# 旧 daily/ at-rest データの lifecycle expire (Issue #191 タスク B-3) が完了すると
# 比較対象が消えて本テンプレート自身も意味を失う。B-3 完了時に削除予定。
#
# 【実行方法】
# kustomize 外。手動 `kubectl create -f apps/logs-rust-pipeline/verify-job-template.yaml`
# で実行する。`--source` (systemd / routeros / k8s-pods / macos-unified) と `--date`
# (TARGET_DATE = 旧 dbt 廃止以前の日付) を都度書き換えること (sed 推奨)。
#
# 【binary subcommand】
# verify は logs-pipeline binary に実装済み:
#   logs-pipeline verify --source systemd --date YYYY-MM-DD \
#     --old-prefix daily --new-prefix daily-struct
# 旧 dbt-duckdb は `daily/date=*/source=*/` (date 先) で書き、新 Rust は
# `daily-struct/source=*/date=*/` (source 先) で書く。binary 側で path 順序差を吸収。
apiVersion: batch/v1
kind: Job
metadata:
  generateName: logs-rust-pipeline-verify-systemd-
  namespace: logs-rust-pipeline
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  # 失敗時 Pod が Failed のまま残ると alert (KubePodNotReady) を発火させるため、
  # Complete/Failed どちらでも 10 分後に Job + Pod を自動 GC。ログは事前に
  # `kubectl logs` で取り出すか、retain したいなら create 時に削っておく。
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: verify
          image: ghcr.io/shinbunbun/logs-pipeline:latest
          args:
            - verify
            - --source
            - systemd
            - --date
            - "2026-05-02"  # ← edit before kubectl create
            - --old-prefix
            - daily
            - --new-prefix
            - daily-struct
          env:
            - name: AWS_S3_ENDPOINT
              value: "http://garage.garage.svc.cluster.local:3900"
            - name: RUST_LOG
              value: "info"
          envFrom:
            - secretRef:
                name: logs-rust-pipeline-credentials
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              # routeros 旧 daily/ は 1 列 json:VARCHAR で 5MB config dump 数百件含む。
              # logs-pipeline #7 で num_rows() metadata 読みに変更済だが、念のため
              # 4Gi (download buffer + Polars metadata parse)。systemd では数百 MiB しか
              # 使わないが、source 別に template 分けるより一律で吸収する方が運用簡素。
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
