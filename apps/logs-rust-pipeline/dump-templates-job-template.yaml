# Drain3 sidecar: state から (template_id, template_text) dict を S3 に snapshot 出力する
# 一回限りの Job テンプレ
#
# 【用途】
# 既存 drain-state/source=X/state.bin から `templates/source=X/templates.parquet` を
# 初回生成する用途。daily CronJob (cronjob-drain-apply-*.yaml) には `--dump-templates`
# flag が付いていて apply 後に dict も上書きされるが、それを待たずに即座に dict を
# 用意したい場合 (Issue #208 Step 3 「既存 state から初回 dump」) に本テンプレを使う。
#
# kustomize 外。`{{SOURCE}}` を sed で都度置換 (backfill-silver-job-template と同形式)。
#
# 【実行例 (4 source 並列)】
#   for s in systemd routeros k8s-pods macos-unified; do
#     sed "s/{{SOURCE}}/${s}/g" \
#       apps/logs-rust-pipeline/dump-templates-job-template.yaml \
#       | kubectl create -f -
#   done
#   kubectl wait --for=condition=complete -n logs-rust-pipeline \
#     job -l app=logs-rust-pipeline,tier=drain-dump-templates \
#     --timeout=600s
#
# 【完了 verify】
#   aws --endpoint-url ... s3 ls s3://logs-archive/templates/source=systemd/templates.parquet
#   # 4 source 全てに templates.parquet が出ていれば OK
#
# 【binary subcommand】
# drain dump-templates --source <SOURCE>
# - state を load して clusters を iterate、(template_id, template_text) を parquet 化
# - state は read-only (incremental learning は触らない、save_state も呼ばない)
apiVersion: batch/v1
kind: Job
metadata:
  generateName: logs-rust-pipeline-drain-dump-templates-{{SOURCE}}-
  namespace: logs-rust-pipeline
  labels:
    app: logs-rust-pipeline
    tier: drain-dump-templates
    source: "{{SOURCE}}"
spec:
  backoffLimit: 1
  # state load + clusters iterate + parquet 出力のみ。systemd/routeros/k8s-pods/macos
  # いずれも数十秒級だが余裕を持って 5 min。
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: logs-rust-pipeline
        tier: drain-dump-templates
        source: "{{SOURCE}}"
    spec:
      restartPolicy: Never
      containers:
        - name: drain
          image: ghcr.io/shinbunbun/logs-pipeline-drain:latest
          args:
            - dump-templates
            - --source
            - "{{SOURCE}}"  # ← edit before kubectl create (sed 推奨)
          env:
            - name: AWS_S3_ENDPOINT
              value: "http://garage.garage.svc.cluster.local:3900"
          envFrom:
            - secretRef:
                name: logs-rust-pipeline-credentials
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              # state load + clusters iterate のみ、Drain tree が in-memory に展開される
              # だけなので daily apply (1-4 GiB) より軽い。peak 観測後に縮小可。
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
