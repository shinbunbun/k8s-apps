# logs-rust-pipeline: Rust + Polars 版 logs archive pipeline
#
# 構成 (dotfiles#681 Phase 4 で旧 CronJob 12 本 + Job template 4 本を削除し、
# Argo Workflows ベースに完全移行):
#
#   workflowtemplate-daily-pipeline.yaml  日次 DAG (4 source × 3 stage)
#   cronworkflow-daily.yaml                00:35 JST 起動 schedule
#   workflowtemplate-backfill.yaml         migrate / silver-backfill /
#                                          gold-backfill / verify の 4 entrypoint
#   README.md                              運用手順 (daily / backfill / rollback)
#
# 旧層 (Phase 4 で削除):
#   - cronjob-{bronze,silver,gold-volume}-{4 sources}.yaml (12 本)
#   - {migrate,backfill-silver,backfill-gold-volume,verify}-job-template.yaml (4 本)
#   - images transformer (newTag による latest → SHA pin): 旧 CronJob 専用、
#     WorkflowTemplate は直書き SHA を採用するため Phase 4 で transformer 廃止
#
# ApplicationSet (apps/* git generator、applicationsets/apps-appset.yaml) が自動検出
# して ArgoCD Application を生成。namespace は basename と一致する `logs-rust-pipeline`
# に CreateNamespace=true で作られる。credentials Secret は apps/garage/keys.yaml の
# `logs-rust-pipeline` GarageKey から secretTemplate で `logs-rust-pipeline-credentials`
# として cross-namespace 配布。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: logs-rust-pipeline
resources:
  - workflowtemplate-daily-pipeline.yaml
  - cronworkflow-daily.yaml
  - workflowtemplate-backfill.yaml
  # 常駐 collector (RouterOS アクセス先統計, dotfiles-private#326)。
  # raw/source={passive-dns,netflow}/ を産出し、上記 daily DAG が処理する。
  - deployment-passive-dns.yaml
  - service-passive-dns-lan.yaml
  - deployment-netflow.yaml
  - service-netflow-lan.yaml
  # IP→ASN/org reference parquet 週次ビルダー (アクセス先統計 v2, dotfiles-private#348)。
  # reference/asn/asn.parquet を産出し、dashboard が query-time に inet range join する。
  - cronworkflow-asn-reference.yaml
