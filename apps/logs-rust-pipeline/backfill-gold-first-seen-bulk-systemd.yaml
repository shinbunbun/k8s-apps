# gold/template_first_seen backfill (bulk mode) for systemd
#
# 【用途】
# silver + templates 全期間 (systemd: 214 day) を 1 Job 内で in-memory accumulator
# により aggregate し、gold/template_first_seen/source=systemd/date=*/data.parquet を
# 一気に生成する。per-day mode (1 K8s Job/partition) だと 5h、bulk で 25-40 分。
#
# 経緯: shinbunbun/dotfiles-private#201 Phase 6 backfill 高速化
# 依存: shinbunbun/logs-pipeline#27 (gold-backfill-bulk-first-seen subcommand)
#
# 【run 方法】
#   kubectl create -f apps/logs-rust-pipeline/backfill-gold-first-seen-bulk-systemd.yaml
#
# 【daily cron 衝突注意】
# bulk mode 実行中に daily cron (cronjob-gold-first-seen-systemd) が走ると同じ
# partition path に同時書き込み race。orchestrator script で daily cron を
# `kubectl patch suspend=true` してから本 Job を投入する。
#
# 【完了 verify】
#   SELECT count(*) FROM read_parquet(
#     's3://logs-archive/gold/template_first_seen/source=systemd/date=*/data.parquet',
#     hive_partitioning=true)
#   GROUP BY date ORDER BY date;
#   → 各 date partition で「初出」した template_id だけが書かれている (累計 ~500 個)
apiVersion: batch/v1
kind: Job
metadata:
  generateName: logs-rust-pipeline-gold-fs-bulk-systemd-
  namespace: logs-rust-pipeline
  labels:
    app: logs-rust-pipeline
    tier: gold-backfill
    table: template-first-seen
    mode: bulk
    source: systemd
spec:
  backoffLimit: 1
  # systemd 214 day × ~10 秒/day = ~35 分。90 分上限 (margin)。
  activeDeadlineSeconds: 5400
  ttlSecondsAfterFinished: 1200
  template:
    metadata:
      labels:
        app: logs-rust-pipeline
        tier: gold-backfill
        table: template-first-seen
        mode: bulk
        source: systemd
    spec:
      restartPolicy: Never
      containers:
        - name: pipeline
          image: ghcr.io/shinbunbun/logs-pipeline:latest
          args:
            - gold-backfill-bulk-first-seen
            - --source
            - systemd
            - --force
          env:
            - name: AWS_S3_ENDPOINT
              value: "http://garage.garage.svc.cluster.local:3900"
            - name: RUST_LOG
              value: "info"
            - name: POLARS_MAX_THREADS
              value: "2"
          envFrom:
            - secretRef:
                name: logs-rust-pipeline-credentials
          resources:
            requests:
              cpu: 1000m
              memory: 512Mi
            limits:
              # in-memory HashMap (template_id × 数千) + per-day Polars compute
              # peak ~1-2 GB 想定。4Gi で安全側。
              cpu: 2000m
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            # 1 day silver + templates + output parquet を順次保持 (sliding window)
            sizeLimit: 4Gi
