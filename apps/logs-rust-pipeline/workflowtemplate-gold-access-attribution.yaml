# Argo WorkflowTemplate: RouterOS アクセス先統計 gold (netflow ⋈ passive-dns ⋈ ASN)
#
# 設計 (dotfiles-private#326 フェーズ4 / #348):
#   - netflow フローを「誰が・どのドメイン/組織へ・何 byte」へ帰属させた gold (集約) 層。
#     gold-volume (host+service+level の件数) とは別物で、複数 source の join +
#     ASN の inet 非等価レンジ join + DNS の ASOF join が本質。
#   - この join は Polars では表現しづらい (INET 型なし / IPv6 整数化が必要) ため、
#     logs-pipeline (Rust) の gold builder がこの 1 テーブルだけ埋め込み DuckDB を使う
#     (logs-pipeline#46、GoldTable::AccessAttribution)。daily/backfill とも同じ binary
#     subcommand `gold-build --table access-attribution` で実行し、専用 image や Python
#     ジョブを増やさない。
#   - 以前は Grafana MyDuck datasource が query-time に同じ join を実行していたが、
#     dashboard を開くと 13 パネルが一斉発火して単一 DuckDB (memory_limit 5GB) を超過し
#     OOM していた。重い join を日次バッチで 1 回だけ materialize し、dashboard 側を純
#     GROUP BY に退化させて根治する。
#
# 出力: s3://logs-archive/gold/access-attribution/date=<d>/data.parquet (garage-archive)
#   粒度 (client_ip, remote, qname) 日次ロールアップ、~14.6k 行/日。date はデータ列に
#   持たず hive partition (date=) が供給。
#
# 【daily / backfill 兼用】
#   - 日次: daily-pipeline (workflowtemplate-daily-pipeline.yaml) が全 silver 完了後に
#     templateRef で本テンプレートを呼ぶ。date 未指定 → binary が yesterday-jst を解釈
#     (group 1 が生成した silver と同じ day)。
#   - backfill: argo submit --from で date を明示渡し (--force で COPY 上書き、冪等):
#       argo submit -n logs-rust-pipeline \
#         --from workflowtemplate/gold-access-attribution -p date=2026-06-20
#     bulk は shell loop (README 参照)。
#
# 【埋め込み DuckDB のランタイム要件】binary は httpfs/inet を runtime に
#   extensions.duckdb.org から INSTALL する (bundled はコアのみ静的化)。
#   - HTTPS egress: 当 namespace は NetworkPolicy 無しで egress 可 (asn-reference が
#     iptoasn.com 到達で実証済み)。
#   - 書込可能な拡張/spill ディレクトリ: binary 側で extension_directory / temp_directory を
#     std::env::temp_dir() (=/tmp) 配下に向けるため、readOnlyRootFilesystem 下でも
#     /tmp emptyDir があれば動く。
#
# 【image SHA】daily-pipeline / backfill と同じく直書き。logs-pipeline を bump したら
#   3 ファイルとも揃える (README「image SHA bump」参照)。
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: gold-access-attribution
spec:
  entrypoint: build
  ttlStrategy:
    secondsAfterCompletion: 86400
  # podGC: standalone submit (backfill) 時の retry 1 回目失敗 Pod を成功時に掃除し
  # KubePodNotReady 誤発報を防ぐ (daily 経由時は daily-pipeline 側の podGC が適用)。
  podGC:
    strategy: OnWorkflowSuccess
    deleteDelayDuration: 30s
  arguments:
    parameters:
      # 空でなく "yesterday-jst" を既定にする (binary の --date default リテラルと一致)。
      # backfill は YYYY-MM-DD を渡す。
      - name: date
        value: "yesterday-jst"
  templates:
    - name: build
      inputs:
        parameters:
          - name: date
            value: "yesterday-jst"
      activeDeadlineSeconds: 1200
      metadata:
        labels:
          app: logs-rust-pipeline
          tier: gold
          table: access-attribution
      # 一過性の S3 timeout / 拡張取得失敗を OnFailure × 2 で吸収 (他 stage と同方針)。
      retryStrategy:
        limit: "2"
        retryPolicy: OnFailure
        backoff:
          duration: "30s"
          factor: "2"
          maxDuration: "5m"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [g3pro]
      container:
        image: ghcr.io/shinbunbun/logs-pipeline:1c89272
        args:
          - gold-build
          - --table
          - access-attribution
          - --date
          - "{{inputs.parameters.date}}"
          # daily は新規 date を書くため no-op、backfill は既存 date を上書き。
          # 単一日の materialize は軽量 (数十万 flow) なので常に --force で冪等にする。
          - --force
        env:
          - name: AWS_S3_ENDPOINT
            value: "http://garage-archive.garage.svc.cluster.local:3900"
          - name: RUST_LOG
            value: "info"
        envFrom:
          - secretRef:
              name: logs-rust-pipeline-archive-credentials
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            # DuckDB memory_limit は binary 側で 3GB。管理外メモリ + 拡張ロード分の
            # ヘッドルームとして 4Gi。
            memory: 4Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: tmp
            mountPath: /tmp
      volumes:
        - name: tmp
          # tempfile (gold parquet) + DuckDB の拡張 INSTALL 先 + spill 先 (binary が
          # /tmp 配下に向ける)。1 日分なので 4Gi で十分。
          emptyDir:
            sizeLimit: 4Gi
