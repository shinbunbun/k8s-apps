# Rust + Polars: silver (daily-struct -> silver) for macos-unified
#
# Source repo: shinbunbun/logs-pipeline (silver subcommand、PR #19)
# 経緯: shinbunbun/dotfiles-private#197 Phase 5 (再起動)
#
# silver immutable layer。drain は templates/ sidecar に書く。
# macos-unified の `timestamp` は ISO 8601 ではなく `YYYY-MM-DD HH:MM:SS.fff+0900`、
# silver subcommand が strptime("%Y-%m-%d %H:%M:%S%.f%z") で parse、ts は
# Datetime[μs, UTC] 統一。
# Schedule: 02:05 JST (= bronze 01:05 + 1h)。
#
# Memory: macos は 6.1M rows/日 (Issue #197 着手時実測)。bronze は peak 8 GiB だが
# silver は projection + sort のみで軽い想定、初回 8Gi で start。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-silver-macos-unified
spec:
  schedule: "5 2 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: silver
            source: macos-unified
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pipeline
              image: ghcr.io/shinbunbun/logs-pipeline:latest
              args:
                - silver
                - --source
                - macos-unified
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
                - name: RUST_LOG
                  value: "info"
              envFrom:
                - secretRef:
                    name: logs-rust-pipeline-credentials
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 8Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: [ALL]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 8Gi
