# KSOPS generator - MinIO Tenant configuration secret
#
# ArgoCD repo-server に注入された KSOPS プラグインが
# secrets/*.enc.yaml を復号して Secret リソースを生成する。
# - storage-env-configuration.enc.yaml: type=Opaque
#   key config.env に MINIO_ROOT_USER / MINIO_ROOT_PASSWORD /
#   MINIO_STORAGE_CLASS_STANDARD を環境変数形式で格納、Tenant の
#   spec.configuration.name で参照される。
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/storage-env-configuration.enc.yaml
