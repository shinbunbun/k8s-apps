# MinIO Tenant Config - Kustomize エントリポイント
#
# ApplicationSet (applicationsets/apps-appset.yaml) が apps/minio-tenant を
# 自動検出して ArgoCD Application を生成する。
# すべてのリソースを minio-tenant namespace にデプロイ。
#
# commonAnnotations の ServerSideApply=true は MinIO Operator の CRD Tenant が
# 内部的に大きな status サブリソースを持つため client-side apply の制限回避に必須。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: minio-tenant

commonAnnotations:
  argocd.argoproj.io/sync-options: ServerSideApply=true

resources:
  - tenant.yaml

generators:
  - secret-generator.yaml
