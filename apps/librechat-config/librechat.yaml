# LibreChat 設定 - MCP ネイティブ chat UI
#
# Helm chart 側 (infrastructure/librechat/application.yaml) の
# librechat.existingConfigYaml で librechat-config-yaml ConfigMap を
# /app/librechat.yaml にマウントして読まれる。
#
# 提供する設定:
#   - registration: Authentik OIDC 一本化 (socialLogins: ["openid"])
#   - mcpServers.grafana: mcp-grafana (streamable-http) を直接接続
#   - endpoints.custom:
#       - macmini-mlx     : mlx-lm.server (Qwen3.5-4B-MLX-4bit、軽量)
#       - nixos-desktop-llamacpp : llama.cpp (Qwen3.6-35B、思考重め)
#
# モデル名は OpenAI 互換 API の /v1/models から fetch (models.fetch: true)。
# default は UI 初期表示用の placeholder。
version: 1.2.1
cache: true

interface:
  privacyPolicy:
    externalUrl: "https://chat.shinbunbun.com"
    openNewTab: false

registration:
  socialLogins: ["openid"]

# MCP server SSRF 防御の exemption。
# .svc.cluster.local は LibreChat の SSRF 防御で .local TLD としてブロックされるため、
# 内部 mcp-grafana を明示的に許可する。
#
# 注意: v0.8.4 (chart 2.0.2 appVersion) では mcpSettings.allowedAddresses が未対応で
# allowedDomains のみが createMCPServersRegistry に渡される。allowedDomains は
# strict whitelist mode を有効化するため、新規 MCP server を mcpServers に追加する際は
# 必ずここにも host を追記すること。
mcpSettings:
  allowedDomains:
    - "mcp-grafana.mcp-tools.svc.cluster.local"

mcpServers:
  grafana:
    type: streamable-http
    url: http://mcp-grafana.mcp-tools.svc.cluster.local:8000/mcp
    timeout: 30000
    serverInstructions: true
    chatMenu: true

endpoints:
  custom:
    - name: "macmini-mlx"
      apiKey: "dummy"
      baseURL: "http://192.168.1.5:8081/v1"
      models:
        default: ["qwen3.5-4b-mlx-4bit"]
        fetch: true
      titleConvo: true
      titleModel: "qwen3.5-4b-mlx-4bit"
      modelDisplayLabel: "Qwen3.5 (macmini MLX)"
    - name: "nixos-desktop-llamacpp"
      apiKey: "dummy"
      baseURL: "http://192.168.1.4:8082/v1"
      models:
        default: ["qwen3.6-35b-a3b-ud-q4-k-m"]
        fetch: true
      titleConvo: true
      titleModel: "qwen3.6-35b-a3b-ud-q4-k-m"
      modelDisplayLabel: "Qwen3.6 35B (desktop CPU)"

# Web Search - cluster 内 SearXNG + Firecrawl (両方 self-host) を組み合わせる。
#
# LibreChat v0.8.5 の webSearch は 3 段構成で、scraperType: "none" 等の skip 設定が
# 存在しないため scraper (Firecrawl) は必須。reranker は v0.8.5 で "none" 許容に:
#   1. Search Provider (SearXNG)    : URL リスト取得
#   2. Scraper (Firecrawl)          : URL を読んで本文取得 ← skip 不可
#   3. Reranker                     : "none" で skip (v0.8.5 で対応、infinity も追加)
#
# - SearXNG (apps/searxng/)         : formats:[html,json] + limiter:false で API 開放済
# - Firecrawl (apps/firecrawl/)     : USE_DB_AUTHENTICATION=false で auth bypass、
#                                     FIRECRAWL_API_KEY は dummy 文字列で可 (cluster
#                                     internal + NetworkPolicy で防御)
#
# 注意: LibreChat は instanceUrl / apiKey 等を直接値で書くと warn を出して機能を
# 無効化するため、必ず ${ENV_VAR} 参照にする。実値は infrastructure/librechat/
# application.yaml の librechat.configEnv で供給。
webSearch:
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  firecrawlApiUrl: "${FIRECRAWL_API_URL}"
  firecrawlApiKey: "${FIRECRAWL_API_KEY}"
  # Reranker (Jina / Cohere / Infinity) は外部 SaaS のため初期は skip。
  # v0.8.5 から rerankerType 'none' が valid (data-provider/src/config.ts の
  # RerankerTypes enum で確認)。infrastructure/librechat/application.yaml で
  # image.tag を v0.8.5 に pin している前提。
  # 必要に応じて rerankerType を 'jina' 等に変更し、jinaApiKey / cohereApiKey を
  # Secret 経由で env var 参照に追加すれば有効化できる。
  rerankerType: "none"
  safeSearch: 0
