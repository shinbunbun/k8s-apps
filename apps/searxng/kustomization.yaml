apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: searxng
resources:
  - deployment.yaml
  - service.yaml
# settings.yml を別ファイルに切り出して ConfigMap として配信する。
# disableNameSuffixHash: true で hash suffix を抑制し、Deployment volume の
# `configMap.name: searxng-settings` を固定名で参照できるようにする。
# (suffix を有効化すると settings.yml 変更で ConfigMap 名が変わって自動 rollout
#  されるメリットはあるが、ArgoCD 側でも diff が拾えるので不要)
configMapGenerator:
  - name: searxng-settings
    files:
      - settings.yml
generatorOptions:
  disableNameSuffixHash: true
