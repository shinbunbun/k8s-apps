apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
data:
  # SearXNG runtime settings (= /etc/searxng/settings.yml)
  #
  # `secret_key` は "ultrasecretkey" placeholder のまま置き、initContainer が
  # 起動時に /dev/urandom 由来の base64 乱数で sed 置換する (SearXNG 公式
  # entrypoint の挙動を initContainer 側で再現したもの)。これにより secret_key
  # を Kubernetes Secret として持つ必要がなくなる (Pod 単位で揮発、replicas: 1
  # で session 共有が無い前提なので問題なし)。
  #
  # `use_default_settings: true` で SearXNG image 内蔵の default settings.yml と
  # マージされるので、上書きしたい値だけここに書く。
  settings.yml: |
    use_default_settings: true
    server:
      secret_key: "ultrasecretkey"
      # 内部限定 (ClusterIP) なので bot detection / レート制限は不要、Redis 依存も避ける
      limiter: false
      # 検索結果に含まれる外部画像を SearXNG が proxy する機能。
      # SSRF 経路と帯域消費の元なので無効化
      image_proxy: false
    search:
      # JSON API を許可 (デフォは html のみ。json 無しだと外部クライアントから
      # /search?q=...&format=json が 403 Forbidden になる)
      formats:
        - html
        - json
      safe_search: 0
      autocomplete: ""
    ui:
      static_use_hash: true
