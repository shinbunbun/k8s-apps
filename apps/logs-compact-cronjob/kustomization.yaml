# logs-compact-cronjob - Kustomize エントリポイント
#
# ApplicationSet (applicationsets/apps-appset.yaml) が apps/logs-compact-cronjob
# を自動検出して ArgoCD Application を生成する。namespace `logs-compact-cronjob`
# にデプロイされ、日次 01:00 JST に Garage logs-archive/raw/ の ndjson.zst を
# DuckDB で読んで daily/logs.parquet (Parquet zstd) に統合する CronJob を動かす。
#
# 【Phase 2c】ログ解析基盤の compaction 層。
# 完了後は raw/ prefix を削除して Garage 使用量を抑える。
#
# resources:
# - cronjob.yaml            : 日次 compaction CronJob
# - script-configmap.yaml   : Python (DuckDB + boto3) スクリプト
#
# 注: S3 credentials (compact-garage-credentials) は Garage Operator が
# GarageKey "compact" の secretTemplate で logs-compact-cronjob NS に自動生成
# するため KSOPS generator は不要 (apps/garage/keys.yaml 参照)。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: logs-compact-cronjob

resources:
  - cronjob.yaml
  - script-configmap.yaml
