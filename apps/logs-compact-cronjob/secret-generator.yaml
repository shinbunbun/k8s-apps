# KSOPS generator - compaction Job が MinIO Tenant にアクセスするための credentials
#
# ArgoCD repo-server に注入された KSOPS プラグインが secrets/*.enc.yaml を
# 復号して Secret リソースを生成する。
#
# 注: ファイル名と Secret 名は apps/loki-config / apps/log-archiver-vector-config
# と同一の loki-minio-credentials をそのまま踏襲している。これは SOPS MAC 整合性
# のため metadata.name を書き換えずに同じ暗号化ファイルを流用する運用 (Secret は
# namespace-scoped なので他 namespace の同名 Secret とは別物で衝突しない)。
# 将来 per-app の access key を MinIO で発行する場合は、専用 Secret を sops で
# 新規作成して差し替える。
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/loki-minio-credentials.enc.yaml
