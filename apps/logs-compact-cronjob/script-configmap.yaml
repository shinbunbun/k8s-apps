# Python スクリプト (DuckDB + boto3) の ConfigMap
#
# cronjob.yaml から /scripts/compact.py として volumeMount される。
# CronJob の bash ラッパーが pip install の後にこのスクリプトを実行する。
#
# 処理:
# 1. JST 前日を算出
# 2. Vector が key_prefix=raw/source={{ log_type }}/date=... で書き出した
#    ソース別 prefix (systemd / k8s-pods / routeros / macos-unified) を列挙
# 3. 各 source ごとに DuckDB httpfs で read_json(glob) → COPY TO Parquet zstd
#    (daily/date={y}/source={src}/logs.parquet、source ごとに 1 ファイル)
# 4. 書き込み完了後、boto3 で raw/source={src}/date={y}/ を削除
apiVersion: v1
kind: ConfigMap
metadata:
  name: logs-compact-script
data:
  compact.py: |
    #!/usr/bin/env python3
    """
    Daily compaction per source (unified JSON schema, idempotent merge mode):
      logs-archive/raw/source=<src>/date=YYYY-MM-DD/hour=HH/**/*.log.zst (ndjson.zst)
        + 既存 logs-archive/daily/date=YYYY-MM-DD/source=<src>/logs.parquet (もしあれば)
        -> logs-archive/daily/date=YYYY-MM-DD/source=<src>/logs.parquet (Parquet zstd)

    出力スキーマ: 1 列 `json` (JSON 型) のみ、`date` / `source` は Hive partition
    path から読み手側で自動推論される (migration 2026-04-tz-rebucket と統一)。

    Merge mode の理由:
      - migration が JST partition で書いた既存 daily/ と、新 Vector が JST 化された
        raw/ で書く新規分が両立する切替日の data 整合を保つ
      - 同じ target_date を 2 回 compact しても結果が同じ (idempotent)、再実行安全
      - PR #198 (Vector JST partitioning) 以前の orphan raw/ を後追いで投入した際も
        既存 daily/ と統合される

    raw/ は ndjson 1 行 1 record (PR #199 で framing 修正済)、各行を to_json で
    JSON 型に持ち上げて 1 列 `json` で書き出す。既存 daily/ も同 schema なので
    そのまま UNION ALL する。
    """
    import os
    import sys
    from datetime import datetime, timedelta
    from zoneinfo import ZoneInfo

    import boto3
    import duckdb
    from botocore.exceptions import ClientError

    ENDPOINT = "garage.garage.svc.cluster.local:3900"
    BUCKET = "logs-archive"
    REGION = os.environ.get("AWS_REGION", "garage")
    ACCESS_KEY = os.environ["AWS_ACCESS_KEY_ID"]
    SECRET_KEY = os.environ["AWS_SECRET_ACCESS_KEY"]

    # Fluent Bit の log_type に一致する想定。追加のソースが増えたら
    # ここに足すか、raw/ 直下の source= プレフィックスを動的 list する
    # ロジックに変える。
    SOURCES = ["systemd", "k8s-pods", "routeros", "macos-unified"]


    def target_date() -> str:
        # COMPACT_TARGET_DATE env で override 可能 (orphan 日付の手動 backfill 用)。
        # 形式: YYYY-MM-DD (JST date)。merge mode が冪等なので何度でも再実行可。
        override = os.environ.get("COMPACT_TARGET_DATE", "").strip()
        if override:
            return override
        jst = ZoneInfo("Asia/Tokyo")
        return (datetime.now(jst).date() - timedelta(days=1)).isoformat()


    def s3_client():
        return boto3.client(
            "s3",
            endpoint_url=f"http://{ENDPOINT}",
            aws_access_key_id=ACCESS_KEY,
            aws_secret_access_key=SECRET_KEY,
            region_name=REGION,
        )


    def has_objects(s3, prefix: str) -> bool:
        resp = s3.list_objects_v2(Bucket=BUCKET, Prefix=prefix, MaxKeys=1)
        return resp.get("KeyCount", 0) > 0


    def head_exists(s3, key: str) -> bool:
        try:
            s3.head_object(Bucket=BUCKET, Key=key)
            return True
        except ClientError:
            return False


    def delete_prefix(s3, prefix: str) -> int:
        paginator = s3.get_paginator("list_objects_v2")
        total = 0
        for page in paginator.paginate(Bucket=BUCKET, Prefix=prefix):
            contents = page.get("Contents", [])
            if not contents:
                continue
            keys = [{"Key": o["Key"]} for o in contents]
            for i in range(0, len(keys), 1000):
                batch = keys[i : i + 1000]
                s3.delete_objects(Bucket=BUCKET, Delete={"Objects": batch, "Quiet": True})
                total += len(batch)
        return total


    def configure_duckdb():
        con = duckdb.connect()
        con.execute("INSTALL httpfs; LOAD httpfs; INSTALL json; LOAD json;")
        # OOM を抑止する実効的な設定は threads=4 (read_json の per-file parse
        # バッファ fan-out 抑制、maximum_object_size=256MB × 並列度 で枯渇する
        # のを防ぐ) と preserve_insertion_order=false (COPY TO PARQUET の
        # メモリ節約、行順は後段 timestamp sort 前提で不要)。
        # 実測ピーク 2.32 GiB (manual-backfill 20260427-0813)、merge mode 込み
        # でも 3 GiB 程度想定 → memory_limit 12GB は約 5x 安全マージン。
        # pod limit 16Gi - memory_limit 12GB = 4 GiB headroom (python +
        # duckdb extension + boto3 + glibc allocator slack を吸収)。
        con.execute(
            f"""
            SET s3_endpoint='{ENDPOINT}';
            SET s3_access_key_id='{ACCESS_KEY}';
            SET s3_secret_access_key='{SECRET_KEY}';
            SET s3_use_ssl=false;
            SET s3_url_style='path';
            SET memory_limit='12GB';
            SET threads=4;
            SET preserve_insertion_order=false;
            SET temp_directory='/tmp/duckdb-spill';
            """
        )
        return con


    def compact_source(con, s3, target: str, source: str) -> tuple[int, int, int]:
        """raw/ + 既存 daily/ を merge して daily/ に書く。

        Returns: (existing_rows, raw_rows, total_rows)
        """
        src = f"s3://{BUCKET}/raw/source={source}/date={target}/**/*.log.zst"
        dst_key = f"daily/date={target}/source={source}/logs.parquet"
        dst = f"s3://{BUCKET}/{dst_key}"

        # 既存 daily/ を先に TEMP TABLE に materialize する。
        # COPY TO で同一 path を読み書きすると S3 PUT/GET の race が起きうるため、
        # 読み出しを完了させてから書き出しを始める。hive_partitioning=false で
        # path 推論を切り、parquet 内部 schema (1 列 `json`) のみ取得する。
        existing_rows = 0
        if head_exists(s3, dst_key):
            con.execute(
                f"""
                CREATE OR REPLACE TEMP TABLE existing AS
                SELECT json FROM read_parquet('{dst}', hive_partitioning=false);
                """
            )
            existing_rows = con.execute("SELECT COUNT(*) FROM existing").fetchone()[0]
        else:
            con.execute("CREATE OR REPLACE TEMP TABLE existing (json JSON);")

        # raw/ ndjson を読み、各行を to_json で JSON 値に持ち上げる。
        # 巨大 message (スタックトレース等) を扱うため maximum_object_size=256MB。
        # ignore_errors=true で破損行を skip。union_by_name=true で source 内の
        # フィールド揺れを吸収。
        con.execute(
            f"""
            CREATE OR REPLACE TEMP TABLE new_records AS
            SELECT to_json(t)::JSON AS json
            FROM read_json(
              '{src}',
              format='newline_delimited',
              compression='zstd',
              union_by_name=true,
              ignore_errors=true,
              maximum_object_size=268435456
            ) AS t;
            """
        )
        raw_rows = con.execute("SELECT COUNT(*) FROM new_records").fetchone()[0]

        # Merge して書き出す。output schema は 1 列 `json` (JSON 型) のみ。
        # date / source は Hive partition path から読み手が推論する。
        con.execute(
            f"""
            COPY (
              SELECT json FROM existing
              UNION ALL
              SELECT json FROM new_records
            ) TO '{dst}' (FORMAT PARQUET, COMPRESSION ZSTD);
            """
        )
        total_rows = con.execute(f"SELECT COUNT(*) FROM '{dst}'").fetchone()[0]
        return (int(existing_rows), int(raw_rows), int(total_rows))


    def main() -> int:
        target = target_date()
        print(f"[compact] target date (JST): {target}", flush=True)

        s3 = s3_client()
        con = configure_duckdb()

        any_processed = False
        for source in SOURCES:
            src_prefix = f"raw/source={source}/date={target}/"
            dst_key = f"daily/date={target}/source={source}/logs.parquet"
            has_raw = has_objects(s3, src_prefix)
            has_daily = head_exists(s3, dst_key)

            if not has_raw and not has_daily:
                print(f"[compact] {source}: no raw and no existing daily, skip", flush=True)
                continue
            if not has_raw and has_daily:
                # raw が空 = この日 source の新規 archive なし。
                # 既存 daily を上書き保存しても無意味なので skip (既存ファイル維持)。
                print(f"[compact] {source}: no raw, existing daily kept as-is", flush=True)
                continue

            existing_rows, raw_rows, total_rows = compact_source(con, s3, target, source)
            print(
                f"[compact] {source}: merged existing={existing_rows} + raw={raw_rows} "
                f"= total={total_rows} rows -> daily/date={target}/source={source}/logs.parquet",
                flush=True,
            )

            deleted = delete_prefix(s3, src_prefix)
            print(
                f"[compact] {source}: deleted {deleted} objects under {src_prefix}",
                flush=True,
            )
            any_processed = True

        if not any_processed:
            print(f"[compact] no sources had new raw data for {target}", flush=True)
        return 0


    if __name__ == "__main__":
        sys.exit(main())
