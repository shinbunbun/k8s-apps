# Python スクリプト (DuckDB + boto3) の ConfigMap
#
# cronjob.yaml から /scripts/compact.py として volumeMount される。
# CronJob の bash ラッパーが pip install の後にこのスクリプトを実行する。
#
# 処理:
# 1. JST 前日を算出
# 2. Vector が key_prefix=raw/source={{ log_type }}/date=... で書き出した
#    ソース別 prefix (systemd / k8s-pods / routeros / macos-unified) を列挙
# 3. 各 source ごとに DuckDB httpfs で read_json(glob) → COPY TO Parquet zstd
#    (daily/date={y}/source={src}/logs.parquet、source ごとに 1 ファイル)
# 4. 書き込み完了後、boto3 で raw/source={src}/date={y}/ を削除
apiVersion: v1
kind: ConfigMap
metadata:
  name: logs-compact-script
data:
  compact.py: |
    #!/usr/bin/env python3
    """
    Daily compaction per source:
      logs-archive/raw/source=<src>/date=YYYY-MM-DD/hour=HH/**/*.log.zst (ndjson.zst)
        -> logs-archive/daily/date=YYYY-MM-DD/source=<src>/logs.parquet (Parquet zstd)

    ソース (log_type) 別に物理ファイルが分かれているため、DuckDB の
    read_json は各 source で均一スキーマを扱え、推論が安定する。
    """
    import os
    import sys
    from datetime import datetime, timedelta
    from zoneinfo import ZoneInfo

    import boto3
    import duckdb

    ENDPOINT = "garage.garage.svc.cluster.local:3900"
    BUCKET = "logs-archive"
    REGION = os.environ.get("AWS_REGION", "garage")
    ACCESS_KEY = os.environ["AWS_ACCESS_KEY_ID"]
    SECRET_KEY = os.environ["AWS_SECRET_ACCESS_KEY"]

    # Fluent Bit の log_type に一致する想定。追加のソースが増えたら
    # ここに足すか、raw/ 直下の source= プレフィックスを動的 list する
    # ロジックに変える。
    SOURCES = ["systemd", "k8s-pods", "routeros", "macos-unified"]


    def target_date() -> str:
        jst = ZoneInfo("Asia/Tokyo")
        return (datetime.now(jst).date() - timedelta(days=1)).isoformat()


    def s3_client():
        return boto3.client(
            "s3",
            endpoint_url=f"http://{ENDPOINT}",
            aws_access_key_id=ACCESS_KEY,
            aws_secret_access_key=SECRET_KEY,
            region_name=REGION,
        )


    def has_objects(s3, prefix: str) -> bool:
        resp = s3.list_objects_v2(Bucket=BUCKET, Prefix=prefix, MaxKeys=1)
        return resp.get("KeyCount", 0) > 0


    def delete_prefix(s3, prefix: str) -> int:
        paginator = s3.get_paginator("list_objects_v2")
        total = 0
        for page in paginator.paginate(Bucket=BUCKET, Prefix=prefix):
            contents = page.get("Contents", [])
            if not contents:
                continue
            keys = [{"Key": o["Key"]} for o in contents]
            for i in range(0, len(keys), 1000):
                batch = keys[i : i + 1000]
                s3.delete_objects(Bucket=BUCKET, Delete={"Objects": batch, "Quiet": True})
                total += len(batch)
        return total


    def configure_duckdb():
        con = duckdb.connect()
        con.execute("INSTALL httpfs; LOAD httpfs;")
        # DuckDB の read_json 内部バッファは disk spill 対象外なので、
        # macos-unified のような大量 ndjson は in-memory で処理する
        # しかない (spill できる operation は Hash Join / Order By 等
        # に限られる)。memory_limit は pod limit (24Gi) から python ランタイム
        # + duckdb 内部オーバーヘッド分を控除した 18GB に設定。
        # threads=4 は parse バッファの fan-out 抑制用。default 並列度
        # (= ホスト CPU コア数) のまま 411 ファイルを並列パースすると
        # 1 ファイルあたり最大 maximum_object_size=256MB のバッファ × 並列度
        # でメモリを食い尽くす。4 並列に絞れば parse バッファ起源の
        # 同時消費は最大 1GB 強で済む。
        # preserve_insertion_order=false は COPY TO PARQUET でのメモリ節約用、
        # 行順は (timestamp ベースで後段が並べ替えるので) 保持不要。
        # temp_directory は残しておいて集計系 op では spill を効かせる
        # (将来 Phase 2d 相当を足すときの保険)。
        con.execute(
            f"""
            SET s3_endpoint='{ENDPOINT}';
            SET s3_access_key_id='{ACCESS_KEY}';
            SET s3_secret_access_key='{SECRET_KEY}';
            SET s3_use_ssl=false;
            SET s3_url_style='path';
            SET memory_limit='18GB';
            SET threads=4;
            SET preserve_insertion_order=false;
            SET temp_directory='/tmp/duckdb-spill';
            """
        )
        return con


    def compact_source(con, target: str, source: str) -> int:
        src = f"s3://{BUCKET}/raw/source={source}/date={target}/**/*.log.zst"
        dst = f"s3://{BUCKET}/daily/date={target}/source={source}/logs.parquet"
        # source 別でスキーマは均一化されているが、稀に巨大 message (スタック
        # トレース等) が 1 行に入るので maximum_object_size を 256MB に拡大。
        # ignore_errors は破損 ndjson 行の安全側スキップ用に残す。
        # source 別で物理ファイルを分離しているのでスキーマは均一。
        # 当初は sample_size=-1 / maximum_sample_files=-1 で全行全ファイル
        # サンプルにしていたが、routeros / macos-unified のような高頻度
        # ログで pod が 2Gi メモリ制限に達して外部 kill されたため、
        # デフォルトの控えめなサンプルに戻す。union_by_name と
        # ignore_errors は残して同一 source 内のマイナーなフィールド
        # 揺れに対応する。
        con.execute(
            f"""
            COPY (
              SELECT * FROM read_json(
                '{src}',
                format='newline_delimited',
                compression='zstd',
                union_by_name=true,
                ignore_errors=true,
                maximum_object_size=268435456
              )
            )
            TO '{dst}' (FORMAT PARQUET, COMPRESSION ZSTD);
            """
        )
        rows = con.execute(f"SELECT COUNT(*) FROM '{dst}'").fetchone()[0]
        return int(rows)


    def main() -> int:
        target = target_date()
        print(f"[compact] target date (JST): {target}", flush=True)

        s3 = s3_client()
        con = configure_duckdb()

        any_processed = False
        for source in SOURCES:
            src_prefix = f"raw/source={source}/date={target}/"
            if not has_objects(s3, src_prefix):
                print(f"[compact] {source}: no objects, skip", flush=True)
                continue

            rows = compact_source(con, target, source)
            print(
                f"[compact] {source}: wrote {rows} rows to "
                f"daily/date={target}/source={source}/logs.parquet",
                flush=True,
            )

            deleted = delete_prefix(s3, src_prefix)
            print(
                f"[compact] {source}: deleted {deleted} objects under {src_prefix}",
                flush=True,
            )
            any_processed = True

        if not any_processed:
            print(f"[compact] no sources had data for {target}", flush=True)
        return 0


    if __name__ == "__main__":
        sys.exit(main())
