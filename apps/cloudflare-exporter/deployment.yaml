apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflare-exporter
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: cloudflare-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflare-exporter
          # 自作 exporter (stdlib のみ) を素の python イメージで実行。
          # 専用イメージビルド/CI は不要、コードは ConfigMap から /app にマウント。
          image: python:3.12-slim
          command: ["python3", "-B", "/app/exporter.py"]
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
          # 非機密設定は ConfigMap、CF_API_TOKEN のみ Secret から注入。
          envFrom:
            - configMapRef:
                name: cloudflare-exporter-config
            - secretRef:
                name: cloudflare-exporter-token
          ports:
            - name: metrics
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            # /healthz は poll スレッドが死ぬと 503 を返す (/metrics は常に 200 のため
            # それだけだと wedged な exporter を検知できない)。
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "48Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: code
              mountPath: /app
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: code
          configMap:
            name: cloudflare-exporter-code
            defaultMode: 0444
        - name: tmp
          emptyDir: {}
