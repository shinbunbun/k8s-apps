apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflare-exporter
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: cloudflare-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflare-exporter
          image: ghcr.io/lablabs/cloudflare_exporter:0.2.3
          ports:
            - name: metrics
              containerPort: 8080
          # 非機密の設定は ConfigMap、CF_API_TOKEN のみ Secret から注入。
          envFrom:
            - configMapRef:
                name: cloudflare-exporter-config
            - secretRef:
                name: cloudflare-exporter-token
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
