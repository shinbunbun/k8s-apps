apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflare-exporter-config
data:
  # 対象ゾーンを shinbunbun.com に限定 (account 全体を勝手に走査させない)。
  CF_ZONES: "8e56680d1b6e70559a45f98f88ec2b76"
  # shinbunbun.com は Free プラン。Paid 専用フィールド要求でのエラーを避けるため必須。
  # Free では httpRequestsAdaptiveGroups (req/帯域/ステータス/国別/キャッシュ) が取得対象。
  FREE_TIER: "true"
  # GraphQL の集計遅延を考慮した取得対象時刻のオフセット (秒)。
  # exporter は「各分を SCRAPE_DELAY 秒遅れで 1 回だけ」クエリするため、これが
  # Free プランのデータ確定ラグより短いと、確定前にクエリして取りこぼし二度と再取得しない。
  # 実測で Free プランの確定ラグは可変 (2〜11 分) のため、安全側に 900 秒 (15 分) に設定。
  # トラフィックの少ない分は実際に 0 なので空でも問題なし (バーストは確定後に拾える)。
  SCRAPE_DELAY: "900"
  LISTEN: ":8080"
  METRICS_PATH: "/metrics"
  LOG_LEVEL: "info"
