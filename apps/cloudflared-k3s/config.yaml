  # NVD フィードミラー (公開 dotfiles の GitHub-hosted runner が LAN VIP .26 に到達できないため、
  # tunnel 経由で公開する)。配信するのは NIST 公開ドメインの NVD フィード 7 ファイル + /metrics のみ。
  # 【重要】vulnix は素の GET しかできず認証ヘッダを送れないため、本ホストは CF Access の対象外
  # (public / bypass) にすること。濫用防止は CF のキャッシュ + レート制限で行う。
  - hostname: nvd-mirror.shinbunbun.com
    service: http://nvd-feed-mirror-lan.nvd-feed-mirror.svc.cluster.local:80
    originRequest:
      httpHostHeader: nvd-mirror.shinbunbun.com
  # Terrakube (dotfiles-private#327): 単一ホスト terrakube.shinbunbun.com に
  # パスルーティング。/dex → Dex (CF Access は別 app で bypass)、その他 API prefix
  # → API、他 → UI。UI が叩く API prefix を全て列挙する必要がある (未列挙だと
  # UI nginx catch-all に落ち HTML が返って .map 等で壊れる):
  #   - /api      : Elide REST (JSON:API)
  #   - /graphql  : GraphQL (organization 一覧 等)
  #   - /pat      : Personal Access Token (Account Settings)
  #   - /access-token : Team Token / 権限取得 (RBAC)
  #   - /webhook  : GitHub の push 配送 (v2)。CF Access bypass する別 app が必要
  #   - /callback : VCS 接続の OAuth callback。CF Access bypass する別 app が必要
  #   - /tfstate  : workspace state の取得/表示 (UI の State タブが叩く
  #                 /tfstate/v1/.../terraform.tfstate)。未列挙だと UI nginx の
  #                 catch-all に落ち index.html(HTML) が返り「state が壊れて見える」。
  #   - /tfoutput : job の plan/apply ログ取得 (UI の Job 詳細が叩く
  #                 /tfoutput/v1/organization/.../job/.../step/...)。未列挙だと UI nginx
  #                 catch-all に落ち index.html(HTML) が返り「Plan 結果が壊れて見える」。
  # /pat・/access-token・/tfstate・/tfoutput はブラウザ=認証済みなので CF Access 保護のまま (bypass 不要)。
  # path ルールは catch-all の UI ルールより前に置くこと (先頭一致順)。
  # terraform CLI は LAN VIP (192.168.128.25) で API に直結 (tunnel 非経由)。
  - hostname: terrakube.shinbunbun.com
    path: ^/dex
    service: http://terrakube-dex.terrakube.svc.cluster.local:5556
    originRequest:
      httpHostHeader: terrakube.shinbunbun.com
  - hostname: terrakube.shinbunbun.com
    path: ^/(api|graphql|webhook|callback|pat|access-token|tfstate|tfoutput)
    service: http://terrakube-api-service.terrakube.svc.cluster.local:8080
    originRequest:
      httpHostHeader: terrakube.shinbunbun.com
  - hostname: terrakube.shinbunbun.com
    service: http://terrakube-ui-service.terrakube.svc.cluster.local:8080
    originRequest:
      httpHostHeader: terrakube.shinbunbun.com
  - service: http_status:404
