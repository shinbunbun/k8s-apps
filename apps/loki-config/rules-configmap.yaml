apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-rules
  namespace: loki
data:
  rules.yaml: |
    # Loki用アラートルール
    # このファイルはLokiのルーラーで評価される
    groups:
      - name: logs_analysis
        interval: 30s
        rules:
          # 高エラーレート（5分窓の警告）（Lokiサービス自身のログを除外）
          - alert: HighErrorRate5m
            expr: |
              sum(rate({job="systemd-journal", service!="loki"} |= "error" [5m])) by (host) > 0.5
            for: 5m
            labels:
              severity: warning
              window: 5m
            annotations:
              summary: "High error rate detected on {{ $labels.host }} (5m window)"
              description: "Error rate is {{ $value }} errors/sec over 5 minutes on {{ $labels.host }}"
    
          # 高エラーレート（30分窓の重大）（Lokiサービス自身のログを除外）
          - alert: HighErrorRate30m
            expr: |
              sum(rate({job="systemd-journal", service!="loki"} |= "error" [30m])) by (host) > 0.3
            for: 10m
            labels:
              severity: critical
              window: 30m
            annotations:
              summary: "Sustained high error rate on {{ $labels.host }} (30m window)"
              description: "Error rate is {{ $value }} errors/sec sustained over 30 minutes on {{ $labels.host }}"
    
          # エラーログ即時検知（1分間に1件以上でアラート）
          - alert: ErrorLogDetected
            expr: |
              sum(count_over_time({job="systemd-journal", service!~"loki|grafana-start", level="error"} [1m])) by (host) > 0
            for: 0s
            labels:
              severity: warning
            annotations:
              summary: "Error log detected on {{ $labels.host }}"
              description: "{{ $value }} error logs detected in the last minute"
    
          # Nginx 5xxエラー（5分窓）
          - alert: HighNginx5xxRate5m
            expr: |
              sum(rate({job="nginx", log_type="access"} | json | status >= 500 [5m])) by (host) > 0.1
            for: 5m
            labels:
              severity: warning
              window: 5m
            annotations:
              summary: "High Nginx 5xx error rate on {{ $labels.host }} (5m window)"
              description: "Nginx 5xx error rate is {{ $value }} errors/sec over 5 minutes"
    
          # Nginx 5xxエラー（30分窓）
          - alert: HighNginx5xxRate30m
            expr: |
              sum(rate({job="nginx", log_type="access"} | json | status >= 500 [30m])) by (host) > 0.05
            for: 10m
            labels:
              severity: critical
              window: 30m
            annotations:
              summary: "Sustained Nginx 5xx errors on {{ $labels.host }} (30m window)"
              description: "Nginx 5xx error rate is {{ $value }} errors/sec sustained over 30 minutes"
    
          # サービス再起動検知（systemdからの起動メッセージのみ、Lokiサービス自身のログを除外）
          - alert: ServiceRestarting
            expr: |
              sum(count_over_time({job="systemd-journal", unit=~".+\\.service", service!="loki"} |= "Started" |= "systemd" [5m])) by (unit, host) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Service {{ $labels.unit }} restarting frequently on {{ $labels.host }}"
              description: "Service {{ $labels.unit }} has restarted {{ $value }} times in 5 minutes"
    
          # OOMキラー検知（Lokiサービス自身のログを除外）
          - alert: OOMKillerActive
            expr: |
              sum(count_over_time({job="systemd-journal"} != "loki" |= "Out of memory" |= "Kill process" [10m])) by (host) > 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "OOM killer activated on {{ $labels.host }}"
              description: "Out of Memory killer has been triggered {{ $value }} times in the last 10 minutes"
    
          # 認証失敗の急増（実際の認証失敗のみ）
          - alert: AuthenticationFailures
            expr: |
              sum(count_over_time({job="systemd-journal", service!="loki"} |~ "authentication failure|Failed password|pam_unix.*authentication failure" [10m])) by (host) > 10
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Multiple authentication failures on {{ $labels.host }}"
              description: "{{ $value }} authentication failures detected in the last 10 minutes"
    
          # ディスクI/Oエラー（Lokiサービス自身のログを除外）
          - alert: DiskIOErrors
            expr: |
              sum(count_over_time({job="systemd-journal"} != "loki" |~ "I/O error|Input/output error" [5m])) by (host) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Disk I/O errors detected on {{ $labels.host }}"
              description: "{{ $value }} disk I/O errors in the last 5 minutes"
    
          # カーネルパニック/クラッシュ検知（Lokiサービス自身のログを除外）
          - alert: KernelPanic
            expr: |
              sum(count_over_time({job="systemd-journal"} != "loki" |~ "kernel panic|kernel BUG|Oops" [5m])) by (host) > 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Kernel panic/crash detected on {{ $labels.host }}"
              description: "Kernel panic or crash signatures detected"
    
      # RouterOS 監視アラート (実ラベル: host, ident, job, level, service_name)
      # 2026-04: topic / severity ラベルは実際のストリームに存在せず dead alert 化していた
      # ため、実ラベルベースに刷新。reboot は mktxp の RouterOSRestarted (metric) でカバー済み。
      # DHCP pool 枯渇は vmrule DHCPPoolNearExhaustion (metric) でカバー済み。
      - name: routeros_monitoring
        interval: 30s
        rules:
          # SSH userauth failure の急増 (ブルートフォース兆候)
          - alert: RouterOSSSHAuthFailure
            expr: |
              sum(count_over_time({job="routeros", ident="packet"} |~ "userauth failure" [10m])) by (host) > 20
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "RouterOS SSH userauth failures spike on {{ $labels.host }}"
              description: "{{ $value }} userauth failure events in last 10m"

          # 上流 DNS 応答失敗レート (NGN resolver 不調の検知)
          - alert: RouterOSDNSUpstreamFailure
            expr: |
              sum(rate({job="routeros"} |~ "dns server failure" [5m])) by (host) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "RouterOS upstream DNS failures on {{ $labels.host }}"
              description: "{{ $value }} 'server failure' /sec in 5m — upstream DNS degraded"

          # エラーログ即時検知 (cache ノイズ除外。cache 満杯は vmrule の
          # RouterOSDNSCacheNearFull (metric) で予兆検知する)
          - alert: RouterOSErrorLogDetected
            expr: |
              sum(count_over_time({job="routeros", level="error", ident!="cache"} [5m])) by (host, ident) > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "RouterOS error log on {{ $labels.host }} (ident={{ $labels.ident }})"
              description: "{{ $value }} non-cache error logs in last 5m"
    
      # macOS 監視アラート
      - name: macos_monitoring
        interval: 30s
        rules:
          # macOS エラーログ検知
          - alert: MacOSErrorLogDetected
            expr: |
              sum(count_over_time({job="macos-unified", level="error"} [1m])) by (host) > 0
            for: 0s
            labels:
              severity: warning
            annotations:
              summary: "macOS error log detected on {{ $labels.host }}"
              description: "{{ $value }} error logs detected in the last minute"
    
          # macOS 高エラーレート
          - alert: MacOSHighErrorRate
            expr: |
              sum(rate({job="macos-unified", level="error"} [5m])) by (host) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High error rate on macOS {{ $labels.host }}"
              description: "macOS error rate is {{ $value }} errors/sec over 5 minutes"
    
          # macOS Fault（critical）検知
          - alert: MacOSFaultDetected
            expr: |
              sum(count_over_time({job="macos-unified", level="critical"} [1m])) by (host) > 0
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "macOS fault detected on {{ $labels.host }}"
              description: "{{ $value }} fault logs (critical) detected in the last minute"

      # k3s Pod ログ監視アラート
      # 2026-04: Alloy DaemonSet (infrastructure/alloy) が job=k8s-pods で
      # 全 3 ノード (nixos-desktop / homemachine / g3pro) から Pod stdout/stderr を
      # 収集する。システム / 観測スタック自身の namespace は Alloy 側で drop 済みだが
      # アラート LogQL でも namespace!~ で二重除外して安全側に倒す。
      - name: k3s_pod_monitoring
        interval: 30s
        rules:
          # Pod エラーログ即時検知 (1分窓に1件以上で warning)
          - alert: K3sPodErrorLogDetected
            expr: |
              sum(count_over_time({job="k8s-pods", namespace!~"kube-system|kube-public|kube-node-lease|loki|victoriametrics|monitoring|alloy|log-archiver-vector", level="error"} [1m])) by (namespace, pod, host) > 0
            for: 0s
            labels:
              severity: warning
            annotations:
              summary: "k3s pod error log detected ({{ $labels.namespace }}/{{ $labels.pod }} on {{ $labels.host }})"
              description: "{{ $value }} error logs detected in the last minute"

          # 高エラーレート (5分窓 warning)
          - alert: K3sPodHighErrorRate5m
            expr: |
              sum(rate({job="k8s-pods", namespace!~"kube-system|kube-public|kube-node-lease|loki|victoriametrics|monitoring|alloy|log-archiver-vector", level="error"} [5m])) by (namespace, pod) > 0.5
            for: 5m
            labels:
              severity: warning
              window: 5m
            annotations:
              summary: "k3s pod high error rate ({{ $labels.namespace }}/{{ $labels.pod }})"
              description: "Error rate is {{ $value }} errors/sec over 5 minutes"

          # 持続的エラー (30分窓 critical)
          - alert: K3sPodHighErrorRate30m
            expr: |
              sum(rate({job="k8s-pods", namespace!~"kube-system|kube-public|kube-node-lease|loki|victoriametrics|monitoring|alloy|log-archiver-vector", level="error"} [30m])) by (namespace, pod) > 0.3
            for: 10m
            labels:
              severity: critical
              window: 30m
            annotations:
              summary: "k3s pod sustained errors ({{ $labels.namespace }}/{{ $labels.pod }})"
              description: "Error rate is {{ $value }} errors/sec sustained over 30 minutes"