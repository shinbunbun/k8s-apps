apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-rules
  namespace: loki
data:
  rules.yaml: |
    # Loki用アラートルール
    # このファイルはLokiのルーラーで評価される
    groups:
      - name: logs_analysis
        interval: 30s
        rules:
          # 高エラーレート（5分窓の警告）（Lokiサービス自身のログを除外）
          - alert: HighErrorRate5m
            expr: |
              sum(rate({job="systemd-journal", service!="loki"} |= "error" [5m])) by (host) > 0.5
            for: 5m
            labels:
              severity: warning
              window: 5m
            annotations:
              summary: "High error rate detected on {{ $labels.host }} (5m window)"
              description: "Error rate is {{ $value }} errors/sec over 5 minutes on {{ $labels.host }}"
    
          # 高エラーレート（30分窓の重大）（Lokiサービス自身のログを除外）
          - alert: HighErrorRate30m
            expr: |
              sum(rate({job="systemd-journal", service!="loki"} |= "error" [30m])) by (host) > 0.3
            for: 10m
            labels:
              severity: critical
              window: 30m
            annotations:
              summary: "Sustained high error rate on {{ $labels.host }} (30m window)"
              description: "Error rate is {{ $value }} errors/sec sustained over 30 minutes on {{ $labels.host }}"
    
          # エラーログ即時検知（1分間に1件以上でアラート）
          # fluent-bit は Loki への push エラー (broken connection 等) を 5-15分間隔で吐く
          # ノイズ源 (バッファで吸収されておりログロスなし) なので除外する。dotfiles-private Issue #250 参照。
          # sshd の `connect_to <addr> port <n>: failed.` は client 側の port forward 設定で
          # 指定された server-side ポートに listener が居ない場合に出る良性ノイズ
          # (server 障害ではなく client の forward 設定残骸)。よって line filter で除外する。
          # dbus-broker-launch の `Ignoring duplicate name '...' in service file '...'` は
          # NixOS の system-path が集約する D-Bus service file が各パッケージ固有の service file と
          # well-known name 重複した際に error 優先度で記録される良性ノイズ。deploy-rs の
          # switch-to-configuration がユーザ session bus を reload する度に再評価され、
          # nixos-desktop では1世代切替あたり ~128件 噴出して CI deploy のたびに本アラートを
          # 発火させていた (dup name は先勝ちで無視されるだけで機能影響なし)。よって除外する。
          - alert: ErrorLogDetected
            expr: |
              sum(count_over_time({job="systemd-journal", service!~"loki|grafana-start|fluent-bit", level="error"} !~ "connect_to .* port .* failed" !~ "Ignoring duplicate name" [1m])) by (host) > 0
            for: 0s
            labels:
              severity: warning
            annotations:
              summary: "Error log detected on {{ $labels.host }}"
              description: "{{ $value }} error logs detected in the last minute"
    
          # Nginx 5xxエラー（5分窓）
          - alert: HighNginx5xxRate5m
            expr: |
              sum(rate({job="nginx", log_type="access"} | json | status >= 500 [5m])) by (host) > 0.1
            for: 5m
            labels:
              severity: warning
              window: 5m
            annotations:
              summary: "High Nginx 5xx error rate on {{ $labels.host }} (5m window)"
              description: "Nginx 5xx error rate is {{ $value }} errors/sec over 5 minutes"
    
          # Nginx 5xxエラー（30分窓）
          - alert: HighNginx5xxRate30m
            expr: |
              sum(rate({job="nginx", log_type="access"} | json | status >= 500 [30m])) by (host) > 0.05
            for: 10m
            labels:
              severity: critical
              window: 30m
            annotations:
              summary: "Sustained Nginx 5xx errors on {{ $labels.host }} (30m window)"
              description: "Nginx 5xx error rate is {{ $value }} errors/sec sustained over 30 minutes"
    
          # サービス再起動検知（systemdからの起動メッセージのみ、Lokiサービス自身のログを除外）
          - alert: ServiceRestarting
            expr: |
              sum(count_over_time({job="systemd-journal", unit=~".+\\.service", service!="loki"} |= "Started" |= "systemd" [5m])) by (unit, host) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Service {{ $labels.unit }} restarting frequently on {{ $labels.host }}"
              description: "Service {{ $labels.unit }} has restarted {{ $value }} times in 5 minutes"
    
          # OOMキラー検知（Lokiサービス自身のログを除外）
          - alert: OOMKillerActive
            expr: |
              sum(count_over_time({job="systemd-journal"} != "loki" |= "Out of memory" |= "Kill process" [10m])) by (host) > 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "OOM killer activated on {{ $labels.host }}"
              description: "Out of Memory killer has been triggered {{ $value }} times in the last 10 minutes"
    
          # 認証失敗の急増（実際の認証失敗のみ）
          - alert: AuthenticationFailures
            expr: |
              sum(count_over_time({job="systemd-journal", service!="loki"} |~ "authentication failure|Failed password|pam_unix.*authentication failure" [10m])) by (host) > 10
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Multiple authentication failures on {{ $labels.host }}"
              description: "{{ $value }} authentication failures detected in the last 10 minutes"
    
          # ディスクI/Oエラー（Lokiサービス自身のログを除外）
          - alert: DiskIOErrors
            expr: |
              sum(count_over_time({job="systemd-journal"} != "loki" |~ "I/O error|Input/output error" [5m])) by (host) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Disk I/O errors detected on {{ $labels.host }}"
              description: "{{ $value }} disk I/O errors in the last 5 minutes"
    
          # カーネルパニック/クラッシュ検知（Lokiサービス自身のログを除外）
          - alert: KernelPanic
            expr: |
              sum(count_over_time({job="systemd-journal"} != "loki" |~ "kernel panic|kernel BUG|Oops" [5m])) by (host) > 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Kernel panic/crash detected on {{ $labels.host }}"
              description: "Kernel panic or crash signatures detected"
    
      # RouterOS 監視アラート (実ラベル: host, ident, job, level, service_name)
      # 2026-04: topic / severity ラベルは実際のストリームに存在せず dead alert 化していた
      # ため、実ラベルベースに刷新。reboot は mktxp の RouterOSRestarted (metric) でカバー済み。
      # DHCP pool 枯渇は vmrule DHCPPoolNearExhaustion (metric) でカバー済み。
      - name: routeros_monitoring
        interval: 30s
        rules:
          # SSH login failure 検知 (ブルートフォース兆候)
          # 2026-05: 旧定義は {ident="packet"} |~ "userauth failure" を見ていたが、
          # これは SSH RFC4252 標準の "none" auth method の失敗 (= publickey 成功前の
          # 正常な handshake step) を debug topic に記録したもの。peer-issuer の
          # reconciler が 60s 間隔で wgissuer ユーザとして SSH 接続するため、
          # ベースラインで毎分1件発火していた (10件/10min)。
          # 本物の login failure は ident="user" かつ level=warning|error|critical で
          # 出るため、これを対象に変更。閾値も > 0 に下げる。
          # 2026-06-23: ident は高基数(~5000 hex値)のため Loki の structured metadata に
          # 降格 (nixos-observability-config generator.nix)。selector から `| ident=` フィルタ
          # へ移行。`| ident=` は stream label / structured metadata の両方に効くため、
          # generator 側 deploy の前後どちらでも動作する (先行 deploy 可能・無破壊)。
          - alert: RouterOSSSHAuthFailure
            expr: |
              sum(count_over_time({job="routeros", level=~"warning|error|critical"} | ident="user" |~ "(?i)login failure|invalid user|authentication fail" [10m])) by (host) > 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "RouterOS SSH login failure on {{ $labels.host }}"
              description: "{{ $value }} login failure events in last 10m"

          # 上流 DNS 応答失敗レート (NGN resolver 不調の検知)
          - alert: RouterOSDNSUpstreamFailure
            expr: |
              sum(rate({job="routeros"} |~ "dns server failure" [5m])) by (host) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "RouterOS upstream DNS failures on {{ $labels.host }}"
              description: "{{ $value }} 'server failure' /sec in 5m — upstream DNS degraded"

          # エラーログ即時検知 (cache ノイズ除外。cache 満杯は vmrule の
          # RouterOSDNSCacheNearFull (metric) で予兆検知する)
          - alert: RouterOSErrorLogDetected
            expr: |
              sum(count_over_time({job="routeros", level="error"} | ident!="cache" [5m])) by (host, ident) > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "RouterOS error log on {{ $labels.host }} (ident={{ $labels.ident }})"
              description: "{{ $value }} non-cache error logs in last 5m"
    
      # macOS 監視アラート
      - name: macos_monitoring
        interval: 30s
        rules:
          # macOS エラーログ検知
          # `networkd_settings_init_block_invoke notify_register_check(...) status 8 token -1` は
          # Network.framework/CFNetwork をリンクするプロセスが network 初期化時に出す Apple 内部の
          # 良性ノイズ (notify_register_check が NOTIFY_STATUS_INVALID_NAME=8 を返すだけで実害なし)。
          # macOS unified logging が Error レベルで記録するため、deploy-rs で nix が cache 問い合わせ等の
          # network アクセスをする度に露出して本アラートを発火させていた。実データ上 macOS の error は
          # 全てこのメッセージで、本物のエラーは存在しないため line filter で除外する。
          - alert: MacOSErrorLogDetected
            expr: |
              sum(count_over_time({job="macos-unified", level="error"} != "networkd_settings_init_block_invoke" [1m])) by (host) > 0
            for: 0s
            labels:
              severity: warning
            annotations:
              summary: "macOS error log detected on {{ $labels.host }}"
              description: "{{ $value }} error logs detected in the last minute"
    
          # macOS 高エラーレート
          - alert: MacOSHighErrorRate
            expr: |
              sum(rate({job="macos-unified", level="error"} [5m])) by (host) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High error rate on macOS {{ $labels.host }}"
              description: "macOS error rate is {{ $value }} errors/sec over 5 minutes"
    
          # macOS Fault（critical）検知
          - alert: MacOSFaultDetected
            expr: |
              sum(count_over_time({job="macos-unified", level="critical"} [1m])) by (host) > 0
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "macOS fault detected on {{ $labels.host }}"
              description: "{{ $value }} fault logs (critical) detected in the last minute"

      # k3s Pod ログ監視アラート
      # 2026-04: Alloy DaemonSet (infrastructure/alloy) が job=k8s-pods で
      # 全 3 ノード (nixos-desktop / homemachine / g3pro) から Pod stdout/stderr を
      # 収集する。システム / 観測スタック自身の namespace は Alloy 側で drop 済みだが
      # アラート LogQL でも namespace!~ で二重除外して安全側に倒す。
      - name: k3s_pod_monitoring
        interval: 30s
        # 良性ノイズ除外 (line filter):
        # - "Failed to decode task, rejecting": authentik-worker (2026.2.3) の
        #   django_dramatiq_postgres broker が空ペイロードの幻タスクを reject する
        #   正常動作。修正 PR goauthentik/authentik#22110 が吐くログで worker は健全。
        #   実行すべきデータのない空タスクのみ破棄され機能影響なし。
        #   詳細: dotfiles-private#375 / upstream goauthentik/authentik#21410
        # - "cleaning up inactive secure values": Grafana 13 の secrets management
        #   (secure values) 定期クリーンアップ背景タスクが DB (CNPG Postgres) で
        #   リース取得時に context deadline exceeded になる良性ノイズ。シークレットは
        #   envFromSecret (k8s Secret/SOPS) で注入しており Grafana 内蔵 secret
        #   manager はほぼ未使用のためクリーン対象が乏しく実害なし。DB の一時的な
        #   遅延 (HA 2 レプリカでのリース取得競合の可能性) による単発タイムアウトで、
        #   過去7日で2回の散発のみ。次の run で cleanup 自体は成功している。
        rules:
          # Pod エラーログ即時検知 (1分窓に1件以上で warning)
          - alert: K3sPodErrorLogDetected
            expr: |
              sum(count_over_time({job="k8s-pods", namespace!~"kube-system|kube-public|kube-node-lease|loki|victoriametrics|monitoring|alloy|log-archiver-vector", level="error"} != "Failed to decode task, rejecting" != "cleaning up inactive secure values" [1m])) by (namespace, pod, host) > 0
            for: 0s
            labels:
              severity: warning
            annotations:
              summary: "k3s pod error log detected ({{ $labels.namespace }}/{{ $labels.pod }} on {{ $labels.host }})"
              description: "{{ $value }} error logs detected in the last minute"

          # 高エラーレート (5分窓 warning)
          - alert: K3sPodHighErrorRate5m
            expr: |
              sum(rate({job="k8s-pods", namespace!~"kube-system|kube-public|kube-node-lease|loki|victoriametrics|monitoring|alloy|log-archiver-vector", level="error"} != "Failed to decode task, rejecting" != "cleaning up inactive secure values" [5m])) by (namespace, pod) > 0.5
            for: 5m
            labels:
              severity: warning
              window: 5m
            annotations:
              summary: "k3s pod high error rate ({{ $labels.namespace }}/{{ $labels.pod }})"
              description: "Error rate is {{ $value }} errors/sec over 5 minutes"

          # 持続的エラー (30分窓 critical)
          - alert: K3sPodHighErrorRate30m
            expr: |
              sum(rate({job="k8s-pods", namespace!~"kube-system|kube-public|kube-node-lease|loki|victoriametrics|monitoring|alloy|log-archiver-vector", level="error"} != "Failed to decode task, rejecting" != "cleaning up inactive secure values" [30m])) by (namespace, pod) > 0.3
            for: 10m
            labels:
              severity: critical
              window: 30m
            annotations:
              summary: "k3s pod sustained errors ({{ $labels.namespace }}/{{ $labels.pod }})"
              description: "Error rate is {{ $value }} errors/sec sustained over 30 minutes"

      # egress C2 検知アラート (dotfiles-private#399 / #396)
      # logs-rust-pipeline の daily-pipeline (gold-egress-c2 ステップ、日次 00:35 JST) が
      # gold/egress-c2 を materialize し、severity=alert の検知を "EGRESS_C2_ALERT ..." マーカー行で出す。
      # Alloy が job="k8s-pods" として Loki に収集するので、その行を count_over_time で拾って発火する。
      # 日次バッチなので窓は [1d]: マーカーが出た当日はアラートが立ち続け、翌日検知が消えれば自然解決する
      # (恒常的な感染は毎日マーカーが出て発火継続 = 望ましい)。詳細と client_ip/remote/ioc は Grafana
      # "Egress C2 Detection" ダッシュボードで確認する。
      # マーカーは level="error" にしていない (既存 K3sPodErrorLogDetected と混線させないため)。
      - name: egress_c2_monitoring
        interval: 30s
        rules:
          # D1: 既知 C2 宛先 (脅威フィード一致)。精度≈1.0 なので critical。
          - alert: EgressC2KnownBadDetected
            expr: |
              sum(count_over_time({job="k8s-pods", namespace="logs-rust-pipeline"} |= "EGRESS_C2_ALERT" |= "detection=known_bad" [1d])) > 0
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "感染端末が既知 C2 に通信している可能性 (egress C2 known-bad)"
              description: "gold/egress-c2 の D1 が既知 C2 宛先への通信を検出。Grafana 'Egress C2 Detection' で client_ip / remote / ioc を確認し該当端末を隔離・調査する。"
          # D2: ビーコン (未知 C2 の振る舞い)。要トリアージなので warning。
          - alert: EgressC2BeaconDetected
            expr: |
              sum(count_over_time({job="k8s-pods", namespace="logs-rust-pipeline"} |= "EGRESS_C2_ALERT" |= "detection=beacon" [1d])) > 0
            for: 0s
            labels:
              severity: warning
            annotations:
              summary: "規則的ビーコン通信を検出 (egress C2 beacon)"
              description: "gold/egress-c2 の D2 が非大手 ASN への規則的ビーコンを検出。Grafana 'Egress C2 Detection' で org / 間隔 (cv, med_gap_s) を確認。良性 SaaS なら allowlist へ、不明なら該当端末を調査する。"