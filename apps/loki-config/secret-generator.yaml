# KSOPS generator - Loki が MinIO Tenant にアクセスするための credentials
#
# ArgoCD repo-server に注入された KSOPS プラグインが
# secrets/*.enc.yaml を復号して Secret リソースを生成する。
# - loki-minio-credentials.enc.yaml: type=Opaque
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY キーを持つ。
#   Loki Helm chart 側で各コンポーネント (read/write/backend) の extraEnvFrom に
#   このシークレットを指定し、S3 SDK 標準の環境変数として渡す。
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/loki-minio-credentials.enc.yaml
