# KSOPS generator - Vector が MinIO Tenant にアクセスするための credentials
#
# ArgoCD repo-server に注入された KSOPS プラグインが
# secrets/*.enc.yaml を復号して Secret リソースを生成する。
# - vector-minio-credentials.enc.yaml: type=Opaque
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY キーを持つ。
#   infrastructure/log-archiver-vector の Helm chart 側で envFrom に
#   このシークレットを指定し、S3 SDK 標準の環境変数として渡す。
#
# 注: Secret の中身は loki-minio-credentials と同一 (同じ MinIO root admin を
# 共用)。将来 per-app の access key を MinIO で発行する場合は、ここの
# credentials を Vector 用に差し替える。
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/vector-minio-credentials.enc.yaml
