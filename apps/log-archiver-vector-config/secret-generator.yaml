# KSOPS generator - Vector が MinIO Tenant にアクセスするための credentials
#
# ArgoCD repo-server に注入された KSOPS プラグインが
# secrets/*.enc.yaml を復号して Secret リソースを生成する。
#
# 注: ファイル名と Secret 名は loki-minio-credentials をそのまま踏襲している。
# これは apps/loki-config/secrets/loki-minio-credentials.enc.yaml と完全に同一の
# SOPS 暗号化ファイルを使い、SOPS MAC 整合性のため metadata.name を書き換えずに
# そのまま使う運用。Secret は namespace-scoped なので、log-archiver-vector
# namespace 内の "loki-minio-credentials" は loki namespace の同名 Secret とは
# 別物で、衝突しない。
# 将来 per-app の access key を MinIO で発行する場合は、Vector 専用 Secret を
# sops で新規作成して差し替える。
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/loki-minio-credentials.enc.yaml
