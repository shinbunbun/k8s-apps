# NVD フィード LAN ミラー (diff-gate の vulnix が NVD timeout で fail-closed するのを解消)。
#
# namespace はディレクトリ名と同じ nvd-feed-mirror。apps-appset.yaml の git generator が
# apps/* を自動検出し destination.namespace=basename + CreateNamespace=true で生成するため、
# kustomization 側に namespace は記さない (routeros-backup と同方式)。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - pvc.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - vmservicescrape.yaml
  - vmrule-alerts.yaml
