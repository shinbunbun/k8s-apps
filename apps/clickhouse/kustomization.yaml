# ClickHouse - Kustomize エントリポイント
#
# ApplicationSet (applicationsets/apps-appset.yaml) が apps/clickhouse を
# 自動検出して ArgoCD Application を生成する。namespace は clickhouse。
#
# 用途: dotfiles-private #215 (Grafana の Garage Parquet 集計を ClickHouse へ移行)。
# ClickHouseInstallation (CHI) CR を apply し、infrastructure/clickhouse-operator
# が生成した controller によって StatefulSet / Service / ConfigMap が展開される。
#
# 依存: GarageKey clickhouse (apps/garage/keys.yaml) が clickhouse-garage-credentials
# Secret を本 namespace に生成する (Garage operator が cross-namespace で配置)。
# CHI の podTemplate.envFrom がこの Secret を読んで s3() table function に渡す。
#
# commonAnnotations の ServerSideApply は CHI CR が `configuration.files` で大きな
# XML をインラインで持つため、client-side apply の annotation 上限を回避する目的
# (loki-config / grafana-config と同じ理由)。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: clickhouse

commonAnnotations:
  argocd.argoproj.io/sync-options: ServerSideApply=true

resources:
  - installation.yaml
