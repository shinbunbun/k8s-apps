# KSOPS generator - Grafana secrets
#
# ArgoCD repo-server に注入された KSOPS プラグインが
# secrets/*.enc.yaml を復号して Secret リソースを生成する。
# - grafana-db-app.enc.yaml: type=basic-auth, CNPG bootstrap.initdb.secret 参照
# - grafana-secrets.enc.yaml: type=Opaque, Grafana Pod envFromSecret 参照
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/grafana-db-app.enc.yaml
  - secrets/grafana-secrets.enc.yaml
  - secrets/cnpg-minio-credentials.enc.yaml
