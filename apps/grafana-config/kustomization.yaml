  # 「Logs Archive」フォルダ。Garage 上の長期 Parquet (daily-struct/source=*/date=*) を
  # 集計する archive 系ダッシュボード群。短期 Loki ダッシュボード
  # (logs-errors / logs-overview / logs-explore) との重複を避けるため別フォルダに
  # 分離している。issue #654 参照。
  #
  # Rust + Polars pipeline (apps/logs-rust-pipeline、Issue #191 Phase 4) 版で
  # daily-struct/source=*/date=*/logs.parquet を直接 query する設計。旧 typed/ 参照
  # の dashboard と並走期に区別するため一時的に -rust suffix を付けていたが、Phase 4
  # 完了により canonical となったため Issue #191 タスク C-2 で suffix を除去した。
  #
  # datasource は dotfiles-private #215 で旧 motherduck DuckDB plugin (#212 撤去) から
  # 公式署名済 grafana-clickhouse-datasource に置換済。クエリは ClickHouse の s3()
  # table function (named_collection 'garage') で同じ Parquet を読む。
  - name: grafana-dashboard-systemd-archive
    files:
      - dashboards/systemd-archive.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: Logs Archive
      disableNameSuffixHash: false
  - name: grafana-dashboard-routeros-archive
    files:
      - dashboards/routeros-archive.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: Logs Archive
      disableNameSuffixHash: false
  - name: grafana-dashboard-k8s-pods-archive
    files:
      - dashboards/k8s-pods-archive.json
    options:
      labels:
        grafana_dashboard: "1"
