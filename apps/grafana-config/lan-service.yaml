# Grafana LAN 内アクセス用 LoadBalancer Service
#
# 既存の grafana Service (ClusterIP) は Traefik IngressRoute 経由でのみ
# アクセスされ、Host ヘッダ `grafana.shinbunbun.com` に依存する。
# Cloudflare Tunnel 配下ではそのままで動くが、LAN 内のクライアント
# (MCP サーバ等) からは Host ヘッダを付けられないため route がマッチせず 404 になる。
#
# 本 Service は Cilium LB IPAM から Traefik VIP (192.168.128.10) とは別の
# 固定 VIP を割り当て、Host ヘッダなしで直接 grafana pod に到達させる。
# Cilium BGP が 192.168.128.0/24 を RouterOS に広告しているため、同 LAN 上の
# クライアントからルーター経由でアクセスできる。
apiVersion: v1
kind: Service
metadata:
  name: grafana-lan
  namespace: grafana
  annotations:
    io.cilium/lb-ipam-ips: 192.168.128.11
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: grafana
