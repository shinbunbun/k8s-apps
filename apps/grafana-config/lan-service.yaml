# Grafana LAN 内アクセス用 LoadBalancer Service
#
# 既存の grafana Service (ClusterIP) は外部 (Cloudflare Tunnel) からの
# アクセス専用で、cluster-internal にしか到達できない。LAN 内のクライアント
# (MCP サーバ等) は ClusterIP に直接届かないため、別途 LoadBalancer Service が必要。
#
# 本 Service は Cilium LB IPAM から固定 VIP を割り当て、直接 grafana pod に
# 到達させる。Cilium BGP が 192.168.128.0/24 を RouterOS に広告しているため、
# 同 LAN 上のクライアントからルーター経由でアクセスできる。
apiVersion: v1
kind: Service
metadata:
  name: grafana-lan
  namespace: grafana
  annotations:
    io.cilium/lb-ipam-ips: 192.168.128.11
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: grafana
