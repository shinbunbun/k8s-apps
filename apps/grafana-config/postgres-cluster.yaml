# Grafana 用 PostgreSQL Cluster (CNPG)
#
# CloudNativePG Operator (infrastructure/cnpg-operator/) が提供する Cluster CR で
# Grafana のメタデータ DB を HA 化する。instances: 2 で Primary 1 + Standby 1 を
# 別ノードに分散 (CNPG デフォルト affinity.enablePodAntiAffinity=true,
# podAntiAffinityType=preferred, topologyKey=kubernetes.io/hostname)。
#
# instances: 3 ではなく 2 とする理由:
# 3 ノード embedded etcd k3s では quorum が 2 のため、2 ノード同時障害で
# etcd が崩壊し API Server / scheduler / controller が停止する。その状態では
# Operator も k8s API を叩けないので Service endpoint 切替も Standby 昇格も
# できず、Cluster instance を 3 にしても 2 ノード障害は救えない。
# 1 ノード障害耐性を満たすには instances: 2 で十分、Operator との別ノード配置の
# ための 1 ノード分の空き枠も確保できる (infrastructure/cnpg-operator/ 参照)。
#
# storage は local-path (k3s 同梱 local-path-provisioner, default SC)。
# CNPG が PG streaming replication で HA を担うため、Piraeus のような
# ブロックレベル複製 SC は二重化になるので使わない。
# ノード障害時は該当 instance の PVC が失われるが、残り 1 instance で継続し
# 復旧後は空 PVC で CNPG が instance を再作成して streaming replication で再同期する。
#
# bootstrap.initdb は database/owner/secret を指定。secret は
# apps/grafana-config/secrets/grafana-db-app.enc.yaml (KSOPS, basic-auth type)。
#
# imageName は省略し CNPG v1.29.0 のバイナリに埋め込まれた
# デフォルト PG image を使う (PostgreSQL 17 系の推奨 tag)。
# backup は Barman Cloud Plugin (infrastructure/cnpg-barman-plugin/) 経由で
# MinIO (minio-tenant ns) に WAL archive + base backup を書き込む。
# Plugin 設定は objectstore.yaml、スケジュールは scheduled-backup.yaml。
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: grafana-db
spec:
  description: "Grafana metadata database"
  instances: 2

  bootstrap:
    initdb:
      database: grafana
      owner: grafana
      secret:
        name: grafana-db-app

  storage:
    storageClass: local-path
    size: 2Gi

  # Barman Cloud Plugin で continuous archiving を有効化。
  # serverName は MinIO 上の prefix (s3://cnpg-backups/grafana-db-v1/) に使われる。
  # Cluster を作り直す場合は -v2 に上げて旧バックアップと分離する。
  # enabled: true は CNPG operator の default だが、ServerSideApply 時は
  # operator が後から注入する形になり ArgoCD の SSA dry-run diff が drift を
  # 検出して OutOfSync ループに入る (kustomization.yaml の ServerSideApply=true)。
  # 明示しておくことで argocd-controller が field owner となり drift しない。
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: grafana-db-backup
        serverName: grafana-db-v1
