# Grafana 用 PostgreSQL Cluster (CNPG)
#
# CloudNativePG Operator (infrastructure/cnpg-operator/) が提供する Cluster CR で
# Grafana のメタデータ DB を HA 化する。instances: 3 で 3 ノードに 1 instance ずつ
# 分散 (CNPG デフォルト affinity.enablePodAntiAffinity=true,
# podAntiAffinityType=preferred, topologyKey=kubernetes.io/hostname)。
#
# instances: 3 とする理由 (1 ノード障害耐性):
# instances: 2 で 1 ノードが落ちると、該当 instance Pod が kubelet 応答不能で
# Terminating のままスタックし (StatefulSet が同 ordinal の Pod を新規作成できず、
# PVC は local-path で停止ノードに pin されているため別ノードにも移動できない)、
# CNPG Cluster Phase が "Waiting for the instances to become active" となる。
# この状態では参照 Pod (authentik-server / grafana など) の startup probe が
# 長時間 502 を返し、Service endpoints が空になり外部から接続できなくなる。
# instances: 3 にすれば 1 ノード障害でも残り 2 instance で Cluster Ready=True を
# 維持し、failover で rw endpoint が瞬時に切り替わるため上記の問題が起きない。
#
# 2 ノード同時障害は etcd quorum (2/3) が崩壊して Operator も動けないため
# instances: 3 でも救えないが、これは 1 ノード障害耐性とは別問題。
#
# Operator (replicaCount: 2) は infrastructure/cnpg-operator/ 側で
# Operator 同士 anti-affinity (preferred) で分散 — leader election で冗長化済み。
#
# storage は local-path (k3s 同梱 local-path-provisioner, default SC)。
# CNPG が PG streaming replication で HA を担うため、Piraeus のような
# ブロックレベル複製 SC は二重化になるので使わない。
# 1 ノード障害時は該当 instance の PVC が停止ノードに pin されたまま使えなくなるが、
# 残り 2 instance で継続し、復旧後は空 PVC で CNPG が instance を再作成して
# streaming replication で再同期する。
#
# bootstrap.initdb は database/owner/secret を指定。secret は
# apps/grafana-config/secrets/grafana-db-app.enc.yaml (KSOPS, basic-auth type)。
#
# imageName は省略し CNPG v1.29.0 のバイナリに埋め込まれた
# デフォルト PG image を使う (PostgreSQL 17 系の推奨 tag)。
# backup は Barman Cloud Plugin (infrastructure/cnpg-barman-plugin/) 経由で
# Garage (garage NS) に WAL archive + base backup を書き込む。
# Plugin 設定は objectstore.yaml、スケジュールは scheduled-backup.yaml。
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: grafana-db
spec:
  description: "Grafana metadata database"
  instances: 3

  bootstrap:
    initdb:
      database: grafana
      owner: grafana
      secret:
        name: grafana-db-app

  storage:
    storageClass: local-path
    size: 2Gi

  # Barman Cloud Plugin で continuous archiving を有効化。
  # serverName は Garage 上の prefix (s3://cnpg-backups/grafana-db-v1/) に使われる。
  # Cluster を作り直す場合は -v2 に上げて旧バックアップと分離する。
  # enabled: true は CNPG operator の default だが、ServerSideApply 時は
  # operator が後から注入する形になり ArgoCD の SSA dry-run diff が drift を
  # 検出して OutOfSync ループに入る (kustomization.yaml の ServerSideApply=true)。
  # 明示しておくことで argocd-controller が field owner となり drift しない。
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: grafana-db-backup
        serverName: grafana-db-v1
