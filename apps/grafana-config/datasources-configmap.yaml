# Grafana データソース provisioning ConfigMap
#
# 旧 NixOS 時代の Prometheus (ruler 同居) 相当を VictoriaMetrics 系で再現する。
# Grafana 側では Prometheus datasource 1 個 (manageAlerts: true) だけで
# Alert rules UI のルール閲覧・発火状態表示が動作する。
#
# Prometheus datasource の URL は vmauth (grafana-gateway) を参照する。
# vmauth が path ベースで vmalert / vmselect にルーティングする:
#   /api/v1/rules, /api/v1/alerts → vmalert
#   その他 (query, status/buildinfo 等) → vmselect
# (victoriametrics-config/vmauth-grafana.yaml 参照)
#
# Loki は k3s 上の SimpleScalable Gateway (cluster DNS) を参照。
# Alertmanager datasource は発火アラート・サイレンス閲覧用。
#
# このファイルは Helm chart の extraConfigmapMounts で
# /etc/grafana/provisioning/datasources にマウントされる
# (infrastructure/grafana/application.yaml 参照)。
#
# 各 datasource の uid は既存 Grafana DB の値を踏襲している
# (routeros.json などのダッシュボードが Prometheus uid を直接参照しているため)。
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    # PR #66 で追加した VMAlert datasource を PR #67 (vmauth 統合) で廃止した際、
    # editable: false で provisioning 管理下にあったため Grafana DB に orphan として
    # 残った。provisioning の deleteDatasources で明示削除する。
    # 旧 DuckDB datasource は motherduck plugin 撤去 (#212) で同様に orphan 化。
    # ClickHouse datasource は dotfiles-private #262 リストラで撤去 (gold layer で代替)。
    deleteDatasources:
      - name: VMAlert
        orgId: 1
      - name: DuckDB
        orgId: 1
      - name: ClickHouse
        orgId: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: PBFA97CFB590B2093
        access: proxy
        url: http://vmauth-grafana-gateway.victoriametrics.svc.cluster.local:8427
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 15s
          manageAlerts: true
          alertmanagerUid: P7647F508D5F54FCB
          prometheusType: Prometheus
          prometheusVersion: "2.40.0"
      - name: Loki
        type: loki
        uid: P8E80F9AEF21F6940
        access: proxy
        url: http://loki-gateway.loki.svc.cluster.local
        editable: false
        jsonData:
          maxLines: 1000
      - name: Alertmanager
        type: alertmanager
        uid: P7647F508D5F54FCB
        access: proxy
        url: http://vmalertmanager-alertmanager.victoriametrics.svc.cluster.local:9093
        editable: false
        jsonData:
          implementation: prometheus
          handleGrafanaManagedAlerts: false
      # Pyroscope datasource (Grafana 公式同梱 grafana-pyroscope-datasource)
      # 用途: Alloy pyroscope.ebpf (infrastructure/alloy-profiles) が採取した
      # kernel + userspace の CPU profile を flame graph として Explore タブで
      # 可視化。Issue dotfiles#699 で導入。Pyroscope 2.0 monolithic server は
      # infrastructure/pyroscope で稼働、Garage S3 (pyroscope-blocks) を backend
      # に retention 30d。external_labels の cluster=homelab + host=<node-name>
      # で per-node 絞り込み可能。
      - name: Pyroscope
        type: grafana-pyroscope-datasource
        uid: Pyroscope0001
        access: proxy
        editable: false
        url: http://pyroscope.pyroscope.svc.cluster.local:4040
      # Tempo datasource (Grafana 公式同梱 tempo plugin)
      # 用途: Beyla (infrastructure/beyla) が eBPF auto-instrument した
      # HTTP/gRPC/SQL span を distributed trace として Traces Drilldown +
      # Explore タブで可視化。Tempo 2.10 monolithic server は infrastructure/tempo
      # で稼働、Garage S3 (tempo-traces) backend に retention 14d。
      # cross-link:
      #   - tracesToLogsV2: trace_id 由来で Loki に飛ぶ (service.name + k8s.namespace.name)
      #   - tracesToProfiles: span から Pyroscope の CPU profile に飛ぶ (service_name 一致)
      #   - tracesToMetrics: span から VictoriaMetrics (Prometheus) の span_metrics に飛ぶ
      #   - serviceMap: Service Graph を Prometheus datasource 経由で描画 (Phase 2)
      # Issue: shinbunbun/unified-dotfiles#16
      - name: Tempo
        type: tempo
        uid: Ptempo0001
        access: proxy
        editable: false
        url: http://tempo.tempo.svc.cluster.local:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: P8E80F9AEF21F6940
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
            tags:
              - key: 'service.name'
                value: 'service'
              - key: 'k8s.namespace.name'
                value: 'namespace'
            filterByTraceID: true
            filterBySpanID: false
          tracesToProfiles:
            datasourceUid: Pyroscope0001
            tags:
              - key: 'service.name'
                value: 'service_name'
            profileTypeId: 'process_cpu:cpu:nanoseconds:cpu:nanoseconds'
          # Phase 2: span_metrics (traces_spanmetrics_*) を VictoriaMetrics 経由で参照。
          # Tempo metrics-generator が remoteWrite した RED metrics を span から飛ばす。
          tracesToMetrics:
            datasourceUid: PBFA97CFB590B2093  # Prometheus (VictoriaMetrics) uid
            spanStartTimeShift: '-2m'
            spanEndTimeShift: '2m'
            tags:
              - key: 'service.name'
                value: 'service'
              - key: 'k8s.namespace.name'
                value: 'namespace'
            queries:
              - name: 'Request rate'
                query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags}[5m])) by (span_name)'
              - name: 'Latency p95'
                query: 'histogram_quantile(0.95, sum(rate(traces_spanmetrics_latency_bucket{$$__tags}[5m])) by (le, span_name))'
              - name: 'Error rate'
                query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags, status_code="STATUS_CODE_ERROR"}[5m])) by (span_name)'
          # Phase 2: Service Graph (traces_service_graph_request_*) を可視化。
          # Tempo metrics-generator の service_graphs processor が出力するエッジから描画。
          serviceMap:
            datasourceUid: PBFA97CFB590B2093  # Prometheus (VictoriaMetrics) uid
          nodeGraph:
            enabled: true
          # streaming は明示的に無効化。
          # 有効時 (default true) Grafana Tempo plugin は gRPC streaming で
          # search / metrics クエリを発行するが、URL `http://tempo:3200` は
          # HTTP/1.1 専用 port のため "frame too large, frame header looked like
          # an HTTP/1.1 header" エラーが Explore / Drilldown の全クエリで発生する。
          # Tempo 2.2+ の `stream_over_http_enabled: true` で HTTP/1.1 上 streaming を
          # 有効化する代替策があるが、chart 2.1.2 にこのフィールドを流す自由記述
          # スロットが無いため (chart fork or extraArgs 検証が必要)、Phase 2 では
          # streaming を諦めて非 streaming HTTP fallback で確実に動作させる。
          # UX 差分: 検索結果の progressive 表示が無くなる (バッチ取得は変わらず)。
          # 復活策: 別 PR で chart 拡張 or LAN VIP 経由 gRPC port 9095 expose を検討。
          streamingEnabled:
            search: false
            metrics: false
