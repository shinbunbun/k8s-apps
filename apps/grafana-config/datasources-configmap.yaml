# Grafana データソース provisioning ConfigMap
#
# 旧 NixOS 時代の Prometheus (ruler 同居) 相当を VictoriaMetrics 系で再現する。
# Grafana 側では Prometheus datasource 1 個 (manageAlerts: true) だけで
# Alert rules UI のルール閲覧・発火状態表示が動作する。
#
# Prometheus datasource の URL は vmauth (grafana-gateway) を参照する。
# vmauth が path ベースで vmalert / vmselect にルーティングする:
#   /api/v1/rules, /api/v1/alerts → vmalert
#   その他 (query, status/buildinfo 等) → vmselect
# (victoriametrics-config/vmauth-grafana.yaml 参照)
#
# Loki は引き続き homeMachine (192.168.1.3:3100) を参照。
# Alertmanager datasource は発火アラート・サイレンス閲覧用。
#
# このファイルは Helm chart の extraConfigmapMounts で
# /etc/grafana/provisioning/datasources にマウントされる
# (infrastructure/grafana/application.yaml 参照)。
#
# 各 datasource の uid は既存 Grafana DB の値を踏襲している
# (routeros.json などのダッシュボードが Prometheus uid を直接参照しているため)。
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    # PR #66 で追加した VMAlert datasource を PR #67 (vmauth 統合) で廃止した際、
    # editable: false で provisioning 管理下にあったため Grafana DB に orphan として
    # 残った。provisioning の deleteDatasources で明示削除する。
    deleteDatasources:
      - name: VMAlert
        orgId: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: PBFA97CFB590B2093
        access: proxy
        url: http://vmauth-grafana-gateway.victoriametrics.svc.cluster.local:8427
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 15s
          manageAlerts: true
          alertmanagerUid: P7647F508D5F54FCB
          prometheusType: Prometheus
          prometheusVersion: "2.40.0"
      - name: Loki
        type: loki
        uid: P8E80F9AEF21F6940
        access: proxy
        url: http://192.168.1.3:3100
        editable: false
        jsonData:
          maxLines: 1000
      - name: Alertmanager
        type: alertmanager
        uid: P7647F508D5F54FCB
        access: proxy
        url: http://vmalertmanager-alertmanager.victoriametrics.svc.cluster.local:9093
        editable: false
        jsonData:
          implementation: prometheus
          handleGrafanaManagedAlerts: false
