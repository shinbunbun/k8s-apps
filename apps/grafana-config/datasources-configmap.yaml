# Grafana データソース provisioning ConfigMap
#
# homeMachine (192.168.1.3) 上の NixOS Prometheus (:9090) と Loki (:3100) を参照。
# 両者は nixos-observability モジュールの openFirewall=true デフォルトで
# LAN 公開されており、k3s Pod から Cilium native routing 経由で到達可能。
#
# 将来 Loki/Prometheus を k3s 側に移行した際は url を差し替えるだけで良い。
# このファイルは Helm chart の extraConfigmapMounts で
# /etc/grafana/provisioning/datasources にマウントされる
# (infrastructure/grafana/application.yaml 参照)。
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://192.168.1.3:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 15s
      - name: Loki
        type: loki
        access: proxy
        url: http://192.168.1.3:3100
        editable: false
        jsonData:
          maxLines: 1000
