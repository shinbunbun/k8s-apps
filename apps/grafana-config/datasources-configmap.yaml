# Grafana データソース provisioning ConfigMap
#
# 旧 NixOS 時代の Prometheus (ruler 同居) 相当を VictoriaMetrics 系で再現する。
# Grafana 側では Prometheus datasource 1 個 (manageAlerts: true) だけで
# Alert rules UI のルール閲覧・発火状態表示が動作する。
#
# Prometheus datasource の URL は vmauth (grafana-gateway) を参照する。
# vmauth が path ベースで vmalert / vmselect にルーティングする:
#   /api/v1/rules, /api/v1/alerts → vmalert
#   その他 (query, status/buildinfo 等) → vmselect
# (victoriametrics-config/vmauth-grafana.yaml 参照)
#
# Loki は k3s 上の SimpleScalable Gateway (cluster DNS) を参照。
# Alertmanager datasource は発火アラート・サイレンス閲覧用。
#
# このファイルは Helm chart の extraConfigmapMounts で
# /etc/grafana/provisioning/datasources にマウントされる
# (infrastructure/grafana/application.yaml 参照)。
#
# 各 datasource の uid は既存 Grafana DB の値を踏襲している
# (routeros.json などのダッシュボードが Prometheus uid を直接参照しているため)。
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    # PR #66 で追加した VMAlert datasource を PR #67 (vmauth 統合) で廃止した際、
    # editable: false で provisioning 管理下にあったため Grafana DB に orphan として
    # 残った。provisioning の deleteDatasources で明示削除する。
    deleteDatasources:
      - name: VMAlert
        orgId: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: PBFA97CFB590B2093
        access: proxy
        url: http://vmauth-grafana-gateway.victoriametrics.svc.cluster.local:8427
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 15s
          manageAlerts: true
          alertmanagerUid: P7647F508D5F54FCB
          prometheusType: Prometheus
          prometheusVersion: "2.40.0"
      - name: Loki
        type: loki
        uid: P8E80F9AEF21F6940
        access: proxy
        url: http://loki-gateway.loki.svc.cluster.local
        editable: false
        jsonData:
          maxLines: 1000
      - name: Alertmanager
        type: alertmanager
        uid: P7647F508D5F54FCB
        access: proxy
        url: http://vmalertmanager-alertmanager.victoriametrics.svc.cluster.local:9093
        editable: false
        jsonData:
          implementation: prometheus
          handleGrafanaManagedAlerts: false
      # DuckDB datasource (motherduckdb/grafana-duckdb-datasource v0.4.1, Apache-2.0)
      # 用途: Garage logs-archive の長期 Parquet (compact.py 出力) を SQL で集計し
      # ダッシュボード化 (Loki 系の短期 retention を超える分析)。
      #
      # path: "" で in-memory DuckDB。プロセス終了で揮発するが、initSql を毎接続で
      # 流すため problem なし (永続テーブルは作らず、read_parquet で都度 S3 から
      # 直接読む)。
      #
      # initSql の中身:
      #   - SET home_directory / extension_directory: Grafana pod は $HOME 未設定で、
      #     DuckDB が INSTALL 時に extension cache の home (~/.duckdb) を作れず
      #     "IO Error: Can't find the home directory at ''" で失敗する。
      #     /tmp は emptyDir 配下で書込可能、pod 寿命と同じなので extension の
      #     再ダウンロードは pod 起動毎 (毎回 ~数百ms 程度の追加コスト)。
      #   - httpfs/json extension load
      #   - memory_limit=2GB / threads=2 で Grafana pod (chart デフォルト 1Gi 想定)
      #     の OOM を防ぐ。compact.py は 12GB/4 threads を使うが、こちらは対話
      #     クエリ用なので絞る。重い集計は compact.py が daily/ にすでに圧縮済。
      #   - preserve_insertion_order=false: 集計順序非依存、メモリ節約
      #   - temp_directory=/tmp/duckdb-spill: spill 先 (Grafana pod の emptyDir / で OK)
      #   - CREATE OR REPLACE SECRET garage_s3: DuckDB v1.4 の httpfs は legacy
      #     `SET s3_*` 設定を読まなくなり、Secret Manager (CREATE SECRET) 経由でのみ
      #     S3 認証情報を取得する。SET だけだと "region '' (HTTP 403 Forbidden) -
      #     Authentication Failure" で失敗する。
      #     アクセスキーは extraSecretMounts で grafana-duckdb-credentials Secret
      #     (Garage Operator が GarageKey "grafana-duckdb" の secretTemplate で
      #     生成) を /var/run/secrets/grafana-duckdb にマウントし、Grafana 標準の
      #     $__file{...} 補間で SQL に埋め込む。read-only キーなので、Explore から
      #     COPY/DELETE 等を実行しても AccessDenied で弾かれる。
      - name: DuckDB
        type: motherduck-duckdb-datasource
        uid: Pduckdblogs0001
        access: proxy
        editable: false
        jsonData:
          path: ""
          initSql: |
            SET home_directory='/tmp/duckdb-home';
            SET extension_directory='/tmp/duckdb-extensions';
            INSTALL httpfs; LOAD httpfs;
            INSTALL json;   LOAD json;
            SET memory_limit='2GB';
            SET threads=2;
            SET preserve_insertion_order=false;
            SET temp_directory='/tmp/duckdb-spill';
            CREATE OR REPLACE SECRET garage_s3 (
              TYPE S3,
              KEY_ID '$__file{/var/run/secrets/grafana-duckdb/AWS_ACCESS_KEY_ID}',
              SECRET '$__file{/var/run/secrets/grafana-duckdb/AWS_SECRET_ACCESS_KEY}',
              ENDPOINT 'garage.garage.svc.cluster.local:3900',
              REGION 'garage',
              URL_STYLE 'path',
              USE_SSL false
            );
