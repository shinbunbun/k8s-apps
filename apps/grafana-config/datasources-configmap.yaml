# Grafana データソース provisioning ConfigMap
#
# 旧 NixOS 時代の Prometheus (ruler 同居) 相当を VictoriaMetrics 系で再現する。
# Grafana 側では Prometheus datasource 1 個 (manageAlerts: true) だけで
# Alert rules UI のルール閲覧・発火状態表示が動作する。
#
# Prometheus datasource の URL は vmauth (grafana-gateway) を参照する。
# vmauth が path ベースで vmalert / vmselect にルーティングする:
#   /api/v1/rules, /api/v1/alerts → vmalert
#   その他 (query, status/buildinfo 等) → vmselect
# (victoriametrics-config/vmauth-grafana.yaml 参照)
#
# Loki は k3s 上の SimpleScalable Gateway (cluster DNS) を参照。
# Alertmanager datasource は発火アラート・サイレンス閲覧用。
#
# このファイルは Helm chart の extraConfigmapMounts で
# /etc/grafana/provisioning/datasources にマウントされる
# (infrastructure/grafana/application.yaml 参照)。
#
# 各 datasource の uid は既存 Grafana DB の値を踏襲している
# (routeros.json などのダッシュボードが Prometheus uid を直接参照しているため)。
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    # PR #66 で追加した VMAlert datasource を PR #67 (vmauth 統合) で廃止した際、
    # editable: false で provisioning 管理下にあったため Grafana DB に orphan として
    # 残った。provisioning の deleteDatasources で明示削除する。
    # 旧 DuckDB datasource は motherduck plugin 撤去 (#212) で同様に orphan 化したため
    # 引き続き清掃対象に残置 (後継の ClickHouse datasource は別 uid なので衝突しない)。
    deleteDatasources:
      - name: VMAlert
        orgId: 1
      - name: DuckDB
        orgId: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: PBFA97CFB590B2093
        access: proxy
        url: http://vmauth-grafana-gateway.victoriametrics.svc.cluster.local:8427
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 15s
          manageAlerts: true
          alertmanagerUid: P7647F508D5F54FCB
          prometheusType: Prometheus
          prometheusVersion: "2.40.0"
      - name: Loki
        type: loki
        uid: P8E80F9AEF21F6940
        access: proxy
        url: http://loki-gateway.loki.svc.cluster.local
        editable: false
        jsonData:
          maxLines: 1000
      - name: Alertmanager
        type: alertmanager
        uid: P7647F508D5F54FCB
        access: proxy
        url: http://vmalertmanager-alertmanager.victoriametrics.svc.cluster.local:9093
        editable: false
        jsonData:
          implementation: prometheus
          handleGrafanaManagedAlerts: false
      # ClickHouse datasource (公式署名済 grafana-clickhouse-datasource)
      # 用途: Garage logs-archive bucket 上の長期 Parquet (daily-struct/source=*/date=*)
      # を ClickHouse の s3() table function 経由で SQL 集計し、archive 系
      # ダッシュボード (systemd / routeros / k8s-pods / macos-unified) を駆動する。
      # 旧 DuckDB datasource (#212) の後継 (dotfiles-private #215)。
      #
      # 接続先: apps/clickhouse/installation.yaml の CHI (1 shard / 1 replica) の
      # operator 生成 Service。Altinity operator は `clickhouse-{chi}` 命名規則で
      # 全レプリカ用 Service と shard 単位 Service を作る (HTTP 8123, Native 9000)。
      # cluster DNS の Service `clickhouse-clickhouse` を参照する。
      #
      # 認証: ClickHouse 側 default user (password なし)、CHI の users 定義で
      # private CIDR からのみ accept する設定。ClusterIP 経由のみで cross-namespace
      # アクセス可。任意 SQL 実行に対しては Garage 側 GarageKey clickhouse の
      # bucket read-only 権限で COPY/DELETE 等を弾く。
      #
      # 接続テストは Grafana UI で Save & test、もしくは clickhouse-client で
      # `SELECT count() FROM s3(garage, 'daily-struct/source=systemd/date=*/logs.parquet', 'Parquet')`
      # が成功すれば OK。
      - name: ClickHouse
        type: grafana-clickhouse-datasource
        uid: Pchlogs0001
        access: proxy
        editable: false
        url: http://clickhouse-clickhouse.clickhouse.svc.cluster.local:8123
        jsonData:
          defaultDatabase: default
          port: 8123
          protocol: http
          secure: false
          username: default
