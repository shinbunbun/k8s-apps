# Barman Cloud Plugin 経由で MinIO に WAL archive + base backup を書き込む設定。
#
# destinationPath の下に serverName prefix が自動で付く
# (s3://cnpg-backups/grafana-db-v1/)。1 バケットに複数 Cluster を共存可能。
# serverName は Cluster CR の spec.plugins[].parameters.serverName で指定。
#
# retentionPolicy "14d" は 15 日以上前の base backup と WAL を削除する。
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: grafana-db-backup
spec:
  configuration:
    destinationPath: s3://cnpg-backups/
    endpointURL: http://minio.minio-tenant.svc.cluster.local
    s3Credentials:
      accessKeyId:
        name: cnpg-minio-credentials
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-minio-credentials
        key: AWS_SECRET_ACCESS_KEY
    wal:
      compression: gzip
    data:
      compression: gzip
      immediateCheckpoint: true
      jobs: 2
  retentionPolicy: "14d"
