# Playwright Service - firecrawl-api からの内部呼び出し用
# (PLAYWRIGHT_MICROSERVICE_URL=http://playwright-service:3000/scrape)
apiVersion: v1
kind: Service
metadata:
  name: playwright-service
  labels:
    app: playwright-service
    tier: firecrawl
spec:
  type: ClusterIP
  selector:
    app: playwright-service
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
