# Firecrawl api Service - LibreChat (別 namespace) から
# http://firecrawl-api.firecrawl.svc.cluster.local:3002 で叩かれる
apiVersion: v1
kind: Service
metadata:
  name: firecrawl-api
  labels:
    app: firecrawl-api
    tier: firecrawl
spec:
  type: ClusterIP
  selector:
    app: firecrawl-api
  ports:
    - name: http
      port: 3002
      targetPort: http
      protocol: TCP
