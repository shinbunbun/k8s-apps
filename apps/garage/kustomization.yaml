# Garage CR 一式 (operator は infrastructure/garage-operator/ で別管理)
#
# ApplicationSet (applicationsets/apps-appset.yaml) が apps/garage を自動検出して
# ArgoCD Application を生成。すべてのリソースを garage namespace へ。
#
# 依存関係 (sync-wave):
#   -1  admin token / pre-generated keys Secret (KSOPS)
#    0  GarageCluster → StatefulSet + layout bootstrap
#    1  GarageBucket × 5, GarageKey × 4 (importKey で SOPS secret を参照)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: garage

commonAnnotations:
  argocd.argoproj.io/sync-options: ServerSideApply=true

resources:
  - cluster.yaml
  - buckets.yaml
  - keys.yaml

generators:
  - secret-generator.yaml
