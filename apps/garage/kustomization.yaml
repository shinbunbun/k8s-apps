# Garage - S3 互換オブジェクトストレージ (MinIO 後継)
#
# MinIO (community edition) が 2026-02-13 に archive されたため、
# Loki チャンク / CNPG Barman バックアップ / Vector log-archive の
# S3 バックエンドを Garage に移行する。
#
# ApplicationSet (applicationsets/apps-appset.yaml) が apps/garage を
# 自動検出して ArgoCD Application を生成。すべてのリソースを garage namespace へ。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: garage

commonAnnotations:
  argocd.argoproj.io/sync-options: ServerSideApply=true

resources:
  - configmap.yaml
  - services.yaml
  - statefulset.yaml
  - cluster-bootstrap-job.yaml

generators:
  - secret-generator.yaml
