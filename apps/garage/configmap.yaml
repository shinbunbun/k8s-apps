# Garage 本体設定 + Bootstrap スクリプト
#
# garage.toml:
#   - replication_factor = 3, consistency_mode = "consistent" で 3 ノード完全冗長
#   - rpc_secret / admin_token / metrics_token は Secret から環境変数で注入 (GARAGE_* env)
#   - s3_region = "garage" はクライアント側 AWS_REGION と一致必須 (空 region を許容しない)
#   - bootstrap_peers は空。ノード間 peering は bootstrap Job が admin API 経由で確立する
#
# bootstrap.sh:
#   - 起動順に StatefulSet の全 pod を待機 → node ID 収集 → 相互 peer 接続
#   - layout 未適用なら assign + apply (version 1)、適用済みなら skip
#   - 事前生成した access key ペアを `garage key import` で登録
#   - bucket 作成 + 権限付与
#   - 全処理冪等、再実行しても差分のみ反映
apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
data:
  garage.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir = "/var/lib/garage/data"
    db_engine = "lmdb"

    replication_factor = 3
    consistency_mode = "consistent"

    rpc_bind_addr = "[::]:3901"
    # rpc_public_addr は StatefulSet の pod ごとに GARAGE_RPC_PUBLIC_ADDR env で設定
    bootstrap_peers = []

    [s3_api]
    s3_region = "garage"
    api_bind_addr = "[::]:3900"
    root_domain = ".s3.garage.internal"

    [s3_web]
    bind_addr = "[::]:3902"
    root_domain = ".web.garage.internal"
    index = "index.html"

    [admin]
    api_bind_addr = "[::]:3903"
    # GARAGE_ADMIN_TOKEN / GARAGE_METRICS_TOKEN env で注入

  bootstrap.sh: |
    #!/bin/sh
    set -eu

    NODES="garage-0 garage-1 garage-2"
    RPC_FQDN_SUFFIX="garage-rpc.garage.svc.cluster.local"
    ADMIN_URL_TPL="http://%s.${RPC_FQDN_SUFFIX}:3903"

    apk add --no-cache curl jq >/dev/null
    curl -sSL -o /usr/local/bin/garage "https://garagehq.deuxfleurs.fr/_releases/v1.3.1/x86_64-unknown-linux-musl/garage"
    chmod +x /usr/local/bin/garage

    garage_cmd() {
      local pod="$1"; shift
      /usr/local/bin/garage -a "$(printf "$ADMIN_URL_TPL" "$pod")" -T "$GARAGE_ADMIN_TOKEN" "$@"
    }

    echo "==> Wait for all garage admin APIs"
    for pod in $NODES; do
      until curl -sf -H "Authorization: Bearer $GARAGE_ADMIN_TOKEN" "$(printf "$ADMIN_URL_TPL" "$pod")/health" >/dev/null 2>&1 \
            || curl -sf "$(printf "$ADMIN_URL_TPL" "$pod")/health" >/dev/null 2>&1; do
        echo "   waiting for $pod..."
        sleep 3
      done
      echo "   $pod OK"
    done

    echo "==> Collect node IDs"
    # `garage node id -q` 出力は <hex-id>@<public-addr>:<port> の 1 行。
    # awk で @ 左側のみ抽出。万一先頭に診断行が混ざっても head -1 で吸収。
    ID_GARAGE_0=$(garage_cmd garage-0 node id -q | head -1 | awk -F@ '{print $1}')
    ID_GARAGE_1=$(garage_cmd garage-1 node id -q | head -1 | awk -F@ '{print $1}')
    ID_GARAGE_2=$(garage_cmd garage-2 node id -q | head -1 | awk -F@ '{print $1}')
    echo "   garage-0=$ID_GARAGE_0"
    echo "   garage-1=$ID_GARAGE_1"
    echo "   garage-2=$ID_GARAGE_2"

    echo "==> Peer each node with the others"
    for src in $NODES; do
      for dst in $NODES; do
        [ "$src" = "$dst" ] && continue
        eval dst_id="\$ID_$(echo $dst | tr a-z- A-Z_)"
        garage_cmd "$src" node connect "${dst_id}@${dst}.${RPC_FQDN_SUFFIX}:3901" || true
      done
    done

    echo "==> Apply layout if version == 0"
    LAYOUT_VERSION=$(garage_cmd garage-0 layout show 2>&1 | awk '/^Current cluster layout version:/{print $5}')
    LAYOUT_VERSION=${LAYOUT_VERSION:-0}
    if [ "$LAYOUT_VERSION" = "0" ]; then
      echo "   assigning nodes to layout"
      garage_cmd garage-0 layout assign "$ID_GARAGE_0" -z dc1 -c 40G -t garage-0
      garage_cmd garage-0 layout assign "$ID_GARAGE_1" -z dc1 -c 40G -t garage-1
      garage_cmd garage-0 layout assign "$ID_GARAGE_2" -z dc1 -c 40G -t garage-2
      garage_cmd garage-0 layout apply --version 1
      echo "   layout applied (v1)"
    else
      echo "   layout version already $LAYOUT_VERSION, skipping assignment"
    fi

    import_key() {
      local name="$1" id="$2" secret="$3"
      if garage_cmd garage-0 key info "$id" >/dev/null 2>&1; then
        echo "   key $name ($id) already present"
      else
        garage_cmd garage-0 key import --yes "$id" "$secret" -n "$name"
        echo "   imported key $name"
      fi
    }

    echo "==> Import S3 access keys"
    import_key loki        "$LOKI_KEY_ID"    "$LOKI_SECRET"
    import_key cnpg        "$CNPG_KEY_ID"    "$CNPG_SECRET"
    import_key vector      "$VECTOR_KEY_ID"  "$VECTOR_SECRET"
    import_key compact     "$COMPACT_KEY_ID" "$COMPACT_SECRET"

    echo "==> Create buckets"
    for b in loki-chunks loki-ruler loki-admin cnpg-backups logs-archive; do
      if garage_cmd garage-0 bucket info "$b" >/dev/null 2>&1; then
        echo "   bucket $b exists"
      else
        garage_cmd garage-0 bucket create "$b"
        echo "   created bucket $b"
      fi
    done

    grant() {
      local key_id="$1" bucket="$2" perms="$3"
      garage_cmd garage-0 bucket allow $perms --key "$key_id" "$bucket"
    }

    echo "==> Grant permissions"
    for b in loki-chunks loki-ruler loki-admin; do
      grant "$LOKI_KEY_ID" "$b" "--read --write --owner"
    done
    grant "$CNPG_KEY_ID"   "cnpg-backups" "--read --write --owner"
    grant "$VECTOR_KEY_ID" "logs-archive" "--read --write --owner"
    # logs-compact は logs-archive を読み取り、上書き圧縮するため write も要る
    grant "$COMPACT_KEY_ID" "logs-archive" "--read --write"

    echo "==> Bootstrap complete"
