# 手動 one-shot Job: Garage logs-archive bucket に S3 lifecycle rule を一括設定する。
#
# 目的:
#   - active raw/ archive は能動的 delete を行う pipeline が無いので 7 日 expire
#     (Phase 4、Issue #191、logs-rust-pipeline は raw/ を read のみ)
#   - 旧 stack の残骸 prefix (`daily/` / `typed/` / `daily-bronze/`) は新規書込
#     ゼロで完全 redundant、Days=1 で全件 sweep
#
# 適用:
#   kubectl create -f apps/garage/lifecycle-job.yaml
#
# 結果検証 (Job 完了後):
#   kubectl logs -n log-archiver-vector -l job-name=garage-lifecycle-set
#
# kustomization.yaml の resources には含めない (手動運用、ArgoCD 管理外)。
# ファイルはリポジトリで管理して再現性を保つ。同じ rule で再 apply しても
# put_bucket_lifecycle_configuration は冪等 (set 操作)。
#
# 参考:
#   Garage は S3 PutBucketLifecycleConfiguration の Expiration アクション
#   (ExpiredObjectDeleteMarker 除く) と AbortIncompleteMultipartUpload のみ
#   サポート。Filter 経由の Prefix 指定が必須 (deprecated 直書き Prefix は不可)。
#
# Namespace 選定:
#   logs-archive bucket の owner 権限を持つ vector key が log-archiver-vector
#   ns に injected されているのでここで実行。logs-rust-pipeline / 旧 compact /
#   logs-typed-dbt キーは read+write のみで lifecycle 設定不可。
#
# Issue #191 タスク B-3 (旧 prefix lifecycle expire):
#   - daily/ (15.69 GiB / 546 files / 2025-10-14..2026-05-03) — 旧 logs-compact-cronjob
#     + 過去 OpenSearch 一括 migrate 出力。Phase 4 で daily-struct/ 採用後は新規書込ゼロ。
#     verify (samples diff=0) 済で daily-struct/ への完全置換確認済
#   - typed/ (1.51 GiB / 22 files / 2026-04-23..2026-05-03) — 旧 dbt-duckdb silver
#     (k8s-pods/routeros)。dashboard は daily-struct/ 直読みに切替済 (#191 タスク C-2)
#   - daily-bronze/ (0.11 GiB / 3 files / 2026-05-02 のみ) — Phase 3 PoC experimental の残骸
apiVersion: batch/v1
kind: Job
metadata:
  name: garage-lifecycle-set
  namespace: log-archiver-vector
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: lifecycle
          image: python:3.14-slim
          command: [bash, -c]
          args:
            - |
              set -euo pipefail
              pip install --no-cache-dir --quiet boto3==1.35.99
              python <<'PY'
              import os, json, boto3
              from botocore.config import Config

              s3 = boto3.client(
                  "s3",
                  endpoint_url="http://garage-archive.garage.svc.cluster.local:3900",
                  aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
                  aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
                  region_name=os.environ.get("AWS_REGION", "garage"),
                  config=Config(s3={"addressing_style": "path"}),
              )

              rules = {
                  "Rules": [
                      {
                          "ID": "expire-raw-7d",
                          "Status": "Enabled",
                          "Filter": {"Prefix": "raw/"},
                          "Expiration": {"Days": 7},
                      },
                      # Issue #191 タスク B-3: 旧 stack 残骸 prefix の expire
                      {
                          "ID": "expire-daily-1d",
                          "Status": "Enabled",
                          "Filter": {"Prefix": "daily/"},
                          "Expiration": {"Days": 1},
                      },
                      {
                          "ID": "expire-typed-1d",
                          "Status": "Enabled",
                          "Filter": {"Prefix": "typed/"},
                          "Expiration": {"Days": 1},
                      },
                      {
                          "ID": "expire-daily-bronze-1d",
                          "Status": "Enabled",
                          "Filter": {"Prefix": "daily-bronze/"},
                          "Expiration": {"Days": 1},
                      },
                  ]
              }
              s3.put_bucket_lifecycle_configuration(
                  Bucket="logs-archive",
                  LifecycleConfiguration=rules,
              )
              print("[lifecycle] put_bucket_lifecycle_configuration OK")

              cur = s3.get_bucket_lifecycle_configuration(Bucket="logs-archive")
              print("[lifecycle] current rules:")
              print(json.dumps(cur.get("Rules", []), indent=2, default=str))
              PY
          envFrom:
            - secretRef:
                name: vector-garage-archive-credentials
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
