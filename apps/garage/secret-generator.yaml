# KSOPS generator - Garage operator に渡す Secret 一式
#
# garage-admin-tokens:
#   - admin-token: GarageCluster.spec.admin.adminTokenSecretRef → operator が admin API 認証
#   - metrics-token: GarageCluster.spec.admin.metricsTokenSecretRef → /metrics scrape 用
#   これは operator → Garage 認証の「root 鍵」相当なので SOPS で固定値管理を継続する。
#
# 旧 garage-s3-keys / garage-s3-keys-authentik:
#   PR #382 以前は GarageKey.spec.importKey.secretRef が参照していたが、PR #384 で
#   importKey 設計を撤去し、operator がランダムな access_key_id を auto-generate
#   して consumer-ns Secret を直接更新する方式に切り替えた。これらの SOPS Secret は
#   完全に未使用となったため本 PR で削除した (apps/garage/secrets/garage-s3-keys{,-authentik}.enc.yaml も削除)。
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/garage-admin-tokens.enc.yaml
  - secrets/garage-archive-admin-tokens.enc.yaml
  - secrets/garage-obs-admin-tokens.enc.yaml
