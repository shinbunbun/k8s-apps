# KSOPS generator - Garage Secret 2 種
#
# garage-server-secrets: StatefulSet / bootstrap Job の両方で使用
#   - GARAGE_RPC_SECRET: ノード間 RPC 認証 (32 bytes hex)
#   - GARAGE_ADMIN_TOKEN: admin API Bearer token
#   - GARAGE_METRICS_TOKEN: /metrics Bearer token (VictoriaMetrics 用)
#
# garage-s3-keys: bootstrap Job が garage key import で登録するアクセスキー
#   - <CLIENT>_KEY_ID / <CLIENT>_SECRET のペアを事前生成 SOPS 暗号化
#   - 各クライアント namespace 側で同じ値を持つ Secret (loki-garage-credentials 等) を
#     別途 SOPS で暗号化して配置する (AWS SDK の AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY 形式)
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/garage-server-secrets.enc.yaml
  - secrets/garage-s3-keys.enc.yaml
