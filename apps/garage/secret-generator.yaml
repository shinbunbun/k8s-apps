# KSOPS generator - Garage operator に渡す Secret 一式
#
# garage-admin-tokens:
#   - admin-token: GarageCluster.spec.admin.adminTokenSecretRef → operator が admin API 認証
#   - metrics-token: GarageCluster.spec.admin.metricsTokenSecretRef → /metrics scrape 用
#
# garage-s3-keys: GarageKey.spec.importKey.secretRef が参照
#   - LOKI / CNPG / VECTOR / COMPACT 各 <CLIENT>_KEY_ID / <CLIENT>_SECRET を SOPS で事前生成
#   - operator が Garage の admin API で `key import` → 実アクセスキーとして登録
#   - PR-2a 以降はクライアント namespace 側の Secret を operator が secretTemplate 経由で
#     直接生成する (cross-namespace 対応)
#
# garage-s3-keys-authentik: CNPG_AUTHENTIK_KEY_ID / CNPG_AUTHENTIK_SECRET (分離)
#   - authentik-db バックアップ用を grafana-db と独立キーにする (障害隔離 + 権限最小化)
#   - 既存 garage-s3-keys.enc.yaml への追記ではなく別ファイルにしているのは、
#     sops 運用上の都合 (ローカル age 鍵で既存ファイルを rewrite できない環境のため)
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/garage-admin-tokens.enc.yaml
  - secrets/garage-s3-keys.enc.yaml
  - secrets/garage-s3-keys-authentik.enc.yaml
