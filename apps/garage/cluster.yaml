# Garage クラスタ (StatefulSet + layout を operator が reconcile)
#
# 【HA 設計】
# - replicas: 3 + topologySpreadConstraints.whenUnsatisfiable: DoNotSchedule で
#   3 ノードに 1 pod ずつ強制分散
# - replication.factor=3 + consistencyMode=consistent で 2/3 quorum。
#   1 ノード障害 (= 2 pod 稼働) でも read/write 継続。
#   RF=2 だとコンシステントモードの write quorum=2/2 となり 1 ノード障害で書き込めない。
#
# 【容量】data 40Gi × 3 = raw 120 GiB、RF=3 で usable ~40 GiB。
# 現 MinIO EC:3 の 60 GiB からは縮小するが、Loki 実測 21 GB + CNPG 14d + Vector で
# 当面十分。逼迫時は storage.data.size を上げて StatefulSet を再作成する
# (local-path は online resize 未対応、PR-1 の制約を継承)。
#
# 【メタデータ】storage.metadata に別 PVC 5Gi。Garage は LMDB メタを頻繁に書くため
# データ領域と分離しておくと FS キャッシュが暖まりやすい (operator デフォルトに近い)。
#
# 【image】spec.image で明示 pin。operator の defaultGarageImage に暗黙依存すると
# operator bump で Garage 本体が意図せず上がり metadata format 互換で事故る可能性があるため。
# v2.x は 2025-06 以降安定、CNPG Barman / Loki AWS SDK との互換性も v1 同等。
#
# 【tokens】admin のみ事前生成 SOPS Secret を渡す。operator はこの token で
# Garage admin API に接続して layout / key 管理を行う。
# /metrics は cluster 内限定 public (metricsTokenSecretRef 未指定)。VMAgent は別 NS で
# cross-NS Secret 共有を避けるため、MinIO の PROMETHEUS_AUTH_TYPE=public と同等扱い。
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageCluster
metadata:
  name: garage
  labels:
    app.kubernetes.io/name: garage
  annotations:
    # operator CRD が登録され、operator Pod が Ready になってから CR を apply させる
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 3
  zone: dc1
  image: dxflrs/garage:v2.3.0

  replication:
    factor: 3
    consistencyMode: consistent

  storage:
    # DataStorageConfig (data) は multi-disk/paths 向け設計で accessModes を取らない。
    # 単一 PVC の場合は PVC の accessModes デフォルト (ReadWriteOnce) に委ねる。
    data:
      type: PersistentVolumeClaim
      size: 40Gi
      storageClassName: local-path
    # metadata は VolumeConfig (通常 PVC) で accessModes を許容する。
    metadata:
      type: PersistentVolumeClaim
      size: 5Gi
      storageClassName: local-path
      accessModes: [ReadWriteOnce]
    metadataAutoSnapshotInterval: "6h"

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: garage

  s3Api:
    region: garage

  admin:
    enabled: true
    adminTokenSecretRef:
      name: garage-admin-tokens
      key: admin-token
    # /metrics は cluster 内限定 public (ClusterIP Service garage:3903 のみ、外部公開なし)。
    # metricsTokenSecretRef を指定すると operator が metrics_token_file を TOML に書き、
    # Garage は Bearer 強制になる。VMAgent が別 NS なので cross-NS Secret 共有を避けるため
    # metricsTokenSecretRef を未指定にして MinIO の PROMETHEUS_AUTH_TYPE=public と同等にする。

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
