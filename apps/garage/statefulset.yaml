# Garage StatefulSet (3 pod、1 pod/node)
#
# topologySpreadConstraints + DoNotSchedule で 3 ノードに 1 pod ずつ強制配置。
# いずれか 1 ノード障害でも残り 2 pod で read/write 継続 (replication_factor=3 の quorum 2)。
#
# PVC: 40Gi × 3 = 120Gi raw、replication_factor=3 で usable ~40Gi。
#   Loki 実測 21GB + CNPG 14日 retention + Vector ログで暫定十分、逼迫時は volumeClaimTemplates
#   の size を増やして StatefulSet を recreate (local-path は online resize 未対応)。
#
# GARAGE_RPC_PUBLIC_ADDR は pod ごとに $(POD_NAME).garage-rpc.garage.svc.cluster.local:3901
# を env interpolation で解決。これが他 pod から RPC 到達するためのアドレスになる。
#
# probe は admin API (/health) を使う。metrics_token は不要で公開エンドポイント。
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  labels:
    app.kubernetes.io/name: garage
spec:
  serviceName: garage-rpc
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: garage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage
    spec:
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: garage
      containers:
        - name: garage
          image: dxflrs/garage:v1.3.1
          imagePullPolicy: IfNotPresent
          args: ["server"]
          ports:
            - name: s3
              containerPort: 3900
            - name: rpc
              containerPort: 3901
            - name: web
              containerPort: 3902
            - name: admin
              containerPort: 3903
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: GARAGE_RPC_PUBLIC_ADDR
              value: "$(POD_NAME).garage-rpc.garage.svc.cluster.local:3901"
            - name: GARAGE_RPC_SECRET
              valueFrom:
                secretKeyRef:
                  name: garage-server-secrets
                  key: GARAGE_RPC_SECRET
            - name: GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: garage-server-secrets
                  key: GARAGE_ADMIN_TOKEN
            - name: GARAGE_METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: garage-server-secrets
                  key: GARAGE_METRICS_TOKEN
          volumeMounts:
            - name: config
              mountPath: /etc/garage.toml
              subPath: garage.toml
            - name: data
              mountPath: /var/lib/garage
          readinessProbe:
            httpGet:
              path: /health
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: admin
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: garage-config
            items:
              - key: garage.toml
                path: garage.toml
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 40Gi
