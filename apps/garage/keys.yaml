# Garage アクセスキー定義 (operator が garage-s3-keys Secret から import してバケット権限を付与)
#
# 【設計】
# - クライアントごとに独立したアクセスキーを発行し、必要なバケットにのみ read/write を許可
# - importKey.secretRef で事前生成の SOPS Secret (garage-s3-keys, garage-s3-keys-authentik)
#   を参照し、同じキー ID / シークレットを Garage に import する
# - secretTemplate でクライアント namespace に operator が直接 Secret を生成
#   (cross-namespace 対応、operator は Secret の ClusterRole 所持)
# - クライアント側は endpoint だけ自前設定、credential は operator 生成 Secret をマウント
# - キーローテーション手順は未検証。operator 実装依存で、同じ metadata.name のまま key ID を
#   変更しても反映されない可能性があるため、初回運用時は GarageKey CR を delete → recreate が確実。
#
# 【権限マッピング】
#   loki            → loki-chunks / loki-ruler / loki-admin を owner
#   cnpg            → cnpg-backups を owner (grafana-db の Barman が使用)
#   cnpg-authentik  → cnpg-backups を owner (authentik-db 専用キー、grafana-db と障害隔離)
#   vector          → logs-archive を owner (retention lifecycle 設定用)
#   logs-rust-pipeline → logs-archive を read + write (Rust + Polars pipeline で
#                     raw/ → daily-struct/ 派生、Phase 4 本採用、旧 logs-typed-dbt の置換)
#   grafana-duckdb  → logs-archive を read のみ (Grafana DuckDB datasource 専用、
#                     Explore から書込/削除事故を防止するため最小権限)
#                     現状は MCP (motherduck) からの ad-hoc クエリで継続使用、Grafana 側は
#                     clickhouse へ移行済 (dotfiles-private #215)
#   clickhouse      → logs-archive を read のみ (Grafana ClickHouse datasource 専用、
#                     s3() table function 経由で named_collection 'garage' に渡す)
#
# 【出力 Secret 構造】
#   各 GarageKey は secretTemplate で AWS SDK 標準形式の Secret を生成:
#     - AWS_ACCESS_KEY_ID
#     - AWS_SECRET_ACCESS_KEY
#     - AWS_REGION (= "garage"、Garage は region 必須)
#   endpoint は includeEndpoint: false で出力しない (クライアント側で endpoint 明示設定)
#
# sync-wave 1: GarageCluster (wave 0) と GarageBucket (wave 1) と同時 apply で operator reconcile 任せ
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: loki
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  clusterRef:
    name: garage
  name: loki
  importKey:
    secretRef:
      name: garage-s3-keys
      namespace: garage
    accessKeyIdKey: LOKI_KEY_ID
    secretAccessKeyKey: LOKI_SECRET
  bucketPermissions:
    - bucketRef:
        name: loki-chunks
      read: true
      write: true
      owner: true
    - bucketRef:
        name: loki-ruler
      read: true
      write: true
      owner: true
    - bucketRef:
        name: loki-admin
      read: true
      write: true
      owner: true
  secretTemplate:
    name: loki-garage-credentials
    namespace: loki
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
    includeRegion: true
---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: cnpg
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  clusterRef:
    name: garage
  name: cnpg
  importKey:
    secretRef:
      name: garage-s3-keys
      namespace: garage
    accessKeyIdKey: CNPG_KEY_ID
    secretAccessKeyKey: CNPG_SECRET
  bucketPermissions:
    - bucketRef:
        name: cnpg-backups
      read: true
      write: true
      owner: true
  secretTemplate:
    # grafana-db 用。authentik-db は独立キー (下の cnpg-authentik) を使う
    name: cnpg-garage-credentials
    namespace: grafana
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
    includeRegion: true
---
