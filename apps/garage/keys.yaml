# Garage アクセスキー定義 (operator がバケット権限を付与して Secret を生成)
#
# 【設計 — v1beta1 cross-namespace 配置】
# v1alpha1 では GarageKey を garage ns に集約し `secretTemplate.namespace` で
# 消費側 ns に Secret を生成していたが、v1beta1 (garage-operator v0.4.0+) で
# `secretTemplate.namespace` フィールドが廃止された。代替設計として:
#   - GarageKey 自体を消費側 ns に配置 (Secret は同 ns に作られる)
#   - `clusterRef.namespace: garage` で garage ns の GarageCluster を cross-ns 参照
#   - `bucketPermissions[].bucketRef.namespace: garage` で GarageBucket を cross-ns 参照
#   - `garage` ns 側で GarageReferenceGrant (apps/garage/reference-grants.yaml) が
#     これらの cross-ns reference を明示的に許可
#
# 【importKey 不採用の経緯 (2026-05-20 復旧時の決定)】
# 当初は `importKey.secretRef` で SOPS 暗号化された固定 access_key_id/secret を Garage に
# import する設計だったが、移行時に operator が old GarageKey 削除に伴って Garage 側の
# S3 access key を消し、新 GarageKey での再 import が Garage 側 tombstone 制約
# (同じ ID の再作成不可) で失敗する事故が発生 (Issue 後追い)。
# 復旧として importKey を撤去し、operator にランダムな新 access_key_id を auto-generate
# させる方式に切り替えた。SOPS Secret (garage-s3-keys / -authentik) は本設計では未使用
# (operator が consumer-ns Secret を直接生成・更新する)。secret-generator.yaml の
# 整理は別 PR で実施予定。
#
# 【権限マッピング】
#   loki                → loki-chunks / loki-ruler / loki-admin を owner
#   cnpg                → cnpg-backups を owner (grafana-db の Barman が使用)
#   cnpg-authentik      → cnpg-backups を owner (authentik-db 専用キー、grafana-db と障害隔離)
#   vector              → logs-archive を owner (retention lifecycle 設定用)
#   logs-rust-pipeline  → logs-archive を read + write (Rust + Polars pipeline で
#                         raw/ → daily-struct/ 派生、Phase 4 本採用、旧 logs-typed-dbt の置換)
#   grafana-duckdb      → logs-archive を read のみ (Grafana DuckDB datasource / MCP motherduck 用)
#
# 【出力 Secret 構造】
#   各 GarageKey は secretTemplate で AWS SDK 標準形式の Secret を同 namespace に生成:
#     - AWS_ACCESS_KEY_ID
#     - AWS_SECRET_ACCESS_KEY
#     - AWS_REGION (= "garage"、Garage は region 必須)
#   endpoint は includeEndpoint: false で出力しない (クライアント側で endpoint 明示設定)
#
# sync-wave 2: GarageCluster (wave 0) と GarageBucket / GarageReferenceGrant (wave 1)
# が apply されてから cross-ns GarageKey を投入 (Grant 不在で webhook 拒否されないように)
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: loki
  namespace: loki
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: loki
  bucketPermissions:
    - bucketRef:
        name: loki-chunks
        namespace: garage
      read: true
      write: true
      owner: true
    - bucketRef:
        name: loki-ruler
        namespace: garage
      read: true
      write: true
      owner: true
    - bucketRef:
        name: loki-admin
        namespace: garage
      read: true
      write: true
      owner: true
  secretTemplate:
    name: loki-garage-credentials
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
    includeRegion: true
---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: cnpg
  # grafana-db (cnpg) 用。authentik-db は独立キー (cnpg-authentik) を使う
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: cnpg
  bucketPermissions:
    - bucketRef:
        name: cnpg-backups
        namespace: garage
      read: true
      write: true
      owner: true
  secretTemplate:
    name: cnpg-garage-credentials
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
    includeRegion: true
---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: cnpg-authentik
  namespace: authentik
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: cnpg-authentik
  bucketPermissions:
    - bucketRef:
        name: cnpg-backups
        namespace: garage
      read: true
      write: true
      owner: true
  secretTemplate:
    name: cnpg-garage-credentials
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
    includeRegion: true
---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: vector
  namespace: log-archiver-vector
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: vector
  bucketPermissions:
    - bucketRef:
        name: logs-archive
        namespace: garage
      read: true
      write: true
      owner: true
  secretTemplate:
    name: vector-garage-credentials
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
    includeRegion: true
---
# Rust + Polars pipeline (apps/logs-rust-pipeline) 専用キー。
# raw/ NDJSON.zst の read と daily-struct/ Parquet の write を担う。
# logs-typed-dbt と同じ logs-archive bucket に対する read+write 権限だが、
# 独立したアクセスキーで権限を分離 (Phase 4 で旧 dbt 廃止後も独立運用するため)。
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: logs-rust-pipeline
  namespace: logs-rust-pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: logs-rust-pipeline
  bucketPermissions:
    - bucketRef:
        name: logs-archive
        namespace: garage
      read: true
      write: true
  secretTemplate:
    name: logs-rust-pipeline-credentials
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
    includeRegion: true
---
# Grafana DuckDB datasource プラグイン専用 read-only キー。
# initSql で SET s3_access_key_id / s3_secret_access_key に流し、
# read_parquet('s3://logs-archive/daily/...') で長期ログを集計する。
# write/owner なしにすることで、Explore タブから誤って COPY TO や
# DELETE 等を実行しても AccessDenied で弾かれる (Grafana の権限分離は
# UI/team レベルでは効くが、DuckDB datasource は SQL 任意実行を許す
# ため、Garage 側の最小権限でガードする)。
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: grafana-duckdb
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: grafana-duckdb
  bucketPermissions:
    - bucketRef:
        name: logs-archive
        namespace: garage
      read: true
  secretTemplate:
    name: grafana-duckdb-credentials
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
    includeRegion: true
---
# Pyroscope 2.0 monolithic 用 GarageKey。
# pyroscope-blocks に対して read+write+owner を付与:
#   - owner は compactor/lifecycle が ListBucket + DeleteObject を行うため必須
#   - Pyroscope 内蔵 retention (30d) で古い block を物理削除する
# 生成 Secret は pyroscope ns の `pyroscope-garage-credentials` (AWS SDK 標準形式)。
# infrastructure/pyroscope の Helm values から extraEnvFrom で注入する。
# Issue: shinbunbun/dotfiles#699
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: pyroscope
  namespace: pyroscope
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: pyroscope
  bucketPermissions:
    - bucketRef:
        name: pyroscope-blocks
        namespace: garage
      read: true
      write: true
      owner: true
  secretTemplate:
    name: pyroscope-garage-credentials
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
    includeRegion: true
---
# Tempo monolithic 用 GarageKey。
# tempo-traces に read+write+owner を付与:
#   - owner は compactor の ListBucket + DeleteObject に必須
#   - Tempo 内蔵 retention (14d) で古い block を物理削除
# 生成 Secret は tempo ns の `tempo-garage-credentials` (AWS SDK 標準形式)。
# infrastructure/tempo の Helm values から extraEnvFrom で注入する。
# Issue: shinbunbun/unified-dotfiles#16
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: tempo
  namespace: tempo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: tempo
  bucketPermissions:
    - bucketRef:
        name: tempo-traces
        namespace: garage
      read: true
      write: true
      owner: true
  secretTemplate:
    name: tempo-garage-credentials
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
    includeRegion: true
