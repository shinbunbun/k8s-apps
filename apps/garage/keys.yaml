      name: garage-s3-keys
      namespace: garage
    accessKeyIdKey: COMPACT_KEY_ID
    secretAccessKeyKey: COMPACT_SECRET
  bucketPermissions:
    - bucketRef: logs-archive
      read: true
      write: true
  secretTemplate:
    name: compact-garage-credentials
    namespace: logs-compact-cronjob
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
