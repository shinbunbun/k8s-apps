apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: vector
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  clusterRef:
    name: garage
  name: vector
  importKey:
