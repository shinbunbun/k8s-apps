    - bucketRef:
        name: logs-archive
      read: true
      write: true
      owner: true
  secretTemplate:
    name: vector-garage-credentials
    namespace: log-archiver-vector
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
    includeRegion: true
---
# Rust + Polars pipeline (apps/logs-rust-pipeline) 専用キー。
# raw/ NDJSON.zst の read と daily-struct/ Parquet の write を担う。
# logs-typed-dbt と同じ logs-archive bucket に対する read+write 権限だが、
# 独立したアクセスキーで権限を分離 (Phase 4 で旧 dbt 廃止後も独立運用するため)。
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: logs-rust-pipeline
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  clusterRef:
    name: garage
  name: logs-rust-pipeline
  importKey:
    secretRef:
      name: garage-s3-keys
      namespace: garage
    accessKeyIdKey: LOGS_RUST_PIPELINE_KEY_ID
    secretAccessKeyKey: LOGS_RUST_PIPELINE_SECRET
  bucketPermissions:
    - bucketRef:
        name: logs-archive
      read: true
      write: true
  secretTemplate:
    name: logs-rust-pipeline-credentials
    namespace: logs-rust-pipeline
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
    includeRegion: true
---
# Grafana DuckDB datasource プラグイン専用 read-only キー。
# initSql で SET s3_access_key_id / s3_secret_access_key に流し、
# read_parquet('s3://logs-archive/daily/...') で長期ログを集計する。
# write/owner なしにすることで、Explore タブから誤って COPY TO や
# DELETE 等を実行しても AccessDenied で弾かれる (Grafana の権限分離は
# UI/team レベルでは効くが、DuckDB datasource は SQL 任意実行を許す
# ため、Garage 側の最小権限でガードする)。
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: grafana-duckdb
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  clusterRef:
    name: garage
  name: grafana-duckdb
  importKey:
    secretRef:
      name: garage-s3-keys
      namespace: garage
    accessKeyIdKey: GRAFANA_DUCKDB_KEY_ID
    secretAccessKeyKey: GRAFANA_DUCKDB_SECRET
  bucketPermissions:
    - bucketRef:
        name: logs-archive
      read: true
  secretTemplate:
    name: grafana-duckdb-credentials
    namespace: grafana
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
    includeRegion: true
---
# Grafana ClickHouse datasource 専用 read-only キー。
# CHI (apps/clickhouse/installation.yaml) の podTemplate で envFrom により
# AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY を注入し、ClickHouse の named_collection
# 'garage' (s3() table function) から logs-archive bucket を読む。
# 旧 grafana-duckdb キーは MCP (motherduck) 用途で残置、本キーは Grafana 経路専用。
# write/owner なしで最小権限 (Grafana の Explore から任意 SQL を実行されても
# Garage 側で書込/削除を弾く)。
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: clickhouse
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  clusterRef:
    name: garage
  name: clickhouse
  importKey:
    secretRef:
      name: garage-s3-keys
      namespace: garage
    accessKeyIdKey: CLICKHOUSE_KEY_ID
    secretAccessKeyKey: CLICKHOUSE_SECRET
  bucketPermissions:
    - bucketRef:
        name: logs-archive
      read: true
  secretTemplate:
    name: clickhouse-garage-credentials
    namespace: clickhouse
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
    includeRegion: true
