# Garage バケット定義
#
# operator が各 CR を Garage の admin API 経由で作成する。
# 既存 MinIO Tenant の spec.buckets と対応:
#   loki-chunks / loki-ruler / loki-admin  ← Loki (SimpleScalable) のチャンク/ルーラー/admin
#   cnpg-backups                           ← CNPG Barman Cloud Plugin の WAL + base backup
#   logs-archive                           ← Vector log-archiver の Fluent Forward → Parquet
#
# quotas は homelab 規模では不要 (cluster 全体 40 GiB usable の範囲で収まる想定)。
# 逼迫してきたら quotas.maxSize を追加して per-bucket 上限で保護する。
#
# sync-wave 1: GarageCluster (wave 0) が Ready になってから apply させる。
# (CR apply だけは operator reconcile のリトライで収束するが、余計な Error ログを減らすため明示)
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: loki-chunks
  namespace: garage
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  clusterRef:
    name: garage
---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: loki-ruler
  namespace: garage
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  clusterRef:
    name: garage
---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: loki-admin
  namespace: garage
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  clusterRef:
    name: garage
---
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: cnpg-backups
  namespace: garage
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  clusterRef:
    name: garage
---
# Pyroscope 2.0 (monolithic) の object storage backend (Pyroscope 2.0 で mandatory)。
# profile blocks + symbol metadata を格納。retention は server 側 30d 設定で
# compactor が GC する (lifecycle rule は未設定、Pyroscope 内蔵 retention に委譲)。
# Issue: shinbunbun/dotfiles#699
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: pyroscope-blocks
  namespace: garage
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  clusterRef:
    name: garage
---
# Tempo monolithic の object storage backend。trace block + WAL flush を格納。
# retention は Tempo 側 14d 設定で compactor が GC する (Pyroscope と同方針、
# lifecycle rule 未設定)。
# 14d は Garage 容量制約 (garage-2 残 24GB) を踏まえた初期値、後で延長判断。
# Issue: shinbunbun/unified-dotfiles#16
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: tempo-traces
  namespace: garage
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  clusterRef:
    name: garage
---
# Terrakube (セルフホスト Terraform コントロールプレーン) の object storage backend。
# Terraform state / module / job output を格納する。Terrakube 本体 (Helm,
# infrastructure/terrakube) が GarageKey "terrakube" 経由で read/write する。
# retention は Terrakube 側で管理 (state は世代管理されるため lifecycle 未設定)。
# Issue: shinbunbun/dotfiles-private#327
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageBucket
metadata:
  name: terrakube-storage
  namespace: garage
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  clusterRef:
    name: garage
