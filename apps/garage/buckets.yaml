# Garage バケット定義
#
# operator が各 CR を Garage の admin API 経由で作成する。
# 既存 MinIO Tenant の spec.buckets と対応:
#   loki-chunks / loki-ruler / loki-admin  ← Loki (SimpleScalable) のチャンク/ルーラー/admin
#   cnpg-backups                           ← CNPG Barman Cloud Plugin の WAL + base backup
#   logs-archive                           ← Vector log-archiver の Fluent Forward → Parquet
#
# quotas は homelab 規模では不要 (cluster 全体 40 GiB usable の範囲で収まる想定)。
# 逼迫してきたら quotas.maxSize を追加して per-bucket 上限で保護する。
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageBucket
metadata:
  name: loki-chunks
spec:
  clusterRef:
    name: garage
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageBucket
metadata:
  name: loki-ruler
spec:
  clusterRef:
    name: garage
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageBucket
metadata:
  name: loki-admin
spec:
  clusterRef:
    name: garage
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageBucket
metadata:
  name: cnpg-backups
spec:
  clusterRef:
    name: garage
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageBucket
metadata:
  name: logs-archive
spec:
  clusterRef:
    name: garage
