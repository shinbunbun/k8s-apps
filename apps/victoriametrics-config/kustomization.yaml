apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: victoriametrics

resources:
  - vmcluster.yaml
  - vmagent.yaml
  - vmalert.yaml
  - vmalertmanager.yaml
  - vmalertmanagerconfig.yaml
  - vmrule-alerts.yaml
  - vmrule-recording.yaml
  - scrape-config-secret.yaml
  - lan-service.yaml
  - alertmanager-lan-service.yaml

configMapGenerator:
  # SNMP Exporter 設定 (MikroTik RouterOS)
  - name: snmp-config
    files:
      - snmp.yml
    options:
      disableNameSuffixHash: true

generators:
  - secret-generator.yaml
