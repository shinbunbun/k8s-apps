# vmagent スクレイプ設定
#
# NixOS の observability.nix から移植。
# additionalScrapeConfigs はジョブ配列を直接受け取る（scrape_configs ラッパー不要）。
# 変換ポイント:
#   localhost:9100   → 192.168.1.3:9100 (vmagent は k8s 内で動作)
#   localhost:9116   → snmp-exporter ClusterIP
#   nixos-desktop:30080 → kube-state-metrics ClusterIP
#   bearer_token_file → Secret ボリュームマウント
apiVersion: v1
kind: Secret
metadata:
  name: vmagent-scrape-config
type: Opaque
stringData:
  scrape-config.yaml: |
    # cluster ラベルは dotdc k8s-views-* 等のダッシュボード変数
    # `label_values(kube_node_info,cluster)` を機能させるために付与する。
    # k3s クラスタに参加していないマシン（shinbunbun-macmini）と外部機器
    # （routeros）には付与しないことで、dashboard の $cluster フィルタで
    # それらが除外される。
    - job_name: node
      scrape_interval: 15s
      static_configs:
        - targets:
            - "192.168.1.3:9100"
          labels:
            instance: "nixos.shinbunbun.com"
            cluster: "homelab"
        - targets:
            - "192.168.1.4:9100"
          labels:
            instance: "nixos-desktop"
            cluster: "homelab"
        - targets:
            - "192.168.1.5:9100"
          labels:
            instance: "shinbunbun-macmini"
        - targets:
            - "192.168.1.6:9100"
          labels:
            instance: "g3pro"
            cluster: "homelab"
    - job_name: victoriametrics
      scrape_interval: 15s
      static_configs:
        - targets:
            - "vmselect-vmcluster.victoriametrics.svc.cluster.local:8481"
            - "vminsert-vmcluster.victoriametrics.svc.cluster.local:8480"
            - "vmstorage-vmcluster-0.vmstorage-vmcluster.victoriametrics.svc.cluster.local:8482"
            - "vmstorage-vmcluster-1.vmstorage-vmcluster.victoriametrics.svc.cluster.local:8482"
          labels:
            cluster: "homelab"
    - job_name: routeros
      scrape_interval: 15s
      static_configs:
        - targets:
            - "192.168.1.1"
      metrics_path: /snmp
      params:
        module:
          - mikrotik
        auth:
          - public_v2
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: "snmp-exporter-prometheus-snmp-exporter.victoriametrics.svc.cluster.local:9116"
    - job_name: k3s-kubelet
      scrape_interval: 15s
      scheme: https
      tls_config:
        insecure_skip_verify: true
      bearer_token_file: /etc/vm/secrets/vm-monitoring-token/token
      static_configs:
        - targets:
            - "192.168.1.4:10250"
          labels:
            instance: "nixos-desktop"
            cluster: "homelab"
        - targets:
            - "192.168.1.3:10250"
          labels:
            instance: "nixos.shinbunbun.com"
            cluster: "homelab"
        - targets:
            - "192.168.1.6:10250"
          labels:
            instance: "g3pro"
            cluster: "homelab"
    - job_name: k3s-cadvisor
      scrape_interval: 15s
      scheme: https
      tls_config:
        insecure_skip_verify: true
      bearer_token_file: /etc/vm/secrets/vm-monitoring-token/token
      metrics_path: /metrics/cadvisor
      static_configs:
        - targets:
            - "192.168.1.4:10250"
          labels:
            instance: "nixos-desktop"
            cluster: "homelab"
        - targets:
            - "192.168.1.3:10250"
          labels:
            instance: "nixos.shinbunbun.com"
            cluster: "homelab"
        - targets:
            - "192.168.1.6:10250"
          labels:
            instance: "g3pro"
            cluster: "homelab"
    - job_name: k3s-apiserver
      scrape_interval: 15s
      scheme: https
      tls_config:
        insecure_skip_verify: true
      bearer_token_file: /etc/vm/secrets/vm-monitoring-token/token
      static_configs:
        - targets:
            - "192.168.1.4:6444"
          labels:
            instance: "nixos-desktop"
            cluster: "homelab"
        - targets:
            - "192.168.1.3:6444"
          labels:
            instance: "nixos.shinbunbun.com"
            cluster: "homelab"
        - targets:
            - "192.168.1.6:6444"
          labels:
            instance: "g3pro"
            cluster: "homelab"
    - job_name: kube-state-metrics
      scrape_interval: 15s
      static_configs:
        - targets:
            - "kube-state-metrics.kube-system.svc.cluster.local:8080"
          labels:
            cluster: "homelab"
    - job_name: cilium-agent
      scrape_interval: 30s
      static_configs:
        - targets:
            - "192.168.1.3:9962"
            - "192.168.1.4:9962"
            - "192.168.1.6:9962"
          labels:
            cluster: "homelab"
    - job_name: hubble
      scrape_interval: 30s
      static_configs:
        - targets:
            - "192.168.1.3:9965"
            - "192.168.1.4:9965"
            - "192.168.1.6:9965"
          labels:
            cluster: "homelab"
    - job_name: hubble-relay
      scrape_interval: 30s
      static_configs:
        - targets:
            - "hubble-relay-metrics.kube-system.svc.cluster.local:9966"
          labels:
            cluster: "homelab"
