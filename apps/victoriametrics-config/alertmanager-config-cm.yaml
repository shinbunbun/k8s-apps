# Alertmanager 設定
#
# NixOS の alertmanager.nix から移植。
# Discord webhook URL は Secret (alertmanager-discord) から環境変数で注入。
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: discord
      group_by:
        - alertname
        - cluster
        - service
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      routes:
        - match:
            severity: critical
          receiver: discord
          repeat_interval: 15m
        - match:
            severity: warning
          receiver: discord
          repeat_interval: 30m

    receivers:
      - name: discord
        discord_configs:
          - webhook_url: "$DISCORD_WEBHOOK_URL"
            send_resolved: true

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal:
          - alertname
          - instance
