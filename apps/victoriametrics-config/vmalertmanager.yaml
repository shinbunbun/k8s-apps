# VMAlertmanager - アラート通知管理
#
# vmalert から受信したアラートをグルーピング・抑制し、Discord に通知する。
# 設定 (alertmanager.yaml) は KSOPS Secret (alertmanager-config) で管理。
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlertmanager
metadata:
  name: alertmanager
  namespace: victoriametrics
spec:
  replicaCount: 1
  configSecret: alertmanager-config
