# VMAlertmanager - アラート通知管理
#
# vmalert から受信したアラートをグルーピング・抑制し、Discord に通知する。
# 具体的な receiver/route 設定は VMAlertmanagerConfig (vmalertmanagerconfig.yaml) で定義。
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlertmanager
metadata:
  name: alertmanager
  namespace: victoriametrics
spec:
  replicaCount: 1
  selectAllByDefault: true
  disableNamespaceMatcher: true
