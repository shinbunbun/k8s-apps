# VMAgent - メトリクス収集エージェント (HA: 2 レプリカ)
#
# 全ターゲットを両レプリカがスクレイプし、VMCluster の vminsert に remote_write。
# 重複データは vmstorage/vmselect の dedup.minScrapeInterval=15s で排除。
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAgent
metadata:
  name: vmagent
  namespace: victoriametrics
spec:
  replicaCount: 2
  # VMServiceScrape / VMPodScrape / VMRule / VMProbe などのリソースを
  # ラベル/namespace セレクタの有無によらず全て拾う。
  # (未指定時の挙動は VM Operator のバージョン依存なので明示する)
  selectAllByDefault: true
  remoteWrite:
    - url: "http://vminsert-vmcluster.victoriametrics.svc.cluster.local:8480/insert/0/prometheus/api/v1/write"
  additionalScrapeConfigs:
    name: vmagent-scrape-config
    key: scrape-config.yaml
  secrets:
    - vm-monitoring-token
  # ストレージ削減: ヒストグラムの *_bucket メトリクスを全 job で drop。
  # (count/sum は残るので平均値は計算可能。quantile が必要になった場合は
  # 個別に drop 除外条件を追加する)
  inlineRelabelConfig:
    - source_labels: [__name__]
      regex: '.*_bucket$'
      action: drop
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: vmagent
                app.kubernetes.io/instance: vmagent
            topologyKey: kubernetes.io/hostname
