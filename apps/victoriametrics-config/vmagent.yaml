# VMAgent - メトリクス収集エージェント (HA: 2 レプリカ)
#
# 全ターゲットを両レプリカがスクレイプし、VMCluster の vminsert に remote_write。
# 重複データは vmstorage/vmselect の dedup.minScrapeInterval=15s で排除。
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAgent
metadata:
  name: vmagent
  namespace: victoriametrics
spec:
  replicaCount: 2
  # VMServiceScrape / VMPodScrape / VMRule / VMProbe などのリソースを
  # ラベル/namespace セレクタの有無によらず全て拾う。
  # (未指定時の挙動は VM Operator のバージョン依存なので明示する)
  selectAllByDefault: true
  # Operator デフォルトの limits.cpu=200m では Cilium/Hubble の VMPodScrape
  # 追加 (scrape job 13 → 27 / target ~80) 後に CFS throttling が発生し、
  # scrape_duration が 0.1〜30s のバイモーダルに乱高下 → rate() の分母が歪み
  # Node Exporter ダッシュボード等の CPU 使用率が負値になる事象が起きた。
  # 実測で throttle ratio 54–100% を観測したため明示的に引き上げる。
  resources:
    requests:
      cpu: "500m"
      memory: "500Mi"
    limits:
      cpu: "2000m"
      memory: "1Gi"
  remoteWrite:
    - url: "http://vminsert-vmcluster.victoriametrics.svc.cluster.local:8480/insert/0/prometheus/api/v1/write"
  additionalScrapeConfigs:
    name: vmagent-scrape-config
    key: scrape-config.yaml
  secrets:
    - vm-monitoring-token
  # ストレージ削減: ヒストグラムの *_bucket メトリクスを全 job で drop。
  # (count/sum は残るので平均値は計算可能。quantile が必要になった場合は
  # 個別に drop 除外条件を追加する)
  inlineRelabelConfig:
    - source_labels: [__name__]
      regex: '.*_bucket$'
      action: drop
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: vmagent
                app.kubernetes.io/instance: vmagent
            topologyKey: kubernetes.io/hostname
