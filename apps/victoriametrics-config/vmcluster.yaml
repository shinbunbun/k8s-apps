# VMCluster - VictoriaMetrics HA クラスタ
#
# vminsert x2 + vmstorage x2 + vmselect x2 で HA 構成。
# replicationFactor=2 により全データが両方の vmstorage に複製される。
# ストレージは local-path (CNPG と同じパターン: アプリ層で冗長化済みのため DRBD 不要)。
#
# image.tag を明示 pin する理由:
# v1.140.0 の MetricsQL に "X - (a + b + c)" を "X - a + b + c" として評価する
# 既知バグがあり、Node Exporter ダッシュボードの Memory used 等が誤値を返す。
# 修正は v1.141.0 (https://github.com/VictoriaMetrics/VictoriaMetrics/issues/10856)。
# Operator chart のデフォルト tag に追従されると次回の意図しない bump で再混入し得るため
# 明示固定。
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMCluster
metadata:
  name: vmcluster
  namespace: victoriametrics
spec:
  retentionPeriod: "1y"
  replicationFactor: 2

  vmstorage:
    replicaCount: 2
    image:
      tag: v1.142.0-cluster
    extraArgs:
      dedup.minScrapeInterval: "15s"
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          resources:
            requests:
              storage: 10Gi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vmstorage
                  app.kubernetes.io/instance: vmcluster
              topologyKey: kubernetes.io/hostname

  vmselect:
    replicaCount: 2
    image:
      tag: v1.142.0-cluster
    extraArgs:
      dedup.minScrapeInterval: "15s"
      replicationFactor: "2"
      search.skipSlowReplicas: "true"
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vmselect
                  app.kubernetes.io/instance: vmcluster
              topologyKey: kubernetes.io/hostname

  vminsert:
    replicaCount: 2
    image:
      tag: v1.142.0-cluster
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vminsert
                  app.kubernetes.io/instance: vmcluster
              topologyKey: kubernetes.io/hostname
