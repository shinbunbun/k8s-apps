# VMCluster - VictoriaMetrics HA クラスタ
#
# vminsert x2 + vmstorage x2 + vmselect x2 で HA 構成。
# replicationFactor=2 により全データが両方の vmstorage に複製される。
# ストレージは local-path (CNPG と同じパターン: アプリ層で冗長化済みのため DRBD 不要)。
#
# image.tag を明示 pin する理由:
# v1.140.0 の MetricsQL に "X - (a + b + c)" を "X - a + b + c" として評価する
# 既知バグがあり、Node Exporter ダッシュボードの Memory used 等が誤値を返す。
# 修正は v1.141.0 (https://github.com/VictoriaMetrics/VictoriaMetrics/issues/10856)。
# Operator chart のデフォルト tag に追従されると次回の意図しない bump で再混入し得るため
# 明示固定。
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMCluster
metadata:
  name: vmcluster
  namespace: victoriametrics
spec:
  retentionPeriod: "1y"
  replicationFactor: 2

  vmstorage:
    replicaCount: 2
    image:
      tag: v1.142.0-cluster
    extraArgs:
      dedup.minScrapeInterval: "15s"
    # Operator デフォルトの memory limit 1500Mi では vmstorage-1 が常時 ~1.49GB
    # まで張り付いて OOMKilled が発生 (2026-05-12)。
    # -memory.allowedPercent=60 default のため limit の 60% を cache に使う想定で
    # 2500Mi に引き上げる。replica 間の使用量偏りは別途調査予定。
    resources:
      limits:
        cpu: "1"
        memory: 2500Mi
      requests:
        cpu: 250m
        memory: 1000Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          resources:
            requests:
              storage: 10Gi
    affinity:
      # 2026-05-26: g3pro (Intel N150) の disk I/O 飽和を回避するため、
      # データプレーン重要 Pod は preferred で g3pro を避ける。詳細は
      # apps/garage/ と Pyroscope flush timeout 調査結果を参照。
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values:
                    - g3pro
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vmstorage
                  app.kubernetes.io/instance: vmcluster
              topologyKey: kubernetes.io/hostname

  vmselect:
    replicaCount: 2
    image:
      tag: v1.142.0-cluster
    extraArgs:
      dedup.minScrapeInterval: "15s"
      replicationFactor: "2"
      search.skipSlowReplicas: "true"
    affinity:
      # g3pro 退避 (上記 vmstorage 参照)
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values:
                    - g3pro
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vmselect
                  app.kubernetes.io/instance: vmcluster
              topologyKey: kubernetes.io/hostname

  vminsert:
    replicaCount: 2
    image:
      tag: v1.142.0-cluster
    affinity:
      # g3pro 退避 (上記 vmstorage 参照)。
      # 現状 vminsert 2 replica が podAntiAffinity preferred のみで g3pro に
      # 両方 schedule されており、Garage S3 traffic が garage-1 (g3pro) に
      # 偏ってる主因の 1 つ。
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values:
                    - g3pro
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vminsert
                  app.kubernetes.io/instance: vmcluster
              topologyKey: kubernetes.io/hostname
