# VMRule - アラートルール
#
# alert-rules.nix と同一のルールを VMRule CRD で定義。
# VM Operator が自動的に vmalert にマウントする。
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: alert-rules
  namespace: victoriametrics
spec:
  groups:
  - name: system
    interval: 30s
    rules:
      # インスタンスダウン
      - alert: InstanceDown
        expr: "up == 0"
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 2 minutes."

      # 高CPU使用率
      - alert: HighCPUUsage
        expr: '(1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance)) * 100 > 80'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 80% (current value: {{ $value }}%)"

      # 高メモリ使用率
      - alert: HighMemoryUsage
        expr: "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85"
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 85% (current value: {{ $value }}%)"

      # メモリ不足クリティカル
      - alert: CriticalMemoryUsage
        expr: "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90"
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 90% (current value: {{ $value }}%). System may become unstable."

      # ディスク容量不足
      - alert: DiskSpaceLow
        expr: '(node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs"} - node_filesystem_free_bytes{fstype!~"tmpfs|fuse.lxcfs"}) / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs"} * 100 > 85'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk usage is above 85% on {{ $labels.mountpoint }} (current value: {{ $value }}%)"

      # Swap使用量警告
      - alert: HighSwapUsage
        expr: '(1 - (node_memory_SwapFree_bytes{instance!="shinbunbun-macmini"} / node_memory_SwapTotal_bytes{instance!="shinbunbun-macmini"})) * 100 > 50'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High swap usage on {{ $labels.instance }}"
          description: "Swap usage is above 50% (current value: {{ $value }}%). This may indicate memory pressure."

      # RouterOS CPU高使用率
      - alert: RouterOSHighCPU
        expr: 'mktxp_system_cpu_load{job="routeros"} > 80'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on RouterOS"
          description: "RouterOS CPU usage is above 80% (current value: {{ $value }}%)"

      # RouterOS再起動検知 (uptime が 10 分未満 = 再起動直後。resets() は VM で誤検出するため不採用)
      - alert: RouterOSRestarted
        expr: 'mktxp_system_uptime{job="routeros"} < 600'
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "RouterOS has been restarted"
          description: "RouterOS uptime is {{ $value }}s (<10m), indicating a recent restart"

      # DHCP枯渇警告 (IPv4 pool=dhcp、/ip pool ranges=192.168.1.2-253 → 252 addr)
      - alert: DHCPPoolNearExhaustion
        expr: 'mktxp_ip_pool_used{job="routeros",pool="dhcp"} / 252 > 0.85'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "DHCP pool near exhaustion ({{ $value | humanizePercentage }})"
          description: "IPv4 DHCP pool usage is above 85% ({{ $value | humanizePercentage }} of 252 addr). Consider extending the pool range or reducing lease time."

      # インターフェースエラー率
      - alert: RouterOSHighErrorRate
        expr: 'rate(mktxp_interface_rx_error_total{job="routeros"}[5m]) > 100 or rate(mktxp_interface_tx_error_total{job="routeros"}[5m]) > 100'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High interface error rate on RouterOS"
          description: "Interface {{ $labels.name }} experiencing high error rate ({{ $value }} errors/sec)"

      # パケットドロップ率
      - alert: RouterOSHighPacketDropRate
        expr: 'rate(mktxp_interface_rx_drop_total{job="routeros"}[5m]) > 1000 or rate(mktxp_interface_tx_drop_total{job="routeros"}[5m]) > 1000'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High packet drop rate on RouterOS interface"
          description: "Interface {{ $labels.name }} is dropping packets at {{ $value }} packets/sec"

      # インターフェース帯域使用率 (mktxp_interface_rate は monitor collector がリンク速度 Mbps を返すため /1e6 で比率化)
      # VictoriaMetrics の MetricsQL は `vector / (vector * scalar)` の括弧を尊重せず
      # `vector / vector * scalar` (左結合) として評価するため、連続除算 `... / rate / 1e6` で同じ式を表現する。
      - alert: RouterOSHighBandwidthUsage
        expr: '(rate(mktxp_interface_rx_byte_total{job="routeros"}[5m]) * 8 / mktxp_interface_rate{job="routeros"} / 1000000 > 0.8) or (rate(mktxp_interface_tx_byte_total{job="routeros"}[5m]) * 8 / mktxp_interface_rate{job="routeros"} / 1000000 > 0.8)'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High bandwidth usage on RouterOS interface"
          description: "Interface {{ $labels.name }} is using more than 80% of its bandwidth ({{ $value | humanizePercentage }})"

      # ネットワークインターフェースダウン
      - alert: NetworkInterfaceDown
        expr: 'node_network_up{device!~"lo|docker.*|veth.*|br.*|tap.*|tun.*|wlp[0-9]s0|wg.*|flannel.*|enp4s0|enp6s0f1|utun.*|awdl.*|llw.*|bridge.*|gif.*|stf.*|ap.*"} == 0'
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Network interface {{ $labels.device }} down on {{ $labels.instance }}"
          description: "Network interface {{ $labels.device }} has been down for more than 2 minutes."

      # 高ネットワークトラフィック（受信）
      - alert: HighNetworkTrafficIn
        expr: "rate(node_network_receive_bytes_total[5m]) > 100000000"
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High network traffic (inbound) on {{ $labels.instance }}"
          description: "Network interface {{ $labels.device }} is receiving more than 100MB/s (current: {{ $value | humanize }}B/s)"

      # 高ネットワークトラフィック（送信）
      - alert: HighNetworkTrafficOut
        expr: "rate(node_network_transmit_bytes_total[5m]) > 100000000"
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High network traffic (outbound) on {{ $labels.instance }}"
          description: "Network interface {{ $labels.device }} is transmitting more than 100MB/s (current: {{ $value | humanize }}B/s)"

      # 受信パケットドロップ率（実際のパケットロス検出）
      # node_network_receive_errs_total は ixgbe 等で RLEC (length field mismatch) を
      # cosmetic にカウントし実害ゼロでも発火するため使わず、drop ベースに変更。
      - alert: HighPacketDropsReceive
        expr: 'rate(node_network_receive_drop_total{device!~"lo|docker.*|veth.*|br.*|tap.*|tun.*|wlp[0-9]s0|wg.*|flannel.*|enp4s0|enp6s0f1|utun.*|awdl.*|llw.*|bridge.*|gif.*|stf.*|ap.*|cilium_.*|lxc.*"}[5m]) > 1'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High packet drops on {{ $labels.instance }} {{ $labels.device }}"
          description: "Network interface {{ $labels.device }} is dropping more than 1 packet/sec (current: {{ $value | humanize }} pkts/sec)"

      # systemdサービス停止
      - alert: SystemdServiceFailed
        expr: 'node_systemd_unit_state{state="failed"} == 1'
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Systemd service {{ $labels.name }} failed on {{ $labels.instance }}"
          description: "The systemd service {{ $labels.name }} is in failed state."

      # サービス再起動頻度
      - alert: SystemdServiceFlapping
        expr: 'changes(node_systemd_unit_state{state="active",name!="NetworkManager-dispatcher.service",name!="nextcloud-cron.service",name!~"github-runner-.*\\.service"}[15m]) > 3'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Systemd service {{ $labels.name }} is flapping on {{ $labels.instance }}"
          description: "The systemd service {{ $labels.name }} has restarted more than 3 times in the last 15 minutes."

      # 高ディスクI/O使用率
      - alert: HighDiskIOUtilization
        expr: "rate(node_disk_io_time_seconds_total[5m]) > 0.9"
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk I/O utilization on {{ $labels.instance }}"
          description: "Disk {{ $labels.device }} I/O utilization is above 90% (current value: {{ $value | humanizePercentage }})"

      # システムロード
      - alert: HighSystemLoad
        expr: 'node_load5 / count(node_cpu_seconds_total{mode="idle"}) by (instance) > 2'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High system load on {{ $labels.instance }}"
          description: "System load average (5m) is high relative to CPU count (current value: {{ $value }})"

      # inode使用率
      - alert: HighInodeUsage
        expr: '(1 - (node_filesystem_files_free{fstype!~"tmpfs|fuse.lxcfs"} / node_filesystem_files{fstype!~"tmpfs|fuse.lxcfs"})) * 100 > 85'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High inode usage on {{ $labels.instance }}"
          description: "Inode usage is above 85% on {{ $labels.mountpoint }} (current value: {{ $value }}%)"

      # 時刻同期ずれ
      - alert: ClockSkewDetected
        expr: "abs(node_timex_offset_seconds) > 10"
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Clock skew detected on {{ $labels.instance }}"
          description: "System clock is {{ $value }} seconds off from NTP time. This may cause issues with time-sensitive operations."

      # NTP同期失敗
      - alert: NTPSyncFailed
        expr: "node_timex_sync_status == 0"
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "NTP synchronization failed on {{ $labels.instance }}"
          description: "System is not synchronized with NTP servers for more than 10 minutes."

      # RouterOSバックアップ失敗（homeMachineのみ）
      - alert: RouterOSBackupFailed
        expr: 'node_systemd_unit_state{name="routeros-backup.service",state="failed",instance="nixos.shinbunbun.com"} == 1'
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "RouterOS backup service failed on {{ $labels.instance }}"
          description: "RouterOS backup service has been in failed state for more than 5 minutes. Check logs: journalctl -u routeros-backup.service"

      # RouterOSバックアップ長時間未実行（homeMachineのみ）
      - alert: RouterOSBackupStale
        expr: 'time() - node_systemd_timer_last_trigger_seconds{name="routeros-backup.timer",instance="nixos.shinbunbun.com"} > 90000'
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "RouterOS backup has not run for more than 25 hours"
          description: "RouterOS backup timer has not triggered for {{ $value | humanizeDuration }}."

  # RouterOS専用グループ
  - name: routeros
    interval: 30s
    rules:
      # RouterOSインターフェースダウン（重要IFのみ: ether1/ether3(WAN)/ether4/wg-home/ipipv6-tunnel1）
      - alert: RouterOSInterfaceDown
        expr: 'mktxp_interface_running{job="routeros",name=~"ether1|ether3|ether4|wg-home|ipipv6-tunnel1"} == 0'
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "RouterOS interface {{ $labels.name }} is down"
          description: "Interface {{ $labels.name }} on RouterOS has been down for more than 2 minutes."

      # RouterOSインターフェースエラー率 (物理 interface)
      - alert: RouterOSInterfaceErrors
        expr: '(rate(mktxp_interface_rx_error_total{job="routeros",name!="wg-home"}[5m]) > 0.01 or rate(mktxp_interface_tx_error_total{job="routeros",name!="wg-home"}[5m]) > 0.01)'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on RouterOS interface {{ $labels.name }}"
          description: "Interface {{ $labels.name }} is experiencing high error rates ({{ $value }} errors/sec)."

      # RouterOSインターフェースエラー率 (wg-home 専用)
      # wg-home は GitHub Actions runner 向け動的 peer の teardown 後に
      # TCP retransmit tail が RouterOS で drop され tx-error burst
      # (2-3 min, peak ~4 err/s) を生じる。これは WireGuard + 動的 peer + TCP の
      # 組み合わせ上避けられない自然な挙動で interface 障害ではない。
      # rate[10m] + for:15m で burst を許容しつつ持続的な異常のみ検知する。
      # interface down 自体は別アラート RouterOSInterfaceDown (for:2m) でカバー。
      - alert: RouterOSInterfaceErrorsWg
        expr: 'rate(mktxp_interface_rx_error_total{job="routeros",name="wg-home"}[10m]) > 0.5 or rate(mktxp_interface_tx_error_total{job="routeros",name="wg-home"}[10m]) > 0.5'
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on RouterOS interface {{ $labels.name }}"
          description: "Interface {{ $labels.name }} is experiencing high error rates ({{ $value }} errors/sec)."

      # RouterOSメモリ使用率
      - alert: RouterOSHighMemoryUsage
        expr: '((mktxp_system_total_memory{job="routeros"} - mktxp_system_free_memory{job="routeros"}) / mktxp_system_total_memory{job="routeros"}) * 100 > 85'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on RouterOS"
          description: "RouterOS memory usage is above 85% (current: {{ $value }}%)"

      # RouterOSディスク使用率
      - alert: RouterOSDiskSpaceLow
        expr: '((mktxp_system_total_hdd_space{job="routeros"} - mktxp_system_free_hdd_space{job="routeros"}) / mktxp_system_total_hdd_space{job="routeros"}) * 100 > 85'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on RouterOS"
          description: "RouterOS disk usage is above 85% (current: {{ $value }}%)"

      # RouterOS WireGuardインターフェース監視
      - alert: RouterOSWireGuardDown
        expr: 'mktxp_interface_running{job="routeros",name="wg-home"} == 0'
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "WireGuard interface is down"
          description: "WireGuard interface (wg-home) has been down for more than 2 minutes."

      # v6plus/MAP-E トンネルダウン（IPv4 WAN）
      - alert: RouterOSV6PlusTunnelDown
        expr: 'mktxp_interface_running{job="routeros",name="ipipv6-tunnel1"} == 0'
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "RouterOS v6plus tunnel (ipipv6-tunnel1) is down"
          description: "IPv6-in-IPv4 tunnel has been down for 2 minutes — IPv4 WAN connectivity is affected."

      # WAN 物理 IF (ether3) トラフィック停止
      - alert: RouterOSWANNoTraffic
        expr: 'rate(mktxp_interface_rx_byte_total{job="routeros",name="ether3"}[10m]) == 0'
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "No inbound traffic on RouterOS WAN (ether3)"
          description: "No inbound traffic detected on physical WAN interface for 10 minutes."

      # 上流到達性 (mktxp_netwatch). status==0 = DOWN, 1 = UP
      - alert: RouterOSNetwatchDown
        expr: 'mktxp_netwatch_status{job="routeros"} == 0'
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "RouterOS netwatch target {{ $labels.name }} is DOWN"
          description: "ICMP probe to {{ $labels.name }} from RouterOS has failed for 2 minutes. Upstream / path issue suspected."

      # netwatch 高パケットロス (10% 以上が 5 分継続)
      - alert: RouterOSNetwatchHighLoss
        expr: 'mktxp_netwatch_icmp_loss_percent{job="routeros"} > 10'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RouterOS netwatch high loss to {{ $labels.name }} ({{ $value }}%)"
          description: "ICMP packet loss to {{ $labels.name }} > 10% for 5 minutes (current {{ $value }}%). Upstream degradation."

      # パケットドロップ率 (mktxp では drop が IF-MIB ifInDiscards 相当)
      - alert: RouterOSPacketDiscardsHigh
        expr: 'rate(mktxp_interface_rx_drop_total{job="routeros"}[5m]) > 100 or rate(mktxp_interface_tx_drop_total{job="routeros"}[5m]) > 100'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High packet drop rate on RouterOS interface {{ $labels.name }}"
          description: "Interface {{ $labels.name }} is dropping packets at > 100/s (current: {{ $value }}/s)"

      # IP connection tracking スパイク検知
      - alert: RouterOSFWConnectionsSpike
        expr: 'mktxp_ip_connections_total{job="routeros"} > 10000'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RouterOS connection tracking table spike"
          description: "Active IP connections count is {{ $value }} (threshold 10000). May indicate port scan or traffic anomaly."

      # BGP セッションダウン (k3s ノードへの peer)
      - alert: RouterOSBGPSessionDown
        expr: 'mktxp_bgp_established{job="routeros"} == 0'
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "RouterOS BGP session down ({{ $labels.name }})"
          description: "BGP session {{ $labels.name }} is not in established state for 2 minutes. k3s LoadBalancer IP announcement affected."

      # BGP セッション flap 検知 (established だが uptime が短い状態が継続)
      - alert: RouterOSBGPSessionFlapping
        expr: 'mktxp_bgp_established{job="routeros"} == 1 and mktxp_bgp_uptime{job="routeros"} / 1000 < 300'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "RouterOS BGP session flapping ({{ $labels.name }})"
          description: "Session uptime has stayed below 300s for 10 minutes — peer keeps resetting."

      # BGP established だが prefix を受信できていない (Cilium 側 advertise 停止)
      - alert: RouterOSBGPNoPrefixesReceived
        expr: 'mktxp_bgp_established{job="routeros"} == 1 and mktxp_bgp_prefix_count{job="routeros"} == 0'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RouterOS BGP session has no received prefixes ({{ $labels.name }})"
          description: "Session {{ $labels.name }} is up but 0 prefixes are being received. Cilium on the peer may have stopped advertising LoadBalancer IPs."

      # インターフェース Link flap (重要 IF のみ)
      - alert: RouterOSInterfaceLinkFlap
        expr: 'increase(mktxp_link_downs_total{job="routeros",name=~"ether1|ether3|ether4|wg-home|ipipv6-tunnel1|bridge1"}[1h]) >= 3'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RouterOS interface {{ $labels.name }} link flapping"
          description: "Interface {{ $labels.name }} has flapped {{ $value }} times in the last hour."

      # Address list のエントリ数変化検知 (セキュリティ監査目的)
      # wg-admin / deploy-servers は手動管理のリストで、自動変更は想定外。
      # wg-ci は peer-issuer が 10.66.66.64/26 プールを自動発行/回収するため対象外。
      - alert: RouterOSAddressListChanged
        expr: 'changes(mktxp_firewall_address_list_selected_count{job="routeros",list=~"wg-admin|deploy-servers"}[10m]) > 0'
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "RouterOS address list {{ $labels.list }} was modified"
          description: "Entry count of address list {{ $labels.list }} changed in the last 10 minutes. Verify the change was intended."

      # DNS キャッシュ使用率 (cache-size 拡張推奨の予兆)
      # cache 満杯は "full, not storing" error ログとして現れるが、ログ依存だと閾値調整
      # できない & 満杯後検知なので手遅れ気味。メトリクスで 90% 30m 継続を捕捉する。
      - alert: RouterOSDNSCacheNearFull
        expr: 'mktxp_dns_info{job="routeros",property="cache_used"} / ignoring(property) mktxp_dns_info{job="routeros",property="cache_size"} > 0.9'
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "RouterOS DNS cache usage {{ $value | humanizePercentage }}"
          description: "/ip dns set cache-size=<N>KiB で容量拡張を推奨 (現在の消費: {{ $value | humanizePercentage }} が 30 分継続)"

  # ディスクヘルスグループ
  - name: disk-health
    interval: 30s
    rules:
      # ディスクエラー検知（SMART）
      - alert: DiskSMARTErrors
        expr: "node_disk_read_errors_total > 0 or node_disk_write_errors_total > 0"
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk errors detected on {{ $labels.instance }}"
          description: "Disk {{ $labels.device }} is reporting read/write errors. Check disk health immediately."

      # smartctl_exporter 自体が応答しない（USB drop / SCSI offline 検知）
      # nixos-desktop の外付け USB HDD が 23 日間 SCSI offline で気付かなかった事例の対策
      - alert: SmartctlExporterDown
        expr: 'up{job="smartctl-exporter"} == 0'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "smartctl-exporter on {{ $labels.instance }} is not responding"
          description: "Disk health metrics unavailable for >5min. USB-SATA bridge offline or service stopped."

      # SMART 全体ヘルス NG
      - alert: SmartDeviceFailing
        expr: 'smartctl_device_smart_status == 0'
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "SMART overall health FAILED on {{ $labels.instance }} {{ $labels.device }}"
          description: "Disk overall health self-assessment indicates impending failure. Replace disk."

      # 代替セクタ発生
      - alert: SmartReallocatedSectors
        expr: 'smartctl_device_attribute{attribute_name="Reallocated_Sector_Ct",attribute_value_type="raw"} > 0'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Reallocated sectors on {{ $labels.instance }} {{ $labels.device }}"
          description: "Disk has reallocated {{ $value }} sectors. Predictive failure indicator."

      # Pending sector 発生
      - alert: SmartPendingSectors
        expr: 'smartctl_device_attribute{attribute_name="Current_Pending_Sector",attribute_value_type="raw"} > 0'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pending sectors on {{ $labels.instance }} {{ $labels.device }}"
          description: "Disk has {{ $value }} pending sectors awaiting reallocation."

      # Load_Cycle_Count が設計限界（600,000）の 200% 超過
      # nixos-desktop の MQ04UBD200 は 2026-04 時点で既に 804,140
      - alert: SmartLoadCycleHigh
        expr: 'smartctl_device_attribute{attribute_name="Load_Cycle_Count",attribute_value_type="raw"} > 1200000'
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "High Load_Cycle_Count on {{ $labels.instance }} {{ $labels.device }}"
          description: "Load Cycle count is {{ $value }} (>200% of 600k design limit). Mechanical wear; consider replacement."

      # ファイルシステムが read-only に切り替わった（ext4 errors=remount-ro 検知）
      # apfs は macOS の SSV (Signed System Volume) で設計上 / が常時 read-only のため除外
      - alert: FilesystemReadOnly
        expr: 'node_filesystem_readonly{fstype!~"tmpfs|fuse.lxcfs|squashfs|iso9660|ramfs|apfs"} == 1'
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is read-only"
          description: "Likely ext4 errors=remount-ro triggered by I/O errors. Investigate disk health and dmesg."

  # Kubernetes監視グループ
  - name: kubernetes
    interval: 30s
    rules:
      # k3s API Serverダウン
      - alert: K3sAPIServerDown
        expr: 'up{job="k3s-apiserver"} == 0'
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "k3s API server is down"
          description: "k3s API server has been unreachable for more than 2 minutes."

      # apiserver の kubelet client (HTTP/2 接続プール) が dead-but-cached state に
      # 陥ったときの検知。修復は当該 instance のノードで k3s 再起動。
      - alert: ApiserverKubeletProxyHighFailureRatio
        expr: |
          sum by (instance) (rate(apiserver_request_total{job="k3s-apiserver",resource="nodes",subresource="proxy",code=~"5.."}[5m]))
          /
          sum by (instance) (rate(apiserver_request_total{job="k3s-apiserver",resource="nodes",subresource="proxy"}[5m]))
          > 0.5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "apiserver {{ $labels.instance }} failing kubelet proxy (>50% 5xx)"
          description: "{{ $labels.instance }} returns 5xx for >50% of /api/v1/nodes/*/proxy/* requests over 5m. Likely a stuck HTTP/2 connection in the apiserver's kubelet client cache. Restart k3s on this node to clear the connection pool."

      # ノード未準備
      - alert: KubeNodeNotReady
        expr: 'kube_node_status_condition{condition="Ready",status="true"} == 0'
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Kubernetes node {{ $labels.node }} is not ready"
          description: "Node {{ $labels.node }} has been in NotReady state for more than 5 minutes."

      # Pod CrashLooping
      # kube-prometheus-stack 方式: Gauge メトリクスで判定する。
      # increase() 方式は scrape 系列リセットで counter reset として誤検知するため採用しない。
      - alert: KubePodCrashLooping
        expr: 'max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff",job="kube-state-metrics"}[5m]) >= 1'
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
          description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} is in CrashLoopBackOff state."

      # Pod未準備
      - alert: KubePodNotReady
        expr: 'kube_pod_status_phase{phase=~"Pending|Unknown|Failed"} == 1'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not ready"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in {{ $labels.phase }} state for more than 10 minutes."

      # Deploymentレプリカ不一致
      - alert: KubeDeploymentReplicaMismatch
        expr: "kube_deployment_spec_replicas != kube_deployment_status_available_replicas"
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replica mismatch"
          description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has {{ $value }} available replicas, expected {{ $labels.spec_replicas }}."

      # コンテナOOMKill
      - alert: KubeContainerOOMKilled
        expr: 'kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1'
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} was OOM killed"
          description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} was terminated due to OOM."

      # コンテナ高CPU使用率（絶対値。limit を持たない重い pod を発見する用途）
      - alert: KubeContainerHighCPU
        expr: 'rate(container_cpu_usage_seconds_total{container!="",container!="POD"}[5m]) > 0.9'
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} high CPU usage"
          description: "Container {{ $labels.container }} is using {{ $value }} CPU cores for more than 10 minutes."

      # コンテナ CPU が limit の 80% 以上（相対比。limit に張り付く前段階で検知）
      - alert: KubeContainerCPUNearLimit
        expr: |
          sum by (namespace, pod, container) (rate(container_cpu_usage_seconds_total{container!="",container!="POD"}[5m]))
          / on(namespace, pod, container) group_left
          sum by (namespace, pod, container) (kube_pod_container_resource_limits{resource="cpu"}) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} approaching CPU limit"
          description: "Container is using {{ $value | humanizePercentage }} of its CPU limit for more than 10 minutes. Consider raising the limit before throttling degrades behavior."

      # コンテナ CPU throttling（limit に達して実行がスケジューリング待ちになっている）
      # container!="" フィルタで pod レベル cgroup (container="") と container レベルの重複集計を避ける
      - alert: KubeContainerCPUThrottling
        expr: |
          sum by (namespace, pod, container) (rate(container_cpu_cfs_throttled_periods_total{container!="",container!="POD"}[5m]))
          / sum by (namespace, pod, container) (rate(container_cpu_cfs_periods_total{container!="",container!="POD"}[5m])) > 0.25
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} is CPU throttled"
          description: "Container is throttled in {{ $value | humanizePercentage }} of CFS periods for more than 10 minutes. Raise limits.cpu or reduce workload."

      # スクレイプ時間が長すぎる（scrape_interval 15s に対し 5s 超は rate() 分母が歪むため）
      - alert: ScrapeSlow
        expr: 'scrape_duration_seconds > 5'
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Slow scrape: job={{ $labels.job }} instance={{ $labels.instance }}"
          description: "scrape_duration_seconds = {{ $value }}s, exceeds scrape_interval/3. rate() timestamp spacing is drifting; check VMAgent throttling or target responsiveness."

  # ログベースのアラートグループ（メトリクスベース）
  - name: logs
    interval: 30s
    rules:
      # Promtailのログ取り込み遅延
      - alert: LogIngestionLag
        expr: "(time() - max(promtail_stream_lag_seconds)) > 60"
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Log ingestion lag detected"
          description: "Promtail is {{ $value }} seconds behind in processing logs"

      # Promtailのログドロップ検知
      - alert: PromtailDroppedLogs
        expr: "rate(promtail_dropped_entries_total[5m]) > 0"
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Promtail is dropping logs"
          description: "Promtail dropped {{ $value }} logs/sec in the last 5 minutes"

      # Lokiのインジェスト失敗
      - alert: LokiIngestionErrors
        expr: 'rate(loki_ingester_chunks_flushed_total{success="false"}[5m]) > 0'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Loki ingestion errors detected"
          description: "Loki failed to flush {{ $value }} chunks/sec"

      # Lokiクエリ遅延
      - alert: LokiQueryLatency
        expr: 'histogram_quantile(0.95, rate(loki_request_duration_seconds_bucket{route=~"loki_api_v1_query|loki_api_v1_query_range"}[5m])) > 10'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Loki query latency"
          description: "95th percentile query latency is {{ $value }} seconds"

  # Garage クラスタ健全性監視
  # ディスク容量はノード全体 (ホスト FS) に対する監視が `DiskSpaceLow` (上記 system-alerts
  # グループ、85% 閾値) で既に担保されている。
  # local-path provisioner は PVC スコープの容量メトリクスを提供せず、Garage 自身の
  # `garage_local_disk_*` も基盤 FS の値をそのまま返すため、PVC 別の容量監視はできない
  # (Garage が 340 MiB しか使っていなくてもホスト FS の他ワークロードで発火するため廃止)。
  # bucket 別の実使用量を追うには `garage bucket list` を CronJob 化して Pushgateway に
  # 流すか、別 exporter を書く必要があり、本 rule では対象外。
  - name: storage-capacity
    interval: 60s
    rules:
      # Garage クラスタ健全性 (いずれかノード断絶) —
      # write quorum (RF=3, consistent) は 2/3 で維持されるが検知対象
      # job="garage" で他 exporter の同名メトリクスとの衝突を避ける
      - alert: GarageClusterUnhealthy
        expr: 'cluster_healthy{job="garage"} == 0'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Garage cluster unhealthy (node disconnected)"
          description: "At least one Garage storage node is not connected. connected={{ with query \"cluster_storage_nodes_ok{job=\\\"garage\\\"}\" }}{{ . | first | value }}{{ end }}, total={{ with query \"cluster_storage_nodes{job=\\\"garage\\\"}\" }}{{ . | first | value }}{{ end }}. Check node/pod state."

      # Loki ingestion レート急上昇 (10 分平均が 1 時間平均の 2 倍超)
      # 設定ミスや意図しないログ増加の検知 (Parquet 側にも影響する)
      - alert: LokiIngestionRateSpike
        expr: |
          sum(rate(loki_distributor_bytes_received_total[10m]))
            > 2 * sum(rate(loki_distributor_bytes_received_total[1h]))
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Loki ingestion rate spike detected"
          description: "Loki ingestion is at {{ $value | humanize }}B/s, over 2x the hourly average. Check for runaway log sources."

  # 日次 logs-compact CronJob (Phase 2c) の失敗監視
  # CronJob は毎日 01:00 JST に走り、source 別に Garage logs-archive/raw/
  # を Parquet に集約する。失敗が放置されると raw/ が溜まり続けるため検知する。
  - name: log-compaction
    interval: 60s
    rules:
      # 26 時間以上 (= 24h cron 1 周期 + 余裕 2h) 成功実績がない。
      # 自動実行 (1 日 1 回) が失敗 or 動いていないことを意味する。手動 retry は
      # last_successful_time を更新するので false positive にならない。
      - alert: LogsCompactCronJobNoRecentSuccess
        expr: |
          (time() - kube_cronjob_status_last_successful_time{
            cronjob="logs-compact",
            namespace="logs-compact-cronjob"
          }) > 60 * 60 * 26
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "logs-compact CronJob has no successful run in over 26h"
          description: |
            {{ $labels.namespace }}/{{ $labels.cronjob }} の最後の成功実行から
            {{ $value | humanizeDuration }} 経過。01:00 JST の日次 compaction が
            失敗している可能性。`kubectl -n logs-compact-cronjob get jobs,pods`
            と Loki の `{namespace="logs-compact-cronjob"}` で確認すること。

      # 自動実行 Job (CronJob 由来、名前末尾が数値タイムスタンプ) が backoffLimit
      # 到達で Failed。手動 trigger (logs-compact-{retry,dbg,manual,macos}-*) は
      # 除外して、本番自動実行のみ拾う。
      - alert: LogsCompactJobFailed
        expr: |
          sum by (namespace, job_name) (
            kube_job_failed{
              condition="true",
              namespace="logs-compact-cronjob",
              job_name=~"logs-compact-[0-9]+"
            }
          ) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "logs-compact job {{ $labels.job_name }} failed"
          description: |
            {{ $labels.namespace }}/{{ $labels.job_name }} が backoffLimit に達して
            Failed。`kubectl -n logs-compact-cronjob describe job {{ $labels.job_name }}`
            と Loki の pod ログで原因確認を。
