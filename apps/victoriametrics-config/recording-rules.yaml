# Prometheus Recording Rules (YAML format)
#
# macOS (Darwin) の Node Exporter メトリクスを Linux 互換名にリマップします。
# これにより Linux 前提の Grafana ダッシュボード（Node Exporter Full 等）が
# macOS インスタンスでも正しく表示されます。
#
# このファイルは recording-rules.nix と同一のルールを YAML 形式で提供します。
# k8s 上の VictoriaMetrics (vmalert) から参照されます。
# NixOS 側は引き続き recording-rules.nix を使用します。

groups:
  - name: darwin_memory_compat
    interval: 30s
    rules:
      # 総メモリ
      - record: node_memory_MemTotal_bytes
        expr: "node_memory_total_bytes"

      # 空きメモリ
      - record: node_memory_MemFree_bytes
        expr: "node_memory_free_bytes"

      # 利用可能メモリ（free + inactive + purgeable で近似）
      - record: node_memory_MemAvailable_bytes
        expr: "node_memory_free_bytes + node_memory_inactive_bytes + node_memory_purgeable_bytes"

      # キャッシュ（inactive を cached として扱う）
      - record: node_memory_Cached_bytes
        expr: "node_memory_inactive_bytes"

      # バッファ（macOS に概念がないため 0 を返す）
      - record: node_memory_Buffers_bytes
        expr: "0 * node_memory_total_bytes"

      # 回収可能メモリ（purgeable を reclaimable として扱う）
      - record: node_memory_SReclaimable_bytes
        expr: "node_memory_purgeable_bytes"

      # Swap合計
      - record: node_memory_SwapTotal_bytes
        expr: "node_memory_swap_total_bytes"

      # Swap空き
      - record: node_memory_SwapFree_bytes
        expr: "node_memory_swap_total_bytes - node_memory_swap_used_bytes"
