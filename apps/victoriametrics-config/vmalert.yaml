# VMAlert - アラート・レコーディングルール評価
#
# vmselect にクエリしてルールを評価し、Alertmanager に通知する。
# recording rule の結果は vminsert に書き戻す。
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAlert
metadata:
  name: vmalert
  namespace: victoriametrics
spec:
  replicaCount: 1
  datasource:
    url: "http://vmselect-vmcluster.victoriametrics.svc.cluster.local:8481/select/0/prometheus"
  remoteWrite:
    url: "http://vminsert-vmcluster.victoriametrics.svc.cluster.local:8480/insert/0/prometheus"
  remoteRead:
    url: "http://vmselect-vmcluster.victoriametrics.svc.cluster.local:8481/select/0/prometheus"
  notifiers:
    - url: "http://alertmanager.victoriametrics.svc.cluster.local:9093"
  evaluationInterval: "15s"
  extraArgs:
    rule: "/etc/vmalert/rules/*.yaml"
  extraVolumeMounts:
    - name: alert-rules
      mountPath: /etc/vmalert/rules
  extraVolumes:
    - name: alert-rules
      projected:
        sources:
          - configMap:
              name: vmalert-alert-rules
          - configMap:
              name: vmalert-recording-rules
