apiVersion: apps/v1
kind: Deployment
metadata:
  name: mixi2-shinbunbun-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mixi2-shinbunbun-bot
  template:
    metadata:
      labels:
        app: mixi2-shinbunbun-bot
    spec:
      containers:
        - name: mixi2-shinbunbun-bot
          image: ghcr.io/shinbunbun/mixi2-shinbunbun-bot:latest
          ports:
            - containerPort: 8080
            - containerPort: 8081
          env:
            - name: LLM_BASE_URL
              value: "http://192.168.1.4:8082/v1"
            - name: LLM_MODEL
              value: "qwen3.6-35b-a3b"
            - name: LLM_DISABLE_THINKING
              value: "true"
          envFrom:
            - secretRef:
                name: mixi2-shinbunbun-bot-secrets
            - secretRef:
                name: mixi2-shinbunbun-bot-github-secrets
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 10
