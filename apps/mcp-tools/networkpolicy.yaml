# defense-in-depth: cluster internal で十分だが他 namespace からのアクセスは絞る
# - mcp-grafana: librechat namespace からのみ ingress 許可 (mcpo 撤去後 LibreChat が直接接続)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-grafana-allow-clients
spec:
  podSelector:
    matchLabels:
      app: mcp-grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: librechat
      ports:
        - protocol: TCP
          port: 8000
