apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcpo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcpo
  template:
    metadata:
      labels:
        app: mcpo
    spec:
      containers:
        - name: mcpo
          image: ghcr.io/open-webui/mcpo:0.0.20
          args:
            - "--port"
            - "8000"
            - "--config"
            - "/etc/mcpo/config.json"
            - "--api-key"
            - "$(MCPO_API_KEY)"
            - "--hot-reload"
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MCPO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mcp-tools-secrets
                  key: MCPO_API_KEY
          volumeMounts:
            - name: config
              mountPath: /etc/mcpo
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: mcpo-config
