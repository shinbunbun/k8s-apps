# MCP Tools - LibreChat から呼び出す MCP サーバ群
#
# 構成:
#   [LibreChat] --(librechat.yaml mcpServers / streamable-http)--> [mcp-grafana] -> Grafana API
#
# - mcp-grafana: Docker Hub 公式 image (mcp/grafana) を streamable-http モードで起動
# - LibreChat は librechat.yaml の mcpServers.grafana で直接接続 (mcpo bridge 不要)
# - 外部公開はしない (cluster internal のみ)
#
# mcpo (MCP→OpenAPI bridge) は OpenWebUI→LibreChat 移行時に撤去 (PR-D)。
# secret.enc.yaml の MCPO_API_KEY は dangling field となるが、復号鍵がローカルに無いため
# 当該 cleanup は別途 cluster 内で `sops` 経由で削除する想定 (PR description 参照)。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mcp-tools
resources:
  - mcp-grafana-deployment.yaml
  - mcp-grafana-service.yaml
  - networkpolicy.yaml
generators:
  - secret-generator.yaml
