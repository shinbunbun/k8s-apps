# cluster-wide read-only access。標準 view ClusterRole は Secret / Role / RoleBinding を
# 除外するので、token / RBAC 構成は読めない。
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-viewer-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: mcp-viewer
    namespace: k8s-mcp-viewer
