# 長命 ServiceAccount token。kubectl create token (TokenRequest API) は短命なので、
# annotation で SA に紐付けた kubernetes.io/service-account-token 型 Secret に
# k3s が data.token を populate する古典パターンを使う。
# .envrc がこの Secret から token を取り出して kubeconfig を生成する。
apiVersion: v1
kind: Secret
metadata:
  name: mcp-viewer-token
  annotations:
    kubernetes.io/service-account.name: mcp-viewer
type: kubernetes.io/service-account-token
