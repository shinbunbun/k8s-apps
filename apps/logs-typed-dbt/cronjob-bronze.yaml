# Daily bronze compaction CronJob (dbt-duckdb Python model)
#
# 毎日 00:30 JST に実行、raw/source=*/date=*/hour=*/*.log.zst (Vector が書く
# ndjson.zst) を集約して daily/date=*/source=*/logs.parquet (1 列 json) に
# 派生させる。compact.py (apps/logs-compact-cronjob/) の代替で、Phase 2 の
# 段階移行で並走運用する。
#
# 重要な実装判断 (Phase 2 PR の試行錯誤を経て):
#   bronze model は SQL ではなく **Python model + 新規 DuckDB connection**
#   で実装する。dbt-duckdb 1.10 の external materialization は CTAS 経由で
#   全 row を memory に乗せて OOM (実機 11 GiB / memory_limit 12GB)。
#   Python model 内で `import duckdb; con = duckdb.connect()` で adapter を
#   bypass し `con.execute("COPY (...) TO file")` を直接発行する形に。
#   実機検証で 0.36 GiB / 0.92s で完走 (direct DuckDB と同等性能)。
#
# 並走戦略:
#   - PR 1 (#250): bronze を s3://logs-archive/daily-bronze/ に shadow write
#   - cutover PR (本 PR): bronze ↔ compact diff=0 を実機検証、env DAILY_PATH_PREFIX
#     を "daily" に切替、compact.py CronJob を spec.suspend: true で停止
#   - cleanup PR: apps/logs-compact-cronjob/ 削除、`compact` GarageKey 削除
#
# Schedule:
#   00:30 JST、compact.py の 01:00 JST より 30 分先行。compact.py の delete_prefix
#   が走る前に bronze が raw/ を read 完了する想定 (4 source 直列でも数分以内)。
#
# 動的 source 選択:
#   bash で aws s3api list-objects-v2 で各 source の raw/ 存在を確認、存在
#   source だけ `--select daily_<src>` を構築。raw/ 不在の source を読もうと
#   すると read_json で IOException になるため、空の source を選ばない仕組み。
#
# Memory:
#   Python model 内で `SET memory_limit='12GB'` (compact.py 同等)。Pod
#   limits.memory=16Gi で Python overhead 含む余裕。実機検証で routeros 1 day
#   partial で 0.36 GiB peak、4 source 直列でも 1 GiB 以内で済む見込み。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-typed-dbt-bronze
spec:
  schedule: "30 0 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: logs-typed-dbt
            tier: bronze
        spec:
          restartPolicy: OnFailure
          containers:
            - name: dbt
              image: python:3.13-slim
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail
                  pip install --no-cache-dir --quiet 'dbt-duckdb==1.10.*' 'duckdb==1.5.2' 'awscli==1.40.*' 'pyarrow'

                  TARGET_DATE="${TARGET_DATE:-$(TZ=Asia/Tokyo date -d 'yesterday' +%F)}"
                  export TARGET_DATE
                  export DAILY_PATH_PREFIX="${DAILY_PATH_PREFIX:-daily-bronze}"
                  echo "[bronze] target_date (JST): ${TARGET_DATE}, prefix: ${DAILY_PATH_PREFIX}"

                  export AWS_DEFAULT_REGION="${AWS_REGION}"
                  ENDPOINT="http://garage.garage.svc.cluster.local:3900"

                  SOURCES=(systemd k8s-pods routeros macos-unified)
                  SELECTED=()
                  for src in "${SOURCES[@]}"; do
                    COUNT=$(aws --endpoint-url="${ENDPOINT}" s3api list-objects-v2 \
                      --bucket logs-archive \
                      --prefix "raw/source=${src}/date=${TARGET_DATE}/" \
                      --max-keys 1 \
                      --query 'KeyCount' \
                      --output text 2>/dev/null || echo 0)
                    if [ "${COUNT}" -gt 0 ]; then
                      SELECTED+=("daily_${src//-/_}")
                      echo "[bronze] ${src}: raw/ has objects, selected"
                    else
                      echo "[bronze] ${src}: raw/ empty, skip"
                    fi
                  done

                  if [ "${#SELECTED[@]}" -eq 0 ]; then
                    echo "[bronze] no sources for ${TARGET_DATE}, exiting 0"
                    exit 0
                  fi

                  cp -rL /dbt /tmp/dbt
                  cd /tmp/dbt
                  echo "[bronze] running: dbt run --select ${SELECTED[*]}"
                  exec dbt run --profiles-dir . --target prod_bronze \
                    --threads 1 \
                    --select ${SELECTED[*]}
              env:
                # Python model に渡す。Pod 起動時 (TARGET_DATE 未指定) は前日 JST、
                # backfill 時は env で override 可。Phase 2 cutover で "daily-bronze"
                # → "daily" に切替済 (compact.py 互換性は実機で diff=0 確認)。
                - name: DAILY_PATH_PREFIX
                  value: "daily"
              envFrom:
                - secretRef:
                    name: logs-typed-dbt-credentials
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  # Python model 内で memory_limit=12GB SET、Python overhead +
                  # extension load + glibc allocator slack を吸収する余裕として 16Gi。
                  memory: 16Gi
              volumeMounts:
                - name: dbt
                  mountPath: /dbt
                  readOnly: true
                - name: duckdb-spill
                  mountPath: /tmp/duckdb-spill
          volumes:
            - name: dbt
              configMap:
                name: logs-typed-dbt-project
                items:
                  - key: dbt_project.yml
                    path: dbt_project.yml
                  - key: profiles.yml
                    path: profiles.yml
                  - key: models__schema.yml
                    path: models/schema.yml
                  - key: models__bronze__daily_systemd.py
                    path: models/bronze/daily_systemd.py
                  - key: models__bronze__daily_k8s_pods.py
                    path: models/bronze/daily_k8s_pods.py
                  - key: models__bronze__daily_routeros.py
                    path: models/bronze/daily_routeros.py
                  - key: models__bronze__daily_macos_unified.py
                    path: models/bronze/daily_macos_unified.py
                  - key: models__silver__typed_k8s_pods.sql
                    path: models/silver/typed_k8s_pods.sql
                  - key: models__silver__typed_routeros.sql
                    path: models/silver/typed_routeros.sql
            - name: duckdb-spill
              emptyDir:
                sizeLimit: 10Gi
