# Daily silver compaction CronJob (dbt-duckdb)
#
# 毎日 02:00 JST に実行、daily/date=*/source=*/logs.parquet (1 列 json) から
# typed/source=*/date=*/logs.parquet (typed columns) を派生させる。
# bronze CronJob (00:30 JST、cronjob-bronze.yaml) が compact.py の代替として
# raw → daily を生成し、その上で本 silver CronJob が daily → typed を派生する。
#
# 実装は dbt-duckdb の external materialization。target_date 単位で 1 ファイル
# 全置換 = idempotent backfill。Phase 2 で bronze と統合した dbt project の
# silver tag だけを `--select tag:silver --target prod_silver` で実行。
#
# Image / 移行履歴:
# - python:3.13-slim を使い、起動時に dbt-duckdb / duckdb を pip install。
#   Python 3.14 + dbt-duckdb 1.9.* は mashumaro の UnserializableField で
#   import 時に落ちるため (実機検証済)、3.13 + dbt-duckdb 1.10.* に揃える。
#
# Secret `logs-typed-dbt-credentials` (Garage Operator が GarageKey "logs-typed-dbt"
# の secretTemplate で logs-typed-dbt NS に自動生成) を envFrom で注入。
# dbt project は ConfigMap `logs-typed-dbt-project` から /dbt にマウント。
# items[] で bronze / silver SQL を `models/{bronze,silver}/...` に再配置する。
# bronze SQL も mount するのは dbt project compile 時に全 model を parse する
# 必要があるため (`--select tag:silver` で実行は silver のみ)。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-typed-dbt-silver
spec:
  schedule: "0 2 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: logs-typed-dbt
            tier: silver
        spec:
          restartPolicy: OnFailure
          containers:
            - name: dbt
              image: python:3.13-slim
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail
                  pip install --no-cache-dir --quiet 'dbt-duckdb==1.10.*' 'duckdb==1.5.2'
                  TARGET_DATE="${TARGET_DATE:-$(TZ=Asia/Tokyo date -d 'yesterday' +%F)}"
                  echo "[silver] target_date (JST): ${TARGET_DATE}"
                  cp -rL /dbt /tmp/dbt
                  cd /tmp/dbt
                  exec dbt run --profiles-dir . --target prod_silver \
                    --select tag:silver \
                    --vars "{target_date: ${TARGET_DATE}}"
              envFrom:
                - secretRef:
                    name: logs-typed-dbt-credentials
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  # 1 source/日のスキャン (compact.py の 4 source 全併合より軽量)。
                  # DuckDB memory_limit=6GB + extension load + python overhead を
                  # 吸収する余裕として 8Gi。実測後に調整。
                  memory: 8Gi
              volumeMounts:
                - name: dbt
                  mountPath: /dbt
                  readOnly: true
                # DuckDB の memory_limit 超過時 spill 先。
                - name: duckdb-spill
                  mountPath: /tmp/duckdb-spill
          volumes:
            - name: dbt
              configMap:
                name: logs-typed-dbt-project
                items:
                  - key: dbt_project.yml
                    path: dbt_project.yml
                  - key: profiles.yml
                    path: profiles.yml
                  - key: models__schema.yml
                    path: models/schema.yml
                  - key: models__bronze__daily_systemd.py
                    path: models/bronze/daily_systemd.py
                  - key: models__bronze__daily_k8s_pods.py
                    path: models/bronze/daily_k8s_pods.py
                  - key: models__bronze__daily_routeros.py
                    path: models/bronze/daily_routeros.py
                  - key: models__bronze__daily_macos_unified.py
                    path: models/bronze/daily_macos_unified.py
                  - key: models__silver__typed_k8s_pods.sql
                    path: models/silver/typed_k8s_pods.sql
                  - key: models__silver__typed_routeros.sql
                    path: models/silver/typed_routeros.sql
            - name: duckdb-spill
              emptyDir:
                sizeLimit: 10Gi
