# dbt project (dbt-duckdb) を ConfigMap に embed
#
# bronze (raw → daily) と silver (daily → typed) を 1 dbt project に統合。
# CronJob 2 個 (bronze 00:30 JST / silver 02:00 JST) が `--target prod_bronze` /
# `--target prod_silver` + `--select daily_<src>` / `--select tag:silver` で
# 対象 model を絞って実行。
#
# 重要な設計判断 (Phase 2 PR の試行錯誤を経て):
#   bronze は SQL ではなく **Python model + 新規 DuckDB connection** で書く。
#   理由: dbt-duckdb 1.10 の external materialization が CTAS 経由で全 row を
#   memory にロードしてから COPY TO を発行するため、raw ndjson 4M 行 × 巨大
#   JSON record で OOM (実機 11 GiB / memory_limit 12GB)。
#   Python model 内で `import duckdb; con = duckdb.connect()` で adapter を
#   bypass して `con.execute("COPY (...) TO file")` を直接発行することで、
#   direct DuckDB と同等の streaming 性能 (実機 0.36 GiB / 0.92s) を達成。
#   silver (daily → typed) は SQL model のままで problem なし。
#   詳細: https://github.com/duckdb/dbt-duckdb/issues/57
#
# ファイル構成 (ConfigMap items[] で `models/{bronze,silver}/...` にマウント):
#   dbt_project.yml                         - tag, materialization, vars
#   profiles.yml                            - DuckDB target 2 つ
#   models/bronze/daily_<source>.py × 4     - raw/ → daily/ 派生 (Python model)
#   models/silver/typed_<source>.sql × 2    - daily/ → typed/ 派生 (Phase 1 既存)
#   models/schema.yml                       - silver model の description
apiVersion: v1
kind: ConfigMap
metadata:
  name: logs-typed-dbt-project
data:
  dbt_project.yml: |
    name: logs_typed
    version: '1.0.0'
    config-version: 2
    profile: logs_typed
    model-paths: ["models"]
    target-path: "/tmp/dbt-target"
    log-path: "/tmp/dbt-logs"
    clean-targets: ["/tmp/dbt-target", "/tmp/dbt-logs"]
    models:
      logs_typed:
        bronze:
          # Python model 内で完結 (ConfigMap mount 経由で `materialized=table` 名目)。
          # 実 output は Python が直接 S3 に書き、dbt は空 Arrow Table を受け取って
          # in-memory に table 作成 (:memory: なので Job 終了で消える)。
          +tags: ["bronze"]
        silver:
          +materialized: external
          +format: parquet
          +options:
            compression: zstd
          +tags: ["silver"]

  profiles.yml: |
    logs_typed:
      target: prod_silver
      outputs:
        prod_silver:
          # silver: SQL model + dbt-duckdb の external materialization を使う。
          # 1 source × 1 day の column projection のみで memory 軽い。
          type: duckdb
          path: ":memory:"
          threads: 2
          extensions:
            - httpfs
            - json
          settings:
            memory_limit: '6GB'
            preserve_insertion_order: false
            home_directory: '/tmp/duckdb-home'
            extension_directory: '/tmp/duckdb-extensions'
          secrets:
            - type: s3
              name: garage_s3
              key_id: "{{ env_var('AWS_ACCESS_KEY_ID') }}"
              secret: "{{ env_var('AWS_SECRET_ACCESS_KEY') }}"
              region: "{{ env_var('AWS_REGION') }}"
              endpoint: 'garage.garage.svc.cluster.local:3900'
              url_style: 'path'
              use_ssl: false
        prod_bronze:
          # bronze: Python model 内で新規 DuckDB connection を使うので、
          # adapter 側 settings は最小限 (Python model が自分で SET する)。
          type: duckdb
          path: ":memory:"
          threads: 1

  # ===== bronze models (Python、raw/ → daily/) =====
  # 各 model は同型 (source 名のみ違う)。dbt の Python model 仕様で
  # `def model(dbt, session)` を提供、引数の session は dbt-duckdb adapter の
  # cursor だが内部で `con = duckdb.connect()` で別 connection を作って bypass。
  # extension load / SET / CREATE SECRET は Python 側で発行 (compact.py 同パターン)。
  # env_var で TARGET_DATE / DAILY_PATH_PREFIX を受け取る (Pod env で渡す)。

  models__bronze__daily_systemd.py: |
    import os
    import duckdb
    import pyarrow as pa

    SOURCE = "systemd"

    def model(dbt, session):
        dbt.config(materialized="table")
        target_date = os.environ["TARGET_DATE"]
        prefix = os.environ.get("DAILY_PATH_PREFIX", "daily-bronze")
        src = f"s3://logs-archive/raw/source={SOURCE}/date={target_date}/**/*.log.zst"
        dst = f"s3://logs-archive/{prefix}/date={target_date}/source={SOURCE}/logs.parquet"

        con = duckdb.connect()
        con.execute("INSTALL httpfs; LOAD httpfs; INSTALL json; LOAD json;")
        con.execute("SET memory_limit='12GB'")
        con.execute("SET threads=4")
        con.execute("SET preserve_insertion_order=false")
        con.execute("SET temp_directory='/tmp/duckdb-spill'")
        con.execute(f"""CREATE SECRET (TYPE S3,
          KEY_ID '{os.environ['AWS_ACCESS_KEY_ID']}',
          SECRET '{os.environ['AWS_SECRET_ACCESS_KEY']}',
          REGION '{os.environ['AWS_REGION']}',
          ENDPOINT 'garage.garage.svc.cluster.local:3900',
          URL_STYLE 'path', USE_SSL false);""")

        con.execute(f"""
          COPY (
            SELECT to_json(t)::JSON AS json
            FROM read_json(
              '{src}',
              format='newline_delimited',
              compression='zstd',
              union_by_name=true,
              ignore_errors=true,
              maximum_object_size=268435456
            ) AS t
          ) TO '{dst}' (FORMAT PARQUET, COMPRESSION 'zstd')
        """)
        rows = con.execute(f"SELECT count(*) FROM read_parquet('{dst}')").fetchone()[0]
        print(f"[bronze] {SOURCE} {target_date}: {rows} rows -> {dst}")
        con.close()

        return pa.table({"dummy": pa.array([], type=pa.int32())})

