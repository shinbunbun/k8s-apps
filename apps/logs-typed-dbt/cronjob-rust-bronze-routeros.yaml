# Rust + Polars 版 PoC: bronze (raw -> daily-struct) for routeros source
#
# shinbunbun/dotfiles#662 Phase 3 PoC、systemd に続く 2 つ目の source。
# 旧 dbt-duckdb (cronjob-bronze.yaml) との並走 verify が目的。
# 新 prefix `daily-struct/source=routeros/` に書くので旧 `daily/` には触れない。
# image source: shinbunbun/logs-pipeline
#
# co-tenancy 注記:
#   PoC スコープでは新 namespace を切らず、logs-typed-dbt namespace を間借りする。
#   logs-typed-dbt-credentials Secret (Garage Operator が secretTemplate で生成) を
#   そのまま envFrom で読む。Phase 4 で本採用するときは apps/logs-rust-pipeline/ に
#   切り出して独立 GarageKey + namespace 化する。
#
# Schedule:
#   00:45 JST (旧 dbt-duckdb bronze 00:30 / 新 systemd bronze 00:35 から 10 分ずらし)。
#   両方とも raw/ を読むだけで delete はしないので衝突は理論上ないが、観測しやすく時間差。
#
# Memory:
#   routeros は systemd の ~130x volume (2.1M rows/day)、巨大 record (5MB config dump
#   100-200/日) も含めて全保持 (1MB filter / truncate なし)。Polars columnar 処理で
#   sub-linear memory 想定だが、初回計測用に 8Gi 余裕を持つ。
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logs-rust-pipeline-bronze-routeros
spec:
  schedule: "45 0 * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: logs-rust-pipeline
            tier: bronze
            source: routeros
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pipeline
              image: ghcr.io/shinbunbun/logs-pipeline:latest
              args:
                - bronze
                - --source
                - routeros
                # date は省略 -> binary 内で yesterday-jst を解釈
              env:
                - name: AWS_S3_ENDPOINT
                  value: "http://garage.garage.svc.cluster.local:3900"
                - name: RUST_LOG
                  value: "info"
              envFrom:
                - secretRef:
                    name: logs-typed-dbt-credentials
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 8Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: [ALL]
              volumeMounts:
                # tempfile crate が /tmp に hour 別 NDJSON + 最終 Parquet を書くため
                # emptyDir をマウント。zstd 解凍後 NDJSON が一時的に展開される。
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 4Gi
