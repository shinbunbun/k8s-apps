apiVersion: batch/v1
kind: CronJob
metadata:
  name: tokyu-flyer-bot
spec:
  schedule: "0 7 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        spec:
          containers:
            - name: tokyu-flyer-bot
              image: ghcr.io/hina524/tokyu-flyer-bot:latest
              envFrom:
                - secretRef:
                    name: tokyu-flyer-bot-secrets
              volumeMounts:
                - name: data
                  mountPath: /data
              resources:
                requests:
                  memory: "32Mi"
                  cpu: "25m"
                limits:
                  memory: "64Mi"
                  cpu: "100m"
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: tokyu-flyer-bot-data
          restartPolicy: Never
