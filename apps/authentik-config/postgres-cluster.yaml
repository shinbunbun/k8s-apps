# Authentik 用 PostgreSQL Cluster (CNPG)
# 設計判断は apps/grafana-config/postgres-cluster.yaml と同じ。
# backup は Barman Cloud Plugin 経由で Garage に書き込む。
# Plugin 設定は objectstore.yaml、スケジュールは scheduled-backup.yaml。
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-db
spec:
  description: "Authentik authentication database"
  instances: 3

  bootstrap:
    initdb:
      database: authentik
      owner: authentik
      secret:
        name: authentik-db-app

  storage:
    storageClass: local-path
    size: 5Gi

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: authentik-db-backup
        serverName: authentik-db-v1
