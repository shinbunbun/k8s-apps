# KSOPS generator - Authentik secrets
#
# ArgoCD repo-server に注入された KSOPS プラグインが
# secrets/*.enc.yaml を復号して Secret リソースを生成する。
#
# CNPG Barman の S3 credentials (cnpg-garage-credentials) は KSOPS では
# 生成しない。Garage Operator が GarageKey "cnpg-authentik" の secretTemplate で
# authentik NS に直接生成する (apps/garage/keys.yaml 参照)。
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/authentik-secret.enc.yaml
  - secrets/authentik-db-app.enc.yaml
