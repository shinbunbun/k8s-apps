# 毎日 03:00 JST (= 18:00 UTC) に authentik-db の base backup を取得。
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: authentik-db-daily
spec:
  schedule: "0 0 18 * * *"
  backupOwnerReference: self
  cluster:
    name: authentik-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  immediate: false
