# KSOPS generator - Argo Workflows SSO Secret
#
# ArgoCD repo-server に注入された KSOPS プラグインが secrets/*.enc.yaml を復号して
# Secret リソース `argo-server-sso` を生成する。chart の server.sso.clientId.name /
# clientSecret.name から参照される。
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/argo-server-sso.enc.yaml
