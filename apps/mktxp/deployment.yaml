apiVersion: apps/v1
kind: Deployment
metadata:
  name: mktxp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mktxp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mktxp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: mktxp
          # 安定版 1.2.17。main は wireguard_collector を含むが parse_mkt_uptime(None)
          # で落ちるバグ (2026-04 時点) があるため、安定版で運用。1.2.17 に
          # wireguard_collector は無いが、peer 詳細が不要な現状では問題なし。
          # 次リリース (1.2.18+) で main の修正取り込みを検討。
          image: ghcr.io/akpw/mktxp:1.2.17
          command: ["mktxp"]
          args: ["--cfg-dir", "/etc/mktxp", "export"]
          ports:
            - name: metrics
              containerPort: 49090
          readinessProbe:
            tcpSocket:
              port: 49090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 49090
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            # mktxp は起動時に _mktxp.conf を自動生成するため、/etc/mktxp 自体は
            # 書き込み可能な emptyDir にして、秘匿情報を含む mktxp.conf のみ
            # Secret から subPath マウントで注入する。
            - name: config
              mountPath: /etc/mktxp
            - name: mktxp-conf
              mountPath: /etc/mktxp/mktxp.conf
              subPath: mktxp.conf
              readOnly: true
      volumes:
        - name: config
          emptyDir: {}
        - name: mktxp-conf
          secret:
            secretName: mktxp-config
            defaultMode: 0400
