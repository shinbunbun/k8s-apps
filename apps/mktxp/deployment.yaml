apiVersion: apps/v1
kind: Deployment
metadata:
  name: mktxp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mktxp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mktxp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: mktxp
          image: ghcr.io/akpw/mktxp:1.2.17
          command: ["mktxp"]
          args: ["--cfg-dir", "/etc/mktxp", "export"]
          ports:
            - name: metrics
              containerPort: 49090
          readinessProbe:
            tcpSocket:
              port: 49090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 49090
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: config
              mountPath: /etc/mktxp
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: mktxp-config
            defaultMode: 0400
