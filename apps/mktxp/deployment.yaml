apiVersion: apps/v1
kind: Deployment
metadata:
  name: mktxp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mktxp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mktxp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: mktxp
          # main タグの digest pin (1.2.17 には wireguard_collector が含まれないため)。
          # wireguard peer collector は 2026-03-29 に main に追加されたが未リリース。
          # 次リリース (1.2.18 以降) で正式タグに戻すこと。
          image: ghcr.io/akpw/mktxp:main@sha256:428f243fd53f4abc3830e95dc3f36f4b0152e6d2f9d58e0f30748e4fe4e5420d
          command: ["mktxp"]
          args: ["--cfg-dir", "/etc/mktxp", "export"]
          ports:
            - name: metrics
              containerPort: 49090
          readinessProbe:
            tcpSocket:
              port: 49090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 49090
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            # mktxp は起動時に _mktxp.conf を自動生成するため、/etc/mktxp 自体は
            # 書き込み可能な emptyDir にして、秘匿情報を含む mktxp.conf のみ
            # Secret から subPath マウントで注入する。
            - name: config
              mountPath: /etc/mktxp
            - name: mktxp-conf
              mountPath: /etc/mktxp/mktxp.conf
              subPath: mktxp.conf
              readOnly: true
      volumes:
        - name: config
          emptyDir: {}
        - name: mktxp-conf
          secret:
            secretName: mktxp-config
            defaultMode: 0400
