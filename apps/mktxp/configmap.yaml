apiVersion: v1
kind: ConfigMap
metadata:
  name: mktxp-config
data:
  mktxp.conf: |
    [home-router]
        enabled = True
        hostname = 192.168.1.1
        port = 8729
        credentials_file = /etc/mktxp-credentials/credentials.yaml
        use_ssl = True
        no_ssl_certificate = True
        ssl_certificate_verify = False
        plaintext_login = True

        # x86_64 RouterOS は HW センサー非対応 (温度/電圧/ファン)
        health = False
        installed_packages = True
        dhcp = True
        dhcp_lease = True

        connections = True
        connection_stats = True

        interface = True
        # TODO: 上流バグ (parse_mkt_uptime が last_handshake=None の peer で落ちる)
        #       が解消したら True に戻す。https://github.com/akpw/mktxp の main
        #       HEAD (2026-04-01) 時点で wireguard_ds.py line 53 が
        #       "expected string or bytes-like object, got 'NoneType'"
        #       を catch して全 peer メトリクスを抑止する。
        #       追跡: shinbunbun/dotfiles の別 issue (mktxp 1.2.18+ 待ち)
        wireguard_peers = False
        # /interface bridge vlan が空のため無効 (VLAN 機能未使用)
        bridge_vlan = False

        route = True
        pool = True
        firewall = True
        neighbor = True
        address_list = wg-admin,wg-ci,deploy-servers
        dns = True

        ipv6_route = True
        ipv6_pool = True
        ipv6_firewall = True
        ipv6_neighbor = True

        # x86_64 RouterOS は PoE 給電非対応
        poe = False
        monitor = True
        # /tool netwatch で 1.1.1.1 / 8.8.8.8 / 2606:4700:4700::1111 を ICMP 監視
        netwatch = True
        public_ip = True
        # 以下は x86_64 RouterOS に物理機能なし (永続的に False)
        wireless = False
        wireless_clients = False
        capsman = False
        capsman_clients = False
        w60g = False

        # トンネル/VPN: 環境で未使用なものを False に
        eoip = False             # /interface eoip 未設定
        gre = False              # /interface gre 未設定
        ipip = True              # ipipv6-tunnel1 (v6plus) で使用中
        lte = False              # LTE モデム非搭載
        ipsec = False            # IPsec 未使用
        switch_port = False      # x86_64 = HW スイッチチップなし

        # Kid Control 機能未使用
        kid_control_assigned = False
        kid_control_dynamic = False

        user = True
        queue = True

        # /routing bfd 未設定 (BGP は keepalive のみ)
        bfd = False
        bgp = True
        routing_stats = True
        certificate = True
        # RouterOS container 機能未使用 (コンテナワークロードは k3s 側で運用)
        container = False

        interface_name_format = name
        check_for_updates = True
