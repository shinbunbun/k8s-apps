# mktxp 設定ファイル (password を含む)
#
# このテンプレートは平文で、コミット前に PHASE_0_PASSWORD を実値に置き換え、
# sops で暗号化して secret.enc.yaml として保存する。
#
# 手順:
#   1. Phase 0 で RouterOS 上に mktxp ユーザを作成 (random 32 char password 生成)
#   2. このファイルを secret.yaml にコピーして password を置換
#   3. sops --encrypt --age age1jfkfpwsze8rj0pnzmachzwpqaqk594s7qkazucavues4g499waeqwdkac4 \
#        secret.yaml > secret.enc.yaml
#   4. secret.yaml を削除 (コミットしない)
#   5. secret.enc.yaml をコミット
#
apiVersion: v1
kind: Secret
metadata:
  name: mktxp-config
type: Opaque
stringData:
  mktxp.conf: |
    [home-router]
        enabled = True
        hostname = 192.168.1.1
        port = 8729
        username = mktxp
        password = PHASE_0_PASSWORD
        use_ssl = True
        no_ssl_certificate = True
        ssl_certificate_verify = False
        plaintext_login = True

        health = False
        installed_packages = True
        dhcp = True
        dhcp_lease = True

        connections = True
        connection_stats = True

        interface = True
        wireguard_peers = True
        bridge_vlan = False

        route = True
        pool = True
        firewall = True
        neighbor = True
        address_list = wg-admin,wg-ci,deploy-servers
        dns = False

        ipv6_route = True
        ipv6_pool = True
        ipv6_firewall = True
        ipv6_neighbor = True

        poe = False
        monitor = True
        netwatch = False
        public_ip = False
        wireless = False
        wireless_clients = False
        capsman = False
        capsman_clients = False
        w60g = False

        eoip = False
        gre = False
        ipip = True
        lte = False
        ipsec = False
        switch_port = False

        kid_control_assigned = False
        kid_control_dynamic = False

        user = True
        queue = True

        bfd = False
        bgp = True
        routing_stats = True
        certificate = False
        container = False

        interface_name_format = name
        check_for_updates = False
