# MyDuck Server PoC 用 Garage 読み取りキー
#
# logs-archive バケット (gold/silver parquet) を read-only で参照する。
# 既存 grafana-duckdb GarageKey (apps/garage/keys.yaml) は grafana ns 配置で
# あり、cross-ns で別 ns Pod に env 注入できないため、本 PoC では同じ logs-archive
# bucket 権限を持つ独立 GarageKey を myduck-poc ns に発行する。
#
# 撤退時にこの GarageKey を削除するだけで権限を完全に剥がせる (key 独立 = ローテーション
# も独立)。本採用が決まれば独自 GarageKey として残置 or grafana ns 側に統合し
# どちらかに決める。
#
# cross-ns reference は apps/garage/reference-grants.yaml で myduck-poc ns を
# from に追加することで明示許可する。
apiVersion: garage.rajsingh.info/v1beta1
kind: GarageKey
metadata:
  name: myduck-poc-duckdb
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  clusterRef:
    name: garage
    namespace: garage
  name: myduck-poc-duckdb
  bucketPermissions:
    - bucketRef:
        name: logs-archive
        namespace: garage
      read: true
  secretTemplate:
    name: myduck-poc-duckdb-credentials
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
    regionKey: AWS_REGION
    includeEndpoint: false
    includeRegion: true
