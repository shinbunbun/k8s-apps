# MyDuck Server 起動後に実行される DuckDB 初期化 SQL
#
# entrypoint.sh が起動完了を待ってから psql -U postgres -f で順に実行する。
# 実行されるのは myduckserver プロセス内の単一 DuckDB インスタンスに対してで、
# 以後の全 Postgres wire 接続から作成済 SECRET が見える。
#
# CREATE PERSISTENT SECRET は ~/.duckdb/stored_secrets/ に書き出すため
# emptyDir でも書き込み可能。Pod 再起動で消えるが init.sql で再生成される。
#
# 認証は PROVIDER credential_chain CHAIN 'env' で env var AWS_ACCESS_KEY_ID /
# AWS_SECRET_ACCESS_KEY を自動拾い。Secret myduck-poc-duckdb-credentials を
# envFrom で Pod に注入することで credential が DuckDB に渡る (init.sql 内に
# 平文認証情報を書かない設計)。
apiVersion: v1
kind: ConfigMap
metadata:
  name: myduck-init-sql
data:
  01-bootstrap.sql: |
    -- DuckDB の buffer manager 上限を cgroup limit (6Gi) より下に固定する。
    -- ダッシュボードの定常 parquet scan で DuckDB が読み込みブロックを内部
    -- キャッシュに溜め続け、約 89Mi/時で単調増加して 6Gi limit に到達 →
    -- OOMKilled → 再起動を約 2.7 日周期で繰り返していた (working set は負荷に
    -- 関係なく線形増加)。memory_limit を設定すると DuckDB 自身が上限到達時に
    -- buffer を eviction/spill するため、kubelet による OOMKill ではなく
    -- DuckDB 側で頭打ちさせられる。6Gi - 1Gi (myduckserver Go プロセス等の
    -- DuckDB 管理外メモリ分のヘッドルーム) = 5GB に設定。
    SET memory_limit = '5GB';

    INSTALL httpfs;
    LOAD httpfs;

    -- inet 拡張: アクセス先統計 v2 (dotfiles-private#348) の dashboard が
    -- reference/asn/asn.parquet に対して `ip::INET BETWEEN range_start::INET AND
    -- range_end::INET` で v4/v6 両対応の CIDR range join を行うため。httpfs と同様
    -- 起動時に一度ロードしておき、panel SQL 側で per-query の INSTALL/LOAD を不要にする。
    INSTALL inet;
    LOAD inet;

    CREATE PERSISTENT SECRET garage (
      TYPE S3,
      PROVIDER credential_chain,
      CHAIN 'env',
      REGION 'garage',
      ENDPOINT '192.168.128.22:3900',
      URL_STYLE 'path',
      USE_SSL false
    );
