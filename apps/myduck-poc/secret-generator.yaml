# KSOPS generator - MyDuck Server PoC secrets
#
# ArgoCD repo-server に注入された KSOPS プラグインが
# secrets/*.enc.yaml を復号して Secret リソースを生成する。
# - myduck-superuser.enc.yaml: type=Opaque, MyDuck Server の SUPERUSER_PASSWORD
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/myduck-superuser.enc.yaml
