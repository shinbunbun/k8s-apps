# MyDuck Server PoC Deployment
#
# Postgres wire protocol (5432) で DuckDB SQL を受け、Garage S3 上の gold parquet
# を read_parquet 経由でクエリする。Issue dotfiles-private#263 における DuckDB
# datasource 再導入の代替案 (Route A: Postgres wire 中間サーバ) の PoC 用。
#
# 【image pin】
# apecloud/myduckserver は version tag を切らず latest / main のみ運用なので
# digest 固定で再現性を確保する (latest = 2025-01-17 push, DuckDB 1.1.3 同梱)。
# PoC で動作 OK ならその時点の digest をそのまま production manifest にも転記。
#
# 【emptyDir 採用理由】
# gold parquet は Garage が真の source of truth。MyDuck 側は in-memory query
# engine として動き、永続化対象は ~/.duckdb/stored_secrets/ (再起動時 init.sql
# で再生成) と /home/admin/data (本 PoC では使わない) のみ。PVC 不要。
#
# 【resource】
# gold/volume は 219 partition × 数百 rows/partition 程度の集約済データなので
# 90日 scan でも数 MB 範囲。peak memory は scan + group by で 1-2 GiB を想定し
# 当初 4 Gi で余裕を持たせていた。
# 2026-05-29 に dashboard (Route A MyDuck Server 経路) の定常クエリで working set
# が長時間 93% 以上で稼働し OOMKilled 発生 (限界到達まで ~3.5h 累積)。
# DuckDB は読み込んだ Parquet を内部キャッシュに溜める挙動があり、PoC 規模でも
# 累積で 4 Gi 限界を超えた。6 Gi に拡張して止血した。
# 2026-06-01: 6 Gi でも working set が約 89Mi/時で線形増加し続け、~2.7 日周期で
# 6 Gi 到達 → OOMKilled → 再起動を繰り返していることを確認。cgroup limit 増量
# だけでは周期が延びるだけで根治しないため、init.sql (init-sql-configmap.yaml)
# で DuckDB の memory_limit を 5GB (cgroup 6Gi より下) に設定し、OOMKill では
# なく DuckDB 自身に buffer eviction させる方式に変更。cgroup limit は
# memory_limit + 管理外メモリのヘッドルームとして 6 Gi を維持する。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myduck
  labels:
    app: myduck
  annotations:
    # GarageKey (default wave 0) → Garage operator が credentials Secret を生成
    # → Deployment は wave 5 で Secret 存在確認後に起動。
    # apps/garage と本 Application は別 Application なので sync-wave 間調整は
    # 不可、本 Application 内 (myduck-poc) では GarageKey をデフォルト wave 0
    # に置き Deployment を wave 5 にずらすことで起動順を保証する。
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: myduck
  template:
    metadata:
      labels:
        app: myduck
    spec:
      # apecloud/myduckserver の Dockerfile は USER admin (uid 1000、debian
      # useradd デフォルト) で動く。emptyDir の subPath dir は kubelet が
      # root:root で作成するため admin user (1000) が書込めない。
      # fsGroup で volume の group ownership を 1000 に固定し、admin user が
      # /home/admin/{data,log,.duckdb} に書込み可能にする。
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: myduck
          image: apecloud/myduckserver@sha256:417604972ee485b4f9729acd42613edfdb3693cc335c977154674cdf04c59eab
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: pg
            - containerPort: 3306
              name: mysql
          env:
            - name: DEFAULT_DB
              value: logs
            - name: SUPERUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: myduck-superuser
                  key: password
          envFrom:
            # GarageKey operator が生成する S3 read-only credential
            # (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION)
            # DuckDB の PROVIDER credential_chain CHAIN 'env' で自動拾い
            - secretRef:
                name: myduck-poc-duckdb-credentials
          volumeMounts:
            # ConfigMap mount は ..data atomic update のため symlink で
            # materialize される (実体: 01-bootstrap.sql -> ..data/01-bootstrap.sql)。
            # entrypoint.sh の execute_init_sqls 内 find -type f は symlink を
            # 除外するため、ディレクトリ mount だと init.sql が 1 度も実行されない。
            # subPath 指定で個別ファイルを regular file として materialize する。
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/postgres/01-bootstrap.sql
              subPath: 01-bootstrap.sql
              readOnly: true
            # data / log / .duckdb は entrypoint.sh が runtime に /home/admin
            # 配下に作成する。emptyDir は image に焼かれた entrypoint.sh を
            # 隠さないよう subPath で個別 mount する。
            - name: home
              mountPath: /home/admin/data
              subPath: data
            - name: home
              mountPath: /home/admin/log
              subPath: log
            - name: home
              mountPath: /home/admin/.duckdb
              subPath: duckdb
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 6Gi
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: init-sql
          configMap:
            name: myduck-init-sql
        - name: home
          emptyDir:
            sizeLimit: 4Gi
