# PostgreSQL 17 - Scanopy の永続データストア。
#
# docker-compose.yml の postgres service を k8s に移植したもの。
# Scanopy discovery データは再スキャンで復元可能なため HA / continuous backup は不要。
# 単一 Pod + PVC (RWO, local-path) で運用する。
#
# strategy: Recreate
#   RollingUpdate だと新旧 Pod が同じ PVC を RWO で奪い合うため Recreate。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanopy-postgres
  labels:
    app: scanopy-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: scanopy-postgres
  template:
    metadata:
      labels:
        app: scanopy-postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: scanopy
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: scanopy-postgres
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scanopy-postgres
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: scanopy-postgres-data
