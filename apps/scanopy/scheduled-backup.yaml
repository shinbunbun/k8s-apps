# 毎日 03:30 JST (= 18:30 UTC) に scanopy-db の base backup を取得。
# grafana-db (03:00) / authentik-db (03:00) とずらして MinIO 負荷を分散。
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: scanopy-db-daily
spec:
  schedule: "0 30 18 * * *"
  backupOwnerReference: self
  cluster:
    name: scanopy-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  immediate: false
