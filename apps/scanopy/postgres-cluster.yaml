# Scanopy 用 PostgreSQL Cluster (CNPG)
# 設計は apps/grafana-config/postgres-cluster.yaml と同じ方針 (instances: 2, local-path)。
# Scanopy は discovery 結果とホスト情報を PG に格納する。
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: scanopy-db
spec:
  description: "Scanopy network topology database"
  instances: 2

  bootstrap:
    initdb:
      database: scanopy
      owner: scanopy
      secret:
        name: scanopy-db-app

  storage:
    storageClass: local-path
    size: 2Gi

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: scanopy-db-backup
        serverName: scanopy-db-v1
