# Scanopy Daemon (ネットワークスキャナ)
#
# docker-compose.yml の daemon は network_mode: host で動くため k8s では
# hostNetwork: true + dnsPolicy: ClusterFirstWithHostNet にして両立させる。
#   - hostNetwork: true → 192.168.1.0/24 LAN に直接到達 (L2 broadcast/ICMP/SNMP 可)
#   - dnsPolicy: ClusterFirstWithHostNet → Pod から cluster.local を解決
#
# 全ノードが同一 LAN セグメント (192.168.1.0/24) のため daemon は 1 つで LAN 全体を
# discovery できる。DaemonSet にすると同じセグメントを複数 daemon がスキャンして
# server 側で重複レポートになるだけなので Deployment replicas:1 とする。
# ノード障害時は Deployment が別ノードに Pod を再スケジュールする。
#
# capabilities:
#   NET_RAW  - raw socket (ICMP ping, ARP)
#   NET_ADMIN - interface inspection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanopy-daemon
  labels:
    app: scanopy-daemon
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: scanopy-daemon
  template:
    metadata:
      labels:
        app: scanopy-daemon
    spec:
      # k8s Service 自動注入 env var との衝突を防ぐため無効化。
      enableServiceLinks: false
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: daemon
          image: ghcr.io/scanopy/scanopy/daemon:latest
          imagePullPolicy: Always
          ports:
            - name: health
              containerPort: 60073
              hostPort: 60073
              protocol: TCP
          securityContext:
            capabilities:
              add:
                - NET_RAW
                - NET_ADMIN
          env:
            - name: SCANOPY_LOG_LEVEL
              value: info
            - name: SCANOPY_SERVER_URL
              value: http://scanopy-server.scanopy.svc.cluster.local:60072
            - name: SCANOPY_MODE
              value: daemon_poll
            - name: SCANOPY_DAEMON_NAME
              value: scanopy-daemon
            # Network/User/API key は Scanopy UI の "Create Daemon" Wizard で
            # 生成された実値を scanopy-secrets に暗号化格納。
            - name: SCANOPY_DAEMON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: scanopy-secrets
                  key: daemon-api-key
            - name: SCANOPY_NETWORK_ID
              valueFrom:
                secretKeyRef:
                  name: scanopy-secrets
                  key: network-id
            - name: SCANOPY_USER_ID
              valueFrom:
                secretKeyRef:
                  name: scanopy-secrets
                  key: user-id
          readinessProbe:
            httpGet:
              path: /api/health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: health
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: config
              mountPath: /etc/scanopy
      volumes:
        - name: config
          emptyDir: {}
