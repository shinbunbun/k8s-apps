# Scanopy Daemon (ネットワークスキャナ)
#
# Pod network モード (hostNetwork: false) で動作。
#   - LAN 192.168.1.0/24: Cilium masquerade egress 経由で ICMP/SNMP 到達可
#   - LB VIP 192.168.128.0/24: Cilium datapath (eBPF) で TCP 到達可
#     (ICMP は Cilium が LB IP で応答しないため TCP 公開ポートベースで検出)
#
# hostNetwork: true にすると k3s ノード自身の kernel route に 192.168.128.0/24 が
# ないため LB VIP に到達できない (RouterOS 経由で ICMP redirect ループ) ので
# Pod network 方式を採用。失うのは L2 LLDP だが、RouterOS の LLDP 情報は SNMP で
# 取得可能なため実害なし。
#
# Deployment replicas:1、ノード障害時は別ノードに再スケジュール。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanopy-daemon
  labels:
    app: scanopy-daemon
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: scanopy-daemon
  template:
    metadata:
      labels:
        app: scanopy-daemon
    spec:
      # k8s Service 自動注入 env var との衝突を防ぐため無効化。
      enableServiceLinks: false
      containers:
        - name: daemon
          image: ghcr.io/scanopy/scanopy/daemon:latest
          imagePullPolicy: Always
          ports:
            - name: health
              containerPort: 60073
              protocol: TCP
          securityContext:
            capabilities:
              add:
                - NET_RAW   # ICMP ping / raw socket
                - NET_ADMIN # interface inspection
          env:
            - name: SCANOPY_LOG_LEVEL
              value: info
            - name: SCANOPY_SERVER_URL
              value: http://scanopy-server.scanopy.svc.cluster.local:60072
            - name: SCANOPY_MODE
              value: daemon_poll
            - name: SCANOPY_DAEMON_NAME
              value: scanopy-daemon
            # Network/User/API key は Scanopy UI の "Create Daemon" Wizard で
            # 生成された実値を scanopy-secrets に暗号化格納。
            - name: SCANOPY_DAEMON_API_KEY
              valueFrom:
                secretKeyRef:
                  name: scanopy-secrets
                  key: daemon-api-key
            - name: SCANOPY_NETWORK_ID
              valueFrom:
                secretKeyRef:
                  name: scanopy-secrets
                  key: network-id
            - name: SCANOPY_USER_ID
              valueFrom:
                secretKeyRef:
                  name: scanopy-secrets
                  key: user-id
          readinessProbe:
            httpGet:
              path: /api/health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: health
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              # 4032 concurrent deep scan で LAN /24 + LB VIP /24 を走査すると
              # 512Mi では OOMKilled (実測)。2Gi まで上げる。
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: config
              mountPath: /etc/scanopy
      volumes:
        - name: config
          emptyDir: {}
