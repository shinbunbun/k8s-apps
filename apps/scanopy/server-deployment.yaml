# Scanopy Server (UI + REST API + PostgreSQL client)
#
# docker-compose.yml (https://github.com/scanopy/scanopy) の server 定義を k8s に
# 移植したもの。
#
# replicas: 1, strategy: Recreate
#   server は /data (PVC, RWO) と stickyな状態を持つため HA 化しない。
#   RollingUpdate だと新旧 Pod が同じ PVC を RWO で奪い合い deadlock するので Recreate。
#
# SCANOPY_DATABASE_URL は scanopy-db-app Secret (CNPG bootstrap で生成される
# basic-auth type, keys: username/password) と service DNS scanopy-db-rw から
# initContainer で組み立てて ENV に渡す。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanopy-server
  labels:
    app: scanopy-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: scanopy-server
  template:
    metadata:
      labels:
        app: scanopy-server
    spec:
      containers:
        - name: server
          image: ghcr.io/scanopy/scanopy/server:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 60072
          env:
            - name: SCANOPY_LOG_LEVEL
              value: info
            - name: SCANOPY_PUBLIC_URL
              value: https://scanopy.shinbunbun.com
            - name: SCANOPY_DB_HOST
              value: scanopy-db-rw.scanopy.svc.cluster.local
            - name: SCANOPY_DB_PORT
              value: "5432"
            - name: SCANOPY_DB_NAME
              value: scanopy
            - name: SCANOPY_DB_USER
              valueFrom:
                secretKeyRef:
                  name: scanopy-db-app
                  key: username
            - name: SCANOPY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scanopy-db-app
                  key: password
            # SCANOPY_DATABASE_URL を sidecar なしで構築。
            # upstream が URL 形式のみ受け付ける場合は以下に切り替える:
            #   value: postgresql://$(SCANOPY_DB_USER):$(SCANOPY_DB_PASSWORD)@$(SCANOPY_DB_HOST):$(SCANOPY_DB_PORT)/$(SCANOPY_DB_NAME)
            - name: SCANOPY_DATABASE_URL
              value: postgresql://$(SCANOPY_DB_USER):$(SCANOPY_DB_PASSWORD)@$(SCANOPY_DB_HOST):$(SCANOPY_DB_PORT)/$(SCANOPY_DB_NAME)
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: scanopy-server-data
