# Scanopy Server (UI + REST API + PostgreSQL client)
#
# docker-compose.yml (https://github.com/scanopy/scanopy) の server 定義を k8s に
# 移植したもの。
#
# replicas: 1, strategy: Recreate
#   server は /data (PVC, RWO) と stickyな状態を持つため HA 化しない。
#   RollingUpdate だと新旧 Pod が同じ PVC を RWO で奪い合い deadlock するので Recreate。
#
# SCANOPY_DATABASE_URL は scanopy-postgres Secret (username/password) と
# Service scanopy-postgres:5432 から env 展開で組み立てる。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanopy-server
  labels:
    app: scanopy-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: scanopy-server
  template:
    metadata:
      labels:
        app: scanopy-server
    spec:
      # k8s が namespace 内 Service から自動注入する SCANOPY_SERVER_PORT 等の
      # 環境変数が Scanopy 自身の SCANOPY_* 設定と衝突するため無効化する。
      enableServiceLinks: false
      # OIDC 設定ファイル /oidc.toml を initContainer でレンダリング。
      # Scanopy Community Edition は UI から SSO 設定不可 (oidc.toml mount 方式のみ) で
      # かつ client_id/client_secret を env 直書きしたくないため Secret 参照の env を
      # initContainer で展開して共有 emptyDir に書き出す。
      initContainers:
        - name: render-oidc
          image: busybox:1.37
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              cat > /oidc/oidc.toml <<EOF
              [[oidc_providers]]
              name = "Authentik"
              slug = "authentik"
              issuer_url = "https://auth.shinbunbun.com/application/o/scanopy/"
              client_id = "${OAUTH_CLIENT_ID}"
              client_secret = "${OAUTH_CLIENT_SECRET}"
              EOF
              chmod 0400 /oidc/oidc.toml
          env:
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: scanopy-secrets
                  key: oauth-client-id
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: scanopy-secrets
                  key: oauth-client-secret
          volumeMounts:
            - name: oidc-config
              mountPath: /oidc
      containers:
        - name: server
          image: ghcr.io/scanopy/scanopy/server:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 60072
          env:
            - name: SCANOPY_LOG_LEVEL
              value: info
            - name: SCANOPY_PUBLIC_URL
              value: https://scanopy.shinbunbun.com
            # server image には /app/static に Web UI 静的ファイルが同梱されているが
            # 明示しないと server ログが "Web UI: disabled (API-only)" になるため設定。
            # docker-compose.yml と同じ値。
            - name: SCANOPY_WEB_EXTERNAL_PATH
              value: /app/static
            - name: SCANOPY_DB_HOST
              value: scanopy-postgres.scanopy.svc.cluster.local
            - name: SCANOPY_DB_PORT
              value: "5432"
            - name: SCANOPY_DB_NAME
              value: scanopy
            - name: SCANOPY_DB_USER
              valueFrom:
                secretKeyRef:
                  name: scanopy-postgres
                  key: username
            - name: SCANOPY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scanopy-postgres
                  key: password
            # SCANOPY_DATABASE_URL を sidecar なしで構築。
            # upstream が URL 形式のみ受け付ける場合は以下に切り替える:
            #   value: postgresql://$(SCANOPY_DB_USER):$(SCANOPY_DB_PASSWORD)@$(SCANOPY_DB_HOST):$(SCANOPY_DB_PORT)/$(SCANOPY_DB_NAME)
            - name: SCANOPY_DATABASE_URL
              value: postgresql://$(SCANOPY_DB_USER):$(SCANOPY_DB_PASSWORD)@$(SCANOPY_DB_HOST):$(SCANOPY_DB_PORT)/$(SCANOPY_DB_NAME)
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: data
              mountPath: /data
            # oidc.toml は ルート /oidc.toml に single-file mount。
            - name: oidc-config
              mountPath: /oidc.toml
              subPath: oidc.toml
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: scanopy-server-data
        - name: oidc-config
          emptyDir: {}
