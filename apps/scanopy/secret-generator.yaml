# KSOPS generator - Scanopy secrets
#
# - scanopy-postgres.enc.yaml: PostgreSQL credentials (username/password)
# - scanopy-secrets.enc.yaml: daemon API key + OIDC client_secret
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/scanopy-postgres.enc.yaml
  - secrets/scanopy-secrets.enc.yaml
