# KSOPS generator - Scanopy secrets
#
# - scanopy-db-app.enc.yaml: type=basic-auth, CNPG bootstrap.initdb.secret 参照
# - scanopy-secrets.enc.yaml: type=Opaque, daemon API key + OIDC client_secret
# - cnpg-minio-credentials.enc.yaml: Barman Cloud Plugin 用 MinIO 資格情報
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: secret-generator
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets/scanopy-db-app.enc.yaml
  - secrets/scanopy-secrets.enc.yaml
  - secrets/cnpg-minio-credentials.enc.yaml
