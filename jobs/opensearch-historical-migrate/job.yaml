# OpenSearch 既存データ移行 one-shot Job (Phase Z)
#
# OpenSearch (http://192.168.1.4:9200) の logs-* インデックスを全列挙して、
# @timestamp <= 2026-04-21 23:59:59 JST のドキュメントを Garage S3
# (logs-archive/daily/date=<YYYY-MM-DD>/source=<log_type>/logs-opensearch-*.parquet) に移行する。
# close 状態のインデックスは 1 つずつ一時 open → query → close に戻す。
#
# 完了後は ttlSecondsAfterFinished (7日) で自動削除される。
# 観察・再実行が必要なら別 Job 名で kubectl create job --from=job/opensearch-historical-migrate ...
#
# Secret `compact-garage-credentials` (GarageKey "compact" が自動生成、
# logs-archive への read+write 権限) を envFrom で再利用する。
# OpenSearch 認証は現状 admin/admin 固定 (TLS/認証未運用) のため env 直指定。
apiVersion: batch/v1
kind: Job
metadata:
  name: opensearch-historical-migrate
  labels:
    app: opensearch-historical-migrate
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 21600 # 6h
  ttlSecondsAfterFinished: 604800 # 7d
  template:
    metadata:
      labels:
        app: opensearch-historical-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: python:3.12-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              pip install --no-cache-dir --quiet \
                opensearch-py==2.8.0 \
                duckdb==1.1.3 \
                boto3==1.35.99
              exec python /scripts/migrate.py
          env:
            - name: OPENSEARCH_URL
              value: "http://192.168.1.4:9200"
            - name: OPENSEARCH_USER
              value: "admin"
            - name: OPENSEARCH_PASS
              value: "admin"
            - name: CUTOFF_ISO
              value: "2026-04-21T23:59:59+09:00"
          envFrom:
            - secretRef:
                name: compact-garage-credentials
          resources:
            requests:
              cpu: 200m
              memory: 8Gi
            limits:
              # read_json の内部バッファは disk spill 対象外。macOS/routeros の
              # 高頻度インデックスで一時 open すると数百MBスパイクの可能性あり、
              # 16Gi で余裕を持たせる。
              memory: 16Gi
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
            - name: duckdb-spill
              mountPath: /tmp/duckdb-spill
      volumes:
        - name: script
          configMap:
            name: opensearch-historical-migrate-script
        - name: duckdb-spill
          emptyDir:
            sizeLimit: 20Gi
