# OpenSearch → Parquet 移行スクリプトの ConfigMap
#
# Job (job.yaml) から /scripts/migrate.py として volumeMount される。
# 起動時 bash wrapper で opensearch-py / duckdb / boto3 を pip install 後に実行。
#
# 処理概要:
# 1. OpenSearch の logs-* インデックスを全列挙 (open + close)
# 2. close indices は一時 _open して処理、完了後に _close で元の状態へ戻す
# 3. 各インデックスで PIT + search_after を用いて @timestamp <= CUTOFF_ISO のドキュメントを
#    ページングで全件取得 (scroll より安定)
# 4. ドキュメントを (date = @timestamp[:10], source = log_type or "unknown") でバッファリング
# 5. バッファが FLUSH_DOCS 件に到達、もしくはインデックス終了時に (date, source) 単位で
#    tempfile (ndjson) → DuckDB read_json → Parquet zstd 出力
# 6. 出力先: s3://logs-archive/daily/date=YYYY-MM-DD/source=<log_type>/logs-opensearch-<index>-<tag>-<n>.parquet
#    (既存 Vector 由来の logs.parquet と共存、ファイル名 prefix で分離)
apiVersion: v1
kind: ConfigMap
metadata:
  name: opensearch-historical-migrate-script
data:
  migrate.py: |
    #!/usr/bin/env python3
    """
    OpenSearch (nixos-desktop:9200) の logs-* インデックスから、
    @timestamp <= CUTOFF_ISO の全ドキュメントを Garage S3 の Parquet に移行する。

    - close indices は 1 つずつ一時 open → query → close (元の状態へ復元)
    - source ラベル: ドキュメントの log_type フィールド、欠損は "unknown"
    - 出力: s3://logs-archive/daily/date=YYYY-MM-DD/source=<src>/logs-opensearch-<index>-<tag>-<n>.parquet
    """
    import json
    import os
    import sys
    import tempfile
    import time
    import traceback
    from collections import defaultdict

    import boto3
    import duckdb
    from opensearchpy import OpenSearch

    ENDPOINT_S3 = "garage.garage.svc.cluster.local:3900"
    BUCKET = "logs-archive"
    REGION = os.environ.get("AWS_REGION", "garage")
    ACCESS_KEY = os.environ["AWS_ACCESS_KEY_ID"]
    SECRET_KEY = os.environ["AWS_SECRET_ACCESS_KEY"]

    OS_URL = os.environ.get("OPENSEARCH_URL", "http://192.168.1.4:9200")
    OS_USER = os.environ.get("OPENSEARCH_USER", "admin")
    OS_PASS = os.environ.get("OPENSEARCH_PASS", "admin")
    CUTOFF_ISO = os.environ.get("CUTOFF_ISO", "2026-04-21T23:59:59+09:00")

    PAGE_SIZE = 5000
    # 50_000 docs でおよそ数十MB (log type 次第)。index 境界でも flush するので安全側。
    FLUSH_DOCS = 50_000
    PIT_KEEP_ALIVE = "10m"


    def os_client():
        return OpenSearch(
            OS_URL,
            http_auth=(OS_USER, OS_PASS),
            timeout=300,
            max_retries=3,
            retry_on_timeout=True,
        )


    def s3_client():
        return boto3.client(
            "s3",
            endpoint_url=f"http://{ENDPOINT_S3}",
            aws_access_key_id=ACCESS_KEY,
            aws_secret_access_key=SECRET_KEY,
            region_name=REGION,
        )


    def list_target_indices(os_cli):
        """logs-* indices (open + close 両方) を返す"""
        resp = os_cli.cat.indices(index="logs-*", format="json", h="index,status")
        # 明らかな test / legacy も含めて対象 (後段で PIT 失敗したら個別エラーで skip)
        idx = [(r["index"], r["status"]) for r in resp if r["index"].startswith("logs-")]
        # 念のため sort (決定的順序で残差が追える)
        idx.sort(key=lambda p: p[0])
        return idx


    def scan_existing_parquets(s3):
        """
        S3 を走査して、各インデックスの既存 logs-opensearch-*.parquet を集計する。

        Returns:
          completed: set of index names where a 'final' suffixed file exists (= 完走)
          partial:   dict index_name -> [S3 keys] of 'part' suffixed files (= 途中中断)
        """
        completed = set()
        partial = {}
        paginator = s3.get_paginator("list_objects_v2")
        for page in paginator.paginate(Bucket=BUCKET, Prefix="daily/"):
            for obj in page.get("Contents", []):
                key = obj["Key"]
                if "/logs-opensearch-" not in key or not key.endswith(".parquet"):
                    continue
                filename = key.rsplit("/", 1)[1]
                # filename = logs-opensearch-<index>-<tag>-<n>.parquet
                stem = filename[len("logs-opensearch-") : -len(".parquet")]
                parts = stem.rsplit("-", 2)
                if len(parts) != 3:
                    continue
                index_name, tag, _ = parts
                if tag == "final":
                    completed.add(index_name)
                elif tag == "part":
                    partial.setdefault(index_name, []).append(key)
        # final がある index の partial エントリは除外 (次回削除対象にしない)
        for idx_name in completed:
            partial.pop(idx_name, None)
        return completed, partial


    def delete_keys(s3, keys):
        """S3 オブジェクトを 1000 件単位で一括削除"""
        total = 0
        for i in range(0, len(keys), 1000):
            batch = [{"Key": k} for k in keys[i : i + 1000]]
            s3.delete_objects(
                Bucket=BUCKET, Delete={"Objects": batch, "Quiet": True}
            )
            total += len(batch)
        return total


    def ensure_open(os_cli, index, was_closed):
        if was_closed:
            print(f"[migrate] opening {index}", flush=True)
            os_cli.indices.open(index=index, wait_for_active_shards=1)
            # open 直後は shard initialization 待ち
            time.sleep(5)


    def restore_state(os_cli, index, was_closed):
        if was_closed:
            try:
                print(f"[migrate] closing {index} (restore)", flush=True)
                os_cli.indices.close(index=index)
            except Exception as e:
                print(f"[migrate] warn: failed to close {index}: {e}", flush=True)


    def configure_duckdb():
        con = duckdb.connect()
        con.execute("INSTALL httpfs; LOAD httpfs;")
        con.execute(
            f"""
            SET s3_endpoint='{ENDPOINT_S3}';
            SET s3_access_key_id='{ACCESS_KEY}';
            SET s3_secret_access_key='{SECRET_KEY}';
            SET s3_use_ssl=false;
            SET s3_url_style='path';
            SET memory_limit='12GB';
            SET temp_directory='/tmp/duckdb-spill';
            """
        )
        return con


    def flush_ndjson_to_parquet(con, key, ndjson_path):
        target = f"s3://{BUCKET}/{key}"
        con.execute(
            f"""
            COPY (
              SELECT * FROM read_json(
                '{ndjson_path}',
                format='newline_delimited',
                union_by_name=true,
                ignore_errors=true,
                maximum_object_size=268435456
              )
            ) TO '{target}' (FORMAT PARQUET, COMPRESSION ZSTD);
            """
        )
        rows = con.execute(f"SELECT COUNT(*) FROM '{target}'").fetchone()[0]
        return int(rows)


    def migrate_index(os_cli, con, index):
        """1 index 内のドキュメントを (date, source) 単位で Parquet に出力"""
        pit_resp = os_cli.create_point_in_time(index=index, keep_alive=PIT_KEEP_ALIVE)
        pit_id = pit_resp["pit_id"]

        body = {
            "size": PAGE_SIZE,
            "query": {"range": {"@timestamp": {"lte": CUTOFF_ISO}}},
            "pit": {"id": pit_id, "keep_alive": PIT_KEEP_ALIVE},
            "sort": [{"@timestamp": "asc"}, {"_id": "asc"}],
            "track_total_hits": False,
        }

        # (date, source) -> (file handle, count)
        buffers = {}
        counts = defaultdict(int)
        file_idx = 0
        total = 0

        def get_buffer(date, source):
            key = (date, source)
            if key not in buffers:
                tf = tempfile.NamedTemporaryFile(
                    mode="w",
                    suffix=".ndjson",
                    delete=False,
                    dir="/tmp/duckdb-spill",
                )
                buffers[key] = tf
            return buffers[key]

        def flush_all(tag):
            nonlocal file_idx
            flushed = 0
            for (date, source), tf in list(buffers.items()):
                tf.close()
                if counts[(date, source)] == 0:
                    os.unlink(tf.name)
                    del buffers[(date, source)]
                    continue
                s3_key = (
                    f"daily/date={date}/source={source}/"
                    f"logs-opensearch-{index}-{tag}-{file_idx}.parquet"
                )
                file_idx += 1
                try:
                    rows = flush_ndjson_to_parquet(con, s3_key, tf.name)
                    print(
                        f"[migrate] {index} flushed {s3_key}: {rows} rows",
                        flush=True,
                    )
                    flushed += rows
                except Exception as e:
                    print(
                        f"[migrate] ERROR flushing {s3_key}: {e}",
                        flush=True,
                    )
                finally:
                    try:
                        os.unlink(tf.name)
                    except FileNotFoundError:
                        pass
                    del buffers[(date, source)]
                    counts[(date, source)] = 0
            return flushed

        search_after = None
        try:
            while True:
                if search_after:
                    body["search_after"] = search_after
                resp = os_cli.search(body=body)
                hits = resp["hits"]["hits"]
                if not hits:
                    break
                for h in hits:
                    src = h["_source"]
                    ts = src.get("@timestamp")
                    if not ts:
                        continue
                    date = ts[:10]  # YYYY-MM-DD (OpenSearch デフォルト UTC)
                    log_type = src.get("log_type") or "unknown"
                    tf = get_buffer(date, log_type)
                    tf.write(json.dumps(src, ensure_ascii=False))
                    tf.write("\n")
                    counts[(date, log_type)] += 1
                    total += 1
                search_after = hits[-1]["sort"]

                total_buffered = sum(counts.values())
                if total_buffered >= FLUSH_DOCS:
                    flush_all("part")
            # 残りバッファを flush
            flush_all("final")
        finally:
            try:
                os_cli.close_point_in_time(body={"pit_id": pit_id})
            except Exception:
                pass

        return total


    def main():
        print(
            f"[migrate] start: OS={OS_URL} cutoff={CUTOFF_ISO} bucket={BUCKET}",
            flush=True,
        )

        os_cli = os_client()
        s3 = s3_client()
        con = configure_duckdb()

        # 既存の Parquet を走査して、再開時の skip / cleanup 対象を決定
        print("[migrate] scanning existing parquets under daily/ ...", flush=True)
        completed, partial = scan_existing_parquets(s3)
        print(
            f"[migrate] existing state: {len(completed)} completed indices, "
            f"{len(partial)} partial indices",
            flush=True,
        )

        indices = list_target_indices(os_cli)
        print(f"[migrate] target indices: {len(indices)}", flush=True)

        grand_total = 0
        for i, (idx, status) in enumerate(indices, 1):
            was_closed = status == "close"
            if idx in completed:
                print(
                    f"[migrate] [{i}/{len(indices)}] {idx} SKIP (already completed)",
                    flush=True,
                )
                continue
            if idx in partial:
                # 途中で中断した index: 古い part-*.parquet を全削除してから再処理
                stale = partial[idx]
                deleted = delete_keys(s3, stale)
                print(
                    f"[migrate] [{i}/{len(indices)}] {idx} cleanup: "
                    f"deleted {deleted} partial parquets before retry",
                    flush=True,
                )
            print(
                f"[migrate] [{i}/{len(indices)}] {idx} (status={status})",
                flush=True,
            )
            try:
                ensure_open(os_cli, idx, was_closed)
                t = migrate_index(os_cli, con, idx)
                grand_total += t
                print(f"[migrate] {idx}: migrated {t} rows", flush=True)
            except Exception as e:
                print(f"[migrate] ERROR on {idx}: {e}", flush=True)
                traceback.print_exc()
            finally:
                restore_state(os_cli, idx, was_closed)

        print(f"[migrate] DONE. total rows this run: {grand_total}", flush=True)
        return 0


    if __name__ == "__main__":
        sys.exit(main())
