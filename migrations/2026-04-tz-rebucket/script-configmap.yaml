    #!/usr/bin/env python3
    """
    TZ re-bucket migration: UTC partition の Parquet を JST partition に再 bucket する。

    入力:
      Era B (2025-10-14 .. 2026-04-21): s3://logs-archive/daily/date={UTC}/source=*/<files>.parquet
        フラット形式 (1 row = 1 record)
      Era A (2026-04-23 .. 2026-04-26): s3://logs-archive/daily/date={UTC}/source=*/logs.parquet
        ネスト形式 (json STRUCT(...)[], date DATE, hour VARCHAR, source VARCHAR)、UNNEST が必要
      Era C (2026-04-27 以降): s3://logs-archive/daily/date={UTC}/source=*/<files>.parquet
        既に JST partition、フラット形式 (新 Vector の出力)

    出力:
      s3://logs-archive/daily-jst/date={JST}/source=*/logs.parquet (1 (jst, src) = 1 file)

    Indexed Job として動作。JOB_COMPLETION_INDEX 0..195 が JST 2025-10-14..2026-04-27 に対応。
    """
    import json
    import os
    import sys
    from datetime import date, timedelta

    import boto3
    import duckdb

    ENDPOINT = "garage.garage.svc.cluster.local:3900"
    BUCKET = "logs-archive"

    JST_START = date(2025, 10, 14)
    JST_END = date(2026, 4, 27)

    # UTC partition 単位の era 境界
    ERA_A_START_UTC = date(2026, 4, 23)
    ERA_C_START_UTC = date(2026, 4, 27)


    def jst_date_for_index(idx: int) -> date:
        return JST_START + timedelta(days=idx)


    def utc_partitions_for(jst_d: date) -> tuple[date, date]:
        # JST 1 日 (00:00 .. 23:59 JST) = UTC (jst_d - 1) 15:00 .. jst_d 14:59
        return (jst_d - timedelta(days=1), jst_d)


    def s3_client():
        return boto3.client(
            "s3",
            endpoint_url=f"http://{ENDPOINT}",
            aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
            aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
            region_name=os.environ.get("AWS_REGION", "garage"),
        )


    def configure_duckdb():
        con = duckdb.connect()
        con.execute("INSTALL httpfs; LOAD httpfs;")
        con.execute(
            f"""
            SET s3_endpoint='{ENDPOINT}';
            SET s3_access_key_id='{os.environ["AWS_ACCESS_KEY_ID"]}';
            SET s3_secret_access_key='{os.environ["AWS_SECRET_ACCESS_KEY"]}';
            SET s3_use_ssl=false;
            SET s3_url_style='path';
            SET memory_limit='6GB';
            SET threads=4;
            SET preserve_insertion_order=false;
            SET temp_directory='/tmp/duckdb-spill';
            """
        )
        return con


    def list_sources_for_jst(s3, jst_d: date) -> set[str]:
        u_prev, u_cur = utc_partitions_for(jst_d)
        sources: set[str] = set()
        for u in (u_prev, u_cur):
            prefix = f"daily/date={u}/source="
            paginator = s3.get_paginator("list_objects_v2")
            for page in paginator.paginate(Bucket=BUCKET, Prefix=prefix, Delimiter="/"):
                for cp in page.get("CommonPrefixes", []) or []:
                    src = cp["Prefix"].removeprefix(prefix).rstrip("/")
                    if src:
                        sources.add(src)
        return sources


    def has_objects(s3, prefix: str) -> bool:
        return s3.list_objects_v2(Bucket=BUCKET, Prefix=prefix, MaxKeys=1).get("KeyCount", 0) > 0


    def detect_era(utc_d: date) -> str:
        if utc_d >= ERA_C_START_UTC:
            return "C"
        if utc_d >= ERA_A_START_UTC:
            return "A"
        return "B"


    def build_select(era: str, src_glob: str) -> str:
        # Era B/C: フラット parquet をそのまま読む。
        # Era A: ネスト形式 (json STRUCT(...)[]) を一段 UNNEST で record 化。
        # DuckDB の UNNEST は alias 指定が制約多いので、サブクエリで rec 列に展開してから
        # 上位で rec.* を解凍する形式で書く (公式推奨パターン)。
        if era in ("B", "C"):
            return f"""
                SELECT *,
                       COALESCE(
                         TRY_CAST("@timestamp" AS TIMESTAMPTZ),
                         TRY_CAST("timestamp"  AS TIMESTAMPTZ)
                       ) AT TIME ZONE 'Asia/Tokyo' AS _ts_jst
                FROM read_parquet('{src_glob}', union_by_name=true)
            """
        # Era A: UNNEST してフラット化
        return f"""
            WITH src AS (
              SELECT UNNEST(json) AS rec
              FROM read_parquet('{src_glob}', union_by_name=true)
            )
            SELECT rec.*,
                   COALESCE(
                     TRY_CAST(rec."@timestamp" AS TIMESTAMPTZ),
                     TRY_CAST(rec."timestamp"  AS TIMESTAMPTZ)
                   ) AT TIME ZONE 'Asia/Tokyo' AS _ts_jst
            FROM src
        """


    def delete_object_if_exists(s3, key: str) -> None:
        # Garage は DeleteObject が冪等 (存在しなくても 204) なのでそのまま呼ぶ
        s3.delete_object(Bucket=BUCKET, Key=key)


    def rebucket_one(con, s3, jst_d: date, source: str) -> dict:
        u_prev, u_cur = utc_partitions_for(jst_d)
        parts: list[tuple[str, str]] = []
        for u in (u_prev, u_cur):
            if has_objects(s3, f"daily/date={u}/source={source}/"):
                era = detect_era(u)
                glob = f"s3://{BUCKET}/daily/date={u}/source={source}/*.parquet"
                parts.append((era, glob))
        if not parts:
            return {"jst_date": str(jst_d), "source": source, "status": "no_input"}

        select_union = "\nUNION ALL BY NAME\n".join(
            f"SELECT * FROM ({build_select(e, g)})" for e, g in parts
        )

        dst_key = f"daily-jst/date={jst_d}/source={source}/logs.parquet"
        dst = f"s3://{BUCKET}/{dst_key}"

        # 冪等: 既存出力を delete してから書き直す
        delete_object_if_exists(s3, dst_key)

        # 入力 scan で in_rows / null_ts / jst_match を 1 query で取得
        row = con.execute(
            f"""
            SELECT
              COUNT(*) AS in_rows,
              COUNT(*) FILTER (WHERE _ts_jst IS NULL) AS null_ts_rows,
              COUNT(*) FILTER (WHERE _ts_jst::DATE = DATE '{jst_d}') AS jst_match_rows
            FROM ({select_union})
            """
        ).fetchone()
        in_rows, null_ts_rows, jst_match_rows = (int(row[0]), int(row[1]), int(row[2]))

        con.execute(
            f"""
            COPY (
              SELECT * EXCLUDE(_ts_jst)
              FROM ({select_union})
              WHERE _ts_jst::DATE = DATE '{jst_d}'
            ) TO '{dst}' (FORMAT PARQUET, COMPRESSION ZSTD);
            """
        )
        out_rows = con.execute(f"SELECT COUNT(*) FROM '{dst}'").fetchone()[0]
        return {
            "jst_date": str(jst_d),
            "source": source,
            "in_rows_2partition": in_rows,
            "null_ts_rows": null_ts_rows,
            "jst_match_rows": jst_match_rows,
            "out_rows": int(out_rows),
            "eras": [e for e, _ in parts],
            "status": "ok",
        }


    def main() -> int:
        idx = int(os.environ["JOB_COMPLETION_INDEX"])
        jst_d = jst_date_for_index(idx)
        print(json.dumps({"event": "start", "index": idx, "jst_date": str(jst_d)}), flush=True)

        s3 = s3_client()
        con = configure_duckdb()

        sources = list_sources_for_jst(s3, jst_d)
        if not sources:
            print(
                json.dumps({"event": "skip", "reason": "no_sources", "jst_date": str(jst_d)}),
                flush=True,
            )
            return 0

        for source in sorted(sources):
            try:
                r = rebucket_one(con, s3, jst_d, source)
                print(json.dumps({"event": "result", **r}), flush=True)
            except Exception as e:
                print(
                    json.dumps(
                        {
                            "event": "error",
                            "jst_date": str(jst_d),
                            "source": source,
                            "err": repr(e),
                        }
                    ),
                    flush=True,
                )
                raise
        return 0


    if __name__ == "__main__":
        sys.exit(main())
  swap.py: |
    #!/usr/bin/env python3
    """
    Migration の検証完了後に実行する swap script。

    手順 (各 step 完了時に marker key を置く、再実行時は marker 確認で skip):
      1. daily/                              -> daily.bak/        (server-side copy + delete)
         (skipped 対象の date=2015-01-01 を含む全 daily/ を退避)
      2. daily-jst/                          -> daily/            (server-side copy + delete)
      3. raw/source=*/date=2026-04-27/       を削除               (CronJob 翌日上書き防止)
         (Era A + Era C merge で daily/date=2026-04-27/ は完成済みのため、
         CronJob が次回 raw -> daily で上書きしないように raw 04-27 を消す)
         source は raw/ 配下を動的 list して導出 (新 source 追加時の取りこぼし防止)。

    冪等性:
      step marker (`_meta/swap-2026-04/stepN-done`) で完了 step は skip。
      これにより部分失敗 → 再起動時に未完了 step のみ実行され、
      step 1 が step 2 完了後に再走して daily.bak/ を上書きする事故を防ぐ。
    """
    import json
    import os
    import sys
    from typing import Iterable

    import boto3

    ENDPOINT = "garage.garage.svc.cluster.local:3900"
    BUCKET = "logs-archive"
    JST_END_DATE = "2026-04-27"
    MARKER_PREFIX = "_meta/swap-2026-04/"


    def s3_client():
        return boto3.client(
            "s3",
            endpoint_url=f"http://{ENDPOINT}",
            aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
            aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
            region_name=os.environ.get("AWS_REGION", "garage"),
        )


    def iter_keys(s3, prefix: str) -> Iterable[str]:
        paginator = s3.get_paginator("list_objects_v2")
        for page in paginator.paginate(Bucket=BUCKET, Prefix=prefix):
            for o in page.get("Contents", []) or []:
                yield o["Key"]


    def list_common_prefixes(s3, prefix: str, delimiter: str = "/") -> list[str]:
        out: list[str] = []
        paginator = s3.get_paginator("list_objects_v2")
        for page in paginator.paginate(Bucket=BUCKET, Prefix=prefix, Delimiter=delimiter):
            for cp in page.get("CommonPrefixes", []) or []:
                out.append(cp["Prefix"])
        return out


    def marker_key(step: str) -> str:
        return f"{MARKER_PREFIX}{step}-done"


    def marker_exists(s3, step: str) -> bool:
        from botocore.exceptions import ClientError
        try:
            s3.head_object(Bucket=BUCKET, Key=marker_key(step))
            return True
        except ClientError as e:
            if e.response.get("Error", {}).get("Code") in ("404", "NoSuchKey", "NotFound"):
                return False
            raise


    def put_marker(s3, step: str) -> None:
        s3.put_object(Bucket=BUCKET, Key=marker_key(step), Body=b"")


    def move_prefix(s3, src_prefix: str, dst_prefix: str) -> int:
        n = 0
        for src_key in iter_keys(s3, src_prefix):
            dst_key = dst_prefix + src_key[len(src_prefix):]
            s3.copy_object(
                Bucket=BUCKET,
                Key=dst_key,
                CopySource={"Bucket": BUCKET, "Key": src_key},
            )
            s3.delete_object(Bucket=BUCKET, Key=src_key)
            n += 1
            if n % 100 == 0:
                print(
                    json.dumps(
                        {
                            "event": "move_progress",
                            "src_prefix": src_prefix,
                            "dst_prefix": dst_prefix,
                            "moved": n,
                            "last_key": src_key,
                        }
                    ),
                    flush=True,
                )
        return n


    def delete_prefix(s3, prefix: str) -> int:
        paginator = s3.get_paginator("list_objects_v2")
        n = 0
        for page in paginator.paginate(Bucket=BUCKET, Prefix=prefix):
            contents = page.get("Contents", []) or []
            if not contents:
                continue
            keys = [{"Key": o["Key"]} for o in contents]
            for i in range(0, len(keys), 1000):
                batch = keys[i : i + 1000]
                s3.delete_objects(
                    Bucket=BUCKET, Delete={"Objects": batch, "Quiet": True}
                )
                n += len(batch)
        return n


    def run_step(s3, step: str, fn) -> int | None:
        if marker_exists(s3, step):
            print(
                json.dumps({"event": "step_skip", "step": step, "reason": "marker_exists"}),
                flush=True,
            )
            return None
        print(json.dumps({"event": "step_start", "step": step}), flush=True)
        n = fn()
        put_marker(s3, step)
        print(
            json.dumps({"event": "step_done", "step": step, "count": n}),
            flush=True,
        )
        return n


    def main() -> int:
        s3 = s3_client()

        n1 = run_step(s3, "step1-daily-to-bak", lambda: move_prefix(s3, "daily/", "daily.bak/"))
        n2 = run_step(s3, "step2-jst-to-daily", lambda: move_prefix(s3, "daily-jst/", "daily/"))

        def step3_cleanup_raw_jst_end() -> int:
            # raw/ 配下の source= prefix を動的 list (ハードコードしない)
            sources = [
                cp.removeprefix("raw/source=").rstrip("/")
                for cp in list_common_prefixes(s3, "raw/source=")
            ]
            print(
                json.dumps(
                    {"event": "raw_sources_discovered", "sources": sources}
                ),
                flush=True,
            )
            total = 0
            for src in sources:
                total += delete_prefix(s3, f"raw/source={src}/date={JST_END_DATE}/")
            return total

        n3 = run_step(s3, "step3-raw-jst-end-cleanup", step3_cleanup_raw_jst_end)

        print(
            json.dumps(
                {
                    "event": "complete",
                    "moved_to_bak": n1,
                    "moved_to_daily": n2,
                    "raw_deleted": n3,
                }
            ),
            flush=True,
        )
        return 0


    if __name__ == "__main__":
        sys.exit(main())
