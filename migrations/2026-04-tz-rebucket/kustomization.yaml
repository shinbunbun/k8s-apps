# logs-archive TZ 再 bucket migration (one-shot)
#
# Argo CD は applicationsets/apps-appset.yaml で apps/* を auto-discover するが、
# このディレクトリは migrations/ 配下なので Argo CD に拾われない。
# 手動で kubectl apply -k で投入する。
#
# 既存 logs-compact-cronjob NS の compact-garage-credentials Secret
# (Garage Operator が GarageKey "compact" の secretTemplate で自動生成)
# を再利用するため、namespace は logs-compact-cronjob を指定。
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: logs-compact-cronjob

resources:
  - script-configmap.yaml
  - job.yaml
  - swap-job.yaml
