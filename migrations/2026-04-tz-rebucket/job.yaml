apiVersion: batch/v1
kind: Job
metadata:
  name: logs-archive-rebucket-2026-04
spec:
  completionMode: Indexed
  completions: 196
  parallelism: 4
  # backoffLimitPerIndex: 各 index 単位の失敗許容数 (k8s 1.33+ で GA)。
  # 1 index の OOM/transient エラーが他 index を巻き込まないように。
  backoffLimitPerIndex: 6
  # maxFailedIndexes: 許容できる failed index の総数。これを超えたら Job 全体を Failed に。
  # 196 の 5% = 10 程度を許容。
  maxFailedIndexes: 10
  # backoffLimit: 全体保険として大きめ (per-index 制御を主とするため)。
  backoffLimit: 1176   # = 196 * 6
  # Job 全体 24h を保険として設定 (見積もり 100-250 分)。
  activeDeadlineSeconds: 86400
  ttlSecondsAfterFinished: 604800
  template:
    metadata:
      labels:
        app: logs-archive-rebucket
    spec:
      restartPolicy: OnFailure
      # 1 Pod (= 1 index) あたりの実行上限 2h。macos-unified の Era A でも収まる想定。
      activeDeadlineSeconds: 7200
      containers:
        - name: rebucket
          image: python:3.14-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              pip install --no-cache-dir --quiet duckdb==1.5.2 boto3==1.35.99
              exec python /scripts/rebucket.py
          envFrom:
            - secretRef:
                name: compact-garage-credentials
          resources:
            requests:
              cpu: 500m
              memory: 4Gi
            limits:
              cpu: "2"
              memory: 8Gi
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
            - name: spill
              mountPath: /tmp/duckdb-spill
      volumes:
        - name: script
          configMap:
            name: logs-rebucket-script
        - name: spill
          emptyDir:
            sizeLimit: 8Gi
