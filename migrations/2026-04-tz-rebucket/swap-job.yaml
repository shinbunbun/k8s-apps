# Swap Job: migration の検証完了後に手動で resume する。
# git 上は suspend: true で休眠、検証 OK なら以下で実行:
#   kubectl patch job -n logs-compact-cronjob logs-archive-swap-2026-04 \
#     -p '{"spec":{"suspend":false}}'
apiVersion: batch/v1
kind: Job
metadata:
  name: logs-archive-swap-2026-04
spec:
  suspend: true
  backoffLimit: 0
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 604800
  template:
    metadata:
      labels:
        app: logs-archive-swap
    spec:
      restartPolicy: Never
      containers:
        - name: swap
          image: python:3.14-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              pip install --no-cache-dir --quiet boto3==1.35.99
              exec python /scripts/swap.py
          envFrom:
            - secretRef:
                name: compact-garage-credentials
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: logs-rebucket-script
