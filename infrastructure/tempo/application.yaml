# Tempo - Distributed Tracing Server (monolithic, Tempo 2.10)
#
# 設計判断:
#
# 【目的】Grafana Beyla (infrastructure/beyla) が eBPF auto-instrument した
# HTTP/gRPC/SQL span を受信・保管し、Grafana Tempo datasource 経由で
# Traces Drilldown / Explore タブで distributed trace として可視化する。
# Issue: shinbunbun/unified-dotfiles#16
#
# 【chart】grafana-community/tempo 2.1.2 (Tempo v2.10.5)。
# https://github.com/grafana-community/helm-charts/tree/main/charts/tempo
# 2026-01-30 で grafana/helm-charts が更新停止、tempo は grafana-community 側のみ
# active。新規追加なので最初から grafana-community を使用。
# (旧 repo 利用中の pyroscope/alloy/alloy-profiles の migration は
#  shinbunbun/unified-dotfiles#18 で別途対応)
#
# 【deployment mode】monolithic (single-binary)。
# Tempo 公式は「small cluster は monolithic 推奨」。homelab 3 ノード規模で
# distributor / ingester / querier / compactor を分離する意味は薄く、運用負荷増。
# 単一 Deployment 内で全コンポーネントが動く。
#
# 【ストレージ】object storage backend は Garage S3 (tempo-traces bucket、
# tempo-garage-obs-credentials Secret で認証)。欠損許容の trace は HA(RF=3) の
# メイン garage ではなく専用の非HAクラスタ garage-obs (RF=1, nixos-desktop) に分離
# (apps/garage/cluster-obs.yaml、g3pro の GC/resync churn 飽和 #372 を回避)。
# - endpoint: cluster 内 DNS 経由 (garage-obs.garage.svc:3900)
# - insecure: true (HTTP)
# - forcepathstyle: true (Garage は virtual-hosted-style 非対応)
# - WAL は emptyDir (persistence: false)。再起動で 1-2 分の loss 許容
#
# 【認証情報】tempo-garage-obs-credentials Secret を extraEnvFrom で AWS SDK 標準
# キー (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION) として注入。
# この Secret は Garage Operator が GarageKey CR の secretTemplate で tempo ns
# に直接生成する (apps/garage/keys-obs.yaml の tempo-obs GarageKey)。
#
# 【retention】14日。Tempo 内蔵 compactor が古い block を物理削除する。
# Garage bucket lifecycle rule は未設定 (Tempo に retention 制御を一元化)。
# 14d は意図的な選定であり、旧「メイン garage-2 の DataAvail 容量制約」由来ではない
# (garage-obs 専用化でその制約は消滅。dotfiles-private#379 で見直し)。trace は
# profile より有用期間が短く (障害調査は直近のものが主)、TraceQL のスキャン量も
# 抑えられるため 14d で十分。容量はもはや律速ではない: 専用化した garage-obs
# (RF=1, 15Gi PVC, apps/garage/cluster-obs.yaml) 上で tempo-traces は実測 0.4GiB のみ、
# 30d へ延ばしても ~0.85GiB で余裕がある。将来 trace の遡及調査が増えたら 30d
# (pyroscope と同値) へ延長してよい (compactor 次サイクルで block_retention 変更が effective)。
#
# 【レプリカ】monolithic で replicas: 1。ノード障害時は再起動で復旧、trace
# データは Garage S3 に永続化済みなので block の再読込で継続。HA は必要に
# なってから microservices モード移行で対応 (homelab 規模では不要)。
#
# 【ネットワーク】
# - Beyla からの push 先: tempo.tempo.svc.cluster.local:4317 (OTLP gRPC、cluster 内のみ)
# - Grafana datasource: tempo.tempo.svc.cluster.local:3200 (HTTP)
# - 外部公開なし (Cloudflare Tunnel にも載せない、LAN 限定)。Loki/Pyroscope と同方針。
# - LAN VIP も初期は割り当てない (必要になったら apps/tempo-config/lan-service.yaml で追加)
#
# 【receiver】OTLP gRPC (4317) + HTTP (4318) のみ有効化。
# Beyla からの push 用には gRPC のみで十分。Jaeger / OpenCensus / Zipkin は
# chart default で有効だが本構成では使わないため明示的に絞る。
#
# 【metrics-generator】Phase 1 では無効。Phase 2 で有効化 + VictoriaMetrics
# remoteWrite (vminsert-vmcluster:8480/insert/0/prometheus/api/v1/write) 連携、
# Service Graph を Grafana datasource jsonData.serviceMap で活性化予定。
#
# 【Pyroscope 運用で発覚した Garage v2 transient race の教訓】
# Pyroscope では segment-writer upload timeout (default 2s) と
# compactor リトライ (default 3) で永久ループが発生し、
# 10s 延長 + max_failures=1 で抑制した。Tempo の compactor / ingester でも
# 同等の問題が出る可能性があるが、Tempo 2.10 では S3 client timeout 系の
# 個別 key が Pyroscope と異なるため、Phase 1 ローリングアウト中に
# Garage 500 / "context deadline exceeded" が頻発したらその時点で
# storage.trace.s3.* の tuning を追加する方針。
# 参考: infrastructure/pyroscope/application.yaml の structuredConfig コメント
#
# 【sync-wave】10: loki / alloy / pyroscope と同階層。
# apps/garage の Bucket/Key (wave 1-2) が先に立っている必要があるが、
# ArgoCD の retry で吸収できる (Secret 不在なら pod CrashLoopBackOff → 再 sync で復旧)。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://grafana-community.github.io/helm-charts
    chart: tempo
    # Chart 2.1.2 = Tempo v2.10.5
    # https://github.com/grafana-community/helm-charts/blob/main/charts/tempo/Chart.yaml
    targetRevision: "2.1.2"
    helm:
      valuesObject:
        # === Tempo server 本体 ===
        tempo:
          # retention 14日 (compactor が古い block を delete)。意図的な選定で旧 garage-2
          # 容量制約由来ではない (詳細はヘッダコメントの【retention】を参照、#379)。
          # (2026-06-02: 旧ノイズ trace flush のため一時的に 1h へ下げた後、本値に復帰)
          retention: 336h

          # 匿名テレメトリ無効化 (homelab では不要)
          reportingEnabled: false

          # Garage credentials を AWS SDK 標準 env として注入
          # (Secret は apps/garage の tempo GarageKey が auto-generate)
          extraEnvFrom:
            - secretRef:
                name: tempo-garage-obs-credentials

          # OTLP gRPC/HTTP のみ有効化 (Jaeger/OpenCensus/Zipkin 不要)
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318

          # === storage backend (Garage S3) ===
          storage:
            trace:
              backend: s3
              s3:
                bucket: tempo-traces
                # 欠損許容の trace は専用の非HAクラスタ garage-obs (RF=1, nixos-desktop,
                # apps/garage/cluster-obs.yaml) に分離。メイン RF=3 から外すことで g3pro
                # の GC/resync churn 飽和 (#372) に寄与しない。bucket 名は globalAlias で
                # 従来どおり tempo-traces のまま、endpoint だけ garage-obs に向ける。
                endpoint: garage-obs.garage.svc.cluster.local:3900
                region: garage
                insecure: true
                # path-style: Garage / MinIO 互換のため明示
                forcepathstyle: true
                # access_key / secret_key は env 経由 (AWS SDK 自動拾い)
              # WAL は emptyDir (persistence.enabled: false)、再起動で全 WAL 失う。
              # Tempo は WAL flush 完了前の re-ingestion 想定なし → block 化済みは
              # S3 にあるため 1-2 分の loss は許容
              wal:
                path: /var/tempo/wal

          # === metrics-generator (Phase 2 で有効化) ===
          # Beyla からの span を集計し、以下を VictoriaMetrics に remoteWrite する:
          #   - service_graphs: traces_service_graph_request_total 等 (Service Graph)
          #   - span_metrics: traces_spanmetrics_calls_total, latency_bucket 等 (RED metrics)
          # これにより Grafana の Traces Drilldown と Service Map (datasource jsonData
          # の serviceMap / tracesToMetrics) が動作する。
          # remoteWriteUrl は VictoriaMetrics vminsert を直接指す (vmagent.yaml の
          # remoteWrite と同じ pattern)。
          # chart の key は `tempo.metricsGenerator` (トップレベルではない) であり
          # ここに書かないと値が ignore される silent bug 化に注意。
          metricsGenerator:
            enabled: true
            remoteWriteUrl: "http://vminsert-vmcluster.victoriametrics.svc.cluster.local:8480/insert/0/prometheus/api/v1/write"
            # processor 設定: service_graphs / span_metrics は default 値、
            # local_blocks は履歴クエリ対応のため flush_to_storage: true 必須。
            processor:
              service_graphs:
                wait: 10s
                max_items: 10000
              span_metrics:
                # target_info は service.name / k8s.namespace.name 等の
                # resource attribute を traces_target_info 系列に書き出す。
                # Grafana datasource jsonData の tracesToMetrics で参照するラベルなので必須。
                enable_target_info: true
              local_blocks:
                # local-blocks processor は TraceQL Metrics (Traces Drilldown の
                # `rate() by(...)` / `quantile_over_time()` 等) のために必須。
                # flush_to_storage: true で metrics block を S3 (tempo-traces bucket)
                # に永続化し、過去データに対するクエリも可能にする。
                # filter_server_spans: false でクライアント side span も対象にする
                # (Beyla の片側計装でも metrics が拾えるように)。
                flush_to_storage: true
                filter_server_spans: false

          # === per-tenant override ===
          # metrics-generator component を起動しただけでは processor は実行されない。
          # tempo は per-tenant の override (overrides.defaults.metrics_generator.processors)
          # で明示的に有効化する必要がある (Tempo 2.x の設計、single-tenant でも必要)。
          # 公式: https://grafana.com/docs/tempo/latest/metrics-generator/#enable-metrics-generator
          overrides:
            defaults:
              metrics_generator:
                processors:
                  - service-graphs
                  - span-metrics
                  # local-blocks は Phase 2 初回 PR で書き忘れ、Grafana Traces
                  # Drilldown が "localblocks processor not found" エラーで動かず追加。
                  # 公式: https://grafana.com/docs/tempo/latest/operations/traceql-metrics/
                  - local-blocks

        # Service: ClusterIP のみ (Pyroscope/Loki と同方針、外部公開なし)
        service:
          type: ClusterIP

        # persistence: 無効 (WAL は emptyDir、永続データは全て S3)
        persistence:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: tempo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
