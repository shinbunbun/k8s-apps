# Authentik IdP - OAuth2/OIDC/SAML2 認証基盤
#
# 公式 Helm Chart (2026.2.1) で Authentik 本体をデプロイする。
# PostgreSQL は Bitnami subchart (公式 postgres イメージ) を使用し、piraeus-storage で永続化。
# Redis は Authentik 本体に内蔵（subchart 不要）。
# シークレットは apps/authentik-config/ (KSOPS) で管理する authentik-secrets を参照。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: "2026.2.1"
    helm:
      valuesObject:
        # --- Authentik 本体設定 ---
        authentik:
          log_level: info
          # secret_key, email 等は KSOPS Secret (authentik-secrets) から existingSecret で注入
          existingSecret:
            secretName: authentik-secrets
          error_reporting:
            enabled: false
          email:
            port: 587
            use_tls: true
            from: "noreply@shinbunbun.com"

        # --- シークレット・DB接続設定を注入 ---
        global:
          envFrom:
            - secretRef:
                name: authentik-secrets
          env:
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: authentik-postgresql
            - name: AUTHENTIK_POSTGRESQL__USER
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__PORT
              value: "5432"
          affinity:
            podAntiAffinity: soft

        # --- Server (ステートレス、2レプリカで HA) ---
        server:
          replicas: 2
          ingress:
            enabled: false  # Traefik IngressRoute を apps/authentik-config/ で定義
          pdb:
            enabled: true
            minAvailable: 1

        # --- Worker ---
        worker:
          replicas: 2
          pdb:
            enabled: true
            minAvailable: 1

        # --- PostgreSQL subchart (公式 postgres イメージ) ---
        postgresql:
          enabled: true
          auth:
            username: authentik
            database: authentik
            existingSecret: authentik-secrets
            secretKeys:
              userPasswordKey: password
              adminPasswordKey: postgres-password
          primary:
            persistence:
              enabled: true
              storageClass: piraeus-storage
              size: 5Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
