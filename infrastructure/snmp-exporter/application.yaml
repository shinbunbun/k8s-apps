# Prometheus SNMP Exporter
#
# RouterOS (MikroTik) の SNMP メトリクスを Prometheus 形式に変換する。
# vmagent からスクレイプされる。
# 設定 (snmp.yml) は apps/victoriametrics-config/snmp-config-cm.yaml で管理。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snmp-exporter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus-snmp-exporter
    targetRevision: "9.13.1"
    helm:
      valuesObject:
        serviceMonitor:
          enabled: false
        extraConfigmapMounts:
          - name: snmp-config
            mountPath: /etc/snmp_exporter
            configMap: snmp-config
            readOnly: true
  destination:
    server: https://kubernetes.default.svc
    namespace: victoriametrics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
