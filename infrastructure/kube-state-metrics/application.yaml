# kube-state-metrics
#
# Kubernetesクラスタのオブジェクト状態（Pod、Deployment、Node等）を
# Prometheusメトリクスとして公開する。
# 外部のPrometheusからNodePort経由でスクレイプされる。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-state-metrics
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-state-metrics
    targetRevision: "7.2.2"
    helm:
      valuesObject:
        service:
          type: NodePort
          nodePort: 30080
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
