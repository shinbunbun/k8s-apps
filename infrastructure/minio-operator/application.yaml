# MinIO Operator - S3 互換オブジェクトストレージの Kubernetes Operator
#
# 公式 Helm Chart (operator v7.1.0 = Operator v7.1.1) で MinIO Operator を
# インストール。CRD `minio.min.io/v2 Tenant` を導入し、apps/minio-tenant/ 側の
# Tenant CR を監視して StatefulSet / Service / ConfigMap を自動生成する。
#
# replicaCount: 2 で leader election により冗長化 (CNPG Operator と同パターン)。
# Operator Pod は chart デフォルトで pod anti-affinity が効いているためそのまま利用。
#
# 第1利用者は Loki k3s 移行タスクで apps/minio-tenant/tenant.yaml。
# 将来 Tempo / Pyroscope / CNPG barmanObjectStore も同じ Tenant を S3 バックエンドとして共用する。
#
# sync-wave: -5 は piraeus (-10?) と CNPG Operator (-10) より後、
# 他の利用者 Application (Loki sync-wave 10) より前にデプロイされる位置取り。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: default
  source:
    repoURL: https://operator.min.io/
    chart: operator
    # Chart 7.1.0 = Operator v7.1.1 (https://github.com/minio/operator/releases/tag/v7.1.1)
    targetRevision: "7.1.0"
    helm:
      valuesObject:
        operator:
          replicaCount: 2
  destination:
    server: https://kubernetes.default.svc
    namespace: minio-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Tenant / PolicyBinding 等の CRD は定義が大きく
      # client-side apply では annotation 上限エラーになるため必須 (CNPG と同じ理由)
      - ServerSideApply=true
