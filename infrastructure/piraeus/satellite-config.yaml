# LINSTOR Satellite 設定 - NixOS 用
#
# NixOS では nixpkgs の DRBD 9.2.16 が Linux 6.19+ カーネルに未対応のため、
# Piraeus の DRBD Module Loader にモジュールのビルド・ロードを任せる。
# ただし /lib/modules が NixOS では /nix/store 配下にあるため、
# ホストパスのマウントを調整する必要がある場合がある。
#
# 問題が発生した場合:
# 1. nixpkgs の DRBD を 9.3.x にオーバーレイしてホスト側ビルドに戻す
# 2. または DRBD Module Loader のカーネルソースパスを NixOS 用に調整
apiVersion: piraeus.io/v1
kind: LinstorSatelliteConfiguration
metadata:
  name: nixos-config
  namespace: piraeus-datastore
spec:
  patches:
    - target:
        kind: Pod
        name: satellite
      patch: |
        apiVersion: v1
        kind: Pod
        metadata:
          name: satellite
        spec:
          volumes:
            - name: lib-modules
              hostPath:
                path: /run/current-system/kernel-modules/lib/modules
                type: Directory
