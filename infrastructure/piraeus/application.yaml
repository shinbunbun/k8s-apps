# Piraeus Operator - LINSTOR + DRBD 分散ストレージ
#
# カーネルレベルの DRBD レプリケーションで PVC の HA を実現する。
# NixOS ではホスト側で DRBD 9 カーネルモジュールをプリロードし、
# drbd-module-loader は依存モジュールのみロード（LB_HOW=deps_only）する。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: piraeus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ghcr.io/piraeusdatastore/piraeus-operator
    chart: piraeus
    targetRevision: "2.10.5"
    helm:
      valuesObject:
        installCRDs: true
        extraManifests:
          # LinstorCluster CR
          - apiVersion: piraeus.io/v1
            kind: LinstorCluster
            metadata:
              name: linstorcluster
            spec:
              # linstor-csi-controller の sidecar ノイズ抑制 patch
              # - csi-snapshotter: snapshot.storage.k8s.io CRD 未導入のため pause image に差し替えて停止
              # - csi-attacher: linstor-csi v1.10.6 が PublishedNodeIds を空配列で
              #   返すバグ (NodesAndConditionFromResources が temporary-diskless-attach
              #   property を持つ resource のみ列挙) により reconcile-sync 周期で
              #   "attached=true found=false" の error log を全 VA に対して吐く
              #   問題を回避するため、reconcile-sync を実質無効化 (default 1m → 87600h)。
              #   informer による event-driven reconcile は維持されるため機能影響なし。
              # 復旧手順: 各 patch ブロックを削除すれば元に戻る (可逆)。
              patches:
                - target:
                    kind: Deployment
                    name: linstor-csi-controller
                  patch: |
                    apiVersion: apps/v1
                    kind: Deployment
                    metadata:
                      name: linstor-csi-controller
                    spec:
                      template:
                        spec:
                          containers:
                            - name: csi-snapshotter
                              # csi-snapshotter image (registry.k8s.io/sig-storage/csi-snapshotter)
                              # は distroless ベースで /bin/sh を持たないため、image ごと
                              # pause に差し替えて何もしない sidecar 化する。
                              image: registry.k8s.io/pause:3.10
                              args: null
                              livenessProbe: null
                              readinessProbe: null
                            - name: csi-attacher
                              args:
                                - --v=$(VERBOSE)
                                - --csi-address=$(ADDRESS)
                                - --timeout=$(TIMEOUT)
                                - --leader-election=$(LEADER_ELECTION)
                                - --leader-election-namespace=$(NAMESPACE)
                                - --worker-threads=$(WORKER_THREADS)
                                - --http-endpoint=$(HTTP_ENDPOINT)
                                - --reconcile-sync=87600h
          # NixOS 向け Satellite 設定
          # piraeus チャートは linstorSatelliteConfiguration values を処理しないため、
          # extraManifests で LinstorSatelliteConfiguration CR を直接作成する
          - apiVersion: piraeus.io/v1
            kind: LinstorSatelliteConfiguration
            metadata:
              name: nixos-config
            spec:
              # JSON Patch (RFC 6902) で NixOS 向けにボリュームとコンテナを修正
              # strategic merge patch ではボリュームの type 変更（hostPath→emptyDir）が不可能なため
              # JSON Patch でインデックス指定で直接置換する
              #
              # デフォルトの volumes 順序:
              #   0: lib-modules (hostPath: /lib/modules)
              #   1: usr-src (hostPath: /usr/src)
              # デフォルトの initContainers 順序:
              #   0: drbd-module-loader
              patches:
                - target:
                    kind: Pod
                    name: satellite
                  patch: |
                    # lib-modules: NixOS のカーネルモジュールパスに変更
                    # /run/booted-system/ は稼働中カーネルに対応
                    - op: replace
                      path: /spec/volumes/0/hostPath/path
                      value: /run/booted-system/kernel-modules/lib/modules
                    # usr-src: hostPath を削除して emptyDir に置換
                    # NixOS に /usr/src は存在しない。deps_only でビルド不要のため空で良い
                    - op: remove
                      path: /spec/volumes/1/hostPath
                    - op: add
                      path: /spec/volumes/1/emptyDir
                      value: {}
                    # drbd-module-loader: deps_only モードに置換
                    # DRBD 9 はホスト側でプリロード済み、依存モジュールのみロードする
                    - op: replace
                      path: /spec/initContainers/0
                      value:
                        name: drbd-module-loader
                        image: quay.io/piraeusdatastore/drbd9-noble:v9.3.2
                        env:
                          - name: LB_HOW
                            value: deps_only
                        securityContext:
                          capabilities:
                            add: [SYS_MODULE]
                            drop: [ALL]
                          readOnlyRootFilesystem: true
                        volumeMounts:
                          - mountPath: /lib/modules
                            name: lib-modules
                            readOnly: true
                          - mountPath: /tmp
                            name: tmp
              # LVM thin pool ストレージプール
              storagePools:
                - name: thinpool
                  lvmThinPool:
                    volumeGroup: vg_linstor
                    thinPool: thinpool
        operator:
          controller:
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
          satellite:
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: piraeus-datastore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
