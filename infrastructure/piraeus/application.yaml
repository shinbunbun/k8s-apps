# Piraeus Operator - LINSTOR + DRBD 分散ストレージ
#
# カーネルレベルの DRBD レプリケーションで PVC の HA を実現する。
# NixOS ではホスト側で DRBD 9 カーネルモジュールをプリロードし、
# drbd-module-loader は依存モジュールのみロード（LB_HOW=deps_only）する。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: piraeus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ghcr.io/piraeusdatastore/piraeus-operator
    chart: piraeus
    targetRevision: "2.10.5"
    helm:
      valuesObject:
        installCRDs: true
        extraManifests:
          # LinstorCluster CR
          - apiVersion: piraeus.io/v1
            kind: LinstorCluster
            metadata:
              name: linstorcluster
            spec: {}
          # NixOS 向け Satellite 設定
          # piraeus チャートは linstorSatelliteConfiguration values を処理しないため、
          # extraManifests で LinstorSatelliteConfiguration CR を直接作成する
          - apiVersion: piraeus.io/v1
            kind: LinstorSatelliteConfiguration
            metadata:
              name: nixos-config
            spec:
              # podTemplate: DaemonSet の Pod テンプレートに strategic merge patch を適用
              # $patch: delete で既存のボリューム・コンテナを削除し、patches で再追加する
              # （同名エントリの delete + add は同一パッチ内では不可能なため 2 段階で処理）
              podTemplate:
                spec:
                  initContainers:
                    # デフォルトの drbd-module-loader を削除（patches で deps_only 版として再追加）
                    - name: drbd-module-loader
                      $patch: delete
                  volumes:
                    # デフォルトの lib-modules（/lib/modules）と usr-src（/usr/src）を削除
                    # NixOS ではパスが異なるため patches で正しいパスで再定義する
                    - name: lib-modules
                      $patch: delete
                    - name: usr-src
                      $patch: delete
              # patches: podTemplate による削除後、kustomize パッチで再追加
              # target に kind: Pod, name: satellite を指定すると、operator 内部の
              # barepodpatch 機構が DaemonSet linstor-satellite への適用に自動変換する
              patches:
                # drbd-module-loader を deps_only モードで再追加
                # DRBD 9 カーネルモジュールはホスト側でプリロード済みのため、
                # ビルドは不要で依存モジュール（libcrc32c 等）のみロードする
                - target:
                    kind: Pod
                    name: satellite
                  patch: |
                    apiVersion: v1
                    kind: Pod
                    metadata:
                      name: satellite
                    spec:
                      initContainers:
                        - name: drbd-module-loader
                          image: quay.io/piraeusdatastore/drbd9-noble:v9.3.1
                          env:
                            - name: LB_HOW
                              value: deps_only
                          securityContext:
                            capabilities:
                              add: [SYS_MODULE]
                              drop: [ALL]
                            readOnlyRootFilesystem: true
                          volumeMounts:
                            - mountPath: /lib/modules
                              name: lib-modules
                              readOnly: true
                            - mountPath: /tmp
                              name: tmp
                      volumes:
                        # NixOS のカーネルモジュールパス
                        # /run/booted-system/ は稼働中カーネルに対応（current-system はリビルド後に変わる）
                        - name: lib-modules
                          hostPath:
                            path: /run/booted-system/kernel-modules/lib/modules
                            type: Directory
                        # /usr/src は NixOS に存在しないため emptyDir に置換
                        - name: usr-src
                          emptyDir: {}
              # LVM thin pool ストレージプール
              storagePools:
                - name: thinpool
                  lvmThinPool:
                    volumeGroup: vg_linstor
                    thinPool: thinpool
        operator:
          controller:
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
          satellite:
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: piraeus-datastore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
