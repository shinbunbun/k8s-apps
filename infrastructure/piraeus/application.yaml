# Piraeus Operator - LINSTOR + DRBD 分散ストレージ
#
# カーネルレベルの DRBD レプリケーションで PVC の HA を実現する。
# NixOS ではホスト側で DRBD 9 カーネルモジュールをプリロードし、
# drbd-module-loader は依存モジュールのみロード（LB_HOW=deps_only）する。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: piraeus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ghcr.io/piraeusdatastore/piraeus-operator
    chart: piraeus
    targetRevision: "2.10.7"
    helm:
      valuesObject:
        installCRDs: true
        extraManifests:
          # LinstorCluster CR
          - apiVersion: piraeus.io/v1
            kind: LinstorCluster
            metadata:
              name: linstorcluster
            spec:
              # operator が生成する Deployment への patches (順次適用):
              #
              # 【patch[0]】linstor-controller の probe/toleration 緩和 (2026-05 全停止インシデント由来)
              # - replicas は operator デフォルトの 1 を維持 (= シングルトン)。
              #   2026-05 に一時 replicas=2 にしたが、standby は :3370 を serve せず常に
              #   serving:false (EndpointSlice 実査) なため startupProbe が永久失敗し約10分毎に
              #   crashloop するだけで、肝心の involuntary failover でも昇格側が結局 JVM cold
              #   start するので zero-endpoint 窓は消えない (= HA になっていなかった)。
              #   LINSTOR controller は DB ロックを持つシングルトンでホットスタンバイ不可。
              #   瞬断自体は csi の継続リトライ + DRBD の I/O 継続で自己回復するため、
              #   replicas を増やすより 1 に戻して crashloop を解消する判断 (2026-06-30)。
              # - strategy は RollingUpdate のまま据え置く (operator デフォルトは Recreate)。
              #   ただし leader election でリーダー重複不可なため、replicas=1 では更新時に
              #   旧 Pod 終了→新 Pod 昇格→cold start のギャップが残り、実質 Recreate と
              #   ほぼ同等 (maxSurge は緩衝にならない)。最小 diff のため strategy 自体は不変更。
              # - livenessProbe timeoutSeconds 1 → 10、periodSeconds 10 → 30、
              #   startupProbe failureThreshold 30 → 60。
              #   Java GC pause / Kubernetes-CRD DB 読み込み中の 1秒タイムアウトに
              #   連続 hit して本来正常な起動中 Pod が連続 kill されていた。
              #   30s 間隔 x failureThreshold=3 で 90s 猶予を確保。
              # - tolerationSeconds 30 → 300 (operator デフォルトの 30s を k8s 標準に戻す。
              #   一過性の NodeNotReady で即 evict されない)。
              # - topologySpreadConstraints は replicas=1 では no-op (将来の複数化に備え残置)。
              # - DRBD 系 toleration (force-io-error/lost-quorum) は controller pod が
              #   DRBD を直接操作しないため明示しない (operator デフォルトに任せる)。
              #
              # 【patch[1]】linstor-csi-controller (sidecar 抑制 + HA を 1 entry に統合)
              # - csi-snapshotter: snapshot.storage.k8s.io CRD 未導入のため pause image に
              #   差し替えて停止 (distroless ベースの本来 image は /bin/sh を持たない)。
              # - csi-attacher: linstor-csi v1.10.6 が PublishedNodeIds を空配列で
              #   返すバグ (NodesAndConditionFromResources が temporary-diskless-attach
              #   property を持つ resource のみ列挙) により reconcile-sync 周期で
              #   "attached=true found=false" の error log を全 VA に対して吐く問題を回避するため、
              #   reconcile-sync を実質無効化 (default 1m → 87600h)。
              #   informer による event-driven reconcile は維持されるため機能影響なし。
              # - replicas: 1 → 2 (sidecar 全てが --leader-election=true 済みなので
              #   active-active 競合なし、leader 1 つだけが実 work を行う)。
              # - tolerationSeconds: 300 + topologySpreadConstraints で別ノード分散。
              #
              # 復旧手順: 各 patch ブロックを削除すれば元に戻る (可逆)。
              patches:
                # 【patch[0]】linstor-controller (replicas=1 + probe/toleration 緩和)
                - target:
                    kind: Deployment
                    name: linstor-controller
                  patch: |
                    apiVersion: apps/v1
                    kind: Deployment
                    metadata:
                      name: linstor-controller
                    spec:
                      replicas: 1
                      strategy:
                        type: RollingUpdate
                        rollingUpdate:
                          maxUnavailable: 1
                          maxSurge: 1
                      template:
                        spec:
                          containers:
                            - name: linstor-controller
                              livenessProbe:
                                httpGet:
                                  path: /health
                                  port: api
                                  scheme: HTTP
                                periodSeconds: 30
                                timeoutSeconds: 10
                                failureThreshold: 3
                                successThreshold: 1
                              startupProbe:
                                httpGet:
                                  path: /health
                                  port: api
                                  scheme: HTTP
                                periodSeconds: 10
                                timeoutSeconds: 5
                                failureThreshold: 60
                                successThreshold: 1
                          tolerations:
                            - effect: NoExecute
                              key: node.kubernetes.io/not-ready
                              operator: Exists
                              tolerationSeconds: 300
                            - effect: NoExecute
                              key: node.kubernetes.io/unreachable
                              operator: Exists
                              tolerationSeconds: 300
                          topologySpreadConstraints:
                            - maxSkew: 1
                              topologyKey: kubernetes.io/hostname
                              whenUnsatisfiable: DoNotSchedule
                              labelSelector:
                                matchLabels:
                                  app.kubernetes.io/component: linstor-controller

                # 【patch[1]】linstor-csi-controller (sidecar 抑制 + HA を 1 entry に統合)
                - target:
                    kind: Deployment
                    name: linstor-csi-controller
                  patch: |
                    apiVersion: apps/v1
                    kind: Deployment
                    metadata:
                      name: linstor-csi-controller
                    spec:
                      replicas: 2
                      template:
                        spec:
                          containers:
                            - name: csi-snapshotter
                              image: registry.k8s.io/pause:3.10
                              args: null
                              livenessProbe: null
                              readinessProbe: null
                            - name: csi-attacher
                              args:
                                - --v=$(VERBOSE)
                                - --csi-address=$(ADDRESS)
                                - --timeout=$(TIMEOUT)
                                - --leader-election=$(LEADER_ELECTION)
                                - --leader-election-namespace=$(NAMESPACE)
                                - --worker-threads=$(WORKER_THREADS)
                                - --http-endpoint=$(HTTP_ENDPOINT)
                                - --reconcile-sync=87600h
                          tolerations:
                            - effect: NoExecute
                              key: node.kubernetes.io/not-ready
                              operator: Exists
                              tolerationSeconds: 300
                            - effect: NoExecute
                              key: node.kubernetes.io/unreachable
                              operator: Exists
                              tolerationSeconds: 300
                          topologySpreadConstraints:
                            - maxSkew: 1
                              topologyKey: kubernetes.io/hostname
                              whenUnsatisfiable: DoNotSchedule
                              labelSelector:
                                matchLabels:
                                  app.kubernetes.io/component: linstor-csi-controller
          # NixOS 向け Satellite 設定
          # piraeus チャートは linstorSatelliteConfiguration values を処理しないため、
          # extraManifests で LinstorSatelliteConfiguration CR を直接作成する
          - apiVersion: piraeus.io/v1
            kind: LinstorSatelliteConfiguration
            metadata:
              name: nixos-config
            spec:
              # JSON Patch (RFC 6902) で NixOS 向けにボリュームとコンテナを修正
              # strategic merge patch ではボリュームの type 変更（hostPath→emptyDir）が不可能なため
              # JSON Patch でインデックス指定で直接置換する
              #
              # デフォルトの volumes 順序:
              #   0: lib-modules (hostPath: /lib/modules)
              #   1: usr-src (hostPath: /usr/src)
              # デフォルトの initContainers 順序:
              #   0: drbd-module-loader
              patches:
                - target:
                    kind: Pod
                    name: satellite
                  patch: |
                    # lib-modules: NixOS のカーネルモジュールパスに変更
                    # /run/booted-system/ は稼働中カーネルに対応
                    - op: replace
                      path: /spec/volumes/0/hostPath/path
                      value: /run/booted-system/kernel-modules/lib/modules
                    # usr-src: hostPath を削除して emptyDir に置換
                    # NixOS に /usr/src は存在しない。deps_only でビルド不要のため空で良い
                    - op: remove
                      path: /spec/volumes/1/hostPath
                    - op: add
                      path: /spec/volumes/1/emptyDir
                      value: {}
                    # drbd-module-loader: deps_only モードに置換
                    # DRBD 9 はホスト側でプリロード済み、依存モジュールのみロードする
                    - op: replace
                      path: /spec/initContainers/0
                      value:
                        name: drbd-module-loader
                        image: quay.io/piraeusdatastore/drbd9-noble:v9.3.2
                        env:
                          - name: LB_HOW
                            value: deps_only
                        securityContext:
                          capabilities:
                            add: [SYS_MODULE]
                            drop: [ALL]
                          readOnlyRootFilesystem: true
                        volumeMounts:
                          - mountPath: /lib/modules
                            name: lib-modules
                            readOnly: true
                          - mountPath: /tmp
                            name: tmp
              # LVM thin pool ストレージプール
              storagePools:
                - name: thinpool
                  lvmThinPool:
                    volumeGroup: vg_linstor
                    thinPool: thinpool
        operator:
          controller:
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
          satellite:
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: piraeus-datastore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
