# Piraeus Operator - LINSTOR + DRBD 分散ストレージ
#
# カーネルレベルの DRBD レプリケーションで PVC の HA を実現する。
# NixOS ではホスト側で DRBD 9 カーネルモジュールをプリロードし、
# drbd-module-loader は依存モジュールのみロード（LB_HOW=deps_only）する。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: piraeus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ghcr.io/piraeusdatastore/piraeus-operator
    chart: piraeus
    targetRevision: "2.10.5"
    helm:
      valuesObject:
        installCRDs: true
        extraManifests:
          # LinstorCluster CR
          - apiVersion: piraeus.io/v1
            kind: LinstorCluster
            metadata:
              name: linstorcluster
            spec: {}
          # NixOS 向け Satellite 設定
          # piraeus チャートは linstorSatelliteConfiguration values を処理しないため、
          # extraManifests で LinstorSatelliteConfiguration CR を直接作成する
          - apiVersion: piraeus.io/v1
            kind: LinstorSatelliteConfiguration
            metadata:
              name: nixos-config
            spec:
              patches:
                # drbd-module-loader: 依存モジュールのみロード
                # DRBD 9 はホスト側でプリロード済みのため、ビルドは不要
                - target:
                    kind: Pod
                    name: satellite
                  patch: |
                    apiVersion: v1
                    kind: Pod
                    metadata:
                      name: satellite
                    spec:
                      initContainers:
                        - name: drbd-module-loader
                          $patch: replace
                          name: drbd-module-loader
                          image: quay.io/piraeusdatastore/drbd9-noble:v9.3.1
                          env:
                            - name: LB_HOW
                              value: deps_only
                          securityContext:
                            capabilities:
                              add: [SYS_MODULE]
                              drop: [ALL]
                            readOnlyRootFilesystem: true
                          volumeMounts:
                            - mountPath: /lib/modules
                              name: lib-modules
                              readOnly: true
                            - mountPath: /tmp
                              name: tmp
                      volumes:
                        # NixOS のカーネルモジュールパス
                        # /run/booted-system/ は稼働中カーネルに対応（current-system はリビルド後に変わる）
                        - name: lib-modules
                          hostPath:
                            path: /run/booted-system/kernel-modules/lib/modules
                            type: Directory
                        # /usr/src は NixOS に存在しないため emptyDir に置換
                        - name: usr-src
                          emptyDir: {}
              # LVM thin pool ストレージプール
              storagePools:
                - name: thinpool
                  lvmThinPool:
                    volumeGroup: vg_linstor
                    thinPool: thinpool
        operator:
          controller:
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
          satellite:
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: piraeus-datastore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
