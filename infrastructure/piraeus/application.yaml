# Piraeus Operator - LINSTOR + DRBD 分散ストレージ
#
# カーネルレベルの DRBD レプリケーションで PVC の HA を実現する。
# NixOS ではホスト側で DRBD カーネルモジュールをプリロードし、
# Piraeus の DRBD Module Loader を無効化する（イミュータブル OS 対応）。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: piraeus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ghcr.io/piraeusdatastore/piraeus-operator
    chart: piraeus
    targetRevision: "2.10.5"
    helm:
      valuesObject:
        installCRDs: true
        # LinstorCluster CR を作成し、LINSTOR controller/satellite をデプロイ
        linstorCluster: {}
        operator:
          controller:
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
          satellite:
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
        # NixOS 用: カーネルモジュールパスをNixOSのパスに調整
        linstorSatelliteConfiguration:
          patches:
            - target:
                kind: Pod
                name: satellite
              patch: |
                apiVersion: v1
                kind: Pod
                metadata:
                  name: satellite
                spec:
                  volumes:
                    - name: lib-modules
                      hostPath:
                        path: /run/current-system/kernel-modules/lib/modules
                        type: Directory
          # ファイルベース loop device 上の LVM thin pool をストレージプールとして登録
          storagePools:
            - name: thinpool
              lvmThinPool:
                volumeGroup: vg_linstor
                thinPool: thinpool
  destination:
    server: https://kubernetes.default.svc
    namespace: piraeus-datastore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
