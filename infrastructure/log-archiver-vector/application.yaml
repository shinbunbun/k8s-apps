# Vector - ログアーカイブパイプライン (Fluent Forward → Garage ndjson.zst → Parquet)
#
# 設計判断:
#
# 【目的】Fluent Bit が Loki に送っているログを、同時に Fluent Forward protocol で
# Vector に受け、Garage の logs-archive バケットに Parquet (zstd) で保存する。
# Phase 2 の「分析・ML 層」の入口。DuckDB から直接 S3 上の Parquet を読める。
#
# 【Helm chart】vector/vector (公式)。customConfig で vector.toml 相当を
# YAML インラインで指定。
#
# 【role】Aggregator (Deployment)。Fluent Bit から受けて集約してバッチ書き出し
# するので StatefulSet 不要。
#
# 【replicas】2。HA (Helm upgrade / node 障害時のログロスト軽減)。
# 処理能力は 1 pod で十分 (ホームラボ規模 1-5 GB/日)。2 pod の主目的は可用性。
# 各 pod が Fluent Forward 入力を独立で処理し、Garage には UUID ベースの
# ファイル名で別々に書き出す (衝突なし、compaction CronJob が統合)。
#
# 【affinity】podAntiAffinity preferredDuringSchedulingIgnoredDuringExecution
# で node 分散。g3pro (Intel N150、CPU 弱) は避けたいが、Vector は軽量なので
# preferred のまま (必須にしない)。
#
# 【ストレージ】S3 (Garage、endpoint 内部 Service port 3900)。
# credentials は vector-garage-credentials Secret (Garage Operator が
# GarageKey "vector" の secretTemplate で log-archiver-vector NS に直接生成) を
# envFrom で注入。AWS SDK 互換の AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY /
# AWS_REGION を読む。
#
# 【スキーマ】transforms.enrich で archived_at (now) と date (timestamp から派生)
# を追加し、全フィールドを ndjson (改行区切り JSON) で書き出す。
# 注: Vector 0.54 時点で aws_s3 sink の encoding.codec に parquet は未対応
# (avro/cef/csv/gelf/json/logfmt/native/native_json/otlp/protobuf/raw_message/
#  text/syslog のみ)。
# そのため Vector は ndjson を出力し、Phase 2c の compaction CronJob で
# DuckDB が read_ndjson_auto() で読み取って Parquet zstd に変換する 2 段構成。
# スキーマは動的 (host/service/level/message/timestamp/labels/job を暗黙に持つ)、
# DuckDB 側で read_ndjson_auto が推論する。
#
# 【port】
# - 24224/TCP: Fluent Forward protocol (Fluent Bit からの入力)
# - 9598/TCP: Prometheus exporter (Vector 自体のメトリクス、Phase 0 の
#             storage-capacity ダッシュボードで監視)
#
# 【sync-wave】10: apps/garage (GarageBucket logs-archive 作成) より後。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: log-archiver-vector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://helm.vector.dev
    chart: vector
    # Chart 0.51.0 = Vector 0.54.0-distroless-libc (2026-03 時点 最新安定)。
    # https://github.com/vectordotdev/helm-charts/releases
    # 将来 chart が更新されたらこの tag を上げる。
    targetRevision: "0.52.0"
    helm:
      valuesObject:
        role: Aggregator
        replicas: 2

        # node 分散 (homemachine / nixos-desktop / g3pro のいずれかに配置、
        # なるべく別ノードに分かれるよう preferred anti-affinity)
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: vector
                      app.kubernetes.io/instance: log-archiver-vector
                  topologyKey: kubernetes.io/hostname

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Garage credentials を環境変数として注入 (AWS SDK 標準)。
        # vector-garage-credentials Secret は Garage Operator が GarageKey "vector" の
        # secretTemplate で log-archiver-vector NS に自動生成 (apps/garage/keys.yaml)。
        # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION の 3 フィールド。
        envFrom:
          - secretRef:
              name: vector-garage-credentials

        # Vector 自身の Prometheus メトリクスを VMAgent が拾えるように
        # Prometheus exporter sink を有効化する (下の customConfig 参照)。
        # ついでに追加の Service port も開ける。
        service:
          enabled: true
          ports:
            - name: fluent
              port: 24224
              protocol: TCP
              targetPort: 24224
            - name: metrics
              port: 9598
              protocol: TCP
              targetPort: 9598

        # Vector のパイプライン定義 (vector.toml 相当の YAML)
        # customConfig を指定すると chart の default config を無視する。
        customConfig:
          data_dir: /vector-data-dir
          api:
            enabled: true
            address: 0.0.0.0:8686
          sources:
            # Fluent Bit からの Fluent Forward 入力
            fluent_bit_forward:
              type: fluent
              address: 0.0.0.0:24224
            # Vector 自身のメトリクス
            vector_metrics:
              type: internal_metrics
          transforms:
            # timestamp から date / hour フィールドを派生させ、S3 partitioning に使う。
            # JST 基準で計算する: aws_s3 sink の key_prefix で strftime (%Y-%m-%d 等)
            # を使うと UTC で評価されてしまい、JST 基準で「昨日」を集計する
            # compact.py と 9 時間ずれる (date=YYYY-MM-DD partition に翌日 JST 早朝
            # 9 時間のレコードが混入し、当日 JST 早朝 9 時間のレコードは前日 partition
            # に置き去りになる)。VRL で timezone を明示してフィールド化し、key_prefix
            # からこれを参照することで sink 側の UTC 評価を回避する。
            enrich:
              type: remap
              inputs: [fluent_bit_forward]
              source: |
                .archived_at = now()
                # .timestamp は fluent source が event time (timestamp 型) を入れるが、
                # Fluent Bit 側の record に `timestamp` が既にある (parser で JSON 抽出した
                # ケース等) と string で上書きされる。format_timestamp の非 bang 版を
                # 使い fallible にし、変換不能時は archive 時刻で fallback する。
                .date = format_timestamp(.timestamp, format: "%Y-%m-%d", timezone: "Asia/Tokyo") ?? format_timestamp!(now(), format: "%Y-%m-%d", timezone: "Asia/Tokyo")
                .hour = format_timestamp(.timestamp, format: "%H", timezone: "Asia/Tokyo") ?? format_timestamp!(now(), format: "%H", timezone: "Asia/Tokyo")
          sinks:
            # Garage (S3 互換) へ ndjson + zstd で書き出し
            # raw/source=<log_type>/date=YYYY-MM-DD/hour=HH/ prefix で
            # 5 分ごとの小ファイル生成。source は Fluent Bit が付与する
            # log_type (systemd / k8s-pods / routeros / macos-unified)。
            # ソースごとにスキーマが異なるため、DuckDB read_ndjson の
            # スキーマ推論を破綻させないよう物理ファイルを分離する。
            # 日次 compaction CronJob (Phase 2c) で DuckDB が source 別に
            # 読んで daily/date=.../source=.../logs.parquet に変換する。
            garage_ndjson_raw:
              type: aws_s3
              inputs: [enrich]
              bucket: logs-archive
              endpoint: http://garage.garage.svc.cluster.local:3900
              region: garage
              # auth は envFrom 由来の AWS_* 環境変数を暗黙に読む
              # Vector の helm chart は customConfig を tpl で再評価するため、
              # Vector 自身の template ({{ field }}) を Helm にパースさせない
              # よう Go template の raw string literal ({{`...`}}) で escape する。
              # date / hour は enrich transform が JST で計算したフィールドを参照。
              # strftime (%Y-%m-%d / %H) は UTC 評価のため使わない。
              key_prefix: 'raw/source={{`{{ log_type }}`}}/date={{`{{ date }}`}}/hour={{`{{ hour }}`}}/'
              encoding:
                codec: json
              # aws_s3 sink は codec=json の時 default で newline_delimited framing
              # を適用するため出力は ndjson (1 行 1 JSON オブジェクト)。
              compression: zstd
              batch:
                timeout_secs: 300
                max_bytes: 104857600 # 100 MiB
            # Prometheus メトリクス exporter (VMAgent scrape 対象)
            prometheus_exporter:
              type: prometheus_exporter
              inputs: [vector_metrics]
              address: 0.0.0.0:9598
  destination:
    server: https://kubernetes.default.svc
    namespace: log-archiver-vector
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
