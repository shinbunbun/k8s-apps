# Barman Cloud Plugin - CNPG の S3 互換バックアップ Plugin
#
# CloudNativePG Operator と gRPC (mTLS) で通信し、barman-cloud を使って
# WAL archive / base backup を S3 互換ストレージ (MinIO) に書き込む。
# Plugin は Operator と同じ cnpg-system namespace にインストールが必須。
#
# manifest.yaml は公式リリース v0.12.0 を vendor したもの:
# https://github.com/cloudnative-pg/plugin-barman-cloud/releases/download/v0.12.0/manifest.yaml
# アップグレード時は上記 URL から新バージョンの manifest.yaml を取得して上書きする。
#
# 注: Plugin v0.12.0 は HA 設計でない。leader election 採用の active-standby だが
# follower pod の readiness probe (tcp-socket :9090) は leader-only listen 構造の
# ため永遠に通らず、replicas>1 + RollingUpdate でデッドロックする。
# replicas=1 + Recreate のまま運用し、ノード障害時は kubelet eviction toleration
# (5分) で自動再スケジュールに任せる。Plugin 公式デプロイ例も replicas=1 が前提。
#
# 依存: cert-manager (infrastructure/cert-manager/, sync-wave -15) が
# Plugin manifest 内の selfSigned Issuer + Certificate を処理する。
#
# sync-wave -5 で cert-manager (-15) / cnpg-operator (-10) の後にデプロイ。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-barman-plugin
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: default
  source:
    repoURL: git@github.com:shinbunbun/k8s-apps.git
    targetRevision: main
    path: manifests/cnpg-barman-plugin
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
