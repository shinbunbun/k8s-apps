# Altinity ClickHouse Operator - ClickHouseInstallation (CHI) CR を宣言的に管理
#
# 用途: dotfiles-private #215 (Grafana の Garage Parquet 集計を ClickHouse へ移行)
# の前提として ClickHouseInstallation CRD と controller をクラスタに導入する。
# CHI CR 本体は apps/clickhouse/ で別管理 (App-of-Apps の ApplicationSet で自動 pickup)。
#
# 【選定理由】
# - operator は 2026-05 時点で active maintenance (release-0.27.0)、all-in-one chart や
#   個人 unsigned plugin (motherduck-duckdb-datasource = #212 廃案) と異なり長期 supportable
# - CHI CR は flat YAML で柔軟、helm chart より細かい制御が効く
# - 既存パターン (garage-operator / cnpg-operator) と同じ「Operator + CR」分離方式
#
# 【sync-wave】-3 は garage-operator (-5) の後、GarageKey/Bucket (1) の前。
# CRD 導入を先行させて apps/clickhouse/ の CHI が apply される時点で controller 起動済を保証。
#
# 【helm repo】Altinity 公式 helm repo `https://docs.altinity.com/clickhouse-operator/`。
# chart 名は `altinity-clickhouse-operator` (release tag と同名)。
#
# 【watch スコープ】chart デフォルト (`configs.files."config.yaml".watch.namespaces.include: []`)
# は operator pod の自 namespace (`clickhouse-operator`) のみ watch する仕様。CHI 本体は
# 別 namespace (`clickhouse`) に置くため全 namespace 監視を強制する必要がある。
# chart の entrypoint は config.yaml 内の `WATCH_NAMESPACES=` プレースホルダを env 値で
# 置換する公式 hook を持つので、`operator.env` で `WATCH_NAMESPACES=.*` を渡す方式が
# 最も安全 (configs.files 全体を override すると defaults が消えるリスクあり)。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clickhouse-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  source:
    repoURL: https://docs.altinity.com/clickhouse-operator/
    chart: altinity-clickhouse-operator
    targetRevision: "0.27.0"
    helm:
      valuesObject:
        operator:
          # WATCH_NAMESPACES=.* で全 namespace を監視させる (詳細は冒頭【watch スコープ】参照)。
          # chart の entrypoint が config.yaml の WATCH_NAMESPACES= プレースホルダをこの env
          # で置換する公式 hook。`configs.files."config.yaml".watch.namespaces` を直接
          # override すると chart デフォルト config 全体を上書きしてしまうため env 方式を採用。
          env:
            - name: WATCH_NAMESPACES
              value: ".*"
  destination:
    server: https://kubernetes.default.svc
    namespace: clickhouse-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # CRD (ClickHouseInstallation 等) が大きいため client-side apply の annotation
      # 上限を回避するため必須 (garage-operator と同パターン)
      - ServerSideApply=true
