# Grafana - 可視化 UI (HA, 2 レプリカ)
#
# values は chart デフォルトを活かし、運用上の差分だけを明示:
# - replicas: 2 (chart デフォルト 1)
# - admin: existingSecret (OIDC 優先なのでフォールバック用途)
# - envFromSecret: grafana-secrets (DB / OAuth / secret_key を注入)
# - grafana.ini: database, auth.generic_oauth, alerting 無効化、analytics 無効化
# - extraConfigmapMounts: datasources provisioning ConfigMap をマウント
# - sidecar.dashboards: label grafana_dashboard=1 を grafana namespace 内で探索
# - affinity: podAntiAffinity preferred でノード分散
# - persistence: chart デフォルト無効のまま (/var/lib/grafana と /var/lib/grafana-search
#   は chart が自動で emptyDir マウントするので unified_storage.index_path もそのまま動く)
# - unified_alerting: 有効化（アラート表示のみ、ルール評価は vmalert が担当）
#
# NOTE: motherduck DuckDB datasource プラグインは chart 11.x で plugin install 機構
# (GF_PLUGINS_PREINSTALL_SYNC) が Plugin Catalog ID 形式しか受けなくなり、
# unsigned 配布の zip URL install で 404 → CrashLoopBackOff となったため一旦撤去。
# 復活方針 (extraInitContainers での手動展開 等) は dotfiles-private の Issue を参照。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    # Cluster より後でデプロイ (cnpg-operator -10 → Cluster 0 → grafana 10)
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    # 2026-01-30 以降、grafana chart は grafana-community/helm-charts へ移行された
    # (旧 grafana/helm-charts では更新が止まる)。詳細: grafana/helm-charts#4087
    repoURL: https://grafana-community.github.io/helm-charts
    chart: grafana
    # Chart 12.1.3 bundles Grafana 13.0.1 appVersion。image.tag は上書きせず
    # chart デフォルトに任せる。
    # 注: chart 12.0.0 / 12.0.1 / 12.1.0 は appVersion 13.0.0 だが grafana/grafana:13.0.0
    # image が Docker Hub に未公開 (GA skip)、chart 12.1.1 で appVersion 13.0.1 に
    # 修正済。これらの版を踏むと ImagePullBackOff となるため 12.1.x 最新を採用。
    # chart 12.2.x / 12.3.0 への patch は別 PR で対応 (chart helm template の細かい差分のみ)。
    #
    # Grafana 12 → 13 メジャーアップグレードのチェック (2026-05-11 時点):
    # - annotation full-rewrite migration: 0 rows / 72 kB → 影響なし
    # - unified storage 自動 migration: 既に chart 11.x で有効化済、自動完了する
    # - Image Renderer plugin 内蔵廃止: 未使用なので影響なし
    # - Legacy Alertmanager API 削除: unified_alerting.enabled=true で対応済
    # - React 18→19: motherduck plugin が PR #308 で撤去済、UI 影響なし
    # - 直近 backup: 2026-05-10T18:00 完了済 (Barman Cloud Plugin)
    # - rollback: chart pin を戻すだけでは Grafana 13→12 ダウングレードは公式非サポート、
    #   失敗時は CNPG Cluster を直近 base backup から restore (kubectl cnpg restore) する
    targetRevision: "12.1.3"
    helm:
      valuesObject:
        replicas: 2

        admin:
          existingSecret: grafana-secrets
          userKey: admin-user
          passwordKey: admin-password

        envFromSecret: grafana-secrets

        grafana.ini:
          server:
            domain: grafana.shinbunbun.com
            root_url: https://grafana.shinbunbun.com
          database:
            type: postgres
            host: grafana-db-rw.grafana.svc.cluster.local
            port: 5432
            name: grafana
            user: grafana
            ssl_mode: disable
          analytics:
            reporting_enabled: false
            check_for_updates: false
          "auth.anonymous":
            enabled: false
          "auth.generic_oauth":
            enabled: true
            name: Authentik
            allow_sign_up: true
            scopes: "openid email profile groups"
            auth_url: https://auth.shinbunbun.com/application/o/authorize/
            token_url: https://auth.shinbunbun.com/application/o/token/
            api_url: https://auth.shinbunbun.com/application/o/userinfo/
            role_attribute_path: "contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'"
            auto_login: true
          unified_alerting:
            enabled: true
            execute_alerts: false
          alerting:
            enabled: false

        extraConfigmapMounts:
          - name: datasources
            mountPath: /etc/grafana/provisioning/datasources
            configMap: grafana-datasources
            readOnly: true

        sidecar:
          dashboards:
            enabled: true
            labelValue: "1"
            searchNamespace: grafana
            # ConfigMap annotation grafana_folder の値を Grafana folder 名として採用。
            # 未設定だと sidecar は annotation を読まず、全ダッシュボードが General に
            # 展開される。
            folderAnnotation: grafana_folder
            provider:
              # folderAnnotation で指定されたフォルダ名を動的に作成するために必要
              # (Grafana の dashboard provider が foldersFromFilesStructure=true かつ
              # 動的 folder 生成を許可するモードで動くようにする)。
              foldersFromFilesStructure: true

        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: grafana
                  topologyKey: kubernetes.io/hostname

        # drain 時に 2 replica が同時に失われるのを防止
        podDisruptionBudget:
          minAvailable: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: grafana
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
