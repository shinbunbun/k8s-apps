# VictoriaMetrics Operator
#
# VMCluster, VMAgent, VMAlert 等の CRD を reconcile し、
# Pod のライフサイクルを管理する。
# CRD も同梱 (crds.plain: false) のため、別途 CRDs チャートは不要。
# cnpg-operator と同じ sync-wave (-10) で他コンポーネントより先にデプロイ。
#
# ArgoCD workaround:
# - cert-manager 不使用時に webhook 証明書が sync ごとに再生成される問題を
#   ignoreDifferences + RespectIgnoreDifferences で対処
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    repoURL: https://victoriametrics.github.io/helm-charts/
    chart: victoria-metrics-operator
    targetRevision: "0.62.1"
    helm:
      valuesObject:
        operator:
          # Prometheus Operator CRD (PodMonitor 等 monitoring.coreos.com) は cluster に
          # インストールしておらず、自前 VM CRD のみで運用しているため converter を無効化。
          # v0.69.0 では API group 不在時に該当コントローラを auto-disable しないバグがあり、
          # 有効のままだと cache sync timeout で operator が CrashLoopBackOff する。
          disable_prometheus_converter: true
        # chart の disable_prometheus_converter は SCRAPECONFIG 用 env var を出力しない
        # ため、新フラグ経由で全 6 種を一括 disable する (env var との二重指定で確実化)。
        extraArgs:
          controller.disableReconcileFor: PodMonitor,ServiceMonitor,Probe,PrometheusRule,AlertmanagerConfig,ScrapeConfig
        admissionWebhooks:
          certManager:
            enabled: false
          keepTLSSecret: true
  destination:
    server: https://kubernetes.default.svc
    namespace: victoriametrics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: victoria-metrics-operator-validation
      namespace: victoriametrics
      jsonPointers:
        - /data
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - '.webhooks[]?.clientConfig.caBundle'
