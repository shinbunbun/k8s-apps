# Cilium - eBPF ベースの CNI + kube-proxy 代替 + BGP Service LB
#
# Flannel, kube-proxy, MetalLB を統合的に置き換える。
# RouterOS (AS 65000) と BGP ピアリングし、Service VIP を ECMP で広告する。
#
# 初回は Helm で手動インストール後、ArgoCD 管理に移行する。
# ArgoCD の ServerSideApply が必要（CRD サイズ制限対策）。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io/
    chart: cilium
    targetRevision: "1.19.3"
    helm:
      valuesObject:
        upgradeCompatibility: "1.18"
        kubeProxyReplacement: true
        k8sServiceHost: 127.0.0.1
        k8sServicePort: 6444

        # LoadBalancer Service の eBPF datapath 振り分けアルゴリズム。
        # default の random は新規接続のたびにランダム選択するため、少数の
        # 新規接続 (例: ブラウザの瞬間的バーストなど) で偏ることがある。
        # maglev (consistent hashing) は 5-tuple ベースで決定論的に分散し、
        # 新規接続の分散品質が random より統計的に均等。
        #
        # 注: maglev は N-S (external LoadBalancer) traffic のみに適用、
        # E-W (in-cluster ClusterIP via socket-LB) は socket 直接割当のため
        # 影響なし。永続接続では 5-tuple が固定するので algorithm に
        # 関係なく同じ pod に行き続けるため、Fluent Bit forward などの
        # 永続接続クライアントには効果なし (それらは別途クライアント側
        # round-robin で対処する)。
        # メモリオーバーヘッドあり (デフォルト maglevTableSize=16381、
        # Service 数に応じて増加) だが、ホームラボ規模では無視できる。
        loadBalancer:
          algorithm: maglev

        routingMode: native
        ipv4NativeRoutingCIDR: "10.42.0.0/16"
        autoDirectNodeRoutes: true
        bpf:
          masquerade: true

        ipam:
          operator:
            clusterPoolIPv4PodCIDRList:
              - "10.42.0.0/16"

        bgpControlPlane:
          enabled: true

        prometheus:
          enabled: true
          # デフォルトセットに含まれない opt-in メトリクスを追加有効化
          # (+ prefix でデフォルトセット維持+追加、- prefix で除外、prefix 無しで置換)
          metrics:
            - "+cilium_bpf_syscall_duration_seconds"

        hubble:
          enabled: true
          metrics:
            enabled:
              - dns:labelsContext=source_namespace,destination_namespace
              - drop:labelsContext=source_namespace,destination_namespace
              - tcp:labelsContext=source_namespace,destination_namespace
              - flow:labelsContext=source_namespace,destination_namespace
              - port-distribution
              - icmp:labelsContext=source_namespace,destination_namespace
              - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
            enableOpenMetrics: true
            serviceMonitor:
              enabled: false
          relay:
            enabled: true
            prometheus:
              enabled: true
          ui:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
