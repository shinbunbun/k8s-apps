# Cilium BGP 設定
#
# RouterOS (AS 65000) と BGP ピアリングし、
# Service VIP (192.168.128.0/24) を ECMP で広告する。
#
# 注意事項:
#   - CiliumBGPPeerConfig のタイマーは timers.holdTimeSeconds (整数秒) 形式
#   - gracefulRestart は RouterOS (IPv4 only) と非互換の場合があるため無効化
#     (Issue: https://github.com/cilium/cilium/issues/30367)
#   - CiliumBGPAdvertisement の selector が nil だと何も広告されない
#     → NotIn ワークアラウンドで全 Service を選択
---
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: bgp-cluster
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  bgpInstances:
    - name: routeros-peer
      localASN: 65001
      peers:
        - name: routeros
          peerASN: 65000
          peerAddress: 192.168.1.1
          peerConfigRef:
            name: routeros-config
---
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: routeros-config
spec:
  timers:
    holdTimeSeconds: 30
    keepAliveTimeSeconds: 10
  gracefulRestart:
    enabled: false
  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          advertise: bgp
---
apiVersion: cilium.io/v2
kind: CiliumBGPAdvertisement
metadata:
  name: svc-advertisement
  labels:
    advertise: bgp
spec:
  advertisements:
    - advertisementType: Service
      service:
        addresses:
          - ExternalIP
          - LoadBalancerIP
      selector:
        matchExpressions:
          - { key: somekey, operator: NotIn, values: [ "never-match" ] }
