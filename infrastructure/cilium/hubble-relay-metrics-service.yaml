# Hubble Relay メトリクス公開用 Service
#
# Cilium Helm Chart の `hubble.relay.prometheus.enabled: true` で
# hubble-relay pod 内に port 9966 のメトリクスエンドポイントが立つが、
# デフォルトの `hubble-relay` Service は gRPC port (4245) のみで
# 9966 を expose しない。本 Service で 9966 を ClusterIP 経由で公開し、
# vmagent が `hubble-relay-metrics.kube-system.svc.cluster.local:9966` で
# スクレイプできるようにする。
apiVersion: v1
kind: Service
metadata:
  name: hubble-relay-metrics
  namespace: kube-system
spec:
  type: ClusterIP
  selector:
    k8s-app: hubble-relay
  ports:
    - name: metrics
      port: 9966
      protocol: TCP
      targetPort: 9966
