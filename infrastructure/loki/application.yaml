# Loki - ログ集約 (SimpleScalable, HA, Garage 背景)
#
# 設計判断:
#
# 【モード】deploymentMode: SimpleScalable (chart 公式推奨)。
# read/write/backend の 3 コンポーネント分離で ingester ring の HA が
# memberlist で自動構成され、single-binary で起きる replicas>1 時の
# WAL 破損リスクを回避できる。Microservices は家庭規模に過剰なので採用しない。
#
# 【レプリカ】write/backend は 3 replicas (3 ノード分散、replication_factor: 2 と
# 組み合わせて 1 pod 不在でも 2/3 で quorum 維持)。read は 2 replicas (quorum 不要)。
# これによりノード障害時も rolling update 中も書き込み継続。
# HPA は未設定 (homelab 規模、spike は ingester WAL で吸収できる想定)。
#
# 【ストレージ】v13 + TSDB + S3 (infrastructure/garage-operator + apps/garage)。
# 2026-04 に MinIO (community edition) archive に伴い Garage へ移行。
# bucketNames は GarageBucket CR で宣言済みの loki-chunks / loki-ruler / loki-admin。
# 認証情報は loki-garage-credentials Secret を extraEnvFrom で AWS SDK 標準キー
# (AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY/AWS_REGION) として注入。
# この Secret は Garage Operator が GarageKey CR の secretTemplate で loki NS に
# 直接生成するため、KSOPS による SOPS ファイル配置は不要。
#
# 【Ruler】backend ターゲットに含まれる ruler が apps/loki-config/rules-configmap.yaml
# をマウントして LogQL rule を評価、VMAlertmanager LAN VIP (192.168.128.13:9093) に送信。
# external_url は既存 Grafana を指す。tenant=fake で運用 (multi-tenant 不使用)。
#
# 【retention】14 日 (336h)。loki-chunks の極小チャンクが garage metadata を
# 肥大させていたため 30日(720h) から短縮。長期ログは Parquet アーカイブが担う
# (詳細は limits_config.retention_period のコメント参照)。
#
# 【ネットワーク】
# - Fluent Bit 送信先: loki-lan Service (192.168.128.14 固定 VIP) → write pod 直送
# - Grafana datasource: loki-gateway ClusterIP (chart が自動生成する nginx) 経由で読み取り
# - 外部公開なし (Cloudflare Tunnel にも載せない、LAN 限定)
#
# sync-wave: 10 は garage-operator (-5) より後、GarageCluster/Bucket/Key 初期化後にデプロイ。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    # 2026-04: grafana/helm-charts の loki chart は 7.0.0 から GEL (Grafana Enterprise Logs)
    # 専用化されたため、OSS 向け公式後継の grafana-community/helm-charts に移行。
    # 参考: https://github.com/grafana/loki/issues/20705
    repoURL: https://grafana-community.github.io/helm-charts
    chart: loki
    targetRevision: "18.1.1"
    helm:
      valuesObject:
        deploymentMode: SimpleScalable

        # chart 同梱の MinIO subchart は使わず、外部 Garage (apps/garage) を参照
        minio:
          enabled: false
        # test pod / monitoring 系は不要
        test:
          enabled: false
        lokiCanary:
          enabled: false
        chunksCache:
          enabled: true
          # 2026-05-17: chart デフォルト 8192MB は homemachine (16GB RAM) には過大。
          # 5.5GB/limit 9.6GB まで成長して node メモリ使用率が 93% に達したため半減。
          # memcached limit は allocatedMemory * 1.2 = ~4.8GB に自動縮小される。
          allocatedMemory: 4096
        resultsCache:
          enabled: true
        monitoring:
          # victoria-metrics 側で自前 scrape 設定する (servicemonitor は VM Operator の VMServiceScrape が別)
          dashboards:
            enabled: false
          rules:
            enabled: false
          serviceMonitor:
            enabled: false

        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 2
          schemaConfig:
            configs:
              - from: "2026-04-16"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          storage:
            type: s3
            bucketNames:
              chunks: loki-chunks
              ruler: loki-ruler
              admin: loki-admin
            s3:
              endpoint: garage.garage.svc.cluster.local:3900
              region: garage
              s3ForcePathStyle: true
              insecure: true
              # access_key_id / secret_access_key は env 経由 (loki-garage-credentials Secret)
              # この Secret は Garage Operator が GarageKey CR の secretTemplate で自動生成
          limits_config:
            # retention 14日 (336h)。30日(720h)から短縮。
            # loki-chunks の極小チャンク (211万オブジェクト, 平均4KB) が garage の
            # metadata DB (db.lmdb) を肥大させ homeMachine の disk-pressure を招いていたため、
            # live オブジェクト数を比例削減する。Loki は「直近の高速検索層」に徹し、
            # それ以前のログは OTLP→Vector→Garage の Parquet アーカイブ (logs-archive,
            # DuckDB 経由で参照可) が長期保存を担うので情報は失われない。
            retention_period: 336h
            ingestion_rate_mb: 50
            ingestion_burst_size_mb: 100
            max_query_parallelism: 32
            reject_old_samples: true
            reject_old_samples_max_age: 168h
            # 2026-06-22: k8s-pods を OTLP 取り込みに移行 (infrastructure/alloy)。
            # Alloy が log 属性→resource 属性に昇格した namespace/container/host/level/job
            # のみ index_label とし、pod/instance は log 属性のまま残して structured metadata
            # 化する。これで高基数 pod/instance によるストリーム基数とデプロイ churn を削減
            # (garage の極小チャンク churn → g3pro sda I/O 飽和の根本対策)。pod は
            # `| pod="..."` でクエリ可能なまま、K3sPod* アラートの by(pod) も維持される。
            # 注意: index_label になるのは下記 attributes に列挙したものだけ。flat 名のため
            # Loki デフォルト昇格リスト (k8s.* semconv) には載らず、列挙漏れは全て SM 行き
            # (= ラベル全消失=巨大ストリーム化に直結するので変更時は要検証)。
            # systemd-journal / macos-unified は引き続き native push なので影響なし。
            otlp_config:
              resource_attributes:
                ignore_defaults: true
                attributes_config:
                  - action: index_label
                    attributes:
                      - namespace
                      - container
                      - host
                      - level
                      - job
          compactor:
            retention_enabled: true
            retention_delete_delay: 2h
            retention_delete_worker_count: 150
            delete_request_store: s3
          rulerConfig:
            storage:
              type: local
              local:
                directory: /var/loki/rules
            rule_path: /tmp/loki-rules-temp
            alertmanager_url: http://192.168.128.13:9093
            external_url: https://grafana.shinbunbun.com
            enable_api: true
            enable_alertmanager_v2: true
            ring:
              kvstore:
                store: memberlist
          # 2026-06-22: ingester チャンク蓄積を延長し idle flush 頻度を削減 (極小チャンク churn 根治)。
          # 既定 chunk_idle_period=30m では低流量ストリーム (6,890 streams、各~0.1 行/秒) が
          # chunk_target_size(1.5MB) 到達前に flush され、flush の 95% が idle 理由で平均 4.7KB/
          # 225 行の極小チャンクを ~27万個/日 量産していた。idle 2h / max_age 4h で idle flush を
          # ~4x 削減し、garage の object churn と全ノードのメタデータ書込増幅を比例低減する。
          # chart の templated config の ingester には wal しか無く chunk 系キーが無いため、
          # structuredConfig (mergeOverwrite で最終 deep-merge、wal とは共存) で追加・上書きする。
          structuredConfig:
            ingester:
              chunk_idle_period: 2h
              max_chunk_age: 4h

        # read/write/backend の全コンポーネントに Garage credentials を環境変数で注入
        # (AWS SDK が AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION を自動で拾う)
        read:
          replicas: 2
          extraEnvFrom:
            - secretRef:
                name: loki-garage-credentials
          affinity:
            # 2026-05-26: g3pro (Intel N150) の disk I/O 飽和を回避するため、
            # データプレーン重要 Pod は preferred で g3pro を避ける。詳細は
            # apps/victoriametrics-config/vmcluster.yaml の同コメント参照。
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: NotIn
                        values:
                          - g3pro
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: loki
                        app.kubernetes.io/component: read
                    topologyKey: kubernetes.io/hostname

        write:
          replicas: 3
          extraEnvFrom:
            - secretRef:
                name: loki-garage-credentials
          affinity:
            # g3pro 退避 (read セクション参照)。
            # write は replicas: 3 のため preferred では 3 つ目が g3pro に
            # 残る可能性あり。replicas 削減や required 化は次フェーズで検討。
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: NotIn
                        values:
                          - g3pro
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: loki
                        app.kubernetes.io/component: write
                    topologyKey: kubernetes.io/hostname

        backend:
          replicas: 3
          extraEnvFrom:
            - secretRef:
                name: loki-garage-credentials
          # Ruler が tenant "fake" のルールを評価するため、
          # loki-rules ConfigMap を /var/loki/rules/fake にマウント
          extraVolumes:
            - name: rules
              configMap:
                name: loki-rules
          extraVolumeMounts:
            - name: rules
              mountPath: /var/loki/rules/fake
          affinity:
            # g3pro 退避 (read セクション参照)。
            # backend は compactor (Garage S3 写入) を含むため退避効果が大きい。
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: NotIn
                        values:
                          - g3pro
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: loki
                        app.kubernetes.io/component: backend
                    topologyKey: kubernetes.io/hostname

        gateway:
          enabled: true
          replicas: 2
  destination:
    server: https://kubernetes.default.svc
    namespace: loki
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
