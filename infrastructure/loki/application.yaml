# Loki - ログ集約 (SimpleScalable, HA, MinIO 背景)
#
# 設計判断:
#
# 【モード】deploymentMode: SimpleScalable (chart 公式推奨)。
# read/write/backend の 3 コンポーネント分離で ingester ring の HA が
# memberlist で自動構成され、single-binary で起きる replicas>1 時の
# WAL 破損リスクを回避できる。Microservices は家庭規模に過剰なので採用しない。
#
# 【レプリカ】各コンポーネント 2 replicas。HPA は未設定 (homelab 規模、
# spike は ingester WAL で吸収できる想定)。read は比較的安全に HPA 化できるが
# Phase 1 では固定 replicas で十分。
#
# 【ストレージ】v13 + TSDB + S3 (infrastructure/minio-operator + minio-tenant)。
# 旧 NixOS Loki の v11/BoltDB/filesystem から完全新規スキーマで起動、
# 過去 30 日分のログは移行しない (retention 切れとともに自然消失)。
# bucketNames は Tenant CRD で宣言作成済みの loki-chunks / loki-ruler / loki-admin。
# 認証情報は loki-minio-credentials Secret (KSOPS) を extraEnvFrom で AWS SDK 標準キー
# (AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY) として注入し、Helm values には書かない。
#
# 【Ruler】backend ターゲットに含まれる ruler が apps/loki-config/rules-configmap.yaml
# をマウントして LogQL rule を評価、VMAlertmanager LAN VIP (192.168.128.13:9093) に送信。
# external_url は既存 Grafana を指す。tenant=fake で運用 (multi-tenant 不使用)。
#
# 【retention】30 日 (720h) を踏襲。NixOS 側 Loki の挙動と揃える。
#
# 【ネットワーク】
# - Fluent Bit 送信先: loki-lan Service (192.168.128.14 固定 VIP) → write pod 直送
# - Grafana datasource: loki-gateway ClusterIP (chart が自動生成する nginx) 経由で読み取り
# - 外部公開なし (Cloudflare Tunnel にも載せない、LAN 限定)
#
# sync-wave: 10 は minio-operator (-5) より後、Tenant 初期化後にデプロイされる位置。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    # Chart 6.55.0 = Loki 3.6.7 (https://github.com/grafana/loki/blob/main/production/helm/loki/Chart.yaml)
    targetRevision: "6.55.0"
    helm:
      valuesObject:
        deploymentMode: SimpleScalable

        # chart 同梱の MinIO subchart は使わず、infrastructure/minio-operator 側を参照
        minio:
          enabled: false
        # test pod / monitoring 系は不要
        test:
          enabled: false
        lokiCanary:
          enabled: false
        chunksCache:
          enabled: true
        resultsCache:
          enabled: true
        monitoring:
          # victoria-metrics 側で自前 scrape 設定する (servicemonitor は VM Operator の VMServiceScrape が別)
          dashboards:
            enabled: false
          rules:
            enabled: false
          serviceMonitor:
            enabled: false
          selfMonitoring:
            enabled: false

        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 2
          schemaConfig:
            configs:
              - from: "2026-04-16"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          storage:
            type: s3
            bucketNames:
              chunks: loki-chunks
              ruler: loki-ruler
              admin: loki-admin
            s3:
              endpoint: minio.minio-tenant.svc.cluster.local
              region: us-east-1
              s3ForcePathStyle: true
              insecure: true
              # access_key_id / secret_access_key は env 経由 (loki-minio-credentials Secret)
          limits_config:
            retention_period: 720h
            ingestion_rate_mb: 50
            ingestion_burst_size_mb: 100
            max_query_parallelism: 32
            reject_old_samples: true
            reject_old_samples_max_age: 168h
          compactor:
            retention_enabled: true
            retention_delete_delay: 2h
            retention_delete_worker_count: 150
            delete_request_store: s3
          rulerConfig:
            storage:
              type: local
              local:
                directory: /var/loki/rules
            rule_path: /tmp/loki-rules-temp
            alertmanager_url: http://192.168.128.13:9093
            external_url: https://grafana.shinbunbun.com
            enable_api: true
            enable_alertmanager_v2: true
            ring:
              kvstore:
                store: memberlist
            # Recording Rule の結果 (log_errors_total 等) を VictoriaMetrics に書き戻す。
            # Ruler が LogQL recording rule を評価し、生成した時系列サンプルを
            # vminsert の Prometheus remote_write 互換エンドポイントに送信する。
            # Phase 1: これにより 30 日保持の Loki ログから抽出した統計を
            # VM 1 年 retention に載せて長期トレンドを追える。
            remote_write:
              enabled: true
              client:
                url: http://vminsert-vmcluster.victoriametrics.svc.cluster.local:8480/insert/0/prometheus/api/v1/write
                queue_config:
                  capacity: 10000

        # read/write/backend の全コンポーネントに MinIO credentials を環境変数で注入
        # (AWS SDK が AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY を自動で拾う)
        read:
          replicas: 2
          extraEnvFrom:
            - secretRef:
                name: loki-minio-credentials
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: loki
                        app.kubernetes.io/component: read
                    topologyKey: kubernetes.io/hostname

        write:
          replicas: 2
          extraEnvFrom:
            - secretRef:
                name: loki-minio-credentials
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: loki
                        app.kubernetes.io/component: write
                    topologyKey: kubernetes.io/hostname

        backend:
          replicas: 2
          extraEnvFrom:
            - secretRef:
                name: loki-minio-credentials
          # Ruler が tenant "fake" のルールを評価するため、
          # loki-rules ConfigMap を /var/loki/rules/fake にマウント
          extraVolumes:
            - name: rules
              configMap:
                name: loki-rules
          extraVolumeMounts:
            - name: rules
              mountPath: /var/loki/rules/fake
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: loki
                        app.kubernetes.io/component: backend
                    topologyKey: kubernetes.io/hostname

        gateway:
          enabled: true
          replicas: 2
  destination:
    server: https://kubernetes.default.svc
    namespace: loki
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
