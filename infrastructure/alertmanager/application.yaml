# Alertmanager
#
# VictoriaMetrics vmalert からのアラートを受信し、Discord に通知する。
# 設定は apps/victoriametrics-config/alertmanager-config-cm.yaml で管理。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alertmanager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: alertmanager
    targetRevision: "1.35.0"
    helm:
      valuesObject:
        configmapReload:
          enabled: true
        config:
          enabled: false # ConfigMap (apps/victoriametrics-config/) で管理
        configFileName: alertmanager.yml
        extraSecretMounts:
          - name: alertmanager-config
            mountPath: /etc/alertmanager
            configMap: alertmanager-config
            readOnly: true
        extraEnvFrom:
          - secretRef:
              name: alertmanager-discord
  destination:
    server: https://kubernetes.default.svc
    namespace: victoriametrics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
