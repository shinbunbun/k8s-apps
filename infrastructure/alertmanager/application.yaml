# Alertmanager
#
# VictoriaMetrics vmalert からのアラートを受信し、Discord に通知する。
# Discord webhook URL は KSOPS Secret (alertmanager-discord) から環境変数で注入。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alertmanager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: alertmanager
    targetRevision: "1.35.0"
    helm:
      valuesObject:
        config:
          global:
            resolve_timeout: 5m
          route:
            receiver: discord
            group_by:
              - alertname
              - cluster
              - service
            group_wait: 10s
            group_interval: 10s
            repeat_interval: 1h
            routes:
              - match:
                  severity: critical
                receiver: discord
                repeat_interval: 15m
              - match:
                  severity: warning
                receiver: discord
                repeat_interval: 30m
          receivers:
            - name: discord
              discord_configs:
                - webhook_url: "$DISCORD_WEBHOOK_URL"
                  send_resolved: true
          inhibit_rules:
            - source_match:
                severity: critical
              target_match:
                severity: warning
              equal:
                - alertname
                - instance
        extraEnvFrom:
          - secretRef:
              name: alertmanager-discord
        extraArgs:
          config.expand-env: true
  destination:
    server: https://kubernetes.default.svc
    namespace: victoriametrics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
