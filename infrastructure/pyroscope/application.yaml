# Pyroscope - Continuous Profiling Server (monolithic, Pyroscope 2.0)
#
# 設計判断:
#
# 【目的】Grafana Alloy `pyroscope.ebpf` component (infrastructure/alloy-profiles)
# が採取する kernel + userspace CPU プロファイルを受信・保管し、Grafana datasource
# 経由で flame graph として可視化する。Issue: shinbunbun/dotfiles#699。
#
# 【chart】grafana/pyroscope 2.0.1 (Pyroscope v2.0.1)。
# https://github.com/grafana/pyroscope/releases
# Pyroscope 2.0 (2026-04-21 GA) は完全リアーキ:
#   - 3x replication 廃止 → object storage を単一 source of truth に
#   - profile co-location でシンボル重複削減 (公式実績で 95% 削減)
#   - read path stateless 化
# 新規導入なので v1 を選ぶ理由なし。
#
# 【deployment mode】monolithic (microservices.enabled: false)。
# Pyroscope 公式は「small cluster は monolithic 推奨」。home-lab 3 ノード規模で
# distributor / querier / ingester / compactor を分離する意味は薄く、運用負荷増。
# 単一 StatefulSet 内で全ターゲットが動く。
#
# 【ストレージ】architecture.storage.v2 を採用 (v1 は disable)。
# Pyroscope 2.0 の新しい block format + co-location 前提のレイアウト。
# object storage backend は Garage S3 (pyroscope-blocks bucket、
# pyroscope-garage-obs-credentials Secret で認証)。欠損許容の profile は HA(RF=3) の
# メイン garage ではなく専用の非HAクラスタ garage-obs (RF=1, nixos-desktop) に分離
# (apps/garage/cluster-obs.yaml、g3pro の GC/resync churn 飽和 #266/#372 を回避)。
#
# 【認証情報】pyroscope-garage-obs-credentials Secret を extraEnvFrom で AWS SDK 標準
# キー (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION) として注入。
# この Secret は Garage Operator が GarageKey CR の secretTemplate で pyroscope ns
# に直接生成する (apps/garage/keys-obs.yaml の pyroscope-obs GarageKey)。
#
# 【retention】30 日。Pyroscope 内蔵 compactor が古い block を物理削除する。
# Garage bucket lifecycle rule は未設定 (Pyroscope に retention 制御を一元化)。
#
# 【レプリカ】monolithic で replicas: 1。ノード障害時は再起動で復旧、profile
# データは Garage S3 に永続化済みなので block の再読込で継続。HA は必要に
# なってから microservices モード移行で対応 (homelab 規模では不要)。
#
# 【ネットワーク】
# - alloy-profiles からの push 先: pyroscope.pyroscope.svc.cluster.local:4040
#   (ClusterIP、cluster 内のみ)
# - Grafana datasource: 同 ClusterIP 経由で読み取り
# - 外部公開なし (Cloudflare Tunnel にも載せない、LAN 限定)。Loki と同方針。
# - LAN VIP も初期は割り当てない (必要になったら apps/pyroscope-config/lan-service.yaml で追加)
#
# 【リソース】requests cpu: 200m / memory: 512Mi、limits memory: 2Gi。
# homelab 規模 (~3 ノードからの CPU profile、19Hz sampling) では十分。
#
# 【sync-wave】10: loki / alloy と同階層。
# apps/garage の Bucket/Key (wave 1-2) が先に立っている必要があるが、
# ArgoCD の retry で吸収できる (Secret 不在なら pod CrashLoopBackOff → 再 sync で復旧)。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pyroscope
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: pyroscope
    # Chart 2.0.1 = Pyroscope 2.0.1 (https://github.com/grafana/pyroscope/blob/main/operations/pyroscope/helm/pyroscope/Chart.yaml)
    targetRevision: "2.0.3"
    helm:
      valuesObject:
        # === デプロイモード ===
        # microservices=false で単一 StatefulSet (all-in-one) 起動
        microservices:
          enabled: false

        # === ストレージアーキテクチャ ===
        # Pyroscope 2.0 の新 block format + 単一 object storage backend
        architecture:
          storage:
            v1: false
            v2: true

        # chart 同梱の MinIO subchart は使わず、外部 Garage (apps/garage) を参照
        minio:
          enabled: false

        # === Pyroscope server 本体設定 ===
        pyroscope:
          # Garage credentials を AWS SDK 標準 env として注入
          # (Secret は apps/garage の pyroscope GarageKey が auto-generate)
          extraEnvFrom:
            - secretRef:
                name: pyroscope-garage-obs-credentials

          # 単一 StatefulSet (monolithic)
          replicaCount: 1

          # object storage backend + retention 設定
          structuredConfig:
            storage:
              backend: s3
              s3:
                # Pyroscope/Tempo は欠損許容の揮発デバッグデータのため、HA(RF=3) の
                # メイン garage ではなく専用の非HAクラスタ garage-obs (RF=1, nixos-desktop
                # 単一ノード, apps/garage/cluster-obs.yaml) に分離している。これにより
                # g3pro へ resync 複製が一切配られなくなり、g3pro 単一 SATA SSD の
                # GC/resync churn 飽和 (dotfiles-private#266 / #372) の原因から外れる。
                # garage-obs は pyroscope と同じ nixos-desktop (NVMe) 上に居るため
                # 同期 flush もネットワークホップ 0・低レイテンシ。
                # (旧 garage-local Service による coordinator 固定 hack は本移設で不要。
                #  pyroscope-s3-service.yaml の撤去は安定確認後の別 PR で行う)
                endpoint: garage-obs.garage.svc.cluster.local:3900
                bucket_name: pyroscope-blocks
                region: garage
                insecure: true
                # path-style: Garage 互換のため明示
                force_path_style: true
                # access_key_id / secret_access_key は env 経由 (pyroscope-garage-credentials)
            # 30 日 retention (compactor が古い block を delete)。
            # Pyroscope 2.0 では `limits.compactor_blocks_retention_period` に書く
            # (CLI flag -compactor.blocks-retention-period 相当)。旧 1.x の
            # `compactor.retention_period` は v2 の compactor.Config に存在しない。
            limits:
              compactor_blocks_retention_period: 720h
            # pyroscopedb.max_block_duration は default (1h) のまま使用 (homelab 3 ノード
            # 規模では短縮しても compaction 頻度が上がるだけでメリット薄)

            # Compactor リトライ抑制 (Garage v2 transient race 対策)。
            # Garage は object_table と version_table の CRDT 伝播 race 時に HTTP 500
            # "conflict/inconsistency between object and version state, version is deleted"
            # を返す (transient error 設計、client retry 想定: src/api/s3/get.rs check_version_not_deleted)。
            # 一方 Pyroscope の objstore.IsObjNotFoundErr は NoSuchKey しか認識せずこの 500 を
            # NotFound 扱いできないため、毎回 3 回フルリトライ → MaxFailures (default 3) 到達で
            # abandon → 新 segment 到着で再 attempt の永久ループになり log noise の主因。
            # MaxFailures=1 でリトライを 1 回に抑制、abandon された block は次サイクルで
            # 再 attempt (race は ephemeral なので次回成功する想定)。
            # 参考: pkg/objstore/not_found.go (NoSuchKey のみ判定), pkg/metastore/compaction/scheduler/scheduler.go
            metastore:
              compaction_max_failures: 1

            # segment-writer の S3 upload timeout (default 2s) を 20s に延長。
            # 当初 default 2s → 10s に拡張済 (Garage write quorum tail 対策)。
            # 2026-05-29 の K3sPodErrorLogDetected 連続発報調査
            # (dotfiles-private#266) で、10s でも flush timeout が頻発することが
            # 判明。nixos.shinbunbun.com (garage-2 host) の chronic disk queue
            # depth (avg 12-40) で Garage S3 latency が ListObjects 8.3s /
            # UploadPart 3s まで伸びるため、segment-writer の waitFlushed
            # (service.go:285) が 10s 内に完了しないケースが残った。
            # 20s まで延ばして tail に対するマージンを確保。upload-hedge_upload_after
            # (30s) は維持するので hedged upload は引き続き事実上無効。
            # これは中期施策 (nixos の重 writer 退避) が効くまでの止血策。
            # 参考: pkg/segmentwriter/service.go segmentwriter.Config.UploadTimeout
            # (yaml tag "upload-timeout,omitempty", default 2*time.Second)。
            # トップキーはアンダースコア (`segment_writer`)、サブキーはハイフン
            # 主体だがフィールド毎に混在規則があり (例: `upload-timeout` は純
            # ハイフン、`upload-hedge_upload_after` はハイフン + アンダースコア)、
            # strict YAML decode (KnownFields=true) のため間違えると
            # CrashLoopBackOff。CLI flag 名 (`-segment-writer.upload-hedge-after`)
            # とも異なるので必ず `pkg/segmentwriter/service.go` の yaml tag を
            # 一次情報として確認すること。
            # hedged upload を事実上無効化 (default 500ms → 30s)。
            # Pyroscope の uploadBlock は retry.Hedged で primary PUT が
            # `upload-hedge_upload_after` 経過時点で未完了の場合、同じ key に
            # 対し 2 本目の PUT を並行発射する (pkg/segmentwriter/segment.go
            # L400-436 + pkg/util/retry/hedged.go)。一方が成功した瞬間
            # context cancel するが、既にネット上にある 2 本目の HTTP request
            # は Garage に到達して Aborted=true の object version として
            # 記録される (= 全 upload で 1 completed + 1 aborted の 2 version
            # が生成される)。多くは GC で清掃されるが、Garage 側の GC backlog
            # と race して一部が「object exists, version=deleted」の dangling
            # 状態に固着し、Pyroscope querier が永久に Garage 500 を受け取る
            # 真因となっていた (unified-dotfiles#17、約 200 block dangling 化)。
            # HedgeAfter > UploadTimeout なら hedged は事実上発火しないため、
            # 30s に延ばして aborted version 生成元を断つ。homelab 規模では
            # テールレイテンシ削減の恩恵より dangling block 抑止の方が重要。
            segment_writer:
              upload-timeout: 20s
              upload-hedge_upload_after: 30s

          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi

          # === ノード固定 (nixos-desktop) ===
          # garage-local Service (internalTrafficPolicy: Local) で S3 コーディネータを
          # 同一ノードの garage Pod に限定する設計上、pyroscope は garage-0 と同居する
          # nixos-desktop (NVMe・24 コア) に固定する必要がある。
          # ・g3pro に再配置されると Local が garage-1=g3pro に振られ本末転倒
          # ・nixos-desktop は最強ノードかつ garage-0 同居でネットワークホップ 0
          # データは emptyDir (object storage が真実) なので再配置自体は無害。
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values: ["nixos-desktop"]

        # === Service 設定 ===
        # ClusterIP のみ (外部公開なし)。Grafana datasource / alloy-profiles から
        # `http://pyroscope.pyroscope.svc.cluster.local:4040` で参照。
        service:
          type: ClusterIP
          port: 4040
  destination:
    server: https://kubernetes.default.svc
    namespace: pyroscope
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
