# OpenSearch Dashboards - ログ検索・可視化UI
#
# 公式 Helm Chart (2.30.0 / AppVersion 2.19.2) でデプロイ。
# OpenSearch 本体は nixos-desktop (192.168.1.4:9200) の NixOS サービスを参照する。
# ステートレスのため PVC 不要。2レプリカで HA 化。
# Ingress は apps/opensearch-dashboards-config/ (IngressRoute) で定義する。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opensearch-dashboards
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://opensearch-project.github.io/helm-charts
    chart: opensearch-dashboards
    targetRevision: "2.30.0"
    helm:
      valuesObject:
        # --- 接続先 OpenSearch (nixos-desktop NixOS サービス) ---
        opensearchHosts: "http://192.168.1.4:9200"

        # --- HA: 2レプリカ ---
        replicaCount: 2

        # --- セキュリティプラグイン無効化 ---
        extraEnvs:
          - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
            value: "true"

        # --- Ingress は Traefik IngressRoute 側で定義 ---
        ingress:
          enabled: false

        # --- リソース制限 ---
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
  destination:
    server: https://kubernetes.default.svc
    namespace: opensearch-dashboards
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
