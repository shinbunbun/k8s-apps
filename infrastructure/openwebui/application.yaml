# Open WebUI - macmini Qwen3.5 推論サーバ用 Web UI
#
# 公式 Helm Chart で OpenWebUI 本体をデプロイ。後段の LLM 推論は macmini
# (192.168.1.5:8081) で常駐する mlx-lm.server (OpenAI 互換 API) を参照する。
#
# 認証は Authentik OIDC + Cloudflare Zero Trust Access の二重防御。
# OIDC client_id / client_secret / WEBUI_SECRET_KEY は KSOPS で復号した
# Secret (apps/openwebui-config/) から注入する。
#
# DB は SQLite (PVC 5Gi, ReadWriteOnce, replicaCount: 1)。HA が必要になったら
# CNPG Postgres を立てて databaseUrl で切り替える。
# Redis (websocket subchart) と Ollama / Pipelines / Tika subchart は不要なので無効化。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openwebui
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.openwebui.com
    chart: open-webui
    targetRevision: "14.2.0"
    helm:
      valuesObject:
        # release 名と chart 名がずれるので fullnameOverride で Service 名を固定。
        # cloudflared-k3s configmap の hostname → service マッピングはこの名前に依存する。
        fullnameOverride: open-webui

        replicaCount: 1

        # SQLite + 単一レプリカ運用なので Redis (websocket) と各種 subchart を無効化
        ollama:
          enabled: false
        pipelines:
          enabled: false
        tika:
          enabled: false
        websocket:
          enabled: false

        persistence:
          enabled: true
          size: 5Gi
          storageClass: local-path
          accessModes:
            - ReadWriteOnce

        # Cloudflare Tunnel 経由で公開するので Ingress は不要
        ingress:
          enabled: false

        service:
          type: ClusterIP
          port: 80
          containerPort: 8080

        # OpenAI 互換バックエンドを 2 系統並列登録:
        #   1. macmini (192.168.1.5:8081) — mlx-lm.server / Qwen3.5-4B-MLX-4bit (軽量)
        #   2. nixos-desktop (192.168.1.4:8082) — llama.cpp / Qwen3.6-35B-A3B-UD-Q4_K_M (CPU 推論、思考重め)
        # UI のモデル選択ドロップダウンで両方が現れるので用途に応じて切替。
        # どちらも API キー検証なしだが空だと chart のデフォルト ("0p3n-w3bu!") が流れるので
        # 明示的に dummy を 2 個並べる (URL の数と長さを合わせる必要あり)。
        enableOpenaiApi: true
        openaiBaseApiUrls:
          - "http://192.168.1.5:8081/v1"
          - "http://192.168.1.4:8082/v1"
        openaiApiKeys:
          - "dummy"
          - "dummy"

        # SQLite (デフォルト)
        databaseUrl: ""

        # WEBUI_SECRET_KEY は Secret 全体を envFrom で読み込む
        extraEnvFrom:
          - secretRef:
              name: openwebui-secrets

        # ENABLE_OLLAMA_API は chart の `ollama.enabled: false` から ENABLE_OLLAMA_API=False が
        # 自動で env に出るので extraEnvVars には書かない (重複回避)
        extraEnvVars:
          - name: WEBUI_URL
            value: "https://chat.shinbunbun.com"
          # 認証は Authentik OIDC に一本化 (ローカルログインフォーム非表示)
          - name: ENABLE_LOGIN_FORM
            value: "false"

        sso:
          enabled: true
          enableSignup: true
          mergeAccountsByEmail: true
          oidc:
            enabled: true
            clientExistingSecret: openwebui-secrets
            clientIdExistingSecretKey: OAUTH_CLIENT_ID
            clientExistingSecretKey: OAUTH_CLIENT_SECRET
            providerUrl: "https://auth.shinbunbun.com/application/o/openwebui/.well-known/openid-configuration"
            providerName: "Authentik"
            scopes: "openid email profile"

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: openwebui
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
