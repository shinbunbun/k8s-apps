# Garage Operator - S3 互換オブジェクトストレージ (MinIO 後継) を宣言的に管理
#
# rajsinghtech/garage-operator を Helm chart で導入。CRD は GarageCluster /
# GarageBucket / GarageKey / GarageNode / GarageAdminToken の 5 種で、
# apps/garage/ 配下の CR を監視して StatefulSet + layout + bucket + key を自動構築する。
#
# 【選定理由】
# - 2026-02 の MinIO archive を受けた代替
# - minio-operator / cnpg-operator と同じ「Operator + CR」パターンに合わせる
# - Garage ネイティブの bootstrap (layout assign / node connect) を operator が担当し、
#   bash スクリプトによる手続き型 bootstrap を避ける
# - GarageKey.spec.importKey で SOPS 暗号化アクセスキーを事前生成 → import 可能
#
# 【sync-wave】-5 は piraeus 等より後、Loki (10) 等のクライアント Application より前。
#
# 【git source】operator はまだ Helm repo 公開しておらず、GitHub の charts/garage-operator/
# を直接引く。targetRevision は release tag に固定 (Renovate が自動 PR を作る)。
#
# 【image.tag override】v0.4.1 以降は Chart.yaml の appVersion が release tag と
# 揃って同期されているが、Renovate が targetRevision だけ bump して image.tag を
# 更新し忘れるリスクを避けるため明示 pin を維持。operator bump 時は targetRevision と
# image.tag を必ず揃えて更新する。
#
# 【v1alpha1 → v1beta1 移行】v0.4.0 で API が v1beta1 に昇格、v1alpha1 は served=false。
# 本 chart bump (0.3.16 → 0.4.1) と同コミットで apps/garage/ 配下の manifest を
# v1beta1 + 新フィールド形式に更新する (rajsinghtech/garage-operator MIGRATION.md
# §"ArgoCD" の Step 1+2 を 1 PR にまとめた形)。Step 3 (v0.4.2+ または v0.5.x) は別 PR。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: garage-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: default
  source:
    repoURL: https://github.com/rajsinghtech/garage-operator.git
    targetRevision: v0.5.7
    path: charts/garage-operator
    helm:
      valuesObject:
        # leader election + 2 replica で operator 自身を HA 化 (minio-operator と同パターン)
        replicaCount: 2
        image:
          # release tag と揃えて明示 pin (Renovate が chart targetRevision だけ bump して
          # image を取り残す事故を防ぐため。詳細はファイル上部コメント参照)
          # 注: 上流 v0.5.7 まで Chart.yaml の appVersion が "0.4.1" のまま (upstream の
          # bump 漏れ) なので、ここで明示 pin しないと operator binary が v0.4.1 のまま
          # 古いまま走り、v0.5.6+ で導入された StatefulSet identity / v0.5.7 の gateway
          # 設計と template 不整合を起こす。
          tag: "0.5.7"
        crds:
          install: true
          keep: true
  destination:
    server: https://kubernetes.default.svc
    namespace: garage-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # CRD が大きいため client-side apply の annotation 上限回避で必須
      - ServerSideApply=true
